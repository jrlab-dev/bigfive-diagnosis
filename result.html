<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e27;
    --purple: #8b5cf6;
    --blue: #3b82f6;

  body {

    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;

  .bg-nebula {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;

  }
  @keyframes nebula-drift {

    100% { transform: scale(1.05) translate(-1%, 1%); }
  }
  .bg-stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.5; } 100% { opacity: 1; }
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    padding: 32px 20px 60px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ===== カード ===== */
  .card-wrapper {
    position: relative; width: 100%;
    max-width: 480px; aspect-ratio: 1 / 1;
    margin-bottom: 32px;
    perspective: 1000px;
    perspective-origin: 50% 50%;
  }
  .card {
    position: relative; width: 100%; height: 100%;
    border-radius: 8px; overflow: hidden;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 20px 20px;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.6),
      0 0 60px rgba(49,30,90,0.2),
      inset 2px 2px 0 rgba(255,255,255,0.12),
      inset -2px -2px 0 rgba(0,0,0,0.6),
      inset 0 0 0 2px rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.08);
    border-style: solid;
    will-change: transform;
    transition: border-color 0.15s, border-width 0.15s;

  /* エッジハイライト（マウス位置に光の反射） */
  .edge-light {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none; border-radius: inherit;
    opacity: 0; transition: opacity 0.3s;
    background: radial-gradient(
      circle 160px at var(--ex, 50%) var(--ey, 50%),
      rgba(255,255,255,0.13) 0%,
      rgba(255,255,255,0.04) 45%,
      transparent 70%
    );
  }
  .card-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 25% 20%, rgba(139,92,246,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 75%, rgba(59,130,246,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 40%, rgba(26,10,62,0.8) 0%, transparent 70%),
      linear-gradient(160deg, #0a0e27 0%, #1a0a3e 40%, #0f172a 100%);
  }
  .card-bg.role-model {
    background:
      repeating-conic-gradient(
        from 0deg,
        transparent 0deg 8deg,
        rgba(255, 215, 0, 0.15) 8deg 16deg
      ),
      radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.25) 0%, transparent 50%),
      linear-gradient(160deg, #ffffff 0%, #f5f5dc 40%, #ffffff 100%);

  .card-bg.role-model::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-conic-gradient(
      from 0deg,
      transparent 0deg 10deg,
      rgba(255, 215, 0, 0.12) 10deg 20deg

    animation: rotate-rays 60s linear infinite;

  @keyframes rotate-rays {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }

    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    animation: star-twinkle 4s ease-in-out infinite alternate;
  }

    0% { opacity: 0.7; } 100% { opacity: 1; }
  }
  .shimmer {
    position: absolute; inset: -100%; z-index: 2;
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
  }
  /* レアリティ判定（スコアの極端さで自動設定） */
  .rarity-common .shimmer { opacity: 0; }
  .rarity-rare .shimmer {
    opacity: 1;

    mix-blend-mode: overlay;

  @keyframes shimmer-move {

    50% { transform: translateX(60%) rotate(15deg); }

  .rarity-legendary .score-label,

  .glow-overlay {
    position: absolute; inset: 0; z-index: 2;
    pointer-events: none; opacity: 0; transition: opacity 0.5s;
    border-radius: inherit;

  .glow-overlay.active {

  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; transform: scale(0.98); }

  /* ダークパーソナリティの光るエフェクト */
  .card-bg.dark-personality {

  .card-bg.dark-personality::after {

  @keyframes dark-glow {

  /* Legendary: 放射光線オーバーレイ */
  .ray-overlay {
    position: absolute; inset: 0; z-index: 3;

        transparent 330deg, rgba(59,130,246,0.07) 332deg, transparent 334deg,

  }
  .rarity-legendary .ray-overlay { opacity: 1; }
  @keyframes ray-spin {
    to { transform: rotate(360deg); }
  }

  /* ===== SECRET: 金ホログラム ===== */
  #holoBg {
    position: absolute; inset: 0; z-index: 0;
    opacity: 0; border-radius: inherit; pointer-events: none;
  }
  .rarity-secret #holoBg   { opacity: 1; }
  .rarity-secret .card-bg  { opacity: 0; }
  .rarity-secret .stars    { opacity: 0; }
  .rarity-secret .card {

  .rarity-secret .shimmer {

  .char-area {

  .card-content {

  /* ===== 性格説明 ===== */

function genRichDesc(sc) {
  const sorted = Object.entries(sc).sort((a, b) => b[1] - a[1]);
  const top1 = sorted[0][0], top2 = sorted[1][0];
  const e1 = traitDesc[top1][sc[top1]];
  const e2 = traitDesc[top2][sc[top2]];

  const summaries = {
    EO: 'あなたは明るく社交的でありながら好奇心旺盛な行動派タイプです。',
    EC: 'あなたは社交的でありながら責任感も強い、信頼されやすいタイプです。',
    EA: 'あなたは人懐こく思いやり深い、周りを温かくする存在です。',
    EN: 'あなたは表に出る明るさの裏に繊細な感受性を持ち合わせています。',
    OC: 'あなたは好奇心と計画性を兼ね備えた、着実に挑戦できるタイプです。',
    OA: 'あなたはオープンマインドで人にも親切な、懐の深いタイプです。',
    ON: 'あなたは豊かな感受性と好奇心を持つ、感性の鋭いタイプです。',
    CA: 'あなたは誠実で思いやりがあり、周囲から信頼を集めやすいタイプです。',
    CN: 'あなたは几帳面で繊細。細かいことに気づける、丁寧な仕事をするタイプです。',
    AN: 'あなたは共感力が高く感情豊か。人の気持ちに寄り添うのが得意なタイプです。',
  };
  const keyStr = top1 + top2;
  const revKey = top2 + top1;
  const summary = summaries[keyStr] || summaries[revKey] || `あなたは${e1.kw[0]}で${e2.kw[0]}な性格傾向があります。`;

  // 全5因子のキーワードを収集
  const allKw = [];
  for (const f of ['O', 'C', 'E', 'A', 'N']) {
    allKw.push(...(traitDesc[f][sc[f]]?.kw || []).slice(0, 1));
  }

  // 全5因子の説明を結合（上位2因子は長文、残りは短文）
  const topTexts = [top1, top2].map(f => traitDesc[f][sc[f]].text);
  const otherFactors = sorted.filter(([k]) => k !== top1 && k !== top2);
  const otherTexts = otherFactors.map(([f]) => {
    const info = traitInfo[f];
    const frag = fragments[f][sc[f]];
    return `${info.name}：${frag}`;
  });
  const detail = topTexts.join(' ') + '\n' + otherTexts.join('\n');

  return { summary, detail, keywords: allKw };
}

function genCareerSection(sc) {
  const seen = new Set();
  const careers = [];
  const reasons = [];

  // 極端な因子（1-2, 4-5）から職業を収集
  const factors = ['O', 'C', 'E', 'A', 'N'];
  const extreme = factors.filter(f => sc[f] >= 4 || sc[f] <= 2);

  if (extreme.length >= 2) {
    extreme.forEach(f => {
      const level = sc[f] >= 4 ? 'high' : 'low';
      const items = careerByFactor[f][level];
      items.forEach(item => {
        if (!seen.has(item.name)) {
          seen.add(item.name);
          careers.push(item);
        }
      });
    });
  } else {
    // 中間型：上位2因子から中程度の職業を追加
    const sorted = Object.entries(sc).sort((a, b) => b[1] - a[1]);
    sorted.slice(0, 2).forEach(([f]) => {
      const items = careerByFactor[f][sc[f] >= 3 ? 'high' : 'low'];
      items.forEach(item => {
        if (!seen.has(item.name)) {
          seen.add(item.name);
          careers.push(item);
        }
      });
    });
  }

  // 最大5つに絞る
  const display = careers.slice(0, 5);

  // 特徴的な理由を生成
  const top2 = Object.entries(sc).sort((a, b) => b[1] - a[1]).slice(0, 2);
  const traitLabels = top2.map(([f, v]) => {
    const info = traitInfo[f];
    return v >= 4 ? `${info.name}が高い` : v <= 2 ? `${info.name}が低い` : '';
  }).filter(Boolean);

  return { careers: display, traits: traitLabels };
}

// ===== 相性スコア計算（学術根拠版） =====
function calcCompatibility(myCode, partnerCode) {
  const [oM, cM, eM, aM, nM] = myCode.split('').map(Number);
  const [oP, cP, eP, aP, nP] = partnerCode.split('').map(Number);

  // デバッグログ
  console.log('相性計算デバッグ:', { myCode, partnerCode });
  console.log('自分:', { oM, cM, eM, aM, nM });
  console.log('相手:', { oP, cP, eP, aP, nP });

  // 差分
  const dO = Math.abs(oM - oP);
  const dC = Math.abs(cM - cP);
  const dE = Math.abs(eM - eP);
  const dA = Math.abs(aM - aP);
  const dN = Math.abs(nM - nP);

  // 生スコア計算（Actor効果 + Partner効果 + 差分ペナルティ）
  let rawScore =
    (6 - nM) * 5.0 +   // 自分のN低さ（Actor効果 ρ=-.29）
    (6 - nP) * 4.0 +   // 相手のN低さ（Partner効果 r=-.22）
    aM * 5.0 +          // 自分のA高さ（Actor効果 ρ=+.29）
    aP * 3.5 +          // 相手のA高さ（Partner効果 r=+.15）
    cM * 3.0 +          // 自分のC高さ（Actor効果 ρ=+.25）
    cP * 1.5 +          // 相手のC高さ（Partner効果 r=+.12）
    (-dC * 2.0) +       // Cスコア差ペナルティ（生活スタイルミスマッチ）
    (-dE * 3.5) +       // Eスコア差ペナルティ（社交スタイルミスマッチ★強化）
    (-dO * 0.5);        // Oスコア差ペナルティ（効果量最小）

  console.log('生スコア（補正前）:', rawScore);

  // 特殊パターン補正
  if (nM >= 4 && aP <= 2) {
    console.log('補正適用: 自分N高×相手A低 -15');
    rawScore -= 15;
  }
  if (nP >= 4 && aM <= 2) {
    console.log('補正適用: 相手N高×自分A低 -15');
    rawScore -= 15;
  }
  if (nM <= 2 && nP <= 2) {
    console.log('補正適用: 両者安定型 +8');
    rawScore += 8;
  }
  if (aM >= 4 && aP >= 4) {
    console.log('補正適用: 双方高協調 +8');
    rawScore += 8;
  }

  console.log('生スコア（補正後）:', rawScore);

  // 正規化: -16〜110 → 0〜100
  const MIN = -16, MAX = 110;
  const normalizedScore = (rawScore - MIN) / (MAX - MIN) * 100;
  const score = Math.max(0, Math.min(100, normalizedScore));

  console.log('正規化後スコア:', normalizedScore, '→', Math.round(score));

  return {
    score: Math.round(score),
    details: { dO, dC, dE, dA, dN },
    components: {
      myN: nM, partnerN: nP,
      myA: aM, partnerA: aP,
      myC: cM, partnerC: cP
    }
  };
}

  // N（最重要）

    comments.push("お互い感情の波が大きく、ぶつかりやすい面があります。");
  } else if (nM <= 2 && nP <= 2) {
    comments.push("2人とも精神的に安定しています。困難な状況でも冷静に向き合えます。");
  } else if (nP <= 2 && nM >= 4) {
    comments.push("相手の安定感があなたの心を落ち着かせてくれます。");
  } else if (nM <= 2 && nP >= 4) {
    comments.push("あなたの安定感が相手の心を支えてくれます。");
  }

  // A
  if (aM >= 4 && aP >= 4) {
    comments.push("思いやりが深い2人。対立しても話し合いで解決できます。");
  } else if (aM <= 2 && aP <= 2) {
    comments.push("2人とも自己主張が強め。意見の違いが摩擦になることも。");
  }

  // C（生活スタイル）
  const dC = Math.abs(cM - cP);
  if (dC >= 3) {
    comments.push("計画性と自由さに大きな差があります。生活スタイルの摺り合わせが必要です。");
  }

  // E（社交スタイル）
  const dE = Math.abs(eM - eP);
  if (dE >= 3) {
    comments.push("社交的なニーズに差があります。休日の過ごし方の好みが異なる可能性があります。");
  }

  return comments.length > 0 ? comments.join(' ') : "基本の相性は良好です。コミュニケーションを大切にしてください。";
}

// ===== レアリティ判定 =====

// 診断スコア（1-5）を隠しキャラ照合用の1/3/5スケールに変換
function toHiddenScale(v) {
  return v <= 2 ? 1 : v >= 4 ? 5 : 3;
}

// 隠しキャラ一致チェック（HIDDEN_CHARACTERS は hidden_characters.js で定義）
function findHiddenCharacter() {
  if (typeof HIDDEN_CHARACTERS === 'undefined') return null;
  const os = toHiddenScale(O), cs = toHiddenScale(C);
  const es = toHiddenScale(E), as = toHiddenScale(A), ns = toHiddenScale(N);
  return HIDDEN_CHARACTERS.find(ch =>
    ch.o === os && ch.c === cs && ch.e === es && ch.a === as && ch.n === ns &&
    (ch.gender === 'any' || ch.gender === gender)
  ) || null;
}

function getRarity() {
  // 10問：レアなし
  if (version === '10') return 'common';

  const hiddenChar = findHiddenCharacter();

  if (version === '30') {
    if (hiddenChar) return 'legendary';      // 隠しキャラ一致 → LEGENDARY
    if (Math.random() < 0.05) return 'rare'; // 5%抽選 → RARE
    return 'common';
  }

  // 120問
  if (hiddenChar) return 'secret';           // 隠しキャラ一致 → SECRET
  if (Math.random() < 0.05) return 'legendary'; // 5%抽選 → LEGENDARY
  return 'rare';                             // それ以外は全員RARE
}

// ===== 説明文生成 =====
function genDescription() {
  const parts = [];
  const f = [O, C, E, A, N];
  const keys = ['O', 'C', 'E', 'A', 'N'];
  f.forEach((score, i) => {
    if (score === 1 || score === 5) {
      parts.push(fragments[keys[i]][score]);
    }
  });
  if (parts.length === 0) {
    parts.push(fragments.O[3]);
    parts.push(fragments.E[3]);
  }
  // 最大2つに絞る
  return parts.slice(0, 2).join('。') + '。';
}

// ===== タイプ名生成 =====
function genTypeName() {
  const scores = { O, C, E, A, N };
  let main = 'O', max = O;
  for (const [k, v] of Object.entries(scores)) {
    if (v > max) { max = v; main = k; }
  }
  const mainLabels = {
    O: { high: '探求者', low: '確実派' },
    C: { high: '実行者', low: '自由人' },
    E: { high: '社交家', low: '内省家' },
    A: { high: '調停者', low: '競争者' },
    N: { high: '感受家', low: '平静派' }
  };
  const subLabels = {
    O: { high: '発想家', low: '現実派' },
    C: { high: '規律派', low: '柔軟派' },
    E: { high: 'ムードメーカー', low: '思考家' },
    A: { high: '支援者', low: '自立派' },
    N: { high: '繊細派', low: '泰然家' }
  };
  const mainEntry = mainLabels[main];
  const mainLabel = max >= 4 ? mainEntry.high : mainEntry.low;
  // 2番目に特徴的な因子（スコア1または5）
  let sub = '';
  for (const [k, v] of Object.entries(scores)) {
    if (k !== main && (v === 1 || v === 5)) {
      sub = subLabels[k][v === 5 ? 'high' : 'low'];
      break;
    }
  }
  return sub ? `${sub}・${mainLabel}` : mainLabel;
}

  } : null;

  // すでに保存済みかチェック（versionも含めてチェック）
  function checkAlreadySaved() {
    const myResults = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
    const isSaved = myResults.some(r => r.code === currentResult.code && r.version === currentResult.version);
    if (isSaved) {
      saveBtn.textContent = '✓ 保存済み';
      saveBtn.className = 'btn btn-saved';
    }
  }

  // 保存実行
  saveBtn.addEventListener('click', () => {
    try {
      // 自分の結果を保存（versionも含めて重複チェック）
      const myResults = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
      const isDuplicate = myResults.some(r => r.code === currentResult.code && r.version === currentResult.version);
      if (!isDuplicate) {
        myResults.unshift(currentResult);
        if (myResults.length > 50) myResults.pop();
        localStorage.setItem(STORAGE_KEY_MY, JSON.stringify(myResults));
      }

      // あの人の結果も保存（他者診断から来た場合）
      if (otherResult) {
        const others = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');
        const isOtherDuplicate = others.some(r => r.name === otherResult.name && r.code === otherResult.code);
        if (!isOtherDuplicate) {
          others.unshift(otherResult);
          if (others.length > 100) others.pop();
          localStorage.setItem(STORAGE_KEY_OTHERS, JSON.stringify(others));
        }
      }

      // ボタン表示更新
      saveBtn.textContent = '✓ 保存しました！';
      saveBtn.className = 'btn btn-saved';

      setTimeout(() => {
        saveBtn.textContent = '✓ 保存済み';
      }, 2000);

    } catch (e) {
      console.error('保存エラー:', e);
      alert('保存に失敗しました');
    }
  });

  // 初期チェック
  checkAlreadySaved();
})();
</script>

<!-- ===== 3D傾きエフェクト（全レアリティ共通）===== -->
<script>
(function() {
  const card    = document.getElementById('card');
  const wrapper = document.querySelector('.card-wrapper');
  const edgeLight = document.getElementById('edgeLight');
  if (!card || !wrapper) return;

  let tRx = 0, tRy = 0, cRx = 0, cRy = 0;
  function lerp(a, b, t) { return a + (b - a) * t; }

  wrapper.addEventListener('mousemove', e => {
    const r = wrapper.getBoundingClientRect();
    const mx = (e.clientX - r.left) / r.width  - 0.5;
    const my = (e.clientY - r.top)  / r.height - 0.5;
    tRy =  mx * 18;
    tRx = -my * 12;
  });
  wrapper.addEventListener('mouseleave', () => { tRx = 0; tRy = 0; });

  (function animTilt() {
    cRx = lerp(cRx, tRx, 0.08);
    cRy = lerp(cRy, tRy, 0.08);
    card.style.transform = `rotateX(${cRx.toFixed(2)}deg) rotateY(${cRy.toFixed(2)}deg)`;

    // --- 1. エッジハイライト（マウス位置に光の反射）---
    if (edgeLight) {
      const lx = ((-cRy / 18 + 1) / 2 * 100).toFixed(1);
      const ly = ((-cRx / 12 + 1) / 2 * 100).toFixed(1);
      edgeLight.style.setProperty('--ex', lx + '%');
      edgeLight.style.setProperty('--ey', ly + '%');
      const totalTilt = Math.abs(cRx) + Math.abs(cRy);
      edgeLight.style.opacity = totalTilt > 0.8 ? '1' : '0';
    }

    // --- 2. グラデーション枠線（傾き方向に光の反射）---
    // 手前側を明るく、奥側を暗く
    const topI    = Math.max(0, -cRx / 12);
    const botI    = Math.max(0,  cRx / 12);
    const leftI   = Math.max(0,  cRy / 18);
    const rightI  = Math.max(0, -cRy / 18);
    const tB = (0.08 + topI   * 0.32).toFixed(3);
    const bB = (0.08 + botI   * 0.32).toFixed(3);
    const lB = (0.08 + leftI  * 0.32).toFixed(3);
    const rB = (0.08 + rightI * 0.32).toFixed(3);
    card.style.borderTopColor    = `rgba(255,255,255,${tB})`;
    card.style.borderBottomColor = `rgba(255,255,255,${bB})`;
    card.style.borderLeftColor   = `rgba(255,255,255,${lB})`;
    card.style.borderRightColor  = `rgba(255,255,255,${rB})`;

    // --- 3. 厚み表現（手前側の枠を太く）---
    const thick = (2 + (Math.abs(cRx) + Math.abs(cRy)) / 30 * 2.5).toFixed(1);
    const thin  = Math.max(0.5, 2 - (Math.abs(cRx) + Math.abs(cRy)) / 30 * 1).toFixed(1);
    card.style.borderTopWidth    = cRx < -0.5 ? thick + 'px' : cRx > 0.5 ? thin + 'px' : '2px';
    card.style.borderBottomWidth = cRx >  0.5 ? thick + 'px' : cRx < -0.5 ? thin + 'px' : '2px';
    card.style.borderLeftWidth   = cRy >  0.5 ? thick + 'px' : cRy < -0.5 ? thin + 'px' : '2px';
    card.style.borderRightWidth  = cRy < -0.5 ? thick + 'px' : cRy > 0.5 ? thin + 'px' : '2px';

    // --- キャラクターの影を傾きに連動（立体感演出）---
    const sx = (cRy * 1.2).toFixed(1);
    const sy = (cRy * 0.3 + cRx * 0.5 + 8).toFixed(1);
    const blur = (12 + Math.abs(cRy) * 0.8 + Math.abs(cRx) * 0.5).toFixed(1);
    const shadowFilter = `drop-shadow(${sx}px ${sy}px ${blur}px rgba(0,0,0,1))`;
    const charImg = document.getElementById('charImg');
    if (charImg) charImg.style.filter = shadowFilter;

    requestAnimationFrame(animTilt);
  })();
})();
</script>

<!-- ===== SECRET: 金ホログラム（SECRETレアリティのみ）===== -->
<script>
(function() {
  const card    = document.getElementById('card');
  const wrapper = document.querySelector('.card-wrapper');
  if (!card || !wrapper) return;

  // SECRETレアリティのみ起動
  if (!card.classList.contains('rarity-secret')) return;

  const canvas = document.getElementById('holoBg');
  const ctx    = canvas.getContext('2d');
  const CELL   = 18, DEPTH = 0.42;
  let t = 0, W = 0, H = 0, brightness = 0;
  window.holoHovered = false;

  function syncSize() {
    const rect = card.getBoundingClientRect();
    W = rect.width  || 340;
    H = rect.height || 480;
    canvas.width  = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  syncSize();
  window.addEventListener('resize', syncSize);

  wrapper.addEventListener('mouseenter', () => { window.holoHovered = true;  card.classList.add('holo-on'); });
  wrapper.addEventListener('mouseleave', () => { window.holoHovered = false; card.classList.remove('holo-on'); });

  const BASE_HUE = 38;

  function getCellColor(col, row, facetLight) {
    const cols = Math.ceil(W / CELL) + 1;
    const rows = Math.ceil(H / CELL) + 1;
    const x = col / cols, y = row / rows;
    const wave =
      Math.sin(x * 6.28 + y * 2.09 + t * 0.00025) * 0.35 +
      Math.sin(x * 3.71 - y * 5.13 + t * 0.00035) * 0.28 +
      Math.sin((x - y)  * 4.97      + t * 0.00020) * 0.22 +
      Math.sin(x * 2.33 + y * 7.81 + t * 0.00030) * 0.15;
    const hue = BASE_HUE + wave * 18;
    const sat = 85 + wave * 12;
    const baseL = facetLight * brightness + facetLight * 0.50 * (1 - brightness);
    const lit   = baseL + wave * 6;
    return `hsl(${hue.toFixed(1)},${sat.toFixed(1)}%,${Math.max(4, lit).toFixed(1)}%)`;
  }

  function drawCell(col, row) {
    const cx = col * CELL, cy = row * CELL, d = CELL * DEPTH;
    const tl = [cx, cy], tr = [cx+CELL, cy], bl = [cx, cy+CELL], br = [cx+CELL, cy+CELL];
    const cc = [cx + CELL/2, cy + CELL/2 - d*0.2];
    [
      { pts:[tl,tr,cc], L:75 },
      { pts:[bl,br,cc], L:18 },
      { pts:[tl,bl,cc], L:48 },
      { pts:[tr,br,cc], L:33 },
    ].forEach(({ pts, L }) => {
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      ctx.lineTo(pts[1][0], pts[1][1]);
      ctx.lineTo(pts[2][0], pts[2][1]);
      ctx.closePath();
      ctx.fillStyle = getCellColor(col, row, L);
      ctx.fill();
    });
  }

  function loop() {
    if (window.holoHovered) t++;
    brightness += ((window.holoHovered ? 1 : 0) - brightness) * 0.04;
    ctx.clearRect(0, 0, W, H);
    const cols = Math.ceil(W / CELL) + 1;
    const rows = Math.ceil(H / CELL) + 1;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) drawCell(c, r);
    ctx.strokeStyle = 'rgba(0,0,0,0.30)';
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= rows; r++) { ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke(); }
    for (let c = 0; c <= cols; c++) { ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke(); }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
