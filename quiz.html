<style>

  .bg-stars {

// ===== 状態管理 =====
const params = new URLSearchParams(window.location.search);
const version = params.get('v') === '120' ? '120' : params.get('v') === '30' ? '30' : '10';
const questions = version === '120' ? questions120 : version === '30' ? questions30 : questions10;
const total = questions.length;
let current = 0;
const answers = new Array(total).fill(null);

// ===== 途中保存（localStorage）=====
const SAVE_KEY = `bigfive_progress_v${version}`;
function saveProgress() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({ current, answers }));
  } catch(e) {}
}
function clearProgress() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}
function loadSaved() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (d && d.answers && d.answers.length === total && d.current > 0) return d;
  } catch(e) {}
  return null;
}

// other_quizから来た場合、LocalStorageから自分のコードを取得
let myCode = params.get('my') || '';
const ref = params.get('ref') || '';
if (ref === 'other' && !myCode) {
  try {
    const STORAGE_KEY_MY = 'bigfive_my_results';
    const myResults = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
    if (myResults.length > 0) {
      myCode = myResults[0].code;
      console.log('LocalStorageから自分のコードを読み込みました:', myCode);
    }
  } catch (e) {
    console.error('LocalStorage読み込みエラー:', e);
  }
}

// ===== DOM =====
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const questionNum = document.getElementById('questionNum');
const questionText = document.getElementById('questionText');
const answersEl = document.getElementById('answers');
const backBtn = document.getElementById('backBtn');
const questionArea = document.getElementById('questionArea');
const loading = document.getElementById('loading');

// ===== 画面更新 =====
// showSaved=true: 戻るとき・再開時に保存済み回答を表示
// showSaved=false: 次の問題へ進むとき（まっさら）
function render(showSaved = true) {
  const q = questions[current];
  progressFill.style.width = `${((current + 1) / total) * 100}%`;
  progressText.textContent = `${current + 1}/${total}`;
  questionNum.textContent = `Q${current + 1}`;
  questionText.textContent = q.text;

  answersEl.querySelectorAll('.answer-btn').forEach(btn => btn.classList.remove('selected'));
  if (showSaved) {
    const savedAnswer = answers[current];
    if (savedAnswer !== null) {
      const target = answersEl.querySelector(`[data-val="${savedAnswer}"]`);
      if (target) target.classList.add('selected');
    }
  }

  backBtn.style.visibility = current === 0 ? 'hidden' : 'visible';
}

// ===== 回答選択 =====
let timer = null;

answersEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.answer-btn');
  if (!btn) return;
  clearTimeout(timer);
  answers[current] = parseInt(btn.dataset.val);
  answersEl.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  saveProgress();
  timer = setTimeout(() => {
    answersEl.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
    if (current < total - 1) {
      current++;
      render(false);
    } else {
      clearProgress();
      showResult();
    }
  }, 300);
});

// ===== 戻る =====
backBtn.addEventListener('click', () => {
  clearTimeout(timer);
  if (current > 0) { current--; render(); }
});

// ===== スコア計算 =====
function calcScore() {
  if (version === '10') {
    // 10問版：各因子2問、平均→3段階
    const factors = { E: [0,1], A: [2,3], C: [4,5], N: [6,7], O: [8,9] };
    const scores = {};
    for (const [f, [i1, i2]] of Object.entries(factors)) {
      const a1 = answers[i1], a2 = answers[i2];
      const q2 = questions[i2];
      const v1 = a1;
      const v2 = q2.dir === '-' ? (6 - a2) : a2;
      const avg = (v1 + v2) / 2;
      scores[f] = avg <= 2.4 ? 1 : avg <= 3.5 ? 3 : 5;
    }
    return {
      O: scores.O, C: scores.C, E: scores.E, A: scores.A, N: scores.N,
      code: `${scores.O}${scores.C}${scores.E}${scores.A}${scores.N}`
    };
  } else if (version === '120') {
    // 120問版：各因子24問、合計→5段階（30問版と比例的な閾値）
    const factorMap = { E: [], A: [], C: [], N: [], O: [] };
    questions.forEach((q, i) => {
      const val = q.dir === '-' ? (6 - answers[i]) : answers[i];
      factorMap[q.factor].push(val);
    });
    const scores = {};
    for (const [f, vals] of Object.entries(factorMap)) {
      const sum = vals.reduce((a, b) => a + b, 0);
      // 24問×5段階=合計24〜120、平均ベースで30問版と同じ閾値
      scores[f] = sum <= 44 ? 1 : sum <= 64 ? 2 : sum <= 92 ? 3 : sum <= 112 ? 4 : 5;
    }
    return {
      O: scores.O, C: scores.C, E: scores.E, A: scores.A, N: scores.N,
      code: `${scores.O}${scores.C}${scores.E}${scores.A}${scores.N}`
    };
  } else {
    // 30問版：各因子6問、合計→5段階
    const factorMap = { E: [], A: [], C: [], N: [], O: [] };
    questions.forEach((q, i) => {
      const val = q.dir === '-' ? (6 - answers[i]) : answers[i];
      factorMap[q.factor].push(val);
    });
    const scores = {};
    for (const [f, vals] of Object.entries(factorMap)) {
      const sum = vals.reduce((a, b) => a + b, 0);
      scores[f] = sum <= 11 ? 1 : sum <= 16 ? 2 : sum <= 23 ? 3 : sum <= 28 ? 4 : 5;
    }
    return {
      O: scores.O, C: scores.C, E: scores.E, A: scores.A, N: scores.N,
      code: `${scores.O}${scores.C}${scores.E}${scores.A}${scores.N}`
    };
  }
}

// ===== 結果表示 =====
function showResult() {
  const result = calcScore();
  questionArea.style.display = 'none';
  loading.classList.add('active');

  // 1.5秒後に性別選択ボタンを表示
  setTimeout(() => {
    document.getElementById('genderSelect').classList.add('visible');
  }, 1500);

  function goToResult(gender) {
    const ref = params.get('ref') || '';
    const otherCode = params.get('other_code') || '';
    const otherName = params.get('other_name') || '';
    let url = `result.html?code=${result.code}&v=${version}&gender=${gender}`;
    if (ref) url += `&ref=${ref}`;
    if (otherCode) url += `&other_code=${otherCode}`;
    if (otherName) url += `&other_name=${encodeURIComponent(otherName)}`;
    // other_quizから来た場合で、自分のコードがある場合は渡す（診断前にLocalStorageから取得したもの）
    // ※診断結果自体はtypeパラメータで渡されるので、これは参照用
    if (myCode && ref === 'other') url += `&stored_my_code=${myCode}`;
    window.location.href = url;
  }

  document.getElementById('genderF').addEventListener('click', () => goToResult('F'));
  document.getElementById('genderM').addEventListener('click', () => goToResult('M'));
}

// ===== 星の生成 =====
(function() {
  const el = document.getElementById('bgStars');
  let css = '';
  const total2 = 60;
  const bright = new Set();
  const superBright = new Set();
  while (superBright.size < 5) superBright.add(Math.floor(Math.random() * total2));
  while (bright.size < 10) {
    const n = Math.floor(Math.random() * total2);
    if (!superBright.has(n)) bright.add(n);
  }
  for (let i = 0; i < total2; i++) {
    const x = Math.random() * 100, y = Math.random() * 100;
    if (superBright.has(i)) {
      const s = Math.random() * 2 + 3, o = Math.random() * 0.2 + 0.8;
      css += `radial-gradient(${s}px ${s}px at ${x}% ${y}%, rgba(255,255,255,${o}) 0%, transparent 100%),radial-gradient(${s*4}px ${s*4}px at ${x}% ${y}%, rgba(200,210,255,${o*0.4}) 0%, transparent 100%),radial-gradient(${s*8}px ${s*8}px at ${x}% ${y}%, rgba(140,160,255,${o*0.15}) 0%, transparent 100%)`;
    } else if (bright.has(i)) {
      const s = Math.random() * 2 + 2, o = Math.random() * 0.3 + 0.7;
      css += `radial-gradient(${s}px ${s}px at ${x}% ${y}%, rgba(255,255,255,${o}) 0%, transparent 100%),radial-gradient(${s*3}px ${s*3}px at ${x}% ${y}%, rgba(180,200,255,${o*0.3}) 0%, transparent 100%)`;
    } else {
      const s = Math.random() * 1.5 + 0.5, o = Math.random() * 0.5 + 0.2;
      css += `radial-gradient(${s}px ${s}px at ${x}% ${y}%, rgba(255,255,255,${o}) 0%, transparent 100%)`;
    }
    if (i < total2 - 1) css += ', ';
  }
  el.style.backgroundImage = css;
})();

// ===== 途中保存バナー =====
(function() {
  const saved = loadSaved();
  if (!saved) { render(); return; }

  const banner = document.getElementById('resumeBanner');
  const info = document.getElementById('resumeInfo');
  const answered = saved.answers.filter(a => a !== null).length;
  info.textContent = `Q${answered}/${total} まで回答済み`;
  banner.classList.add('visible');

  document.getElementById('resumeContinue').addEventListener('click', () => {
    current = saved.current;
    saved.answers.forEach((v, i) => { answers[i] = v; });
    banner.classList.remove('visible');
    render();
  });

  document.getElementById('resumeRestart').addEventListener('click', () => {
    clearProgress();
    banner.classList.remove('visible');
    render();
  });
})();
