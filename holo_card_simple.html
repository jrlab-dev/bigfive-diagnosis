<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホログラムカード - シンプル版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a1a;
    font-family: 'Segoe UI', sans-serif;
  }

  .scene {
    perspective: 800px;
  }

  .card {
    width: 280px;
    height: 390px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
    cursor: pointer;
    border-radius: 16px;
  }

  /* カード本体 */
  .card-inner {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    box-shadow:
      0 25px 60px rgba(0,0,0,0.6),
      0 0 30px rgba(100,100,255,0.2);
  }

  /* ── 虹色ホログラムレイヤー ── */
  .holo-layer {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 2px,
        rgba(255,255,255,0.03) 4px
      );
    mix-blend-mode: overlay;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .holo-rainbow {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: conic-gradient(
      from 0deg at var(--mx, 50%) var(--my, 50%),
      hsl(0,   100%, 60%) 0%,
      hsl(60,  100%, 60%) 16%,
      hsl(120, 100%, 60%) 33%,
      hsl(180, 100%, 60%) 50%,
      hsl(240, 100%, 60%) 66%,
      hsl(300, 100%, 60%) 83%,
      hsl(360, 100%, 60%) 100%
    );
    mix-blend-mode: color-dodge;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  /* マウスを当てると光る */
  .card:hover .holo-layer { opacity: 1; }
  .card:hover .holo-rainbow { opacity: 0.35; }

  /* ── カードコンテンツ ── */
  .card-header {
    padding: 14px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-name {
    color: #ffd700;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
    letter-spacing: 1px;
  }

  .card-hp {
    color: #fff;
    font-size: 13px;
    background: rgba(255,0,0,0.7);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .card-image {
    margin: 0 16px;
    height: 170px;
    background: radial-gradient(ellipse at center, #2a4a7a, #0a1a3a);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 70px;
    position: relative;
    overflow: hidden;
  }

  .card-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      transparent 30%,
      rgba(255,255,255,0.1) 50%,
      transparent 70%
    );
    border-radius: 10px;
  }

  .card-type {
    text-align: center;
    color: #aad4ff;
    font-size: 11px;
    margin: 6px 0;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card-stats {
    margin: 0 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .stat {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 6px 4px;
    text-align: center;
  }

  .stat-label {
    color: #88aacc;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat-value {
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    margin-top: 2px;
  }

  .card-attack {
    margin: 10px 16px 0;
    background: rgba(255,100,100,0.15);
    border: 1px solid rgba(255,100,100,0.3);
    border-radius: 8px;
    padding: 8px 12px;
  }

  .attack-name {
    color: #ff8888;
    font-size: 13px;
    font-weight: bold;
  }

  .attack-desc {
    color: #aaa;
    font-size: 10px;
    margin-top: 3px;
    line-height: 1.4;
  }

  .attack-damage {
    float: right;
    color: #ffd700;
    font-size: 20px;
    font-weight: bold;
    margin-top: -4px;
  }

  .card-footer {
    position: absolute;
    bottom: 12px;
    left: 16px;
    right: 16px;
    display: flex;
    justify-content: space-between;
    color: #666;
    font-size: 9px;
  }

  /* ── 枠のキラキラ ── */
  .card-border {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 2px solid transparent;
    background:
      linear-gradient(#1a1a2e, #1a1a2e) padding-box,
      linear-gradient(
        var(--angle, 0deg),
        #ff0080, #ff8c00, #ffd700, #00ff88, #00bfff, #8000ff, #ff0080
      ) border-box;
    pointer-events: none;
  }

  /* 説明テキスト */
  .hint {
    position: fixed;
    bottom: 30px;
    color: #555;
    font-size: 12px;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="scene">
  <div class="card" id="card">
    <div class="card-border" id="cardBorder"></div>
    <div class="card-inner">

      <!-- 虹色ホログラムレイヤー -->
      <div class="holo-layer"></div>
      <div class="holo-rainbow" id="rainbow"></div>

      <!-- カード内容 -->
      <div class="card-header">
        <div class="card-name">⚡ ライトニング</div>
        <div class="card-hp">HP 120</div>
      </div>

      <div class="card-image">🐉</div>

      <div class="card-type">◆ Dragon · Electric ◆</div>

      <div class="card-stats">
        <div class="stat">
          <div class="stat-label">ATK</div>
          <div class="stat-value">95</div>
        </div>
        <div class="stat">
          <div class="stat-label">DEF</div>
          <div class="stat-value">72</div>
        </div>
        <div class="stat">
          <div class="stat-label">SPD</div>
          <div class="stat-value">110</div>
        </div>
      </div>

      <div class="card-attack">
        <div>
          <span class="attack-name">⚡ 雷光閃</span>
          <span class="attack-damage">80</span>
        </div>
        <div class="attack-desc">相手全体に電撃ダメージ。追加で麻痺状態にする可能性あり。</div>
      </div>

      <div class="card-footer">
        <span>No.001 / レアリティ：★★★</span>
        <span>2026 Edition</span>
      </div>
    </div>
  </div>
</div>

<p class="hint">マウスをカードに乗せて動かしてみてください</p>

<script>
  const card = document.getElementById('card');
  const rainbow = document.getElementById('rainbow');
  const border = document.getElementById('cardBorder');
  let angle = 0;

  // 虹枠のアニメーション
  setInterval(() => {
    angle = (angle + 2) % 360;
    border.style.setProperty('--angle', angle + 'deg');
  }, 16);

  // マウス追従で3D傾き + 虹色移動
  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;

    const rotX = (-dy / rect.height) * 20;
    const rotY = (dx / rect.width) * 20;

    card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

    // 虹の中心をマウス位置に合わせる
    const mx = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    const my = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    rainbow.style.setProperty('--mx', mx + '%');
    rainbow.style.setProperty('--my', my + '%');
  });

  card.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateX(0deg) rotateY(0deg)';
  });
</script>

</body>
</html>
