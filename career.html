// ===== マッチングアルゴリズム =====
var KEYS=['O','C','E','A','N'];
var MAX_DIST=Math.sqrt(5*16); // 全因子5vs1の最大ユークリッド距離

function matchPct(user,ideal){
  var sumSq=0;
  for(var i=0;i<KEYS.length;i++){
    var diff=(user[KEYS[i]]||3)-ideal[KEYS[i]];
    sumSq+=diff*diff;
  }
  return Math.round((1-Math.sqrt(sumSq)/MAX_DIST)*75+25);
}

function rankItems(user,list){
  return list.map(function(item){
    return {item:item, pct:matchPct(user,item.ideal)};
  }).sort(function(a,b){return b.pct-a.pct;});
}

// ===== 理由生成 =====
function genReason(user,item){
  var reasons=[];
  for(var i=0;i<KEYS.length;i++){
    var k=KEYS[i], u=user[k]||3, id=item.ideal[k];
    var diff=Math.abs(u-id);
    if(diff<=0.5){
      reasons.push({k:k,text:u>=4?traitInfo[k].high:u<=2?traitInfo[k].low:traitInfo[k].name+'がバランス良く'});
    }
  }
  if(reasons.length===0){
    var topK=KEYS.slice().sort(function(a,b){return Math.abs((user[a]||3)-item.ideal[a])-Math.abs((user[b]||3)-item.ideal[b]);});
    var k=topK[0],u=user[k]||3;
    reasons.push({k:k,text:u>=4?traitInfo[k].high:u<=2?traitInfo[k].low:traitInfo[k].name+'のバランス'});
  }
  return reasons.slice(0,2).map(function(r){return r.text;}).join('、')+'点で、この'+(item.tags?'業界':'職種')+'に向いています。';
}

// ===== アーキタイプ選択 =====
function pickArchetypes(scores){
  var matched=ARCHETYPES.filter(function(a){return a.cond(scores);});
  if(matched.length>=1) return matched.slice(0,2);
  // フォールバック：最も近い2つ
  return ARCHETYPES.map(function(a){
    var sc=0;
    if(a.id==='leader') sc=(scores.C>=3?1:0)+(scores.E>=3?1:0);
    else if(a.id==='creator') sc=(scores.O>=3?1:0)+(scores.N>=2?1:0);
    else if(a.id==='analyst') sc=(scores.C>=3?1:0)+(scores.E<=3?1:0);
    else if(a.id==='supporter') sc=(scores.A>=3?1:0)+(scores.E>=2?1:0);
    else if(a.id==='pioneer') sc=(scores.O>=3?1:0)+(scores.A<=3?1:0);
    else if(a.id==='craftsman') sc=(scores.C>=3?1:0)+(scores.O<=3?1:0);
    else if(a.id==='diplomat') sc=(scores.E>=3?1:0)+(scores.A>=3?1:0);
    else if(a.id==='sage') sc=(scores.O>=3?1:0)+(scores.E<=3?1:0);
    return {arch:a,sc:sc};
  }).sort(function(a,b){return b.sc-a.sc;}).slice(0,2).map(function(x){return x.arch;});
}

// ===== 詳細分析テキスト生成 =====
function genAnalysis(scores){
  var env=[],pitfall=[],strategy=[];

  // 職場環境
  if(scores.N>=4) env.push('静かで予測可能な環境が最適です。オープンオフィスや頻繁なコンテキストの切り替えは避けた方が良いでしょう。');
  else if(scores.N<=2) env.push('プレッシャーのかかる環境でも力を発揮できます。変化の激しい環境でも安定してパフォーマンスを出せます。');
  if(scores.E>=4) env.push('チームでの協働や頻繁なコミュニケーションがある環境でエネルギーを得られます。');
  else if(scores.E<=2) env.push('一人で集中できる時間が確保できる環境が最適です。リモートワークや個室のレイアウトが向いています。');
  if(scores.O>=4) env.push('自由度が高く、創造的な取り組みが評価される環境で能力を発揮します。');
  else if(scores.O<=2) env.push('ルールと手順が明確な構造化された環境で安心して働けます。');
  if(scores.C>=4) env.push('目標とスケジュールが明確な環境で最高のパフォーマンスを発揮します。');
  if(env.length===0) env.push('バランスの取れた環境で柔軟に対応できます。色々な職場環境に適応できるのが強みです。');

  // キャリアの落とし穴
  if(scores.C>=4&&scores.O<=2) pitfall.push('ルーチンに固執しすぎて変化に適応できない可能性があります。定期的に新しいアプローチに触れる時間を持ちましょう。');
  if(scores.A>=4&&scores.C<=2) pitfall.push('他人のために働きすぎて自分のキャリア優先事項がおろそかになる傾向があります。「ノ」と言う練習を意識しましょう。');
  if(scores.N>=4&&scores.A>=4) pitfall.push('同僚の感情に引きずられて精神的に消耗しやすい傾向があります。感情的境界線を意識的に引くことが大切です。');
  if(scores.E>=4&&scores.N>=4) pitfall.push('人間関係のトラブルを必要以上に深刻に受け止める傾向があります。客観的な視点を持つメンターを見つけると良いでしょう。');
  if(scores.O>=4&&scores.C<=2) pitfall.push('新しいアイデアに飛びつきすぎて途中で投げ出す傾向があります。一つのことを最後までやり抜く習慣をつけましょう。');
  if(scores.E<=2&&scores.A>=4) pitfall.push('自己主張が弱く不当な扱いを受けやすい傾向があります。交渉スキルを意識的に学ぶことをお勧めします。');
  if(pitfall.length===0) pitfall.push('バランスの取れた性格のため、極端な落とし穴は少ないですが、自分の強みを活かすキャリア選びを意識しましょう。');

  // キャリア戦略
  var topFactors=KEYS.slice().sort(function(a,b){return (scores[b]||3)-(scores[a]||3);});
  var top1=topFactors[0],top2=topFactors[1];
  strategy.push(traitInfo[top1].name+'が'+(scores[top1]>=4?'高い':'低い')+'あなたは、'+traitInfo[top1].high+(scores[top1]>=4?'特性':'特性の裏返し')+'を活かせる職種を狙うのが戦略的です。');
  if(top2!==top1){
    strategy.push(traitInfo[top2].name+'も'+(scores[top2]>=4?'高め':'低め')+'です。'+traitInfo[top1].name+'×'+traitInfo[top2].name+'の組み合わせは希少で、その交差点にある職種は競合が少ない狙い目です。');
  }
  if(scores.C>=4) strategy.push('誠実性が高いあなたは長期的なキャリア構築に向いています。3〜5年先を見据えた計画を立てることで、着実にステップアップできます。');
  if(scores.O>=4) strategy.push('開放性が高いあなたは新しいスキルの習得が早いです。定期的に新しい技術や知識に触れる環境を選ぶと成長曲線が急伸します。');

  return {env:env,pitfall:pitfall,strategy:strategy};
}
