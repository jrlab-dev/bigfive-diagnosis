<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビッグファイブ性格カード テンプレート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0a0e27;
    --deep-purple: #1a0a3e;
    --c-O: #8b5cf6;
    --c-C: #3b82f6;
    --c-E: #f97316;
    --c-A: #f472b6;
    --c-N: #14b8a6;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #050816;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    color: #fff;
  }

  /* ===== コントロール ===== */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .controls-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls-row label {
    font-size: 11px;
    color: var(--text-dim);
    align-self: center;
    margin-right: 4px;
  }
  .controls button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s;
  }
  /* キャラ選択ボタン */
  .btn-char {
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
    border-color: rgba(255,255,255,0.1);
  }
  .btn-char.active, .btn-char:hover {
    background: rgba(139,92,246,0.2);
    color: #e2e8f0;
    border-color: rgba(139,92,246,0.5);
  }
  /* 性別ボタン */
  .btn-gender {
    background: rgba(255,255,255,0.05);
    color: var(--text-dim);
    border-color: rgba(255,255,255,0.1);
    min-width: 48px;
  }
  .btn-gender.active, .btn-gender:hover {
    background: rgba(59,130,246,0.2);
    color: #93c5fd;
    border-color: rgba(59,130,246,0.5);
  }
  /* レアリティボタン */
  .btn-common { background: rgba(148,163,184,0.1); color: #94a3b8; border-color: #334155; }
  .btn-common.active, .btn-common:hover { background: rgba(148,163,184,0.25); color: #e2e8f0; border-color: #94a3b8; }
  .btn-rare { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: #1e3a5f; }
  .btn-rare.active, .btn-rare:hover { background: rgba(59,130,246,0.25); color: #93c5fd; border-color: #3b82f6; box-shadow: 0 0 16px rgba(59,130,246,0.2); }
  .btn-legendary { background: rgba(245,158,11,0.1); color: #fbbf24; border-color: #78350f; }
  .btn-legendary.active, .btn-legendary:hover { background: rgba(245,158,11,0.25); color: #fde68a; border-color: #f59e0b; box-shadow: 0 0 16px rgba(245,158,11,0.2); }
  /* ★ SECRETボタン（最高レアリティ） */
  .btn-secret {
    background: linear-gradient(135deg, rgba(20,10,0,0.9), rgba(40,20,0,0.9));
    color: #b8860b;
    border-color: #7a5800;
    letter-spacing: 0.1em;
  }
  .btn-secret.active, .btn-secret:hover {
    background: linear-gradient(135deg, rgba(60,30,0,0.9), rgba(80,45,0,0.9));
    color: #ffd700;
    border-color: #d4a000;
    box-shadow: 0 0 20px rgba(212,160,0,0.5), 0 0 40px rgba(212,160,0,0.2);
  }

  /* ===== カード外枠（perspectiveをここに持たせる）===== */
  .card-wrapper {
    position: relative;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1 / 1;
    perspective: 1000px;
    perspective-origin: 50% 50%;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 20px;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.6),
      0 0 60px rgba(49,30,90,0.2),
      inset 2px 2px 0 rgba(255,255,255,0.12),
      inset -2px -2px 0 rgba(0,0,0,0.6),
      inset 0 0 0 2px rgba(255,255,255,0.05);
    transition: box-shadow 0.5s, border-color 0.5s;
    border: 2px solid rgba(255,255,255,0.08);
    will-change: transform;
  }

  /* ===== 星雲背景 ===== */
  .card-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    transition: opacity 0.5s;
    background:
      radial-gradient(ellipse 80% 60% at 25% 20%, rgba(139,92,246,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 75%, rgba(59,130,246,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 40%, rgba(26,10,62,0.8) 0%, transparent 70%),
      linear-gradient(160deg, #0a0e27 0%, #1a0a3e 40%, #0f172a 100%);
  }

  /* ===== ホログラム金ダイヤモンド背景（SECRETのみ表示）===== */
  #holoBg {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    border-radius: inherit;
    opacity: 0;           /* デフォルト非表示 */
    mix-blend-mode: normal;
    transition: opacity 0.6s;
  }

  /* ===== 星の装飾 ===== */
  .stars {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    transition: opacity 0.5s;
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
  }

  /* ===== キラエフェクト ===== */
  .shimmer {
    position: absolute;
    inset: -100%;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  /* rare: 光帯 */
  [data-rarity="rare"] .shimmer {
    opacity: 1;
    background: linear-gradient(
      115deg,
      transparent 20%,
      rgba(180,200,255,0.3) 40%,
      rgba(255,255,255,0.6) 50%,
      rgba(180,200,255,0.3) 60%,
      transparent 80%
    );
    animation: shimmer-move 3s ease-in-out infinite;
    mix-blend-mode: overlay;
  }
  @keyframes shimmer-move {
    0%, 100% { transform: translateX(-60%) rotate(15deg); }
    50% { transform: translateX(60%) rotate(15deg); }
  }

  /* legendary: 多層レインボーホロ */
  [data-rarity="legendary"] .shimmer {
    opacity: 1;
    background:
      repeating-linear-gradient(
        45deg,
        transparent 0px, transparent 3px,
        rgba(255,100,150,0.16) 3px, rgba(255,100,150,0.16) 6px
      ),
      repeating-linear-gradient(
        -45deg,
        transparent 0px, transparent 3px,
        rgba(100,200,255,0.16) 3px, rgba(100,200,255,0.16) 6px
      ),
      conic-gradient(
        from 0deg at 50% 50%,
        rgba(255,50,50,0.25),
        rgba(255,200,0,0.25),
        rgba(50,255,100,0.25),
        rgba(50,100,255,0.25),
        rgba(200,50,255,0.25),
        rgba(255,50,50,0.25)
      );
    animation: holo-spin 8s linear infinite;
    mix-blend-mode: color-dodge;
  }
  @keyframes holo-spin {
    to { transform: rotate(360deg); }
  }

  /* secret: 金の光帯シマー（普段は薄く、ホバーで強く） */
  [data-rarity="secret"] .shimmer {
    opacity: 0.45;
    background: linear-gradient(
      125deg,
      transparent 15%,
      rgba(255,220,80,0.06) 35%,
      rgba(255,255,200,0.15) 50%,
      rgba(255,220,80,0.06) 65%,
      transparent 85%
    );
    animation: shimmer-gold 9s ease-in-out infinite;
    mix-blend-mode: screen;
    transition: opacity 0.6s;
  }
  [data-rarity="secret"].holo-on .shimmer {
    opacity: 1;
    background: linear-gradient(
      125deg,
      transparent 15%,
      rgba(255,220,80,0.12) 35%,
      rgba(255,255,200,0.32) 50%,
      rgba(255,220,80,0.12) 65%,
      transparent 85%
    );
    animation: shimmer-gold 6s ease-in-out infinite;
    mix-blend-mode: screen;
  }
  @keyframes shimmer-gold {
    0%, 100% { transform: translateX(-70%) rotate(20deg); }
    50%       { transform: translateX(70%) rotate(20deg); }
  }

  /* ===== レアリティ別カードスタイル ===== */
  [data-rarity="legendary"] .card {
    box-shadow:
      0 8px 32px rgba(0,0,0,0.6),
      0 0 40px rgba(139,92,246,0.3),
      0 0 80px rgba(245,158,11,0.15),
      inset 2px 2px 0 rgba(255,215,0,0.2),
      inset -2px -2px 0 rgba(0,0,0,0.7),
      inset 0 0 0 2px rgba(255,215,0,0.08);
    border-color: rgba(255,215,0,0.3);
  }

  [data-rarity="rare"] .card {
    box-shadow:
      0 8px 32px rgba(0,0,0,0.6),
      0 0 30px rgba(59,130,246,0.2),
      inset 2px 2px 0 rgba(59,130,246,0.18),
      inset -2px -2px 0 rgba(0,0,0,0.65),
      inset 0 0 0 2px rgba(59,130,246,0.06);
    border-color: rgba(59,130,246,0.2);
  }

  /* Legendary: 説明文エリア透明化 */
  [data-rarity="legendary"] .card-content {
    background: linear-gradient(to bottom, transparent 0%, rgba(10,14,39,0.35) 30%, rgba(10,14,39,0.55) 100%);
  }
  [data-rarity="legendary"] .description {
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(6px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  [data-rarity="legendary"] .score-label,
  [data-rarity="legendary"] .score-val {
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* SECRET: 黄金の枠 */
  [data-rarity="secret"] .card {
    box-shadow:
      0 12px 50px rgba(0,0,0,0.8),
      0 0 50px rgba(212,170,0,0.4),
      0 0 100px rgba(212,170,0,0.15),
      inset 2px 2px 0 rgba(255,215,0,0.3),
      inset -2px -2px 0 rgba(80,50,0,0.8),
      inset 0 0 0 2px rgba(255,215,0,0.12),
      inset 0 0 30px rgba(212,170,0,0.08);
    border-color: rgba(212,170,0,0.6);
  }

  /* SECRET: 星雲背景・星を非表示 */
  [data-rarity="secret"] .card-bg  { opacity: 0; }
  [data-rarity="secret"] .stars    { opacity: 0; }
  [data-rarity="secret"] #holoBg   { opacity: 1; }

  /* SECRET: テキストは文字阴影で見やすく（背景は透明にしてホログラムを見せる） */
  [data-rarity="secret"] .card-content {
    background: linear-gradient(to bottom, transparent 0%, rgba(5,3,0,0.35) 30%, rgba(5,3,0,0.55) 100%);
  }
  [data-rarity="secret"] .description {
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(6px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  [data-rarity="secret"] .score-label,
  [data-rarity="secret"] .score-val {
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  .glow-overlay {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    border-radius: inherit;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
    animation: glow-pulse 3s ease-in-out infinite;
  }

  /* Legendary: 放射光線オーバーレイ */
  .ray-overlay {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    border-radius: inherit;
    background:
      conic-gradient(
        from 0deg at 50% 50%,
        transparent 0deg, rgba(139,92,246,0.08) 2deg, transparent 4deg,
        transparent 30deg, rgba(245,158,11,0.06) 32deg, transparent 34deg,
        transparent 60deg, rgba(59,130,246,0.07) 62deg, transparent 64deg,
        transparent 90deg, rgba(139,92,246,0.08) 92deg, transparent 94deg,
        transparent 120deg, rgba(245,158,11,0.06) 122deg, transparent 124deg,
        transparent 150deg, rgba(59,130,246,0.07) 152deg, transparent 154deg,
        transparent 180deg, rgba(139,92,246,0.08) 182deg, transparent 184deg,
        transparent 210deg, rgba(245,158,11,0.06) 212deg, transparent 214deg,
        transparent 240deg, rgba(59,130,246,0.07) 242deg, transparent 244deg,
        transparent 270deg, rgba(139,92,246,0.08) 272deg, transparent 274deg,
        transparent 300deg, rgba(245,158,11,0.06) 302deg, transparent 304deg,
        transparent 330deg, rgba(59,130,246,0.07) 332deg, transparent 334deg,
        transparent 360deg
      );
    animation: ray-spin 20s linear infinite;
  }

  [data-rarity="legendary"] .glow-overlay {
    opacity: 1;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,0.12) 0%, rgba(139,92,246,0.06) 30%, transparent 60%),
      radial-gradient(circle at 30% 40%, rgba(245,158,11,0.08) 0%, transparent 40%),
      radial-gradient(circle at 70% 60%, rgba(59,130,246,0.08) 0%, transparent 40%);
  }
  [data-rarity="legendary"] .ray-overlay { opacity: 1; }
  [data-rarity="secret"]    .glow-overlay {
    opacity: 0.4;
    background: radial-gradient(circle at 50% 50%, rgba(255,220,80,0.04) 0%, transparent 70%);
    transition: opacity 0.6s;
  }
  [data-rarity="secret"].holo-on .glow-overlay {
    opacity: 1;
    background: radial-gradient(circle at 50% 50%, rgba(255,220,80,0.09) 0%, transparent 70%);
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes ray-spin {
    to { transform: rotate(360deg); }
  }

  /* ===== 粒子キャンバス ===== */
  #particles {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.5s;
  }
  [data-rarity="legendary"] #particles { opacity: 1; }
  [data-rarity="secret"]    #particles { opacity: 1; }

  /* ===== カード内コンテンツ ===== */
  .card-content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 20px;
    background: linear-gradient(to bottom, transparent 0%, rgba(10,14,39,0.7) 20%, rgba(10,14,39,0.85) 100%);
    transition: background 0.5s;
  }

  .type-name {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    font-size: clamp(14px, 7vw, 42px);
    font-weight: 900;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 24px rgba(0,0,0,0.9), 0 0 48px rgba(0,0,0,0.5);
    letter-spacing: 0.08em;
    z-index: 6;
    padding: 0 16px;
    line-height: 1.2;
    white-space: nowrap; overflow: hidden;
    transform-origin: center top;
    transition: color 0.5s, text-shadow 0.5s;
  }

  /* SECRET: タイトルを金色に */
  [data-rarity="secret"] .type-name {
    color: #ffd700;
    text-shadow:
      0 2px 8px rgba(0,0,0,0.9),
      0 0 20px rgba(212,170,0,0.8),
      0 0 40px rgba(212,170,0,0.4);
  }

  .char-area {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    height: 85%;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
  }
  .char-img {
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    transition: opacity 0.3s, filter 0.15s;
  }

  .type-code {
    font-size: 13px;
    color: #cbd5e1;
    font-weight: 500;
    letter-spacing: 0.15em;
    position: absolute;
    top: 56px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 6;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  .scores {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    margin-bottom: 10px;
    position: relative;
    z-index: 5;
  }
  .score-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-label {
    font-size: 11px;
    font-weight: 700;
    width: 14px;
    text-align: center;
  }
  .score-bar-bg {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }
  .score-val {
    font-size: 10px;
    color: var(--text-dim);
    width: 12px;
    text-align: right;
  }

  .description {
    font-size: 14px;
    line-height: 1.6;
    text-align: left;
    color: #cbd5e1;
    padding: 8px 12px;
    background: rgba(0,0,0,0.35);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.05);
    width: 100%;
    position: relative;
    z-index: 5;
    backdrop-filter: blur(4px);
  }

  @media (max-width: 400px) {
    .card { padding: 16px 14px 14px; }
    .type-name { font-size: 17px; }
    .description { font-size: 11px; padding: 6px 8px; }
    .scores { gap: 4px 12px; }
    .controls button { font-size: 11px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<div class="controls">
  <div class="controls-row">
    <button class="btn-char active" onclick="setChar(0)">自由人</button>
    <button class="btn-char" onclick="setChar(1)">地味に安心</button>
    <button class="btn-char" onclick="setChar(2)">ツンデレ</button>
    <button class="btn-char" onclick="setChar(3)">理想のリーダー</button>
    <button class="btn-char" onclick="setChar(4)">究極の理解者</button>
  </div>
  <div class="controls-row">
    <button class="btn-char" onclick="setChar(5)">頼れる兄貴姉御</button>
    <button class="btn-char" onclick="setChar(6)">保守的現実派</button>
    <button class="btn-char" onclick="setChar(7)">超まじめ</button>
    <button class="btn-char" onclick="setChar(8)">孤独な競争者</button>
    <button class="btn-char" onclick="setChar(9)">超繊細</button>
  </div>
  <div class="controls-row">
    <label>性別：</label>
    <button class="btn-gender active" onclick="setGender('F')">女性</button>
    <button class="btn-gender" onclick="setGender('M')">男性</button>
  </div>
  <div class="controls-row">
    <label>レアリティ：</label>
    <button class="btn-common active" onclick="setRarity('common')">Common</button>
    <button class="btn-rare"         onclick="setRarity('rare')">Rare</button>
    <button class="btn-legendary"    onclick="setRarity('legendary')">Legendary</button>
    <button class="btn-secret"       onclick="setRarity('secret')">★ SECRET</button>
  </div>
</div>

<div class="card-wrapper" id="cardWrapper">
    <div class="card" id="card" data-rarity="common">
      <div class="card-bg"></div>
      <canvas id="holoBg"></canvas>
      <div class="stars" id="stars"></div>
      <div class="shimmer"></div>
      <div class="glow-overlay"></div>
      <div class="ray-overlay"></div>
      <canvas id="particles"></canvas>

      <div class="type-name" id="typeName">自由人</div>
      <div class="type-code" id="typeCode">O4 C1 E4 A3 N3</div>

      <div class="card-content">
        <div class="scores" id="scores"></div>
        <div class="description" id="desc">好奇心旺盛で自由を愛する冒険者。型にはまらない生き方で、周囲をワクワクさせる存在です。</div>
      </div>

      <div class="char-area">
        <!-- 季節キャラ（春・桜テーマ）仮表示用SVG -->
        <svg id="charSvg" viewBox="0 0 200 370" xmlns="http://www.w3.org/2000/svg" style="height:100%;filter:drop-shadow(0 6px 24px rgba(0,0,0,0.7)) drop-shadow(0 0 12px rgba(200,150,255,0.4))">
          <defs>
            <radialGradient id="glow" cx="50%" cy="45%" r="55%">
              <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <ellipse cx="100" cy="190" rx="85" ry="130" fill="url(#glow)"/>
          <!-- 髪（後ろ） -->
          <path d="M57,72 Q52,22 100,16 Q148,22 143,72 Q158,130 142,158 Q120,175 100,170 Q80,175 58,158 Q42,130 57,72Z" fill="#2d1054"/>
          <!-- 頭 -->
          <circle cx="100" cy="72" r="37" fill="#fde8d0"/>
          <!-- 髪（前） -->
          <path d="M63,60 Q67,22 100,18 Q133,22 137,60 Q142,42 136,30 Q112,2 88,2 Q62,12 63,38Z" fill="#3d1870"/>

<script>
// ===== キャラクターデータ =====
const characters = [
  { num:'001', name:'自由人',         o:4,c:1,e:4,a:3,n:3, desc:'好奇心旺盛で自由を愛する冒険者。型にはまらない生き方で、周囲をワクワクさせる存在です。' },
  { num:'002', name:'地味に安心',     o:2,c:3,e:2,a:4,n:1, desc:'穏やかで安心感を与える存在。親しみやすく、誰もが心地よく過ごせる空気を作ります。' },
  { num:'003', name:'ツンデレ',       o:3,c:3,e:3,a:2,n:4, desc:'素直になれないクールな一面と、実は繊細で感情豊かな内面を持つ魅力的な人です。' },
  { num:'004', name:'理想のリーダー', o:3,c:5,e:4,a:4,n:1, desc:'誠実で頼りがいのあるリーダー。組織をまとめ、周囲に安心と信頼を与えます。' },
  { num:'005', name:'究極の理解者',   o:4,c:3,e:3,a:5,n:3, desc:'誰に対しても深い共感を示す理解者。温かい包容力で人の心に寄り添います。' },
  { num:'006', name:'頼れる兄貴姉御', o:2,c:4,e:4,a:4,n:2, desc:'元気で面倒見の良い頼れる存在。実行力があり、チームを引っ張っていきます。' },
  { num:'007', name:'保守的現実派',   o:1,c:3,e:3,a:3,n:3, desc:'堅実で現実的な考え方の持ち主。地に足のついた行動で周囲に安定をもたらします。' },
  { num:'008', name:'超まじめ',       o:3,c:5,e:3,a:3,n:3, desc:'何事にも真面目に取り組む努力家。規律を守り、高い基準で自分に挑戦し続けます。' },
  { num:'009', name:'孤独な競争者',   o:3,c:3,e:3,a:1,n:3, desc:'独立心が強く、自分の道を貫く競争者。孤独の中で強さを磨き続けます。' },
  { num:'010', name:'超繊細',         o:3,c:3,e:3,a:3,n:5, desc:'繊細で感受性の豊かな芸術家肌。小さな美しさに気づき、深い感情を表現します。' }
];

let currentChar = 0;
let currentGender = 'F';

// ===== 星をランダム配置 =====
(function() {
  const el = document.getElementById('stars');
  let html = '';
  for (let i = 0; i < 50; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const size = Math.random() * 1.5 + 0.5;
    const opacity = Math.random() * 0.6 + 0.3;
    const hue = Math.random() > 0.7
      ? `hsla(${220 + Math.random() * 40}, 80%, 80%, ${opacity})`
      : `rgba(255,255,255,${opacity})`;
    html += `radial-gradient(${size}px ${size}px at ${x}% ${y}%, ${hue} 0%, transparent 100%)`;
    if (i < 49) html += ', ';
  }
  el.style.backgroundImage = html;
})();

// ===== スコアバー描画 =====
function renderScores(ch) {
  const factors = [
    { key:'o', label:'O', color:'var(--c-O)' },
    { key:'c', label:'C', color:'var(--c-C)' },
    { key:'e', label:'E', color:'var(--c-E)' },
    { key:'a', label:'A', color:'var(--c-A)' },
    { key:'n', label:'N', color:'var(--c-N)' }
  ];
  let html = '';
  factors.forEach((f, i) => {
    const val = ch[f.key];
    const pct = val * 20;
    const span = '';
    html += `<div class="score-item"${span}>
      <span class="score-label" style="color:${f.color}">${f.label}</span>
      <div class="score-bar-bg"><div class="score-bar" style="width:${pct}%;background:${f.color}"></div></div>
      <span class="score-val">${val}</span>
    </div>`;
  });
  document.getElementById('scores').innerHTML = html;
}

// ===== スコア → ファイル名用コード変換（1,2→1 / 3→3 / 4,5→5）=====
function toCode(n) { return n <= 2 ? 1 : n === 3 ? 3 : 5; }

// ===== キャラクター切り替え =====
function setChar(idx) {
  currentChar = idx;
  updateCard();
  document.querySelectorAll('.btn-char').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
}

function setGender(g) {
  currentGender = g;
  updateCard();
  document.querySelectorAll('.btn-gender').forEach(b => {
    b.classList.toggle('active', b.textContent === (g === 'F' ? '女性' : '男性'));
  });
}

function updateCard() {
  const ch = characters[currentChar];
  // 実画像パス（スコアを1/3/5に丸めた5桁コード）
  const code = `${toCode(ch.o)}${toCode(ch.c)}${toCode(ch.e)}${toCode(ch.a)}${toCode(ch.n)}`;
  const imgPath = `画像/キャラクター（商用利用可）/${currentGender}/${code}.png`;
  const img = document.getElementById('charImg');
  const svg = document.getElementById('charSvg');
  img.style.opacity = 0;
  svg.style.display = '';
  img.src = imgPath;
  document.getElementById('typeName').textContent = ch.name;
  // 名前が見切れる場合は縮小
  const nameEl = document.getElementById('typeName');
  nameEl.style.transform = '';
  requestAnimationFrame(() => {
    if (nameEl.scrollWidth > nameEl.clientWidth) {
      const scale = nameEl.clientWidth / nameEl.scrollWidth;
      nameEl.style.transform = `scale(${Math.max(scale, 0.7)})`;
    }
  });
  document.getElementById('typeCode').textContent = `O${ch.o} C${ch.c} E${ch.e} A${ch.a} N${ch.n}`;
  document.getElementById('desc').textContent = ch.desc;
  renderScores(ch);
}

// ===== レアリティ切り替え =====
function setRarity(rarity) {
  document.getElementById('card').setAttribute('data-rarity', rarity);
  document.querySelectorAll('.btn-common,.btn-rare,.btn-legendary,.btn-secret')
    .forEach(b => b.classList.remove('active'));
  document.querySelector(`.btn-${rarity}`).classList.add('active');

  if (rarity === 'legendary') startParticles('legendary');
  else if (rarity === 'secret') startParticles('secret');
  else stopParticles();
}

// ===== 粒子エフェクト =====
let particleAnim = null;
function startParticles(mode) {
  stopParticles();
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width  = rect.width  * 2;
  canvas.height = rect.height * 2;
  canvas.style.width  = rect.width  + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(2, 2);
  const w = rect.width, h = rect.height;

  const particles = [];
  const count = mode === 'secret' ? 35 : 25;
  for (let i = 0; i < count; i++) {
    // secretは金・銀の粒子、legendaryは紫・金
    const hue = mode === 'secret'
      ? (Math.random() > 0.5 ? 45 : 55)    // 金・黄金
      : (Math.random() > 0.5 ? 270 : 45);  // 紫・金
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      size: Math.random() * (mode === 'secret' ? 2.5 : 2) + 0.5,
      speedX: (Math.random() - 0.5) * 0.3,
      speedY: -Math.random() * 0.4 - 0.1,
      opacity: Math.random() * 0.7 + 0.2,
      hue
    });
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.speedX; p.y += p.speedY;
      if (p.y < -5) { p.y = h + 5; p.x = Math.random() * w; }
      if (p.x < -5) p.x = w + 5;
      if (p.x > w + 5) p.x = -5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      const sat = mode === 'secret' ? '90%' : '80%';
      const lit = mode === 'secret' ? '80%' : '75%';
      ctx.fillStyle = `hsla(${p.hue}, ${sat}, ${lit}, ${p.opacity})`;
      ctx.fill();
    });
    particleAnim = requestAnimationFrame(animate);
  }
  animate();
}

function stopParticles() {
  if (particleAnim) cancelAnimationFrame(particleAnim);
  particleAnim = null;
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ===== 初期表示 =====
updateCard();

// ===== ★ ホログラム金ダイヤモンド背景 =====
// holoHovered: tiltエフェクトのmouseenter/leaveと共有するフラグ
window.holoHovered = false;

(function() {
  const canvas  = document.getElementById('holoBg');
  const ctx     = canvas.getContext('2d');
  const wrapper = document.getElementById('cardWrapper');
  const CELL    = 18;
  const DEPTH   = 0.42;
  let t = 0;
  let W = 0, H = 0;
  // 明るさの補間値（0=暗い, 1=フル）
  let brightness = 0;

  function syncSize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width  || 480;
    H = rect.height || 480;
    canvas.width  = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  syncSize();
  window.addEventListener('resize', syncSize);

  // マウスホバー検知 → holo-onクラスでCSS効果も連動
  const cardEl = document.getElementById('card');
  wrapper.addEventListener('mouseenter', () => {
    window.holoHovered = true;
    cardEl.classList.add('holo-on');
  });
  wrapper.addEventListener('mouseleave', () => {
    window.holoHovered = false;
    cardEl.classList.remove('holo-on');
  });

  const BASE_HUE = 38; // 金色の中心色相

  function getCellColor(col, row, facetLight) {
    const cols = Math.ceil(W / CELL) + 1;
    const rows = Math.ceil(H / CELL) + 1;
    const x = col / cols;
    const y = row / rows;

    // 周波数を互いに素にして機械的な繰り返しを防ぐ
    // ★ さらに速度を落とした（係数を 0.0008 → 0.00025 程度に削減）
    const wave =
      Math.sin(x * 6.28 + y * 2.09 + t * 0.00025) * 0.35 +
      Math.sin(x * 3.71 - y * 5.13 + t * 0.00035) * 0.28 +
      Math.sin((x - y)  * 4.97      + t * 0.00020) * 0.22 +
      Math.sin(x * 2.33 + y * 7.81 + t * 0.00030) * 0.15;

    const hue = BASE_HUE + wave * 18;
    const sat = 85 + wave * 12;

    // ★ 普段もじんわり光る（非ホバー約50%輝度・ホバーでフル輝度）
    // brightness=0: 淡い金色の光 / brightness=1: フルの金色
    const baseL = facetLight * brightness + facetLight * 0.50 * (1 - brightness);
    const lit = baseL + wave * 6;

    return `hsl(${hue.toFixed(1)}, ${sat.toFixed(1)}%, ${Math.max(4, lit).toFixed(1)}%)`;
  }

  function drawCell(col, row) {
    const cx = col * CELL;
    const cy = row * CELL;
    const d  = CELL * DEPTH;
    const tl = [cx,        cy       ];
    const tr = [cx + CELL, cy       ];
    const bl = [cx,        cy + CELL];
    const br = [cx + CELL, cy + CELL];
    const cc = [cx + CELL / 2, cy + CELL / 2 - d * 0.2];

    // 面の基準明度（明暗差が大きいほど「鏡面感」が出る）
    const faces = [
      { pts: [tl, tr, cc], L: 75 },  // 上：最明
      { pts: [bl, br, cc], L: 18 },  // 下：最暗
      { pts: [tl, bl, cc], L: 48 },  // 左：中
      { pts: [tr, br, cc], L: 33 },  // 右：やや暗
    ];
    faces.forEach(({ pts, L }) => {
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      ctx.lineTo(pts[1][0], pts[1][1]);
      ctx.lineTo(pts[2][0], pts[2][1]);
      ctx.closePath();
      ctx.fillStyle = getCellColor(col, row, L);
      ctx.fill();
    });
  }

  function loop() {
    // ホバー時だけ時間を進める（非ホバーは止まる → 静止した暗い金属模様）
    if (window.holoHovered) t++;

    // 明るさをなめらかに補間（0.04 ≒ 約25フレームでフェード）
    const target = window.holoHovered ? 1 : 0;
    brightness += (target - brightness) * 0.04;

    ctx.clearRect(0, 0, W, H);
    const cols = Math.ceil(W / CELL) + 1;
    const rows = Math.ceil(H / CELL) + 1;
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        drawCell(col, row);
      }
    }
    // 境界線
    ctx.strokeStyle = 'rgba(0,0,0,0.30)';
    ctx.lineWidth = 0.5;
    for (let r = 0; r <= rows; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke();
    }
    for (let c = 0; c <= cols; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke();
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

// ===== ★ マウスによる3D傾きエフェクト =====
// wrapper が perspective コンテナ、card が実際に回転する要素
(function() {
  const wrapper = document.getElementById('cardWrapper');
  const card    = document.getElementById('card');
  let tRx = 0, tRy = 0;
  let cRx = 0, cRy = 0;

  function lerp(a, b, t) { return a + (b - a) * t; }

  function animateTilt() {
    cRx = lerp(cRx, tRx, 0.08);
    cRy = lerp(cRy, tRy, 0.08);
    card.style.transform = `rotateX(${cRx.toFixed(3)}deg) rotateY(${cRy.toFixed(3)}deg)`;

    // キャラクターの影を傾きに連動（立体感演出）
    const sx = (cRy * 1.2).toFixed(1);
    const sy = (cRy * 0.3 + cRx * 0.5 + 8).toFixed(1);
    const blur = (12 + Math.abs(cRy) * 0.8 + Math.abs(cRx) * 0.5).toFixed(1);
    const shadowFilter = `drop-shadow(${sx}px ${sy}px ${blur}px rgba(0,0,0,1))`;
    const charImg = document.getElementById('charImg');
    const charSvg = document.getElementById('charSvg');
    if (charImg) charImg.style.filter = shadowFilter;
    if (charSvg) charSvg.style.filter = shadowFilter + ' drop-shadow(0 0 12px rgba(200,150,255,0.4))';

    requestAnimationFrame(animateTilt);
  }
  animateTilt();

  wrapper.addEventListener('mousemove', e => {
    const rect = wrapper.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    tRx = -(e.clientY - cy) / rect.height * 20;
    tRy =  (e.clientX - cx) / rect.width  * 20;
  });

  wrapper.addEventListener('mouseleave', () => {
    tRx = 0;
    tRy = 0;
  });

  // タッチ対応
  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = wrapper.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const touch = e.touches[0];
    tRx = -(touch.clientY - cy) / rect.height * 15;
    tRy =  (touch.clientX - cx) / rect.width  * 15;
  }, { passive: false });

  wrapper.addEventListener('touchend', () => {
    tRx = 0;
    tRy = 0;
  });
})();
</script>
