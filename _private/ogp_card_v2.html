<canvas id="c" width="560" height="560"></canvas>
<img id="charImgEl" style="display:none">
<img id="bgImgEl" style="display:none">
<script>
(function(){
'use strict';
const p=new URLSearchParams(location.search);
const code=p.get('code')||'33333';
const gender=p.get('gender')||'F';
const rarity=p.get('rarity')||'r1';
const imgOverride=p.get('img')||'';

const O=+(p.get('o')||code[0]);
const C=+(p.get('c')||code[1]);
const E=+(p.get('e')||code[2]);
const A=+(p.get('a')||code[3]);
const N=+(p.get('n')||code[4]);
const scores={O,C,E,A,N};

const FC={O:'#8b5cf6',C:'#3b82f6',E:'#f97316',A:'#f472b6',N:'#14b8a6'};
const FH={O:[139,92,246],C:[59,130,246],E:[249,115,22],A:[244,114,182],N:[20,184,166]};

function toScale(v){return v<=2?1:v>=4?5:3;}
function isMax(f,v){if(f==='N')return v===1;if(f==='E'||f==='A')return v===1||v===5;return v===5;}
function getMaxFactor(){
  const ks=['O','C','E','A','N'],vs=[O,C,E,A,N];
  for(let i=0;i<5;i++)if(isMax(ks[i],vs[i]))return ks[i];
  return null;
}

// 決定論的シード乱数：同じカードは常に同じ見た目
let _seed=(parseInt(code)||0)*31+(gender==='M'?7:0);
function sr(){_seed=(_seed*1664525+1013904223)&0xffffffff;return(_seed>>>0)/4294967296;}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapText(ctx,text,maxW){
  const chars=text.split(''),lines=[];let line='';
  for(const ch of chars){
    const t=line+ch;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=ch;}else{line=t;}
  }
  if(line)lines.push(line);return lines;
}

// ============================================================
// 背景描画関数
// ============================================================

function drawStars(ctx,COX,COY,CW,CH){
  for(let i=0;i<65;i++){
    const x=COX+sr()*CW,y=COY+sr()*CH,s=sr()*1.2+0.3,o=sr()*0.5+0.15;
    ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${o})`;ctx.fill();
  }
}

// R1/R2: グリチE��ースパ�Eクル�E�キャラの前面に描画�E�E
function drawGlitter(ctx,COX,COY,CW,CH){
  const lightAngle=sr()*Math.PI*2; // カードごとにランダム角度
  const prevComp=ctx.globalCompositeOperation;
  ctx.globalCompositeOperation='screen';
  for(let i=0;i<220;i++){
    const x=COX+sr()*CW,y=COY+sr()*CH,size=sr()*1.8+0.4;
    const ca=sr()*Math.PI*2,cw=sr()*0.6+0.3,intensity=sr()*0.5+0.5;
    let diff=lightAngle-ca;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    const bright=Math.max(0,Math.cos(diff/cw))*intensity;
    if(bright<0.06)continue;
    const r=size*(0.5+bright*0.5);
    ctx.beginPath();ctx.arc(x,y,Math.max(0.3,r*0.5),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,240,${bright*0.9})`;ctx.fill();
    if(size>0.9){
      const outerR=r+bright*r*1.2,innerR=outerR*0.22;
      ctx.beginPath();
      for(let j=0;j<8;j++){
        const ang=j*Math.PI/4-Math.PI/2,rad=j%2===0?outerR:innerR;
        const px=x+Math.cos(ang)*rad,py=y+Math.sin(ang)*rad;
        if(j===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.closePath();ctx.fillStyle=`rgba(255,255,240,${bright*0.35})`;ctx.fill();
    }
  }
  ctx.globalCompositeOperation=prevComp;
}

// R2: 金属箔シマ�E�E�EAX因子色の斜め光！E
function drawFoil(ctx,COX,COY,CW,CH,factorKey){
  const rgb=FH[factorKey]||[212,190,140];
  const [r,g,b]=rgb;
  ctx.save();
  ctx.translate(COX+CW*0.5,COY+CH*0.45);
  ctx.rotate(-28*Math.PI/180);
  const g1=ctx.createLinearGradient(-CW,0,CW,0);
  g1.addColorStop(0,'rgba(255,255,255,0)');
  g1.addColorStop(0.25,`rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},0.12)`);
  g1.addColorStop(0.45,`rgba(255,255,255,0.28)`);
  g1.addColorStop(0.55,`rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},0.20)`);
  g1.addColorStop(0.75,`rgba(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)},0.10)`);
  g1.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g1;ctx.fillRect(-CW,-CH*1.5,CW*2,CH*3);
  ctx.restore();
}

// R3: オーロラカーチE��
function drawAurora(ctx,COX,COY,CW,CH){
  const smx=0.45,smy=0.5;
  const cnt=5;
  for(let i=0;i<cnt;i++){
    const baseX=(CW/(cnt+1))*(i+1);
    const hueBase=120+i*50;
    const wave1=Math.sin(smx*Math.PI*3+i*1.3)*45;
    const wave2=Math.sin(smy*Math.PI*2+i*2.1)*28;
    const xShift=(smx-.5)*80;
    for(let layer=2;layer>=0;layer--){
      const spread=30+layer*25;
      const hue=(hueBase+layer*15+smx*90+smy*45)%360;
      const alpha=.34-layer*.03;
      ctx.beginPath();
      ctx.moveTo(COX+baseX+wave1-spread+xShift,COY);
      for(let y=0;y<=CH;y+=8){
        const wv=Math.sin(y*.008+smx*Math.PI*4+i)*(15+layer*5)+Math.sin(y*.015+smy*Math.PI*3+i*2)*8;
        ctx.lineTo(COX+baseX+wave1+wv-spread+xShift,COY+y);
      }
      for(let y=CH;y>=0;y-=8){
        const wv=Math.sin(y*.009+smx*Math.PI*3+i+1)*(15+layer*5)+Math.sin(y*.013+smy*Math.PI*2+i*3)*8;
        ctx.lineTo(COX+baseX+wave2+wv+spread+xShift,COY+y);
      }
      ctx.closePath();
      const grad=ctx.createLinearGradient(COX+baseX-spread+xShift,COY,COX+baseX+spread+xShift,COY+CH);
      grad.addColorStop(0,`hsla(${hue},85%,55%,${alpha})`);
      grad.addColorStop(.3,`hsla(${(hue+20)%360},90%,60%,${alpha*1.3})`);
      grad.addColorStop(.6,`hsla(${(hue+40)%360},80%,50%,${alpha})`);
      grad.addColorStop(1,`hsla(${(hue+30)%360},85%,45%,${alpha*.6})`);
      ctx.fillStyle=grad;ctx.fill();
    }
  }
}

// R2/R3: 大きな煌めき星�E�静止画用・全星を常に表示�E�E
function drawBigStars(ctx,COX,COY,CW,CH){
  const prev=ctx.globalCompositeOperation;
  ctx.globalCompositeOperation='screen';
  for(let i=0;i<16;i++){
    const x=COX+sr()*CW,y=COY+sr()*CH;
    const size=sr()*4.5+3.5;
    const bright=sr()*0.35+0.65; // 常に 0.65、E.0 の高輝度
    // 中忁E�E点
    ctx.beginPath();ctx.arc(x,y,size*.45,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,240,${bright})`;ctx.fill();
    // 十字�E条�E�E本�E�E    
const outerR=size*(1+bright*1.8),innerR=outerR*.13;
    ctx.beginPath();
    for(let j=0;j<8;j++){
      const ang=j*Math.PI/4-Math.PI/2,rad=j%2===0?outerR:innerR;
      if(j===0)ctx.moveTo(x+Math.cos(ang)*rad,y+Math.sin(ang)*rad);
      else ctx.lineTo(x+Math.cos(ang)*rad,y+Math.sin(ang)*rad);
    }
    ctx.closePath();ctx.fillStyle=`rgba(255,255,240,${bright*.6})`;ctx.fill();
    // 放封E��ロー
    const gr=ctx.createRadialGradient(x,y,0,x,y,outerR*2);
    gr.addColorStop(0,`rgba(255,255,255,${bright*.3})`);
    gr.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=gr;ctx.fillRect(x-outerR*2,y-outerR*2,outerR*4,outerR*4);
  }
  ctx.globalCompositeOperation=prev;
}

// R3: 光沢オーバ�Eレイ
function drawAuroraGloss(ctx,COX,COY,CW,CH){
  // 斜め光沢シマ�E
  const g1=ctx.createLinearGradient(COX,COY,COX+CW*.7,COY+CH);
  g1.addColorStop(0,'rgba(255,255,255,0.22)');
  g1.addColorStop(0.2,'rgba(255,255,255,0.12)');
  g1.addColorStop(0.45,'rgba(255,255,255,0.03)');
  g1.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g1;ctx.fillRect(COX,COY,CW,CH);
  // スペキュラ光点�E�左上！E  
const g2=ctx.createRadialGradient(COX+CW*.22,COY+CH*.1,0,COX+CW*.22,COY+CH*.1,CW*.38);
  g2.addColorStop(0,'rgba(255,255,255,0.32)');
  g2.addColorStop(0.4,'rgba(255,255,255,0.10)');
  g2.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g2;ctx.fillRect(COX,COY,CW,CH);
}

// R4: ダイヤモンドファセチE���E��߁E�E
function drawDiamond(ctx,COX,COY,CW,CH){
  const CELL=18,DEPTH=0.42,BASE_HUE=38,lx=0.3,ly=0.25;
  function getFacetL(fi){
    const dx=(lx-.5)*2,dy=(ly-.5)*2;
    if(fi===0)return 55+Math.max(0,-dy)*38;
    if(fi===1)return 12+Math.max(0,dy)*28;
    if(fi===2)return 35+Math.max(0,-dx)*32;
    return 22+Math.max(0,dx)*32;
  }
  const cols=Math.ceil(CW/CELL)+1,rows=Math.ceil(CH/CELL)+1;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cx=COX+c*CELL,cy=COY+r*CELL;
      const cc=[cx+CELL/2,cy+CELL/2-CELL*DEPTH*.2];
      const tl=[cx,cy],tr=[cx+CELL,cy],bl=[cx,cy+CELL],br=[cx+CELL,cy+CELL];
      const x=c/cols,y=r/rows;
      const wave=Math.sin(x*6.28+y*2.09)*.35+Math.sin(x*3.71-y*5.13)*.28+Math.sin((x-y)*4.97)*.22+Math.sin(x*2.33+y*7.81)*.15;
      [[tl,tr,cc,0],[bl,br,cc,1],[tl,bl,cc,2],[tr,br,cc,3]].forEach(([p1,p2,p3,fi])=>{
        const L=getFacetL(fi);
        const hue=BASE_HUE+wave*18,sat=85+wave*12,lit=Math.max(4,L+wave*8);
        ctx.beginPath();ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.lineTo(p3[0],p3[1]);ctx.closePath();
        ctx.fillStyle=`hsl(${hue.toFixed(1)},${sat.toFixed(1)}%,${lit.toFixed(1)}%)`;ctx.fill();
      });
    }
  }
  ctx.strokeStyle='rgba(0,0,0,0.30)';ctx.lineWidth=0.5;
  for(let r=0;r<=rows;r++){ctx.beginPath();ctx.moveTo(COX,COY+r*CELL);ctx.lineTo(COX+CW,COY+r*CELL);ctx.stroke();}
  for(let c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(COX+c*CELL,COY);ctx.lineTo(COX+c*CELL,COY+CH);ctx.stroke();}
}

// R5: サンド粒子（カラフル�E�E
function drawSandParticles(ctx,COX,COY,CW,CH){
  const lightAngle=sr()*Math.PI*2;
  const prev=ctx.globalCompositeOperation;
  ctx.globalCompositeOperation='screen';
  for(let i=0;i<700;i++){
    const x=COX+sr()*CW,y=COY+sr()*CH,size=sr()*3.5+0.5;
    const ca=sr()*Math.PI*2,cw=sr()*.5+.25,intensity=sr()*.5+.5,hue=sr()*360;
    let diff=lightAngle-ca;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    const bright=Math.max(0,Math.cos(diff/cw))*intensity;
    if(bright<0.1)continue;
    ctx.beginPath();ctx.arc(x,y,Math.max(0.3,size*(0.5+bright*0.5)),0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue},90%,75%,${bright})`;ctx.fill();
  }
  ctx.globalCompositeOperation=prev;
}

// R6/R7: ホログラムタイル
function drawHoloTiles(ctx,COX,COY,CW,CH,isDark){
  const COLS=22,ROWS=32,cw=CW/COLS,ch=CH/ROWS,JITTER=.55;
  const pts=[];
  for(let r=0;r<=ROWS;r++){pts[r]=[];for(let c=0;c<=COLS;c++){
    const jx=(c===0||c===COLS)?0:(sr()-.5)*cw*JITTER;
    const jy=(r===0||r===ROWS)?0:(sr()-.5)*ch*JITTER;
    pts[r][c]={x:COX+c*cw+jx,y:COY+r*ch+jy};
  }}
  const lightAngle=sr()*Math.PI*2;
  const prev=ctx.globalCompositeOperation;
  ctx.globalCompositeOperation='screen';
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
    const tl=pts[r][c],tr=pts[r][c+1],bl=pts[r+1][c],br=pts[r+1][c+1];
    const hue=isDark?(sr()*60+200):(sr()*360);
    const ca=sr()*Math.PI*2,cw2=sr()*.4+.2,ci=sr()*.5+.5;
    let diff=lightAngle-ca;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    const bright=Math.max(0,Math.cos(diff/cw2))*ci;
    if(bright<.04)continue;
    const sat=isDark?(25+bright*45):85,light=15+bright*(isDark?40:65),alpha=bright*.85;
    ctx.fillStyle=`hsla(${hue.toFixed(1)},${sat.toFixed(0)}%,${light.toFixed(1)}%,${alpha.toFixed(2)})`;
    ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();ctx.fill();
  }}
  ctx.globalCompositeOperation=prev;
}

const fragments={
  O:{1:'慣れ親しんだことを大切にし、変化よりも安定を好む',2:'どちらかといえば保守的で、実際的なアプローチを取る',3:'新しいことへの関心と安定へのニーズのバランスが取れている',4:'好奇心が旺盛で、新しいアイデアや体験を積極的に求める',5:'豊かな想像力と強い探求心を持ち、常に新しい視点を探求する'},
  C:{1:'自由な流れに任せて行動し、計画よりも直感を重視する',2:'柔軟性を大切にし、細かい計画より臨機応変を好む',3:'計画性と柔軟性をバランスよく使い分ける',4:'責任感が強く、目標に向けて着実に取り組む',5:'高い自己規律と計画性で、何事も確実に成し遂げる'},
  E:{1:'一人の時間を大切にし、深い内省と思考を好む',2:'内向的で、少数の親しい関係を深めることを重視する',3:'社交的な面と一人の時間のニーズをバランスよく持つ',4:'社交的で、人との交流からエネルギーを得る',5:'活発で社交的、賑やかな場や新しい出会いを積極的に求める'},
  A:{1:'自己主張が明確で、競争的な場面でも主張を崩さない',2:'独立心が強く、自分の判断と利益を重視する傾向がある',3:'他者への配慮と自己主張のバランスが取れている',4:'思いやりがあり、周囲との調和を大切にする',5:'深い共感力と利他性を持ち、他者のために動くことを自然に行う'},
  N:{1:'精神的な安定感が高く、ストレス下でも冷静さを保てる',2:'感情的な揺れが少なく、落ち着いて物事を判断できる',3:'感情の波はあるが、自分でコントロールできる程度に保つ',4:'感情豊かで繊細。状況によって精神的に揺れることがある',5:'感情に敏感で深く、ストレスや不安を強く感じやすい'}
};

function genTypeName(s){
  let main='O',max=s.O;
  for(const[k,v]of Object.entries(s)){if(v>max){max=v;main=k;}}
  const ml={O:{h:'探求者',l:'確実派'},C:{h:'実行者',l:'自由人'},E:{h:'社交家',l:'内向家'},A:{h:'調停者',l:'競争者'},N:{h:'感受家',l:'平静派'}};
  const sl={O:{h:'発想家',l:'現実派'},C:{h:'規律派',l:'柔軟派'},E:{h:'ムードメーカー',l:'思索者'},A:{h:'支援者',l:'自立派'},N:{h:'繊細派',l:'泰然家'}};
  const mn=max>=4?ml[main].h:ml[main].l;
  let sub=null;
  for(const[k,v]of Object.entries(s)){if(k!==main&&(v===1||v===5)){sub=k;break;}}
  if(sub){const sn=s[sub]===5?sl[sub].h:sl[sub].l;return sn+'・'+mn;}
  return mn;
}

function genDescription(){
  const parts=[],keys=['O','C','E','A','N'],vals=[O,C,E,A,N];
  vals.forEach((score,i)=>{if(score===1||score===5)parts.push(fragments[keys[i]][score]);});
  if(parts.length===0){parts.push(fragments.O[3]);parts.push(fragments.E[3]);}
  return parts.slice(0,2).join('、') + '。';
}

// 画像ロード�Eルパ�E
function loadImg(el, src) {
  return new Promise((res) => {
    el.onload = () => res(el);
    el.onerror = () => res(null);
    el.src = src;
  });
}

// ============================================================
// メイン描画
// ============================================================
async function render(){
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');
  const W=560,H=560,CW=480,CH=480,COX=(W-CW)/2,COY=(H-CH)/2;
  const isR0=rarity==='r0';
  const maxFactor=getMaxFactor();

  // R5/R6/R7 背景画像を事前ローチE  
const bgSrcs={r5:'../images/holo/sand.jpg',r6:'../images/holo/random.jpg',secret:'../images/holo/random.jpg',r7:'../images/holo/dark_random.jpg'};
  let bgImg=null;
  if(bgSrcs[rarity]){
    bgImg=await loadImg(document.getElementById('bgImgEl'),bgSrcs[rarity]);
  }

  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // ── Phase 1: カードエリアクリチE�E ──
  ctx.save();
  roundRect(ctx,COX,COY,CW,CH,8);
  ctx.clip();

  // ── Phase 2: 背景 ──
  if(isR0){
    const bg=ctx.createLinearGradient(COX,COY,COX+CW,COY+CH);
    bg.addColorStop(0,'#fdf6ec');bg.addColorStop(.5,'#f5e6cc');bg.addColorStop(1,'#ead8b4');
    ctx.fillStyle=bg;ctx.fillRect(COX,COY,CW,CH);
  }else if(rarity==='r4'){
    drawDiamond(ctx,COX,COY,CW,CH);
  }else if(rarity==='r6'||rarity==='secret'){
    ctx.fillStyle='#0a0e27';ctx.fillRect(COX,COY,CW,CH);
    if(bgImg){ctx.drawImage(bgImg,COX,COY,CW,CH);}
    drawHoloTiles(ctx,COX,COY,CW,CH,false);
  }else if(rarity==='r7'){
    ctx.fillStyle='#040a14';ctx.fillRect(COX,COY,CW,CH);
    if(bgImg){ctx.drawImage(bgImg,COX,COY,CW,CH);}
    drawHoloTiles(ctx,COX,COY,CW,CH,true);
  }else{
    // R1〜R5: 星空背景 + エフェクト
    if(rarity==='r2'&&maxFactor){
      // R2: MAX因子�E色で暗い背景グラチE�Eション
      const [fr,fg,fb]=FH[maxFactor];
      const bg2=ctx.createLinearGradient(COX,COY,COX,COY+CH);
      bg2.addColorStop(0,`rgb(${fr*.30|0},${fg*.22|0},${fb*.35|0})`);
      bg2.addColorStop(1,`rgb(${fr*.12|0},${fg*.09|0},${fb*.16|0})`);
      ctx.fillStyle=bg2;ctx.fillRect(COX,COY,CW,CH);
    }else{
      ctx.fillStyle='#0a0e27';ctx.fillRect(COX,COY,CW,CH);
    }
    drawStars(ctx,COX,COY,CW,CH);
    if(rarity==='r1'){drawGlitter(ctx,COX,COY,CW,CH);drawBigStars(ctx,COX,COY,CW,CH);}
    if(rarity==='r3')drawAurora(ctx,COX,COY,CW,CH);
    if(rarity==='r5'){
      if(bgImg){ctx.globalAlpha=0.55;ctx.drawImage(bgImg,COX,COY,CW,CH);ctx.globalAlpha=1;}
      drawSandParticles(ctx,COX,COY,CW,CH);
    }
  }

  // ── Phase 3: キャラクター画僁E──
  const roundedCode=[0,1,2,3,4].map(i=>toScale(+code[i])).join('');
  const charImgEl=document.getElementById('charImgEl');
  let charImg;
  if(imgOverride){
    charImg=await loadImg(charImgEl,`../${imgOverride}`);
  }else{
    // 1. hidden/のドンピシャ画像を優先
    charImg=await loadImg(charImgEl,`../images/characters/hidden/${gender}/${code}.webp`);
    if(!charImg){
      // 2. F/Mの完全一致
      charImgEl.src='';
      charImg=await loadImg(charImgEl,`../images/characters/${gender}/${code}.webp`);
    }
    if(!charImg){
      // 3. F/Mの丸めフォールバック（{1,3,5}のみ）
      charImgEl.src='';
      charImg=await loadImg(charImgEl,`../images/characters/${gender}/${roundedCode}.webp`);
    }
  }

  if(charImg){
    const cx2=COX+CW*.05,cy2=COY+CH*.05,cw2=CW*.9,ch2=CH*.75;
    const ir=charImg.naturalWidth/charImg.naturalHeight,ar=cw2/ch2;
    let dw=ir>ar?cw2:ch2*ir,dh=ir>ar?cw2/ir:ch2;
    dw*=1.2;dh*=1.2;
    ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=14;ctx.shadowOffsetY=5;
    ctx.drawImage(charImg,cx2+(cw2-dw)/2,cy2,dw,dh);
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
  }

  // ── Phase 4: グリチE��ー・大きい星�E光沢�E�キャラの前面�E�E──
  if(rarity==='r2'){drawGlitter(ctx,COX,COY,CW,CH);drawBigStars(ctx,COX,COY,CW,CH);}
  if(rarity==='r3')drawAuroraGloss(ctx,COX,COY,CW,CH);

  // ── Phase 5: 下部グラチE�EションフェーチE──
  const bottomPad=16,descBoxH=52,barGapY=16,barH=6;
  const descY=COY+CH-bottomPad-descBoxH;
  const scoreStartY=descY-10-(barGapY*2+barH);
  const contentTop=Math.max(COY,scoreStartY-40);
  const fade=ctx.createLinearGradient(COX,contentTop,COX,COY+CH);
  if(isR0){
    fade.addColorStop(0,'transparent');fade.addColorStop(.35,'transparent');
    fade.addColorStop(.65,'#ead8b4');fade.addColorStop(1,'#e0c89a');
  }else if(rarity==='r4'){
    fade.addColorStop(0,'transparent');fade.addColorStop(.2,'rgba(0,0,0,0.55)');
    fade.addColorStop(1,'rgba(0,0,0,0.88)');
  }else{
    fade.addColorStop(0,'transparent');fade.addColorStop(.15,'rgba(10,14,39,0.7)');
    fade.addColorStop(1,'rgba(10,14,39,0.92)');
  }
  ctx.fillStyle=fade;ctx.fillRect(COX,contentTop,CW,COY+CH-contentTop);

  // ── Phase 6: スコアバ�E ──
  const scoreKeys=['O','C','E','A','N'],scoreVals=[O,C,E,A,N];
  const scoreAreaX=COX+24,scoreAreaW=CW-48;
  const labelW=14,valW=14,barGapX=16,colW=(scoreAreaW-barGapX)/2,barMaxW=colW-labelW-valW;

  ctx.textBaseline='middle';
  for(let i=0;i<5;i++){
    const col=i%2,row=Math.floor(i/2);
    const x=scoreAreaX+col*colW,y=scoreStartY+row*barGapY;
    const color=FC[scoreKeys[i]],val=scoreVals[i];

    ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    if(isR0){ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;ctx.lineJoin='round';ctx.strokeText(scoreKeys[i],x+labelW/2,y+barH/2);}
    ctx.fillStyle=color;ctx.fillText(scoreKeys[i],x+labelW/2,y+barH/2);

    const barX=x+labelW;
    roundRect(ctx,barX,y,barMaxW,barH,3);
    ctx.fillStyle=isR0?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.4)';ctx.fill();
    if(val>0){
      roundRect(ctx,barX,y,Math.max(barH,val/5*barMaxW),barH,3);
      ctx.fillStyle=color;ctx.fill();
    }
    ctx.font='10px sans-serif';ctx.textAlign='right';
    if(isR0){
      ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2;ctx.strokeText(val,barX+barMaxW+valW,y+barH/2+1);
      ctx.fillStyle='#fff';ctx.fillText(val,barX+barMaxW+valW,y+barH/2+1);
    }else{
      ctx.fillStyle='#94a3b8';ctx.fillText(val,barX+barMaxW+valW,y+barH/2+1);
    }
  }

  // ── Phase 7: 説明文 ──
  const desc=genDescription();
  roundRect(ctx,scoreAreaX,descY,scoreAreaW,descBoxH,8);
  if(isR0){
    ctx.fillStyle='rgba(255,255,255,0.92)';ctx.fill();
    ctx.font='14px "Noto Sans JP","Hiragino Kaku Gothic Pro","Meiryo",sans-serif';
    ctx.fillStyle='#3a2e1e';
  }else{
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.stroke();
    ctx.font='14px "Noto Sans JP","Hiragino Kaku Gothic Pro","Meiryo",sans-serif';
    ctx.fillStyle='#cbd5e1';
  }
  ctx.textAlign='left';ctx.textBaseline='top';
  wrapText(ctx,desc,scoreAreaW-24).slice(0,2).forEach((line,i)=>{
    ctx.fillText(line,scoreAreaX+12,descY+10+i*18);
  });

  ctx.restore();

  // ── Phase 8: カード枠 ──
  const borderColors={r0:'rgba(180,140,90,0.5)',r1:'rgba(96,165,250,0.7)',r3:'rgba(52,211,153,0.7)',r4:'rgba(251,191,36,0.75)',r5:'rgba(248,113,113,0.7)',r6:'rgba(249,168,212,0.85)',secret:'rgba(249,168,212,0.85)',r7:'rgba(124,58,237,0.85)'};
  let borderColor=borderColors[rarity]||'rgba(255,255,255,0.3)';
  if(rarity==='r2'&&maxFactor){const rgb=FH[maxFactor];borderColor=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.85)`;}
  ctx.strokeStyle=borderColor;ctx.lineWidth=2.5;
  roundRect(ctx,COX,COY,CW,CH,8);ctx.stroke();

  // ── Phase 9: グロー ──
  ctx.save();
  const glows={r4:'rgba(251,191,36,0.28)',r5:'rgba(248,113,113,0.22)',r6:'rgba(249,168,212,0.35)',secret:'rgba(249,168,212,0.35)',r7:'rgba(124,58,237,0.35)'};
  ctx.shadowColor=glows[rarity]||'rgba(0,0,0,0.5)';
  ctx.shadowBlur=glows[rarity]?45:30;ctx.shadowOffsetY=6;
  roundRect(ctx,COX,COY,CW,CH,8);ctx.strokeStyle='transparent';ctx.stroke();
  ctx.restore();

  // ── Phase 10: タイプ名・コード（上部�E�E──
  const typeName=genTypeName(scores);
  const typeCode=`O${O} C${C} E${E} A${A} N${N}`;
  const nameFS=Math.round(26*1.6);
  ctx.textAlign='center';ctx.textBaseline='top';
  if(isR0){
    ctx.font=`bold ${nameFS}px "Noto Sans JP","Hiragino Kaku Gothic Pro","Meiryo",sans-serif`;
    ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.lineJoin='round';
    ctx.strokeText(typeName,W/2,COY+8);ctx.fillStyle='#fff';ctx.fillText(typeName,W/2,COY+8);
    ctx.font='500 12px sans-serif';
    ctx.strokeText(typeCode,W/2,COY+8+nameFS+4);ctx.fillText(typeCode,W/2,COY+8+nameFS+4);
  }else{
    ctx.font=`bold ${nameFS}px "Noto Sans JP","Hiragino Kaku Gothic Pro","Meiryo",sans-serif`;
    ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=8;ctx.shadowOffsetY=2;
    ctx.fillStyle='#e2e8f0';ctx.fillText(typeName,W/2,COY+8);
    ctx.font='500 12px sans-serif';ctx.fillStyle='#cbd5e1';ctx.shadowBlur=6;
    ctx.fillText(typeCode,W/2,COY+8+nameFS+4);
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
  }

  window._ready=true;
  window._webpData=canvas.toDataURL('image/webp',0.85);
}

render().catch(e=>{console.error(e);window._ready=true;window._error=e.message;});
})();
</script>
</body>
