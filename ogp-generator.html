<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OGP画像ジェネレーター - ビッグファイブ3125タイプ診断</title>
<style>
  body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 20px; }
  canvas { border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); max-width: 100%; }
  button { background: #6366f1; color: #fff; border: none; padding: 14px 40px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  button:hover { background: #4f46e5; }
  p { color: #555; font-size: 14px; }
</style>
</head>
<body>
<h2>OGP画像ジェネレーター（1200×630px）</h2>
<canvas id="c" width="1200" height="630"></canvas>
<p>↓ ボタンを押すと <strong>ogp.png</strong> として保存されます。</p>
<button onclick="download()">ogp.png をダウンロード</button>

<script>
const c   = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 1200, H = 630;

function draw() {
    // 背景
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0,   '#0f172a');
    bg.addColorStop(0.5, '#1e1b4b');
    bg.addColorStop(1,   '#0f172a');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // 光のグロー（左上）
    const g1 = ctx.createRadialGradient(300, 180, 0, 300, 180, 350);
    g1.addColorStop(0, 'rgba(99,102,241,0.25)');
    g1.addColorStop(1, 'rgba(99,102,241,0)');
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    // 光のグロー（右下）
    const g2 = ctx.createRadialGradient(900, 450, 0, 900, 450, 300);
    g2.addColorStop(0, 'rgba(236,72,153,0.2)');
    g2.addColorStop(1, 'rgba(236,72,153,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);

    // 上部アクセントライン
    const topLine = ctx.createLinearGradient(0, 0, W, 0);
    topLine.addColorStop(0,   '#6366f1');
    topLine.addColorStop(0.3, '#06b6d4');
    topLine.addColorStop(0.7, '#ec4899');
    topLine.addColorStop(1,   '#f59e0b');
    ctx.fillStyle = topLine;
    ctx.fillRect(0, 0, W, 4);

    // 5つの因子バー（装飾）
    const colors = ['#6366f1', '#06b6d4', '#10b981', '#f59e0b', '#ec4899'];
    const labels = ['O', 'C', 'E', 'A', 'N'];
    const barY = 110;
    for (let i = 0; i < 5; i++) {
        const bx = 120 + i * 200;
        // バー背景
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        roundRect(ctx, bx, barY, 150, 8, 4);
        ctx.fill();
        // バー（ランダムに見せる）
        const widths = [120, 95, 130, 110, 80];
        const barGrad = ctx.createLinearGradient(bx, 0, bx + widths[i], 0);
        barGrad.addColorStop(0, colors[i]);
        barGrad.addColorStop(1, colors[i] + '88');
        ctx.fillStyle = barGrad;
        roundRect(ctx, bx, barY, widths[i], 8, 4);
        ctx.fill();
        // ラベル
        ctx.font = '13px "Orbitron", monospace';
        ctx.fillStyle = colors[i] + 'cc';
        ctx.textAlign = 'center';
        ctx.fillText(labels[i], bx + 75, barY + 28);
    }

    // メインタイトル
    const titleGrad = ctx.createLinearGradient(200, 0, 1000, 0);
    titleGrad.addColorStop(0,   '#6366f1');
    titleGrad.addColorStop(0.5, '#06b6d4');
    titleGrad.addColorStop(1,   '#ec4899');

    ctx.font = 'bold 56px "Hiragino Kaku Gothic Pro", Meiryo, sans-serif';
    ctx.fillStyle = titleGrad;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(99,102,241,0.4)';
    ctx.shadowBlur = 20;
    ctx.fillText('ビッグファイブ 3125タイプ診断', W/2, 270);
    ctx.shadowBlur = 0;

    // サブタイトル
    ctx.font = '24px "Hiragino Kaku Gothic Pro", Meiryo, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('5つの性格因子 × 3125パターンであなたを分析', W/2, 330);

    // タイプ名例
    ctx.font = 'bold 32px "Hiragino Kaku Gothic Pro", Meiryo, sans-serif';
    ctx.fillStyle = '#fbbf24';
    ctx.shadowColor = 'rgba(251,191,36,0.3)';
    ctx.shadowBlur = 12;
    ctx.fillText('あなたのタイプは…？', W/2, 410);
    ctx.shadowBlur = 0;

    // 例のタイプ名
    ctx.font = '22px "Hiragino Kaku Gothic Pro", Meiryo, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillText('「しずかクリエイター」「お祭り実現係」「深海の探検家」…', W/2, 460);

    // 装飾パーティクル
    const particles = [
        {x:80,y:200,r:3,c:'rgba(99,102,241,0.3)'},
        {x:1120,y:180,r:2,c:'rgba(6,182,212,0.3)'},
        {x:150,y:450,r:2.5,c:'rgba(236,72,153,0.25)'},
        {x:1050,y:400,r:3,c:'rgba(245,158,11,0.25)'},
        {x:200,y:120,r:2,c:'rgba(16,185,129,0.3)'},
        {x:1000,y:130,r:2,c:'rgba(99,102,241,0.2)'},
        {x:600,y:520,r:2,c:'rgba(6,182,212,0.15)'},
    ];
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.c;
        ctx.fill();
    });

    // フッター
    ctx.font = '14px "Orbitron", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.letterSpacing = '4px';
    ctx.textAlign = 'center';
    ctx.fillText('ASOBI  LAB', W/2, 590);

    // 下部ライン
    ctx.fillStyle = topLine;
    ctx.fillRect(0, H - 4, W, 4);
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function download() {
    const a = document.createElement('a');
    a.download = 'ogp.png';
    a.href = c.toDataURL('image/png');
    a.click();
}

draw();
</script>
</body>
</html>
