<meta name="description" content="保存したビッグファイブ診断結果をつかって人間関係を分析。好かれたい・振られた理由・距離の原因・ケンカの理由など、日々の悩みを性格の5因子から読み解き、相手との合わせ方まで具体的にアドバイスします。">

<style>
:root {
  --c-O: #8b5cf6;
  --c-C: #3b82f6;
  --c-E: #f97316;
  --c-A: #f472b6;
  --c-N: #14b8a6;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --bg: #0a0e27;
  --text: #e2e8f0;
  --dim: #94a3b8;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 40px 20px 100px;
}
.container { max-width: 600px; margin: 0 auto; }

/* ヘッダー */
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.back-link {
  display: inline-flex; align-items: center; gap: 5px;
  color: var(--dim); text-decoration: none; font-size: 14px; transition: color 0.2s;
}
.back-link:hover { color: var(--text); }
.page-title { font-size: 20px; font-weight: 700; flex: 1; margin: 0; }

/* ステップインジケーター */
.steps { display: flex; align-items: center; margin-bottom: 28px; }
.step-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); font-weight: 500; }
.step-item.active { color: var(--text); }
.step-item.done { color: var(--purple); }
.step-num {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.step-item.active .step-num,
.step-item.done .step-num { background: var(--purple); border-color: var(--purple); color: #fff; }
.step-line { flex: 1; height: 1px; background: rgba(139,92,246,0.2); margin: 0 6px; }

.section-label { font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: 0.08em; margin-bottom: 12px; }

/* 人物カード */
.person-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.person-card {
  display: flex; align-items: center; gap: 14px; padding: 14px 16px;
  background: rgba(26,10,62,0.45);
  border: 1.5px solid rgba(139,92,246,0.2);
  border-radius: 12px; cursor: pointer; transition: all 0.2s; user-select: none;
}
.person-card:hover { border-color: rgba(139,92,246,0.5); transform: translateY(-1px); }
.person-card.selected { border-color: #ec4899; background: rgba(236,72,153,0.08); }
.person-card.disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.person-avatar { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.person-avatar-placeholder {
  width: 48px; height: 48px; border-radius: 8px;
  background: rgba(139,92,246,0.12); border: 1.5px solid rgba(139,92,246,0.2);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.person-avatar-placeholder svg { width: 22px; height: 22px; stroke: var(--dim); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.person-info { flex: 1; min-width: 0; }
.person-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.person-type { font-size: 12px; color: var(--dim); margin-bottom: 6px; }
.mini-bars { display: flex; gap: 4px; }
.mini-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.mini-bar-bg { width: 16px; height: 28px; background: rgba(128,128,128,0.12); border-radius: 3px; overflow: hidden; display: flex; align-items: flex-end; }
.mini-bar-fill { width: 100%; border-radius: 3px; }
.mini-bar-label { font-size: 9px; color: var(--dim); font-weight: 700; }
.select-badge {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid rgba(139,92,246,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: transparent; transition: all 0.2s; flex-shrink: 0;
}
.person-card.selected .select-badge { background: #ec4899; border-color: #ec4899; color: #fff; }

.hint-text { font-size: 13px; color: var(--dim); text-align: center; margin-bottom: 16px; padding: 10px; background: rgba(139,92,246,0.06); border-radius: 8px; }

/* テーマ選択 */
.situation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.situation-btn {
  padding: 20px 16px;
  background: rgba(26,10,62,0.45);
  border: 1.5px solid rgba(139,92,246,0.2);
  border-radius: 14px; cursor: pointer; text-align: center;
  transition: all 0.2s; color: var(--text); font-family: 'Noto Sans JP', sans-serif;
}
.situation-btn:hover { border-color: rgba(139,92,246,0.5); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139,92,246,0.12); }
.situation-icon { width: 32px; height: 32px; margin: 0 auto 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.situation-icon svg { width: 18px; height: 18px; }
.situation-label { font-size: 13px; font-weight: 700; line-height: 1.4; }
.situation-sub { font-size: 11px; color: var(--dim); margin-top: 4px; line-height: 1.4; }

/* ペア表示 */
.pair-display {
  display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  background: rgba(26,10,62,0.45); border: 1px solid rgba(139,92,246,0.2);
  border-radius: 12px; margin-bottom: 24px;
}
.pair-person { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.pair-avatar { width: 52px; height: 52px; border-radius: 9px; object-fit: cover; }
.pair-avatar-placeholder {
  width: 52px; height: 52px; border-radius: 9px;
  background: rgba(139,92,246,0.12); border: 1.5px solid rgba(139,92,246,0.2);
  display: flex; align-items: center; justify-content: center;
}
.pair-avatar-placeholder svg { width: 24px; height: 24px; stroke: var(--dim); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.pair-name { font-size: 13px; font-weight: 700; text-align: center; }
.pair-divider { font-size: 18px; color: var(--dim); font-weight: 700; flex-shrink: 0; }

/* ペア相性タイプカード（フェーズ3） */
.pair-type-card {
  padding: 20px 18px; border-radius: 14px; margin-bottom: 20px; text-align: center;
  background: rgba(139,92,246,0.08); border: 1.5px solid rgba(139,92,246,0.3);
}
.pair-type-label { font-size: 11px; letter-spacing: 2px; color: var(--dim); font-weight: 700; margin-bottom: 8px; }
.pair-type-name { font-size: 22px; font-weight: 900; line-height: 1.3; margin-bottom: 6px; }
.pair-type-roles { font-size: 12px; color: var(--dim); margin-bottom: 10px; }
.pair-type-copy { font-size: 13px; line-height: 1.7; text-align: left; }

/* 分析カード */
.analysis-section { margin-bottom: 20px; }
.analysis-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; padding-left: 10px; border-left: 3px solid var(--purple); }
.analysis-card {
  padding: 16px;
  background: rgba(26,10,62,0.45); border: 1px solid rgba(139,92,246,0.2);
  border-radius: 12px; margin-bottom: 10px;
}
.analysis-card:last-child { margin-bottom: 0; }
.analysis-point { font-size: 13px; font-weight: 700; margin-bottom: 6px; line-height: 1.5; }
.analysis-detail { font-size: 13px; color: var(--dim); line-height: 1.7; }

.advice-card {
  padding: 16px 18px;
  background: rgba(139,92,246,0.07); border: 1px solid rgba(139,92,246,0.2);
  border-radius: 12px; margin-bottom: 10px;
}
.advice-card:last-child { margin-bottom: 0; }
.advice-text { font-size: 13px; line-height: 1.7; }

.back-btn {
  width: 100%; padding: 13px; background: transparent;
  border: 1.5px solid rgba(139,92,246,0.2);
  border-radius: 12px; color: var(--dim); font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 12px; transition: all 0.2s;
}
.back-btn:hover { border-color: rgba(139,92,246,0.5); color: var(--text); }

.empty-state { text-align: center; padding: 60px 20px; }
.empty-text { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--dim); margin-bottom: 24px; }
.empty-btn { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: #fff; text-decoration: none; border-radius: 100px; font-size: 14px; font-weight: 700; }

.step-view { display: none; }
.step-view.active { display: block; }

/* カテゴリタブ */
.cat-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.cat-tab {
  flex: 1; padding: 11px 6px; border: 1.5px solid rgba(139,92,246,0.2);
  background: rgba(26,10,62,0.3); border-radius: 10px; cursor: pointer;
  font-size: 13px; font-weight: 700; color: var(--dim); transition: all 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.cat-tab:hover { border-color: rgba(139,92,246,0.45); color: var(--text); }
.cat-tab svg { width: 14px; height: 14px; flex-shrink: 0; }
.cat-tab.active { background: rgba(236,72,153,0.12); border-color: var(--pink); color: var(--text); }
</style>
</head>

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

<script src="reladvice-data.js"></script>
<script>
function toImgCode(code) {
  return (code || '33333').split('').map(function(d) {
    var n = parseInt(d); return n <= 2 ? '1' : n >= 4 ? '5' : '3';
  }).join('');
}

var PERSON_SVG = '<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';

var currentCat = 'love';

function loadAllPersons() {
  var persons = [];
  try {
    var raw = JSON.parse(localStorage.getItem('bigfive_my_results') || 'null');
    var myData = null;
    if (Array.isArray(raw) && raw.length > 0) { myData = raw[0]; }
    else if (raw && typeof raw === 'object' && raw.code) { myData = raw; }
    if (myData) {
      var myName = (localStorage.getItem('bigfive_my_name') || '').trim() || '自分';
      persons.push(Object.assign({}, myData, { _isSelf: true, name: myName }));
    }
  } catch(e) {}
  try {
    var others = JSON.parse(localStorage.getItem('bigfive_other_results') || '[]');
    if (Array.isArray(others)) {
      others.forEach(function(o) { persons.push(Object.assign({}, o, { _isSelf: false })); });
    }
  } catch(e) {}
  return persons;
}

var allPersons = [];
var selected = [];
var currentSituation = '';


function getImgPath(p) {
  var code = p.code || '33333';
  var gender = p.gender || 'F';
  var version = p.version || '10';
  if (typeof ImageResolver !== 'undefined') {
    return ImageResolver.getDisplayImage(code, gender, version);
  }
  return 'images/characters/marume243/' + (gender === 'M' ? 'M' : 'F') + '/' + toImgCode(code) + '.webp';
}
function getImgFallback(p) {
  var code = p.code || '33333';
  var gender = p.gender || 'F';
  if (typeof ImageResolver !== 'undefined') {
    return ImageResolver.getFallbackImage(code, gender);
  }
  return 'images/characters/marume243/' + (gender === 'M' ? 'M' : 'F') + '/' + toImgCode(code) + '.webp';
}

function avatarImg(p, size) {
  var s = size || 48;
  var r = Math.round(s * 0.167) + 'px';
  var g = p.gender || '';
  if (p.code && (g === 'M' || g === 'F')) {
    var src = getImgPath(p);
    var fb = getImgFallback(p);
    return '<img style="width:' + s + 'px;height:' + s + 'px;border-radius:' + r + ';object-fit:cover;flex-shrink:0;" src="' + src + '" data-fb="' + fb + '"'
      + ' onerror="if(!this.dataset.t){this.dataset.t=\'1\';this.src=this.dataset.fb}else{this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';}" alt="">'
      + '<div class="person-avatar-placeholder" style="width:' + s + 'px;height:' + s + 'px;border-radius:' + r + ';display:none;">' + PERSON_SVG + '</div>';
  }
  return '<div class="person-avatar-placeholder" style="width:' + s + 'px;height:' + s + 'px;border-radius:' + r + ';">' + PERSON_SVG + '</div>';
}

function renderPersonGrid() {
  var grid = document.getElementById('personGrid');
  if (allPersons.length === 0) {
    grid.innerHTML = '<div class="empty-state">'
      + '<div class="empty-text">診断データがありません</div>'
      + '<div class="empty-sub">まずはビッグファイブ診断を受けるか、<br>「あの人を診断する」で登録してください</div>'
      + '<a href="quiz.html" class="empty-btn">診断をはじめる</a></div>';
    return;
  }
  grid.innerHTML = '';
  allPersons.forEach(function(p, i) {
    var isSel = selected.indexOf(i) !== -1;
    var selNum = selected.indexOf(i) + 1;
    var isDis = !isSel && selected.length >= 2;
    var card = document.createElement('div');
    card.className = 'person-card' + (isSel ? ' selected' : '') + (isDis ? ' disabled' : '');
    if (!isDis) card.onclick = function() { toggleSelect(i); };

    var miniBars = FACTORS.map(function(f) {
      var h = Math.round(sc(p, f.key) / 5 * 28);
      return '<div class="mini-bar-wrap"><div class="mini-bar-bg"><div class="mini-bar-fill" style="height:' + h + 'px;background:' + f.color + ';"></div></div><div class="mini-bar-label">' + f.key + '</div></div>';
    }).join('');

    var dateStr = p.date ? new Date(p.date).toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'}) : '';
    var meta = [p.typeName, dateStr].filter(Boolean).join('  ');

    card.innerHTML = avatarImg(p, 48)
      + '<div class="person-info">'
        + '<div class="person-name">' + escHtml(p.name || '名前なし') + '</div>'
        + (meta ? '<div class="person-type">' + escHtml(meta) + '</div>' : '')
        + '<div class="mini-bars">' + miniBars + '</div>'
      + '</div>'
      + '<div class="select-badge">' + (isSel ? selNum : '') + '</div>';
    grid.appendChild(card);
  });
}

function toggleSelect(i) {
  var idx = selected.indexOf(i);
  if (idx !== -1) { selected.splice(idx, 1); }
  else { if (selected.length >= 2) return; selected.push(i); }
  renderPersonGrid();
  if (selected.length === 2) setTimeout(goStep2, 200);
}

function goStep1() { selected = []; renderPersonGrid(); showStep(1); }
function goStep2() {
  if (selected.length < 2) return;
  renderPairDisplay('pairDisplay2');
  renderCatTabs();
  renderThemeGrid();
  showStep(2);
}
function hexA(hex, a) {
  var h = String(hex).replace('#', '');
  var r = parseInt(h.substr(0, 2), 16), g = parseInt(h.substr(2, 2), 16), b = parseInt(h.substr(4, 2), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}
function renderCatTabs() {
  var el = document.getElementById('catTabs');
  el.innerHTML = CATEGORIES.map(function(c) {
    var on = c.id === currentCat ? ' active' : '';
    var style = on ? ' style="color:' + c.color + ';"' : '';
    return '<button type="button" class="cat-tab' + on + '"' + style + ' onclick="selectCat(\'' + c.id + '\')">'
      + c.icon + '<span>' + c.label + '</span></button>';
  }).join('');
}
function selectCat(catId) {
  currentCat = catId;
  renderCatTabs();
  renderThemeGrid();
}
function renderThemeGrid() {
  var grid = document.getElementById('themeGrid');
  var cat = CATEGORIES.filter(function(c) { return c.id === currentCat; })[0];
  if (!cat) { grid.innerHTML = ''; return; }
  var list = THEMES.filter(function(t) { return t.cat === currentCat; });
  grid.innerHTML = list.map(function(t) {
    return '<button type="button" class="situation-btn" onclick="goStep3(\'' + t.id + '\')">'
      + '<div class="situation-icon" style="background:' + hexA(cat.color, 0.12) + ';color:' + cat.color + ';">'
      + cat.icon + '</div>'
      + '<div class="situation-label">' + t.label + '</div>'
      + '</button>';
  }).join('');
}
function goStep3(situation) {
  currentSituation = situation;
  renderPairDisplay('pairDisplay3');
  renderAnalysis();
  showStep(3);
}
function showStep(n) {
  document.querySelectorAll('.step-view').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('step' + n).classList.add('active');
  [1,2,3].forEach(function(i) {
    var si = document.getElementById('si' + i);
    si.classList.remove('active','done');
    if (i < n) si.classList.add('done'); else if (i === n) si.classList.add('active');
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderPairDisplay(elId) {
  var p1 = allPersons[selected[0]], p2 = allPersons[selected[1]];
  document.getElementById(elId).innerHTML = '<div class="pair-display">'
    + pairMini(p1) + '<div class="pair-divider">×</div>' + pairMini(p2) + '</div>';
}
function pairMini(p) {
  var g = p.gender || '', av = '';
  if (p.code && (g === 'M' || g === 'F')) {
    var src = getImgPath(p);
    av = '<img class="pair-avatar" src="' + src + '"'
       + ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" alt="">'
       + '<div class="pair-avatar-placeholder" style="display:none;">' + PERSON_SVG + '</div>';
  } else { av = '<div class="pair-avatar-placeholder">' + PERSON_SVG + '</div>'; }
  return '<div class="pair-person">' + av + '<div class="pair-name">' + escHtml(p.name || '名前なし') + '</div></div>';
}

function renderAnalysis() {
  var el = document.getElementById('analysisResult');
  var p1 = allPersons[selected[0]], p2 = allPersons[selected[1]];
  var n1 = escHtml(p1.name || '名前なし'), n2 = escHtml(p2.name || '名前なし');
  var ctx = buildCtx(p1, p2, n1, n2);
  var theme = THEMES.filter(function(t) { return t.id === currentSituation; })[0] || null;
  var titleText = buildTitle(theme, ctx);
  var res = analyzePair(currentSituation, p1, p2, ctx, 3);

  var html = '<div style="font-size:14px;font-weight:700;margin-bottom:14px;line-height:1.5;">' + titleText + '</div>';

  /* 0. ペア相性タイプカード */
  var pt = pairType(p1, p2, ctx);
  if (pt) {
    html += '<div class="pair-type-card" style="border-top:3px solid ' + pt.color + ';">';
    html += '<div class="pair-type-label">おふたりのタイプ</div>';
    html += '<div class="pair-type-name" style="color:' + pt.color + ';">' + pt.name + '</div>';
    if (pt.roleLine) html += '<div class="pair-type-roles">' + pt.roleLine + '</div>';
    html += '<div class="pair-type-copy">' + pt.copy + '</div></div>';
  }

  /* 1. 見立て（このペアの一番のカギ） */
  var top = res.top;
  var mitate;
  if (top.diff >= 2) {
    mitate = 'おふたりの間でいちばん効いているのは<b>「' + top.name + '」のズレ</b>です（' + n1 + 'さん ' + top.v1 + ' ／ ' + n2 + 'さん ' + top.v2 + '）。ここを押さえると、他の小さなすれ違いも読み解きやすくなります。';
  } else {
    mitate = 'おふたりは<b>「' + top.name + '」の感覚がよく似ています</b>（' + n1 + 'さん ' + top.v1 + ' ／ ' + n2 + 'さん ' + top.v2 + '）。この近さが、おふたりの関係を読み解く出発点になります。';
  }
  html += '<div class="analysis-section"><div class="analysis-title">見立て</div>';
  html += '<div class="advice-card"><div class="advice-text">' + mitate + '</div></div></div>';

  /* 2. なぜそうなっているか（実スコア付き） */
  var cards = res.items.slice();
  if (res.selfNote) cards.push(res.selfNote);
  html += '<div class="analysis-section"><div class="analysis-title">なぜそうなっているか</div>';
  cards.forEach(function(m) {
    html += '<div class="analysis-card"><div class="analysis-point">' + m.title + '</div><div class="analysis-detail">' + m.detail + '</div>';
    if (m.scoreline) html += '<div style="font-size:11px;color:var(--dim);margin-top:8px;opacity:0.85;">📊 ' + m.scoreline + '</div>';
    html += '</div>';
  });
  html += '</div>';

  /* 3. 明日からできること */
  html += '<div class="analysis-section"><div class="analysis-title">明日からできること</div>';
  cards.forEach(function(m, i) {
    html += '<div class="advice-card"><div class="advice-text"><b>' + (i + 1) + '.</b> ' + m.advice + '</div></div>';
  });
  html += '</div>';

  /* 4. それでも難しいときは */
  html += '<div class="analysis-section"><div class="analysis-title">それでも難しいときは</div>';
  html += '<div class="analysis-card"><div class="analysis-detail">この分析はビッグファイブ（性格傾向）にもとづく参考情報で、おふたりの関係を決めつけるものではありません。実際のやり取りの中の事情までは読み取れないので、もっと細かく相談したいときは、マイページの「AIに相談する用プロフィール」でおふたりの診断データをコピーして、AIに続きを相談できます。</div>';
  html += '<a href="mypage.html#aiProfileSection" style="display:block;margin-top:12px;padding:11px;text-align:center;border:1.5px solid rgba(139,92,246,0.45);border-radius:10px;color:inherit;font-size:13px;font-weight:700;text-decoration:none;">AIにもっと詳しく相談する →</a></div></div>';

  el.innerHTML = html;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

allPersons = loadAllPersons();
renderPersonGrid();
