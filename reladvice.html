<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://bigfive.jr-genius.jp/reladvice.html">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" href="favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="favicon-180.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人間関係相談 — ビッグファイブで本当の自分を知る【公式】</title>
<meta name="description" content="保存したビッグファイブ診断結果を使って人間関係を分析。好かれたい・振られた理由・距離の原因・ケンカの理由をビッグファイブで解説。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="light-mode.css">
<style>
:root {
  --c-O: #8b5cf6;
  --c-C: #3b82f6;
  --c-E: #f97316;
  --c-A: #f472b6;
  --c-N: #14b8a6;
  --purple: #8b5cf6;
  --pink: #ec4899;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 40px 20px 100px;
}
.container {
  max-width: 600px;
  margin: 0 auto;
}

/* ヘッダー */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: var(--dim);
  text-decoration: none;
  font-size: 14px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--text); }
.page-title {
  font-size: 20px;
  font-weight: 700;
  flex: 1;
}

/* ステップインジケーター */
.steps {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 28px;
}
.step-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--dim);
  font-weight: 500;
}
.step-item.active { color: var(--text); }
.step-item.done { color: var(--purple); }
.step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  background: transparent;
}
.step-item.active .step-num {
  background: var(--purple);
  border-color: var(--purple);
  color: #fff;
}
.step-item.done .step-num {
  background: var(--purple);
  border-color: var(--purple);
  color: #fff;
}
.step-line {
  flex: 1;
  height: 1px;
  background: rgba(139,92,246,0.2);
  margin: 0 6px;
}

/* セクションラベル */
.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* 人物カード */
.person-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.person-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--surface, rgba(26,10,62,0.45));
  border: 1.5px solid var(--border, rgba(139,92,246,0.2));
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.person-card:hover {
  border-color: rgba(139,92,246,0.5);
  transform: translateY(-1px);
}
.person-card.selected {
  border-color: #ec4899;
  background: rgba(236,72,153,0.08);
}
.person-card.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
.person-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(139,92,246,0.15);
}
.person-avatar-placeholder {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(139,92,246,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.person-info { flex: 1; min-width: 0; }
.person-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.person-type {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 6px;
}
.mini-bars {
  display: flex;
  gap: 4px;
}
.mini-bar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.mini-bar-bg {
  width: 16px;
  height: 28px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}
.mini-bar-fill {
  width: 100%;
  border-radius: 3px;
  transition: height 0.3s;
}
.mini-bar-label {
  font-size: 9px;
  color: var(--dim);
  font-weight: 700;
}
.select-badge {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(139,92,246,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: transparent;
  transition: all 0.2s;
  flex-shrink: 0;
}
.person-card.selected .select-badge {
  background: #ec4899;
  border-color: #ec4899;
  color: #fff;
}

/* 選択済みバナー */
.selected-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: rgba(236,72,153,0.08);
  border: 1px solid rgba(236,72,153,0.25);
  border-radius: 10px;
  margin-bottom: 16px;
  font-size: 13px;
}
.selected-banner.show { display: flex; }
.selected-names { font-weight: 700; color: #ec4899; }

/* 次へボタン */
.next-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  display: none;
}
.next-btn.show { display: block; }
.next-btn:hover { opacity: 0.9; transform: translateY(-1px); }

/* ステップ2: シチュエーション */
.situation-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.situation-btn {
  padding: 20px 16px;
  background: var(--surface, rgba(26,10,62,0.45));
  border: 1.5px solid var(--border, rgba(139,92,246,0.2));
  border-radius: 14px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
}
.situation-btn:hover {
  border-color: rgba(139,92,246,0.5);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(139,92,246,0.12);
}
.situation-emoji { font-size: 28px; margin-bottom: 8px; }
.situation-label {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.4;
}
.situation-sub {
  font-size: 11px;
  color: var(--dim);
  margin-top: 4px;
  line-height: 1.4;
}

/* 選択した2人の表示（ステップ2・3共通） */
.pair-display {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface, rgba(26,10,62,0.45));
  border: 1px solid var(--border, rgba(139,92,246,0.2));
  border-radius: 12px;
  margin-bottom: 24px;
}
.pair-person {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
}
.pair-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(139,92,246,0.15);
}
.pair-avatar-placeholder {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(139,92,246,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.pair-name {
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}
.pair-divider {
  font-size: 22px;
  color: var(--dim);
  flex-shrink: 0;
}

/* ステップ3: 分析結果 */
.score-compare {
  padding: 16px;
  background: var(--surface, rgba(26,10,62,0.45));
  border: 1px solid var(--border, rgba(139,92,246,0.2));
  border-radius: 12px;
  margin-bottom: 20px;
}
.score-compare-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--dim);
  margin-bottom: 14px;
  letter-spacing: 0.05em;
}
.factor-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.factor-row:last-child { margin-bottom: 0; }
.factor-label {
  font-size: 11px;
  font-weight: 700;
  width: 56px;
  flex-shrink: 0;
}
.factor-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.factor-bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.factor-bar-name {
  font-size: 10px;
  color: var(--dim);
  width: 36px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.factor-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
}
.factor-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}
.factor-bar-val {
  font-size: 11px;
  font-weight: 700;
  width: 16px;
  text-align: right;
  flex-shrink: 0;
}

/* 分析カード */
.analysis-section {
  margin-bottom: 20px;
}
.analysis-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.analysis-card {
  padding: 16px;
  background: var(--surface, rgba(26,10,62,0.45));
  border: 1px solid var(--border, rgba(139,92,246,0.2));
  border-radius: 12px;
  margin-bottom: 10px;
}
.analysis-card:last-child { margin-bottom: 0; }
.analysis-point {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 6px;
  line-height: 1.5;
}
.analysis-detail {
  font-size: 13px;
  color: var(--dim);
  line-height: 1.7;
}

/* アドバイスカード */
.advice-card {
  padding: 16px 18px;
  background: rgba(139,92,246,0.07);
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: 12px;
  margin-bottom: 10px;
}
.advice-card:last-child { margin-bottom: 0; }
.advice-text {
  font-size: 13px;
  line-height: 1.7;
}

/* 戻るボタン */
.back-btn {
  width: 100%;
  padding: 13px;
  background: transparent;
  border: 1.5px solid var(--border, rgba(139,92,246,0.2));
  border-radius: 12px;
  color: var(--dim);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  margin-top: 12px;
  transition: all 0.2s;
}
.back-btn:hover { border-color: rgba(139,92,246,0.5); color: var(--text); }

/* 空状態 */
.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-text { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--dim); margin-bottom: 24px; }
.empty-btn {
  display: inline-block;
  padding: 12px 28px;
  background: linear-gradient(135deg, #8b5cf6, #ec4899);
  color: #fff;
  text-decoration: none;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 700;
}

/* ステップ非表示 */
.step-view { display: none; }
.step-view.active { display: block; }
</style>
</head>
<body>
<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <a href="mypage.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      マイページ
    </a>
    <div class="page-title">💬 人間関係相談</div>
  </div>

  <!-- ステップインジケーター -->
  <div class="steps" id="stepIndicator">
    <div class="step-item active" id="si1">
      <div class="step-num">1</div>
      <span>2人を選ぶ</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" id="si2">
      <div class="step-num">2</div>
      <span>テーマ</span>
    </div>
    <div class="step-line"></div>
    <div class="step-item" id="si3">
      <div class="step-num">3</div>
      <span>分析結果</span>
    </div>
  </div>

  <!-- Step1: 2人を選ぶ -->
  <div class="step-view active" id="step1">
    <div class="section-label">誰について相談しますか？（2人を選択）</div>
    <div class="selected-banner" id="selectedBanner">
      <span class="selected-names" id="selectedNames"></span>
      <span style="font-size:12px;color:var(--dim);">2人選択済み</span>
    </div>
    <div class="person-grid" id="personGrid"></div>
    <button class="next-btn" id="nextBtn1" onclick="goStep2()">次へ　→</button>
  </div>

  <!-- Step2: テーマを選ぶ -->
  <div class="step-view" id="step2">
    <div id="pairDisplay2"></div>
    <div class="section-label">どんな相談ですか？</div>
    <div class="situation-grid">
      <button class="situation-btn" onclick="goStep3('like')">
        <div class="situation-emoji">❤️</div>
        <div class="situation-label">好かれたい</div>
        <div class="situation-sub">AさんにBさんを<br>好きになってもらうには</div>
      </button>
      <button class="situation-btn" onclick="goStep3('rejected')">
        <div class="situation-emoji">💔</div>
        <div class="situation-label">なぜ振られた？</div>
        <div class="situation-sub">うまくいかなかった<br>理由を知りたい</div>
      </button>
      <button class="situation-btn" onclick="goStep3('distance')">
        <div class="situation-emoji">😐</div>
        <div class="situation-label">なぜ距離がある？</div>
        <div class="situation-sub">なかなか仲良くなれない<br>理由を分析</div>
      </button>
      <button class="situation-btn" onclick="goStep3('fight')">
        <div class="situation-emoji">🔥</div>
        <div class="situation-label">ケンカが多い</div>
        <div class="situation-sub">衝突しやすい<br>根本の原因を知る</div>
      </button>
    </div>
    <button class="back-btn" onclick="goStep1()">← 人を選び直す</button>
  </div>

  <!-- Step3: 分析結果 -->
  <div class="step-view" id="step3">
    <div id="pairDisplay3"></div>
    <div id="scoreCompare"></div>
    <div id="analysisResult"></div>
    <button class="back-btn" onclick="goStep2()">← テーマを選び直す</button>
    <button class="back-btn" onclick="goStep1()" style="margin-top:8px;">最初から</button>
  </div>

</div>

<script>
// ---- 定数 ----
const FACTORS = [
  { key: 'O', name: '開放性', color: '#8b5cf6' },
  { key: 'C', name: '誠実性', color: '#3b82f6' },
  { key: 'E', name: '外向性', color: '#f97316' },
  { key: 'A', name: '協調性', color: '#f472b6' },
  { key: 'N', name: '感受性', color: '#14b8a6' },
];

// ---- データ読み込み ----
function loadAllPersons() {
  var persons = [];
  try {
    var myArr = JSON.parse(localStorage.getItem('bigfive_my_results') || '[]');
    if (myArr.length > 0) {
      var me = Object.assign({}, myArr[0], { _isSelf: true, name: '自分' });
      persons.push(me);
    }
  } catch(e) {}
  try {
    var others = JSON.parse(localStorage.getItem('bigfive_other_results') || '[]');
    others.forEach(function(o) { persons.push(Object.assign({}, o, { _isSelf: false })); });
  } catch(e) {}
  return persons;
}

// ---- 状態 ----
var allPersons = [];
var selected = []; // インデックス2件まで
var currentSituation = '';

// ---- 人物カード描画 ----
function renderPersonGrid() {
  var grid = document.getElementById('personGrid');
  if (allPersons.length === 0) {
    grid.innerHTML = '<div class="empty-state">'
      + '<div class="empty-icon">🔍</div>'
      + '<div class="empty-text">診断データがありません</div>'
      + '<div class="empty-sub">まずはビッグファイブ診断を受けるか、<br>「あの人を診断する」で登録してください</div>'
      + '<a href="quiz.html" class="empty-btn">診断をはじめる</a>'
      + '</div>';
    return;
  }
  grid.innerHTML = '';
  allPersons.forEach(function(p, i) {
    var isSelected = selected.indexOf(i) !== -1;
    var selNum = selected.indexOf(i) + 1;
    var isDisabled = !isSelected && selected.length >= 2;
    var card = document.createElement('div');
    card.className = 'person-card' + (isSelected ? ' selected' : '') + (isDisabled ? ' disabled' : '');
    card.onclick = function() { toggleSelect(i); };

    var avatarHtml = '';
    var gender = p.gender || 'N';
    var code = p.code || '';
    if (code && (gender === 'M' || gender === 'F')) {
      avatarHtml = '<img class="person-avatar" src="images/characters/' + gender + '/' + code + '.webp" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" alt="">'
        + '<div class="person-avatar-placeholder" style="display:none;">' + (p._isSelf ? '👤' : '👥') + '</div>';
    } else {
      avatarHtml = '<div class="person-avatar-placeholder">' + (p._isSelf ? '👤' : '👥') + '</div>';
    }

    var miniBars = FACTORS.map(function(f) {
      var sc = (p.scores && p.scores[f.key]) ? p.scores[f.key] : 3;
      var h = Math.round(sc / 5 * 28);
      return '<div class="mini-bar-wrap">'
        + '<div class="mini-bar-bg"><div class="mini-bar-fill" style="height:' + h + 'px;background:' + f.color + ';"></div></div>'
        + '<div class="mini-bar-label">' + f.key + '</div>'
        + '</div>';
    }).join('');

    var typeName = p.typeName || '';
    var dateStr = p.date ? new Date(p.date).toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'}) : '';
    var metaStr = (typeName ? typeName : '') + (dateStr ? '　' + dateStr : '');

    card.innerHTML = avatarHtml
      + '<div class="person-info">'
        + '<div class="person-name">' + escHtml(p.name || '名前なし') + '</div>'
        + '<div class="person-type">' + escHtml(metaStr) + '</div>'
        + '<div class="mini-bars">' + miniBars + '</div>'
      + '</div>'
      + '<div class="select-badge">' + (isSelected ? selNum : '') + '</div>';

    grid.appendChild(card);
  });
}

function toggleSelect(i) {
  var idx = selected.indexOf(i);
  if (idx !== -1) {
    selected.splice(idx, 1);
  } else {
    if (selected.length >= 2) return;
    selected.push(i);
  }
  renderPersonGrid();
  updateBanner();
}

function updateBanner() {
  var banner = document.getElementById('selectedBanner');
  var names = document.getElementById('selectedNames');
  var btn = document.getElementById('nextBtn1');
  if (selected.length === 2) {
    var n1 = allPersons[selected[0]].name || '名前なし';
    var n2 = allPersons[selected[1]].name || '名前なし';
    names.textContent = n1 + '　×　' + n2;
    banner.classList.add('show');
    btn.classList.add('show');
  } else {
    banner.classList.remove('show');
    btn.classList.remove('show');
  }
}

// ---- ステップ移動 ----
function goStep1() {
  showStep(1);
}

function goStep2() {
  if (selected.length < 2) return;
  renderPairDisplay('pairDisplay2');
  showStep(2);
}

function goStep3(situation) {
  currentSituation = situation;
  renderPairDisplay('pairDisplay3');
  renderScoreCompare();
  renderAnalysis();
  showStep(3);
}

function showStep(n) {
  document.querySelectorAll('.step-view').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('step' + n).classList.add('active');
  // インジケーター更新
  [1,2,3].forEach(function(i) {
    var si = document.getElementById('si' + i);
    si.classList.remove('active', 'done');
    if (i < n) si.classList.add('done');
    else if (i === n) si.classList.add('active');
  });
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ---- ペア表示 ----
function renderPairDisplay(elId) {
  var el = document.getElementById(elId);
  var p1 = allPersons[selected[0]];
  var p2 = allPersons[selected[1]];
  el.innerHTML = '<div class="pair-display">'
    + personMini(p1)
    + '<div class="pair-divider">×</div>'
    + personMini(p2)
    + '</div>';
}

function personMini(p) {
  var gender = p.gender || 'N';
  var code = p.code || '';
  var avatarHtml = '';
  if (code && (gender === 'M' || gender === 'F')) {
    avatarHtml = '<img class="pair-avatar" src="images/characters/' + gender + '/' + code + '.webp" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" alt="">'
      + '<div class="pair-avatar-placeholder" style="display:none;">' + (p._isSelf ? '👤' : '👥') + '</div>';
  } else {
    avatarHtml = '<div class="pair-avatar-placeholder">' + (p._isSelf ? '👤' : '👥') + '</div>';
  }
  return '<div class="pair-person">' + avatarHtml + '<div class="pair-name">' + escHtml(p.name || '名前なし') + '</div></div>';
}

// ---- スコア比較バー ----
function renderScoreCompare() {
  var el = document.getElementById('scoreCompare');
  var p1 = allPersons[selected[0]];
  var p2 = allPersons[selected[1]];
  var n1 = shortenName(p1.name);
  var n2 = shortenName(p2.name);

  var rows = FACTORS.map(function(f) {
    var s1 = sc(p1, f.key);
    var s2 = sc(p2, f.key);
    var w1 = Math.round(s1 / 5 * 100);
    var w2 = Math.round(s2 / 5 * 100);
    return '<div class="factor-row">'
      + '<div class="factor-label" style="color:' + f.color + ';">' + f.key + '<br><span style="font-size:10px;font-weight:400;color:var(--dim);">' + f.name + '</span></div>'
      + '<div class="factor-bars">'
        + '<div class="factor-bar-row">'
          + '<div class="factor-bar-name">' + escHtml(n1) + '</div>'
          + '<div class="factor-bar-bg"><div class="factor-bar-fill" style="width:' + w1 + '%;background:' + f.color + ';opacity:0.85;"></div></div>'
          + '<div class="factor-bar-val" style="color:' + f.color + ';">' + s1 + '</div>'
        + '</div>'
        + '<div class="factor-bar-row">'
          + '<div class="factor-bar-name">' + escHtml(n2) + '</div>'
          + '<div class="factor-bar-bg"><div class="factor-bar-fill" style="width:' + w2 + '%;background:' + f.color + ';opacity:0.4;"></div></div>'
          + '<div class="factor-bar-val" style="color:' + f.color + ';opacity:0.6;">' + s2 + '</div>'
        + '</div>'
      + '</div>'
      + '</div>';
  }).join('');

  el.innerHTML = '<div class="score-compare">'
    + '<div class="score-compare-title">📊 5因子スコア比較</div>'
    + rows
    + '</div>';
}

// ---- 分析ロジック ----
function sc(p, key) {
  return (p.scores && p.scores[key]) ? p.scores[key] : 3;
}
function isHigh(p, key) { return sc(p, key) >= 4; }
function isLow(p, key)  { return sc(p, key) <= 2; }
function diff(p1, p2, key) { return Math.abs(sc(p1, key) - sc(p2, key)); }

function renderAnalysis() {
  var el = document.getElementById('analysisResult');
  var p1 = allPersons[selected[0]];
  var p2 = allPersons[selected[1]];
  var n1 = p1.name || '名前なし';
  var n2 = p2.name || '名前なし';

  var points = [];
  var advice = [];

  if (currentSituation === 'like') {
    // AさんがBさんに好かれるためのアドバイス
    var titleHtml = '❤️ ' + escHtml(n1) + ' が ' + escHtml(n2) + ' に好かれるには';

    if (isHigh(p2, 'N')) {
      points.push({ point: escHtml(n2) + 'さんは不安を感じやすく、安心感を求めています', detail: '感情的に繊細なため、予測できない行動や曖昧な態度は不安を招きやすいです。' });
      advice.push('予測可能な行動・細かい気遣いが信頼につながります。「また連絡する」と言ったら必ず連絡するなど、小さな約束を守ることが大切です。');
    } else if (isLow(p2, 'N')) {
      points.push({ point: escHtml(n2) + 'さんは感情より論理を重視する傾向があります', detail: '感情的な訴えより、落ち着いた事実ベースの話し方が届きやすいです。' });
      advice.push('感情的なアピールよりも、具体的な行動や事実で示す方が印象に残ります。');
    }
    if (isHigh(p2, 'E')) {
      points.push({ point: escHtml(n2) + 'さんは社交的で賑やかな場を楽しみます', detail: '一緒に何かを体験することで距離が縮まりやすいタイプです。' });
      advice.push('積極的に誘ったり、新しい体験を一緒にすることで自然と関係が深まります。');
    } else if (isLow(p2, 'E')) {
      points.push({ point: escHtml(n2) + 'さんは少人数・静かな環境で本音を話せます', detail: '大勢の場では本来の自分を出しにくいタイプです。' });
      advice.push('2人きりや小さな場を意識的に作ることで、本音を引き出しやすくなります。');
    }
    if (isHigh(p2, 'A')) {
      points.push({ point: escHtml(n2) + 'さんは相手の気持ちを大切にする繊細な人です', detail: '話をしっかり聞いてくれる人、感謝を言葉にできる人に好感を持ちやすいです。' });
      advice.push('話をよく聞いて感謝を言葉で伝えることが好感につながります。「ありがとう」を惜しまないことが大切です。');
    } else if (isLow(p2, 'A')) {
      points.push({ point: escHtml(n2) + 'さんははっきりした意見を持つ人を好む傾向があります', detail: '曖昧な態度や八方美人的な振る舞いよりも、自分の立場をはっきり示せる人に魅力を感じます。' });
      advice.push('遠慮せずに自分の意見・好みをはっきり伝えましょう。媚びすぎない姿勢が好印象です。');
    }
    if (isHigh(p2, 'C')) {
      points.push({ point: escHtml(n2) + 'さんは約束・時間・ルールを大切にします', detail: 'ルーズな印象を与えると信頼を失いやすいタイプです。' });
      advice.push('時間を守る・言ったことを実行するなど、信頼感を積み上げることが好感の土台になります。');
    } else if (isLow(p2, 'C')) {
      points.push({ point: escHtml(n2) + 'さんは自然体・気軽さを好みます', detail: '堅苦しい雰囲気よりも、リラックスして過ごせる関係を心地よく感じます。' });
      advice.push('完璧を目指さず、肩の力を抜いて気軽に接することで距離が縮まります。');
    }
    if (isHigh(p2, 'O')) {
      points.push({ point: escHtml(n2) + 'さんは新しいこと・知的な話題が好きです', detail: '好奇心旺盛で、日常にない刺激や発見を共有できる人に魅力を感じます。' });
      advice.push('面白い話題・ちょっと変わった体験を提案することで興味を引けます。');
    } else if (isLow(p2, 'O')) {
      points.push({ point: escHtml(n2) + 'さんは安定・慣れ親しんだことを好みます', detail: '急な変化や冒険より、安心できる日常を大切にするタイプです。' });
      advice.push('いつもの場所・いつもの流れで一緒に過ごすことで自然と親しくなれます。');
    }

    // 最大3点に絞る
    points = points.slice(0, 3);
    advice = advice.slice(0, 3);
    renderResult(el, titleHtml, points, advice);

  } else if (currentSituation === 'rejected') {
    var titleHtml = '💔 ' + escHtml(n1) + ' と ' + escHtml(n2) + '、うまくいかなかった理由';

    if (diff(p1, p2, 'N') >= 2) {
      points.push({ point: '感情のペースが合いませんでした', detail: '片方がクールに見え、もう片方が感情的に見えた可能性があります。感情の振れ幅が違うと、日常のやり取りにストレスが溜まりやすいです。' });
      advice.push('感情のペースの違いは「冷たい」「重い」の誤解を生みます。お互いの感情スタイルを言葉で伝え合うことが大切でした。');
    }
    if (diff(p1, p2, 'E') >= 2) {
      points.push({ point: '一緒にいたい頻度・社交への欲求が違いました', detail: '「もっと一緒にいたい」「少し1人の時間がほしい」というすれ違いが起きやすい組み合わせです。' });
      advice.push('外向性の差は「嫌いになった」ではなく「充電の仕方が違う」という問題です。お互いの時間の使い方を尊重できれば変わっていたかもしれません。');
    }
    if (diff(p1, p2, 'A') >= 2) {
      points.push({ point: '主張と協調のバランスが合いませんでした', detail: 'どちらかが「自分ばかり合わせている」と感じていた可能性があります。' });
      advice.push('どちらが折れるか、という構造になってしまうと関係は疲弊します。対等に意見を出せる雰囲気が必要でした。');
    }
    if (diff(p1, p2, 'C') >= 2) {
      points.push({ point: '生活習慣・几帳面さの価値観がズレていました', detail: 'ルーズに見えた、または逆に窮屈に感じた可能性があります。こういった違いは長期になると摩擦になりやすいです。' });
      advice.push('価値観のズレは時間が経つほど表面化します。早い段階でお互いの「当たり前」を確認し合えたらよかったかもしれません。');
    }
    if (isLow(p1, 'A') && isLow(p2, 'A')) {
      points.push({ point: 'お互いに自分の意見を曲げにくい組み合わせでした', detail: '両者とも主張が強めで、折り合いをつけるのが難しい組み合わせです。' });
      advice.push('どちらも「私が正しい」と感じやすい。小さなことでも意見を聞こうとする姿勢が鍵でした。');
    }
    if (isHigh(p1, 'N') && isHigh(p2, 'N')) {
      points.push({ point: '両者が感情的になりやすい組み合わせでした', detail: '小さなことでも感情が揺れやすく、言葉が強くなりやすかった可能性があります。' });
      advice.push('感情が高まったときに距離を置いて冷静になる習慣が、この組み合わせには特に重要でした。');
    }

    points = points.slice(0, 3);
    advice = advice.slice(0, 3);
    if (points.length === 0) {
      points.push({ point: 'スコア上の大きなズレは見つかりませんでした', detail: '相性の問題だけではなく、タイミングや環境の影響も大きかった可能性があります。' });
      advice.push('ビッグファイブはあくまで性格傾向の参考です。相性だけで関係の結果を決めつけずに、自分の気持ちを大切にしてください。');
    }
    renderResult(el, titleHtml, points, advice);

  } else if (currentSituation === 'distance') {
    var titleHtml = '😐 ' + escHtml(n1) + ' と ' + escHtml(n2) + '、距離が縮まらない理由';

    if (isLow(p2, 'E')) {
      points.push({ point: escHtml(n2) + 'さんはもともと人との距離を大切にするタイプです', detail: '外向性が低い人は、少人数・静かな環境を好み、意図的にプライベート空間を守る傾向があります。' });
      advice.push('この距離感は' + escHtml(n2) + 'さんの特性であり、あなたへの拒否ではありません。焦らず、少しずつ関係を深めていきましょう。');
    }
    if (diff(p1, p2, 'E') >= 2) {
      points.push({ point: '社交のペースが違います', detail: '外向性の差が大きいと、片方は「もっと一緒にいたい」、もう片方は「少し休みたい」と感じやすいです。' });
      advice.push(escHtml(n2) + 'さんに合ったペースで接すると、かえって距離が縮まりやすくなります。');
    }
    if (isHigh(p2, 'N')) {
      points.push({ point: escHtml(n2) + 'さんは不安から人を遠ざけることがあります', detail: '感受性が高い人は、傷つかないよう自己防衛として距離を置くことがあります。' });
      advice.push('安心できる存在であることを、言葉ではなく継続した行動で示すことが重要です。');
    }
    if (isHigh(p1, 'E') && isLow(p2, 'E')) {
      points.push({ point: 'あなたの積極さが少し重く感じられているかもしれません', detail: '外向型と内向型の組み合わせでは、外向型の「普通の熱量」が内向型には圧に感じられることがあります。' });
      advice.push('アプローチを少し緩めると、かえって近づける場合があります。相手のペースに合わせてみてください。');
    }
    if (isLow(p1, 'A')) {
      points.push({ point: 'あなたの率直な言動が距離を作っている可能性があります', detail: '協調性が低めだと、無意識に相手を傷つける言動が出やすいことがあります。' });
      advice.push('相手の気持ちに少し配慮した言葉選びを意識すると、関係が変わることがあります。');
    }

    points = points.slice(0, 3);
    advice = advice.slice(0, 3);
    if (points.length === 0) {
      points.push({ point: '大きな特性のズレは見当たりませんでした', detail: '距離感はお互いの忙しさや環境による場合もあります。' });
      advice.push('まずは気軽に声をかけ続けることで、少しずつ関係が育っていく可能性があります。');
    }
    renderResult(el, titleHtml, points, advice);

  } else if (currentSituation === 'fight') {
    var titleHtml = '🔥 ' + escHtml(n1) + ' と ' + escHtml(n2) + '、ケンカが多い理由';

    if (isLow(p1, 'A') && isLow(p2, 'A')) {
      points.push({ point: 'お互いに主張が強く、譲り合いが少ない組み合わせです', detail: '両者とも自分の意見を曲げにくいため、小さなことでもぶつかりやすいです。' });
      advice.push('どちらかが先に聞く役に回ることで、ケンカの頻度が大幅に減ります。「聞く番」を意識的に作りましょう。');
    }
    if (isHigh(p1, 'N') && isHigh(p2, 'N')) {
      points.push({ point: '両者が感情的になりやすいため、発火しやすい組み合わせです', detail: '小さな言葉が大きく刺さったり、感情のスパイラルに入りやすいです。' });
      advice.push('感情が高ぶっているときは判断を後回しにする習慣を。「今は話せない」と伝えて時間を置くことが有効です。');
    }
    if (diff(p1, p2, 'C') >= 2) {
      points.push({ point: '几帳面さ・ルールへの価値観が違います', detail: '「当然こうするべき」の基準が違うと、相手の行動が「非常識」に見えてしまいます。' });
      advice.push('何が「当たり前」かを一度すり合わせてみましょう。悪意ではなく価値観の違いだと認識するだけでも摩擦が減ります。');
    }
    if (diff(p1, p2, 'E') >= 2) {
      points.push({ point: '活動量・刺激への欲求が違います', detail: '外向的な人は「もっと一緒に動きたい」、内向的な人は「少し休みたい」と感じるため、すれ違いが生まれます。' });
      advice.push('「一緒にやること」「それぞれでやること」を分けて決めると摩擦が減ります。');
    }
    if (isHigh(p1, 'O') && isLow(p2, 'O') || isLow(p1, 'O') && isHigh(p2, 'O')) {
      points.push({ point: '変化好きと安定好きの組み合わせです', detail: '新しいことへの好奇心と、慣れ親しんだことへの安心感が衝突しやすいです。' });
      advice.push('変化を提案するときは「なぜ良いか」を丁寧に説明すると受け入れられやすくなります。');
    }

    points = points.slice(0, 3);
    advice = advice.slice(0, 3);
    if (points.length === 0) {
      points.push({ point: 'スコア上での明らかな衝突要因は見つかりませんでした', detail: 'ケンカの原因は環境やストレスから来ている可能性もあります。' });
      advice.push('お互いの「地雷」を言葉で共有し合う対話が、ケンカの予防に一番効果的です。');
    }
    renderResult(el, titleHtml, points, advice);
  }
}

function renderResult(el, titleHtml, points, adviceArr) {
  var analysisHtml = '<div class="analysis-section">'
    + '<div class="analysis-title">🔍 分析</div>';
  points.forEach(function(p) {
    analysisHtml += '<div class="analysis-card">'
      + '<div class="analysis-point">▶ ' + p.point + '</div>'
      + '<div class="analysis-detail">' + p.detail + '</div>'
      + '</div>';
  });
  analysisHtml += '</div>';

  var adviceHtml = '<div class="analysis-section">'
    + '<div class="analysis-title">💡 アドバイス</div>';
  adviceArr.forEach(function(a) {
    adviceHtml += '<div class="advice-card"><div class="advice-text">' + a + '</div></div>';
  });
  adviceHtml += '</div>';

  el.innerHTML = '<div style="font-size:14px;font-weight:700;margin-bottom:18px;line-height:1.5;">' + titleHtml + '</div>'
    + analysisHtml
    + adviceHtml;
}

// ---- ユーティリティ ----
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function shortenName(name) {
  if (!name) return '?';
  return name.length > 4 ? name.slice(0, 4) + '…' : name;
}

// ---- 初期化 ----
allPersons = loadAllPersons();
renderPersonGrid();
