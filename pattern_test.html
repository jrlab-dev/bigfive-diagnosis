<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カード模様テスト（放射状）</title>
<style>
  body {
    background: #0a0e27;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px 20px;
    font-family: 'Noto Sans JP', sans-serif;
    color: #fff;
  }
  h2 {
    font-size: 14px;
    color: #aaa;
    margin: 0 0 8px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* ===== 共通カード ===== */
  .card {
    position: relative;
    width: 320px;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    border: 1.5px solid rgba(180,140,90,0.4);
  }
  .card-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #fdf6ec 0%, #f5e6cc 50%, #ead8b4 100%);
  }
  .char-placeholder {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 180px;
    background: rgba(100,80,50,0.15);
    border-radius: 70px 70px 40px 40px;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
  }
  .card-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 0 16px 16px;
    background: linear-gradient(to bottom, transparent 0%, transparent 45%, #ead8b4 70%, #e0c89a 100%);
  }
  .type-name {
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    text-align: center;
    margin-bottom: 4px;
  }
  .description {
    font-size: 12px;
    line-height: 1.5;
    background: rgba(255,255,255,0.92);
    color: #3a2e1e;
    border-radius: 6px;
    padding: 6px 10px;
  }

  /* ===== A: 細い光線（シャープなサンバースト） ===== */
  /* 中心から細い線が均等に広がる。くっきりした印象 */
  .pattern-a .card-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(
      from 0deg at 50% 50%,
      rgba(139,105,64,0.18) 0deg 2deg,
      transparent 2deg 12deg
    );
  }

  /* ===== B: 太い柔らかい光線（ソフトサンバースト） ===== */
  /* 光と影が交互に広がる。やわらかく上品な印象 */
  .pattern-b .card-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(
      from 0deg at 50% 50%,
      rgba(139,105,64,0.05) 0deg 9deg,
      rgba(139,105,64,0.20) 9deg 18deg
    );
  }

  /* ===== C: 放射線＋同心円（クロスパターン） ===== */
  /* 光線の上に同心円を重ねた複合模様。華やかな印象 */
  .pattern-c .card-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(
      from 0deg at 50% 50%,
      rgba(139,105,64,0.15) 0deg 3deg,
      transparent 3deg 15deg
    );
  }
  .pattern-c .card-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-radial-gradient(
      circle at 50% 50%,
      transparent 0px,
      transparent 22px,
      rgba(139,105,64,0.12) 23px,
      transparent 24px
    );
  }
</style>
</head>
<body>

<h2>A：細い光線（シャープ）</h2>
<div class="card pattern-a">
  <div class="card-bg"></div>
  <div class="char-placeholder">🧙</div>
  <div class="card-content">
    <div class="type-name">発想家・探求者</div>
    <div class="description">豊かな想像力と強い知的好奇心を持ち、常に新しい視点や可能性を探求する発想家。</div>
  </div>
</div>

<h2>B：太い柔らかい光線（ソフト）</h2>
<div class="card pattern-b">
  <div class="card-bg"></div>
  <div class="char-placeholder">🧙</div>
  <div class="card-content">
    <div class="type-name">発想家・探求者</div>
    <div class="description">豊かな想像力と強い知的好奇心を持ち、常に新しい視点や可能性を探求する発想家。</div>
  </div>
</div>

<h2>C：放射線＋同心円（クロス）</h2>
<div class="card pattern-c">
  <div class="card-bg"></div>
  <div class="char-placeholder">🧙</div>
  <div class="card-content">
    <div class="type-name">発想家・探求者</div>
    <div class="description">豊かな想像力と強い知的好奇心を持ち、常に新しい視点や可能性を探求する発想家。</div>
  </div>
</div>

<p style="color:#666; font-size:12px; margin-top:20px;">※ 気に入った模様を教えてください。濃さ・本数も調整できます</p>

</body>
</html>
