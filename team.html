<div class="container">

<script>
// ===== 定数 =====
const STORAGE_KEY_MY = 'bigfive_my_results';
const STORAGE_KEY_OTHERS = 'bigfive_other_results';
const STORAGE_KEY_TEAMS = 'bigfive_team_results';
const MAX_MEMBERS = 8;
const MAX_TEAMS = 10;
const MIN_MEMBERS = 2;

const traitInfo = {
  O: { name: '開放性', color: '#8b5cf6' },
  C: { name: '誠実性', color: '#3b82f6' },
  E: { name: '外向性', color: '#f97316' },
  A: { name: '協調性', color: '#f472b6' },
  N: { name: '感受性', color: '#14b8a6' },
};

// ===== ユーティリティ =====
function toImgCode(code) {
  return code.split('').map(d => { const n = parseInt(d); return n <= 2 ? '1' : n >= 4 ? '5' : '3'; }).join('');
}

function codeToScores(code) {
  return {
    O: parseInt(code[0]), C: parseInt(code[1]),
    E: parseInt(code[2]), A: parseInt(code[3]), N: parseInt(code[4])
  };
}

function formatDate(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return '今日';
  if (diffDays === 1) return '昨日';
  if (diffDays < 7) return `${diffDays}日前`;
  if (diffDays < 30) return `${Math.floor(diffDays / 7)}週間前`;
  return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
}

// ===== URLの共有データを解析 =====
let sharedMember = null;
let viewTeamData = null;
(function parseShareParam() {
  try {
    // マイページから保存済みチームを表示
    const viewRaw = new URLSearchParams(location.search).get('view');
    if (viewRaw) {
      const params = new URLSearchParams(decodeURIComponent(viewRaw));
      const members = [];
      const codes = params.getAll('m');
      const names = params.getAll('n');
      const genders = params.getAll('g');
      const types = params.getAll('t');
      codes.forEach((c, i) => {
        members.push({
          code: c,
          name: names[i] || `メンバー (${c})`,
          gender: genders[i] || 'F',
          type: types[i] || 'other'
        });
      });
      if (members.length >= 2) {
        viewTeamData = {
          teamName: params.get('teamName') || '',
          members
        };
      }
      return;
    }
    // 共有リンクからのメンバー
    const raw = new URLSearchParams(location.search).get('share');
    if (!raw) return;
    const data = JSON.parse(decodeURIComponent(escape(atob(raw))));
    if (!data.c || data.c.length !== 5) return;
    sharedMember = {
      id: 'shared_0',
      name: data.n || `友達 (${data.c})`,
      code: data.c,
      scores: codeToScores(data.c),
      gender: data.g || 'F',
      type: 'shared',
      date: new Date().toISOString()
    };
  } catch(e) {}
})();

// ===== メンバー読み込み =====
let allMembers = [];
let selectedIds = new Set();

function loadMembers() {
  // マイページからの保存済みチーム表示
  if (viewTeamData) {
    return viewTeamData.members.map((m, i) => ({
      id: `view_${i}`,
      name: m.name,
      code: m.code,
      scores: codeToScores(m.code),
      gender: m.gender || 'F',
      type: m.type || 'other',
      date: new Date().toISOString()
    }));
  }

  const myResults = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
  const otherResults = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');

  const members = [];

  // 自分の結果（適用中データを使用）
  if (myResults.length > 0) {
    const activeIdx = Math.min(parseInt(localStorage.getItem('bigfive_active_my_index') || '0'), Math.max(0, myResults.length - 1));
    const r = myResults[activeIdx];
    const scores = r.scores || codeToScores(r.code);
    members.push({
      id: 'my_0',
      name: r.typeName || `自分 (${r.code})`,
      code: r.code,
      scores,
      gender: r.gender || 'F',
      type: 'my',
      date: r.date
    });
  }

  // 他人の結果
  otherResults.forEach((r, i) => {
    const scores = codeToScores(r.code);
    members.push({
      id: `other_${i}`,
      name: r.name || `あの人 (${r.code})`,
      code: r.code,
      scores,
      gender: r.gender || 'F',
      type: 'other',
      date: r.date
    });
  });

  // URL共有メンバー（先頭に追加）
  if (sharedMember) {
    members.unshift(sharedMember);
  }

  return members;
}

// ===== メンバー一覧描画 =====
function renderMembers() {
  const container = document.getElementById('memberList');
  allMembers = loadMembers();

  // 共有バナーの表示
  const intro = document.querySelector('.intro');
  const existingBanner = document.getElementById('sharedBanner');
  if (existingBanner) existingBanner.remove();
  if (sharedMember) {
    const banner = document.createElement('div');
    banner.id = 'sharedBanner';
    banner.className = 'shared-banner';
    banner.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg> <strong>${sharedMember.name}</strong> さんから相性チェックのリンクが届きました！<br>あなたの診断結果を選んで「チーム相性を診断する」を押してください。`;
    intro.after(banner);
  }

  if (allMembers.length < MIN_MEMBERS) {
    const needDiag = sharedMember
      ? `<p>自分の診断結果がありません。<a href="quiz.html">自分を診断する →</a></p>`
      : `<p>診断結果が不足しています（最低${MIN_MEMBERS}人必要）</p><p><a href="quiz.html">自分を診断する →</a>　<a href="other_quiz.html">あの人を診断する →</a></p>`;
    container.innerHTML = `<div class="empty-state">${needDiag}</div>`;
    document.getElementById('selectionInfo').textContent = '';
    document.getElementById('analyzeBtn').disabled = true;
    return;
  }

  // 共有メンバーがいる場合、初回だけ自動選択
  if (sharedMember && selectedIds.size === 0) {
    selectedIds.add('shared_0');
    const firstMy = allMembers.find(m => m.type === 'my');
    if (firstMy) selectedIds.add(firstMy.id);
  }

  container.innerHTML = allMembers.map(m => {
    const isSelected = selectedIds.has(m.id);
    const isDisabled = !isSelected && selectedIds.size >= MAX_MEMBERS;
    return `
      <div class="member-card${isSelected ? ' selected' : ''}${isDisabled ? ' disabled' : ''}${m.type === 'shared' ? ' shared' : ''}" data-id="${m.id}">
        <div class="member-checkbox">${isSelected ? '✓' : ''}</div>
        <div class="member-icon${m.type === 'other' ? ' other' : ''}">
          <img src="images/characters/marume243/${m.gender}/${toImgCode(m.code)}.webp" alt=""
               onerror="this.parentElement.innerHTML='<svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2&quot;/><circle cx=&quot;12&quot; cy=&quot;7&quot; r=&quot;4&quot;/></svg>'">
        </div>
        <div class="member-info">
          <div class="member-name">${m.name}</div>
          <div class="member-meta">
            <span class="member-code">${m.code}</span>
          </div>
          <div class="member-score-bars">
            ${['O','C','E','A','N'].map(f => {
              const pct = (m.scores[f] / 5) * 100;
              return `<div class="member-sbar"><div class="member-sbar-fill" style="width:${pct}%;background:${traitInfo[f].color}"></div></div>`;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');

  // クリックイベント
  container.querySelectorAll('.member-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else if (selectedIds.size < MAX_MEMBERS) {
        selectedIds.add(id);
      }
      renderMembers();
    });
  });

  // 選択カウンター
  const info = document.getElementById('selectionInfo');
  const count = selectedIds.size;
  if (count === 0) {
    info.innerHTML = `メンバーを選択してください（${MIN_MEMBERS}〜${MAX_MEMBERS}人）`;
  } else if (count >= 6) {
    const commPaths = (count * (count - 1)) / 2;
    info.innerHTML = `
      <span>${count}</span>人選択中（最大${MAX_MEMBERS}人まで）
      <div style="margin-top:10px;padding:12px 14px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:10px;text-align:left;font-size:12px;line-height:1.8;color:#fbbf24;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> <strong>チームの人数について</strong><br>
        <span style="color:var(--dim);">
          心理学の研究では、<strong style="color:var(--text);">5人前後が最も機能しやすいチームサイズ</strong>とされています。
          ${count}人では会話の経路が<strong style="color:var(--text);">${commPaths}通り</strong>に増え、コミュニケーションコストが急増します。<br>
          また「リングルマン効果」により、人数が増えるほど個人の貢献量が下がる傾向があります。
          6人以上では意思決定が遅くなるリスクも高まります。
        </span>
      </div>
    `;
  } else {
    info.innerHTML = `<span>${count}</span>人選択中（最大${MAX_MEMBERS}人まで）`;
  }

  // ボタン有効化
  document.getElementById('analyzeBtn').disabled = count < MIN_MEMBERS;
}

// ===== ポジションアドバイスデータ =====
const improvementTips = {
  O: {
    up: '①普段読まない分野の本や記事に触れてみる。特に文学的フィクションは視点取得能力を高める。②未経験の趣味に挑戦する。「毎日1つ新しいこと」をルールにすると行動確認効果がある。③年齢や職業が異なる人との対話を増やす。④通勤ルートや作業順序など、日常のルーティンを意識的に変える。',
    down: '①毎日同じパターンの生活を避け、意識的に変化を取り入れる。②「自分には才能がない」という固定マインドセットに気づき、「まだ知らないだけ」と捉え直す。③SNSのアルゴリズムに依存せず、異なる情報源に触れる。④失敗を恐れず「間違えても学びがある」と捉える習慣をつける。'
  },
  C: {
    up: '①「朝起きたら(if)ベッドを整える(then)」のように、状況と行動を結びつけるif-thenプランニングを実践。②既存の習慣に新しい行動をくっつける（例：コーヒーを淹れたらタスクを3つ書く）。③2分で終わることは即座にやる。④翌日の優先タスク3つを寝る前に決める。⑤目標を人に伝えて進捗を共有する。',
    down: '①睡眠を7〜9時間確保する。睡眠不足は計画性と自己制御を直接阻害する。②慢性的な過労やバーンアウトに注意する。③スマホの即時報酬に依存しない。④「完璧にできないならやらない」という回避型完璧主義に気づく。⑤やるべきことを3つまで絞る習慣をつける。'
  },
  E: {
    up: '①積極的に会話を始める練習。「行動が先、内面が後から追従」。②共通の目的を持つグループ（読書会、クラブなど）に参加。③「1日1回見知らぬ人に話しかける」目標を週単位で追跡。④スケジュールに意識的に外出を組み込む。⑤社交後、楽しめた会話を振り返る（ネガティブな反芻を防ぐ）。',
    down: '①意識的に人と交流する機会を作る。対人接触の減少が社会的スキルを萎縮させる。②慢性的なストレスに注意。休息が重要。③対人トラウマの経験がある場合、専門家のサポートを検討。④SNSでの対面交流の代替に注意。⑤うつ状態が2週間以上続く場合は医療機関の受診を検討。'
  },
  A: {
    up: '①相手の話を遮らず最後まで聞くアクティブ・リスニングを実践。②「もし自分があの人の立場なら？」と考える視点転換の練習。③「ありがとう」を具体的に伝える。④毎日小さな親切を1つ。⑤異なる意見を「違う視点」として受け入れる練習。',
    down: '①慢性的な対人葛藤から距離を取ることも必要。②信頼できる人との定期的なつながりを維持する。③睡眠を最優先。睡眠不足が衝動的な怒りを招く。④オンライン上の対立への長期暴露に注意。⑤win-winの再構成を心がける。'
  },

    up: '①非機能的な思考に気づき「本当にそうか？別の見方はないか？」と問い直す。②不安を避けない練習（重症の場合は専門家に）。③感情を書き出すジャーナリング。④週150分以上の有酸素運動。⑤毎日3つの感謝できることを書く。',

// ===== ポジションアドバイス計算 =====
function genPositionAdvice(members, currentScore) {
  const advice = [];

  members.forEach((member, idx) => {
    let bestImprovement = 0;
    let bestFactor = null;
    let bestDirection = 0;

    ['O', 'C', 'E', 'A', 'N'].forEach(f => {
      [-1, 1].forEach(dir => {
        const newScore = Math.max(1, Math.min(5, member.scores[f] + dir));
        if (newScore === member.scores[f]) return;

        const adjustedMembers = members.map((m, i) =>
          i === idx ? { ...m, scores: { ...m.scores, [f]: newScore } } : m
        );
        const { score: newTeamScore } = calcTeamScore(adjustedMembers);
        const improvement = newTeamScore - currentScore;

        if (improvement > bestImprovement) {
          bestImprovement = improvement;
          bestFactor = f;
          bestDirection = dir;
        }
      });
    });

    if (bestFactor && bestImprovement >= 2) {
      advice.push({
        name: member.name,
        factor: bestFactor,
        factorName: traitInfo[bestFactor].name,
        improvement: bestImprovement,
        text: `${traitInfo[bestFactor].name}を${bestDirection > 0 ? '<b>伸ばす</b>' : '<b>他に活かす</b>'}ことでチームスコアが<b>+${bestImprovement}点</b>になります`,
        tipKey: bestFactor,
        tipDir: bestDirection > 0 ? 'up' : 'down'
      });
    } else {
      advice.push({
        name: member.name,
        text: '現在の特性はチームに良い影響を与えています',
        factor: null, tipKey: null
      });
    }
  });

  return advice;
}

// ===== チームスコア計算 =====
function calcTeamScore(members) {
  const factors = ['O', 'C', 'E', 'A', 'N'];
  const n = members.length;

  // 平均
  const avg = {};
  factors.forEach(f => {
    avg[f] = members.reduce((sum, m) => sum + m.scores[f], 0) / n;
  });

  // 分散
  const variance = {};
  factors.forEach(f => {
    variance[f] = members.reduce((sum, m) => sum + (m.scores[f] - avg[f]) ** 2, 0) / n;
  });

  // 最小値・最大値（視覚化用）
  const min = {}, max = {};
  factors.forEach(f => {
    min[f] = Math.min(...members.map(m => m.scores[f]));
    max[f] = Math.max(...members.map(m => m.scores[f]));
  });

  // チームスコア計算
  let raw = 50;

  // ポジティブ要因
  raw += avg.C * 7;       // C高＝実行力プラス
  raw += avg.A * 7;       // A高＝協調性プラス
  raw += variance.O * 1.5; // O分散＝多様性プラス（控えめ）

  // ネガティブ要因
  raw -= variance.C * 3;  // C分散＝生活スタイル不一致マイナス
  raw -= avg.N * 7;       // N高＝ストレスリスクマイナス

  // 「高すぎる」ペナルティ
  if (avg.A >= 4.5) raw -= 5;  // A高すぎ＝グループシンクリスク
  if (avg.C >= 4.5) raw -= 3;  // C高すぎ＝柔軟性不足リスク

  // 多様性ボーナス（3人以上の場合）
  if (n >= 3) {
    const totalVariance = variance.O + variance.E + variance.A;
    raw += Math.min(totalVariance * 0.5, 4);
  }

  // 大人数ペナルティ（5人超：コミュニケーション経路が n*(n-1)/2 通りに急増するため）
  // 5人=10通りを基準に、超過した経路数×1.2点を減算（最大22点）
  if (n > 5) {
    const extraPaths = (n * (n - 1) / 2) - 10;
    raw -= Math.min(extraPaths * 1.2, 22);
  }

  // 2人チームはペア相性を重視
  if (n === 2) {
    const pairScore = calcPairCompatibility(members[0].code, members[1].code);
    raw = raw * 0.4 + pairScore * 0.6;
  }

  // 正規化 0〜100
  const score = Math.max(0, Math.min(100, Math.round(raw)));

  return { score, avg, variance, min, max };
}

// ===== ペア相性計算 =====
function calcPairCompatibility(code1, code2) {
  const [o1, c1, e1, a1, n1] = code1.split('').map(Number);
  const [o2, c2, e2, a2, n2] = code2.split('').map(Number);
  return Math.round(calcCompatCore(
    { O: o1, C: c1, E: e1, A: a1, N: n1 },
    { O: o2, C: c2, E: e2, A: a2, N: n2 }
  ));
}

// ===== 総合コメント生成 =====
function genSummary(score, avg, variance, bestPair, worstPair, n) {
  let rank, rankClass, summaryText;

  if (score >= 80) {
    rank = 'S'; rankClass = 'rank-s';
    summaryText = '非常に高いチーム相性です。メンバーの強みがうまく補完し合っており、協力して成果を出せる理想的な組成です。';
  } else if (score >= 60) {
    rank = 'A'; rankClass = 'rank-a';
    summaryText = '良好なチーム相性です。お互いの違いを活かしながら、効果的に連携できるチームです。';
  } else if (score >= 40) {
    rank = 'B'; rankClass = 'rank-b';
    summaryText = '普通のチーム相性です。工夫次第で良いチームになります。いくつか注意点を意識しましょう。';
  } else {
    rank = 'C'; rankClass = 'rank-c';
    summaryText = '挑戦的なチーム相性です。個性の違いが大きい分、衝突リスクもありますが、工夫次第で強力なチームになります。';
  }

  // 強み
  const strengths = [];
  if (avg.C >= 3.5) strengths.push('計画性と実行力');
  if (avg.A >= 3.5) strengths.push('チームの和と協力関係');
  if (variance.O >= 0.8) strengths.push('多様な視点からの創造性');
  if (avg.N <= 2.5) strengths.push('精神的な安定性');

  // 注意点
  const cautions = [];
  if (variance.C >= 1.0) cautions.push('生活リズムや計画性の違い');
  if (avg.N >= 3.5) cautions.push('ストレスによる感情的な対立');
  if (avg.A <= 2.5) cautions.push('意見の衝突と意思決定の遅れ');
  if (avg.A >= 4.5) cautions.push('反対意見が出にくい傾向');
  if (avg.C <= 2.5) cautions.push('段取りや計画の不在');
  if (n >= 6) cautions.push(`人数が多い（${n}人）ためコミュニケーションコスト増加`);

  return { rank, rankClass, summaryText, strengths, cautions };
}

  `;

    };

    const btn = document.getElementById('saveTeamBtn');
    btn.textContent = '✓ 保存しました！';

  // ビッグファイブマン分析：発動条件チェック

  // ビッグファイブマン分析ボタン
  let bfmActive = false;
  document.getElementById('bigfivemanBtn').addEventListener('click', () => {
    if (!bfmActive) {
      const bonus = calcEqDtBonus(bfmData);
      const newScore = Math.max(0, Math.min(100, score + bonus));
      const newSummary = genSummary(newScore, avg, variance, bestPair, worstPair, selected.length);
      animateScoreValue(score, newScore);
      updateRankDisplay(newSummary.rank, newSummary.rankClass);
      const warnings = genPairWarnings(bfmData);
      document.getElementById('bigfivemanSection').innerHTML = genBigFiveManHtml(bfmData, warnings, bonus, newScore);

      bfmActive = false;
    }
  });

  // 再選択ボタン
  document.getElementById('reselectBtn').addEventListener('click', () => {
    container.classList.remove('visible');
    container.innerHTML = '';
    document.getElementById('memberSection').style.display = 'block';
  });
}

// ===== ビッグファイブマン分析：データ取得 =====
function loadBigFiveManData(members) {
  // 旧キー（フォールバック用）
  let myEqFallback = null, myDtFallback = null;
  let myAttachFallback = null, myMindsetFallback = null, myLocusFallback = null;
  try { myEqFallback = JSON.parse(localStorage.getItem('eq_result') || 'null'); } catch(e) {}
  try { myDtFallback = JSON.parse(localStorage.getItem('dark_triad_result') || 'null'); } catch(e) {}
  try { myAttachFallback = JSON.parse(localStorage.getItem('attachment_result') || 'null'); } catch(e) {}
  try { myMindsetFallback = JSON.parse(localStorage.getItem('mindset_result') || 'null'); } catch(e) {}
  try { myLocusFallback = JSON.parse(localStorage.getItem('locus_result') || 'null'); } catch(e) {}

  // 適用中の自分のBig Five結果レコード
  let myRecord = null;
  try {
    const myResults = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
    const activeIdx = Math.min(parseInt(localStorage.getItem('bigfive_active_my_index') || '0'), Math.max(0, myResults.length - 1));
    myRecord = myResults[activeIdx] || null;
  } catch(e) {}

  const otherResults = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');

  return members.map(m => {
    let eq = null, dt = null, attachment = null, mindset = null, locus = null;
    if (m.type === 'my') {
      eq = (myRecord && myRecord.eq) || myEqFallback;
      dt = (myRecord && myRecord.darkTriad) || myDtFallback;
      attachment = (myRecord && myRecord.attachment) || myAttachFallback;
      mindset = (myRecord && myRecord.mindset) || myMindsetFallback;
      locus = (myRecord && myRecord.locus) || myLocusFallback;
    } else if (m.type === 'other') {
      const idx = parseInt(m.id.replace('other_', ''));
      if (!isNaN(idx) && otherResults[idx]) {
        eq = otherResults[idx].eq || null;
        dt = otherResults[idx].darkTriad || null;
        attachment = otherResults[idx].attachment || null;
      }
    }
    return { ...m, eq, dt, attachment, mindset, locus };
  });
}

// ===== ビッグファイブマン分析：発動条件 =====
function canBigFiveMan(bfmData) {
  const myData = bfmData.find(m => m.type === 'my');
  const myHasData = myData && (myData.eq || myData.dt || myData.attachment || myData.mindset || myData.locus);
  const othersWithData = bfmData.filter(m => m.type !== 'my' && (m.eq || m.dt || m.attachment));
  return myHasData && othersWithData.length >= 1;
}

// ===== ビッグファイブマン分析：スコア補正計算 =====
function calcEqDtBonus(bfmData) {
  const eqMembers = bfmData.filter(m => m.eq && m.eq.overall != null);
  const dtMembers = bfmData.filter(m => m.dt && m.dt.nPct != null);
  let bonus = 0;

  const eqVals = eqMembers.map(m => m.eq.overall);
  const eqAvg  = eqVals.length > 0 ? eqVals.reduce((s, v) => s + v, 0) / eqVals.length : null;
  const eqMax  = eqVals.length > 0 ? Math.max(...eqVals) : null;
  const eqMin  = eqVals.length > 0 ? Math.min(...eqVals) : null;
  const eqHighCount = eqMembers.filter(m => m.eq.overall >= 3.5).length;

  const machiHigh = dtMembers.filter(m => m.dt.mPct >= 65);
  const narcHigh  = dtMembers.filter(m => m.dt.nPct >= 65);
  const psychHigh = dtMembers.filter(m => m.dt.pPct >= 65);
  const anyDtHigh = dtMembers.filter(m => Math.max(m.dt.nPct, m.dt.mPct, m.dt.pPct) >= 65);

  // ── EQ補正（文脈込み）──
  if (eqAvg !== null && eqMembers.length >= 2) {
    // 全員EQが高い → 対立回避・創造性低下リスク（マイナス）
    const allHighEq = eqVals.every(v => v >= 3.8);
    if (allHighEq) {
      bonus -= 4; // 全員高EQ＝空気読み合いで創造的摩擦が起きにくい
    } else if (eqAvg >= 3.5) {
      bonus += 3; // 適度に高EQ＝プラス
    } else if (eqAvg <= 2.0) {
      bonus -= 4;
    }
    // EQに偏りがある → 感情労働が一部に集中するリスク
    if (eqMax !== null && eqMin !== null && eqMax - eqMin >= 1.5 && eqMembers.length >= 2) {
      bonus -= 3;
    }
  }

  // ── DT補正（文脈込み）──
  // マキャベリアン1人 → 外部交渉力としてプラス面あり、EQ高多数と組み合わさると搾取リスク
  if (machiHigh.length === 1) {
    if (eqHighCount >= 2) {
      bonus -= 6; // 搾取リスク（外部強みはあるが内部コスト大）
    } else {
      bonus += 2; // 外部折衝力としてプラス
    }
  } else if (machiHigh.length >= 2) {
    bonus -= 7; // 複数マキャベリアン＝内部の権謀術数
  }

  // ナルシシスト1人 → 短期リーダーシップとして機能しうる（軽めのマイナス）
  if (narcHigh.length === 1) {
    bonus -= 2; // 単独なら牽引力になる可能性あり
  } else if (narcHigh.length >= 2) {
    bonus -= 8; // 複数は覇権争いリスク大
  }

  // サイコパシー → 高ストレス下での決断力あり、長期で信頼を傷つける
  if (psychHigh.length >= 1) {
    bonus -= 4;
  }

  // EQ適度＋DT全員低い → 持続性ボーナス
  if (eqAvg !== null && eqAvg >= 3.0 && eqAvg < 3.8 && dtMembers.length >= 1 && anyDtHigh.length === 0) {
    bonus += 4;
  }

  // ── 愛着スタイル補正（自分+あの人のペアパターン）──
  const myData = bfmData.find(m => m.type === 'my');
  const myType = myData && myData.attachment && myData.attachment.typeKey;
  const otherAttachMembers = bfmData.filter(m => m.type !== 'my' && m.attachment && m.attachment.typeId);

  if (myType && otherAttachMembers.length >= 1) {
    let securePairCount = 0, clashPairCount = 0;
    otherAttachMembers.forEach(m => {
      const otherType = m.attachment.typeId;
      if (myType === 'secure' && otherType === 'secure') securePairCount++;
      // 不安×回避（追いかけっこパターン）
      if ((myType === 'anxious' && otherType === 'avoidant') ||
          (myType === 'avoidant' && otherType === 'anxious')) clashPairCount++;
    });
    if (securePairCount >= 1) bonus += 3;
    bonus -= clashPairCount * 5;
  }

  return bonus;
}

// ===== ビッグファイブマン分析：ペア別・チーム全体の注目ポイント =====
function genPairWarnings(bfmData) {
  const warnings = [];
  const eqMembers = bfmData.filter(m => m.eq && m.eq.overall != null);
  const dtMembers = bfmData.filter(m => m.dt && m.dt.nPct != null);
  const eqVals = eqMembers.map(m => m.eq.overall);
  const eqAvg  = eqVals.length > 0 ? eqVals.reduce((s, v) => s + v, 0) / eqVals.length : null;
  const narcHigh  = dtMembers.filter(m => m.dt.nPct >= 65);
  const machiHigh = dtMembers.filter(m => m.dt.mPct >= 65);
  const psychHigh = dtMembers.filter(m => m.dt.pPct >= 65);

  // ── チーム全体の傾向（ペア問わず） ──

  // 全員EQ高い → 対立回避リスク
  if (eqVals.length >= 2 && eqVals.every(v => v >= 3.8)) {
    warnings.push({ type: 'caution', pair: false,
      text: `全員のEQが高く、互いに気を遣い合う空気が生まれやすいです。「反対意見を言いにくい」「問題を先送りにする」といった現象が起きやすいため、意図的に反論役（デビルズアドボケイト）を設けることが有効です。` });
  }

  // EQに大きな偏り → 感情労働の集中
  if (eqVals.length >= 2) {
    const eqMax = Math.max(...eqVals), eqMin = Math.min(...eqVals);
    if (eqMax - eqMin >= 1.5) {
      const highEqNames = eqMembers.filter(m => m.eq.overall >= eqMax - 0.3).map(m => m.name);
      warnings.push({ type: 'caution', pair: false,
        text: `メンバー間でEQに差があります。<strong>${highEqNames.join('・')}さん</strong>に感情的な調整役・緩衝役が集中しやすく、長期的に燃え尽きるリスクがあります。意識的に役割を分担しましょう。` });
    }
  }

  // マキャベリアン → 文脈込みの評価
  if (machiHigh.length === 1) {
    const m = machiHigh[0];
    const eqHighCount = eqMembers.filter(em => em.eq.overall >= 3.5).length;
    if (eqHighCount >= 2) {
      warnings.push({ type: 'danger', pair: false,
        text: `<strong>${m.name}さんのマキャベリアン傾向</strong>は、外部交渉や組織政治での立ち回りでチームに強みをもたらします。一方、EQの高いメンバーが多い内部では、感情を読んだ利用的なダイナミクスが生じやすいため、定期的に率直な1on1を設けることが有効です。` });
    } else {
      warnings.push({ type: 'caution', pair: false,
        text: `<strong>${m.name}さんのマキャベリアン傾向</strong>は、外部折衝や政治的な場面でチームの強みになります。内部では物事をストレートに話す場を意識的に作ると、関係が安定しやすいです。` });
    }
  } else if (machiHigh.length >= 2) {
    warnings.push({ type: 'danger', pair: false,
      text: `<strong>${machiHigh.map(m => m.name).join('・')}さん</strong>が両者ともマキャベリアン傾向が高いです。外部では強力ですが、内部で利害が衝突したときに権謀術数が生じやすく、チームの信頼基盤が崩れるリスクがあります。` });
  }

  // ナルシシズム → 文脈込みの評価
  if (narcHigh.length === 1) {
    const m = narcHigh[0];
    warnings.push({ type: 'caution', pair: false,
      text: `<strong>${m.name}さんのリーダーシップ傾向</strong>は、危機対応や短期プロジェクトで大きな推進力になります。ただし長期的には「自分の貢献だけが見えやすくなる」傾向があるため、他メンバーの成果を可視化する工夫が有効です。` });
  } else if (narcHigh.length >= 2) {
    warnings.push({ type: 'danger', pair: false,
      text: `<strong>${narcHigh.map(m => m.name).join('・')}さん</strong>が両者ともリーダーシップ傾向が強いです。方向性が一致しているうちは突破力がありますが、意見が割れた場合に覇権争いに発展しやすいです。意思決定のフローを明文化しておくことを強く推奨します。` });
  }

  // サイコパシー
  psychHigh.forEach(m => {
    const eqHighNames = eqMembers.filter(em => em.id !== m.id && em.eq.overall >= 3.5).map(em => em.name);
    if (eqHighNames.length >= 1) {
      warnings.push({ type: 'caution', pair: false,
        text: `<strong>${m.name}さん</strong>は高ストレス下での冷静な判断力が強みです。一方、長期的には<strong>${eqHighNames.join('・')}さん</strong>のような共感力の高いメンバーに感情的コストが蓄積しやすいです。定期的な振り返りの場が有効です。` });
    } else {
      warnings.push({ type: 'caution', pair: false,
        text: `<strong>${m.name}さん</strong>は冷静な判断力が強みです。長期的にはチームの感情的なつながりを維持する工夫が必要です。` });
    }
  });

  // ── 愛着スタイルペア警告 ──
  const myMember = bfmData.find(m => m.type === 'my');
  const myAttachType = myMember && myMember.attachment && myMember.attachment.typeKey;
  if (myAttachType) {
    bfmData.filter(m => m.type !== 'my' && m.attachment && m.attachment.typeId).forEach(m => {
      const otherType = m.attachment.typeId;
      if ((myAttachType === 'anxious' && otherType === 'avoidant') ||
          (myAttachType === 'avoidant' && otherType === 'anxious')) {
        const [chaser, distancer] = myAttachType === 'anxious'
          ? [myMember.name, m.name]
          : [m.name, myMember.name];
        warnings.push({ type: 'caution', pair: true,
          text: `<strong>${chaser}さんと${distancer}さんの愛着スタイル</strong>は「不安型×回避型」の組み合わせです。距離感でズレが生じやすく、追いかけるほど引いてしまう循環が起きやすいです。定期的に「今どんなペースで関わりたいか」を率直に伝え合う場を設けると関係が安定します。` });
      } else if (myAttachType === 'secure' && otherType === 'secure') {
        warnings.push({ type: 'good', pair: true,
          text: `<strong>${myMember.name}さんと${m.name}さん</strong>は両者とも安定型の愛着スタイルです。感情的な余裕があり、安心して頼り合えるベース関係を築きやすい組み合わせです。` });
      }
    });
  }

  return warnings;
}

// ===== ビッグファイブマン分析：スコアアニメーション =====
function animateScoreValue(from, to, duration = 700) {
  const el = document.getElementById('teamScoreDisplay');
  if (!el) return;
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    el.textContent = Math.round(from + (to - from) * eased);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = to;
  }
  requestAnimationFrame(tick);
}

function updateRankDisplay(rank, rankClass) {
  const el = document.getElementById('teamRankDisplay');
  if (!el) return;
  el.textContent = rank + 'ランク';
  el.className = `team-score-rank ${rankClass}`;
}

// ===== ビッグファイブマン分析：HTML生成 =====
function genBigFiveManHtml(bfmData, warnings, bonus, newScore) {
  const eqMembers = bfmData.filter(m => m.eq && m.eq.overall != null);
  const dtMembers = bfmData.filter(m => m.dt && m.dt.nPct != null);
  const eqAvg = eqMembers.length > 0
    ? eqMembers.reduce((s, m) => s + m.eq.overall, 0) / eqMembers.length : null;
  const anyDtHigh = dtMembers.filter(m => Math.max(m.dt.nPct, m.dt.mPct, m.dt.pPct) >= 65);
  const narcHigh  = dtMembers.filter(m => m.dt.nPct >= 65);
  const machiHigh = dtMembers.filter(m => m.dt.mPct >= 65);

  // チームタイプ判定（良い面・悪い面を両方記述）
  const eqValsAll = eqMembers.map(m => m.eq.overall);
  const allHighEq = eqValsAll.length >= 2 && eqValsAll.every(v => v >= 3.8);
  let typeName, typeDesc;
  if (eqAvg !== null && eqAvg >= 3.0 && eqAvg < 3.8 && anyDtHigh.length === 0 && dtMembers.length >= 1) {
    typeName = '安定・持続型';
    typeDesc = 'EQが適度に高く、ダークトライアド傾向も低い組み合わせです。長期プロジェクトへの適性が高く、信頼関係が自然に育ちます。急成長よりも着実な積み上げが得意な反面、外部への強い折衝力は別途補う必要があります。';
  } else if (allHighEq) {
    typeName = '調和重視型';
    typeDesc = '全員EQが高く、対立を避ける力に優れています。雰囲気が良い反面、誰も反論しないまま問題が先送りになる「グループシンク」が起きやすいです。意図的に批判的思考を持ち込む役割を作ると、このチームの力が最大化します。';
  } else if (eqAvg !== null && eqAvg >= 3.5) {
    typeName = '調和型';
    typeDesc = '感情知性が高く、対立をうまく収める力があります。人間関係のトラブルが少なく、相談しやすい空気があります。建設的な摩擦を意図的に作ると、さらに力が伸びます。';
  } else if (machiHigh.length >= 1 && eqAvg !== null && eqAvg >= 3.0) {
    typeName = '戦略×共感型';
    typeDesc = '外部交渉・組織政治に強いメンバーと、共感力の高いメンバーが共存するチームです。外部折衝では強みを発揮します。内部では感情的搾取が起きやすい構造のため、信頼構築を意識的に行うことがこのチームの最重要課題です。';
  } else if (narcHigh.length === 1 && eqAvg !== null) {
    typeName = 'エネルギー型';
    typeDesc = '強い推進力を持つメンバーがいるチームです。短期プロジェクトや危機対応では大きな力を発揮します。長期的には他メンバーの貢献の可視化と、リーダーシップを共有する仕組みが持続力のカギになります。';
  } else if (narcHigh.length >= 2 || machiHigh.length >= 2) {
    typeName = '競争型';
    typeDesc = '個性と主張の強いメンバーが集まったチームです。方向性が合っているときの突破力は強いですが、利害が衝突したときに内部崩壊するリスクがあります。ルール・役割・評価基準の明文化が不可欠です。';
  } else {
    typeName = 'バランス型';
    typeDesc = '多様な特性が混在した、状況適応力のあるチームです。';
  }

  // スコア補正表示
  const bonusSign = bonus >= 0 ? `+${bonus}` : `${bonus}`;
  const bonusColor = bonus >= 0 ? '#34d399' : '#f87171';

  // 警告HTML
  const iconMap = { danger: '🔴', caution: '🟡', good: '🟢' };
  const cautionWarnings = warnings.filter(w => w.type !== 'good');
  const goodWarnings = warnings.filter(w => w.type === 'good');
  const warningsHtml = (cautionWarnings.length > 0 || goodWarnings.length > 0) ? `
    <div class="bigfiveman-pair-warnings">
      ${cautionWarnings.length > 0 ? `
        <p class="bigfiveman-members-title" style="margin-bottom:8px;">⚠️ 注意が必要な組み合わせ</p>
        ${cautionWarnings.map(w => `
          <div class="bigfiveman-pair-warning">
            <span class="bigfiveman-pair-icon">${iconMap[w.type] || '🟡'}</span>
            <span class="bigfiveman-pair-text">${w.text}</span>
          </div>
        `).join('')}
      ` : ''}
      ${goodWarnings.length > 0 ? `
        <p class="bigfiveman-members-title" style="margin-bottom:8px;margin-top:12px;">✨ 相性のよい組み合わせ</p>
        ${goodWarnings.map(w => `
          <div class="bigfiveman-pair-warning">
            <span class="bigfiveman-pair-icon">🟢</span>
            <span class="bigfiveman-pair-text">${w.text}</span>
          </div>
        `).join('')}
      ` : ''}
    </div>
  ` : `
    <div style="text-align:center;padding:10px 0;font-size:13px;color:#6ee7b7;">✓ 危険な組み合わせパターンは検出されませんでした</div>
  `;

  // メンバー別データ
  const membersHtml = bfmData.map(m => {
    if (!m.eq && !m.dt) return '';
    const bars = [];
    if (m.eq && m.eq.overall != null) {
      const pct = ((m.eq.overall - 1) / 4) * 100;
      bars.push(`<div class="bigfiveman-mini-row">
        <span class="bigfiveman-mini-label">EQ</span>
        <div class="bigfiveman-mini-track"><div class="bigfiveman-mini-fill" style="width:${pct}%;background:#d946ef;"></div></div>
        <span class="bigfiveman-mini-val">${m.eq.levelName || m.eq.overall.toFixed(1)}</span>
      </div>`);
    }
    if (m.dt) {
      [['ナルシシズム', '#f97316', m.dt.nPct],
       ['マキャベリアン', '#ef4444', m.dt.mPct],
       ['サイコパシー', '#8b5cf6', m.dt.pPct]].forEach(([label, color, val]) => {
        if (val == null) return;
        bars.push(`<div class="bigfiveman-mini-row">
          <span class="bigfiveman-mini-label">${label}</span>
          <div class="bigfiveman-mini-track"><div class="bigfiveman-mini-fill" style="width:${val}%;background:${color};"></div></div>
          <span class="bigfiveman-mini-val">${val}%</span>
        </div>`);
      });
    }
    return `<div class="bigfiveman-member-row">
      <div class="bigfiveman-member-name">${m.name}</div>
      <div class="bigfiveman-mini-bars">${bars.join('')}</div>
    </div>`;
  }).filter(Boolean).join('');

  // 自分へのアドバイスHTML（mindset/locus）
  const myMemberForAdvice = bfmData.find(m => m.type === 'my');
  const adviceItems = [];

  if (myMemberForAdvice && myMemberForAdvice.mindset) {
    const ms = myMemberForAdvice.mindset;
    const mindsetLabels = { growth: '成長マインドセット', mixed: '中間マインドセット', fixed: '固定マインドセット' };
    const mindsetAdvice = {
      growth: 'チームの困難を「成長の機会」と捉える視点がチームに伝わると、メンバーの挑戦意欲が高まります。',
      mixed: '状況によって柔軟に思考スタイルを切り替えられる強みがあります。チームが停滞しているときに「できることから試そう」と促す役割が向いています。',
      fixed: '安定志向の強さはリスク管理に活きます。一方、チームが新しい挑戦をするときは「まず小さく試す」というフレームで参加すると動きやすくなります。'
    };
    adviceItems.push(`<div class="bigfiveman-advice-item">
      <span class="bigfiveman-advice-label">マインドセット：${mindsetLabels[ms.type] || ms.type}</span>
      <p class="bigfiveman-advice-text">${mindsetAdvice[ms.type] || ''}</p>
    </div>`);
  }

  if (myMemberForAdvice && myMemberForAdvice.locus) {
    const lc = myMemberForAdvice.locus;
    const locusLabels = { internal: '内的統制型', external: '外的統制型', balanced: 'バランス型' };
    const locusAdvice = {
      internal: '「自分で変えられる」という意識が強く、主体的な行動力がチームの推進力になります。ただし他者への期待値が高くなりすぎると摩擦が生まれやすいので注意しましょう。',
      external: '状況の流れを読む柔軟性がありますが、チームでの意思決定時には「自分はどうしたいか」を一度明確にして発言すると影響力が増します。',
      balanced: '自分でコントロールできることとできないことを使い分ける判断力が強みです。チームの振り返りの場でファシリテーター的な役割を担うと力を発揮しやすいです。'
    };
    adviceItems.push(`<div class="bigfiveman-advice-item">
      <span class="bigfiveman-advice-label">統制の所在：${locusLabels[lc.type] || lc.type}</span>
      <p class="bigfiveman-advice-text">${locusAdvice[lc.type] || ''}</p>
    </div>`);
  }

  const adviceHtml = adviceItems.length > 0 ? `
    <div class="bigfiveman-pair-warnings" style="margin-top:12px;">
      <p class="bigfiveman-members-title" style="margin-bottom:8px;">💡 あなた自身へのアドバイス</p>
      ${adviceItems.join('')}
    </div>
  ` : '';

  return `
    <div class="bigfiveman-card">
      <div class="bigfiveman-header">
        <span class="bigfiveman-label">🦸 ビッグファイブマン分析</span>
        <span class="bigfiveman-score-change" style="color:${bonusColor};">スコア ${bonusSign}点</span>
      </div>
      <p class="bigfiveman-disclaimer">ビッグファイブに加え、EQ・ダークトライアドの診断スコアを統合して算出しています。いずれも心理検査による推定値のため、参考値としてご活用ください。</p>
      <div class="bigfiveman-type-wrap">
        <p class="bigfiveman-type-label">チームキャラクター診断</p>
        <p class="bigfiveman-type-name">${typeName}</p>
        <p class="bigfiveman-type-desc">${typeDesc}</p>
      </div>
      ${warningsHtml}
      ${membersHtml ? `<p class="bigfiveman-members-title">メンバー別プロファイル</p>${membersHtml}` : ''}
      ${adviceHtml}
    </div>
  `;
}

// ===== イベント =====
document.getElementById('analyzeBtn').addEventListener('click', () => {
  renderResults();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ===== 初期化 =====
renderMembers();

// マイページからの保存済みチーム表示：全員自動選択＋即分析
if (viewTeamData && allMembers.length >= 2) {
  allMembers.forEach(m => selectedIds.add(m.id));
  if (viewTeamData.teamName) {
    document.getElementById('teamNameInput').value = viewTeamData.teamName;
  }
  renderMembers();
  renderResults();
  // イントロを隠して結果セクションにスクロール
  document.querySelector('.intro').style.display = 'none';
  setTimeout(() => {
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 150);
}
</script>
