<style>
  :root {
    --purple: #8b5cf6;
    --blue: #3b82f6;
    --pink: #ec4899;
    --c-O: #8b5cf6;
    --c-C: #3b82f6;
    --c-E: #f97316;
    --c-A: #f472b6;
    --c-N: #14b8a6;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  /* ヘッダー */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }
  .page-title {
    font-size: 20px;
    font-weight: 700;
  }

  /* 説明 */
  .intro {
    text-align: center;
    margin-bottom: 28px;
  }
  .intro p {
    font-size: 14px;
    color: var(--dim);
    line-height: 1.7;
  }

  /* メンバー選択 */
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .member-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(26,10,62,0.45);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .member-card:hover {
    border-color: rgba(139,92,246,0.4);
  }
  .member-card.selected {
    border-color: var(--purple);
    background: rgba(139,92,246,0.12);
    box-shadow: 0 0 20px rgba(139,92,246,0.15);
  }
  .member-card.disabled {
    opacity: 0.4;
    pointer-events: none;
  }
  .member-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid rgba(139,92,246,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 13px;
  }
  .member-card.selected .member-checkbox {
    background: var(--purple);
    border-color: var(--purple);
  }
  .member-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(139,92,246,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
    padding: 0;
  }
  .member-icon img { width: 100%; height: 100%; object-fit: contain; }
  .member-icon.other {
    background: rgba(236,72,153,0.15);
  }
  .member-info {
    flex: 1;
    min-width: 0;
  }
  .member-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .member-meta {
    font-size: 11px;
    color: var(--dim);
  }
  .member-code {
    font-family: monospace;
    background: rgba(139,92,246,0.15);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--purple);
  }
  .member-score-bars {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
  .member-sbar {
    width: 20px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .member-sbar-fill {
    height: 100%;
    border-radius: 2px;
  }

  /* 選択カウンター */
  .selection-info {
    text-align: center;
    font-size: 13px;
    color: var(--dim);
    margin-bottom: 16px;
  }
  .selection-info span {
    color: var(--purple);
    font-weight: 700;
  }

  /* チーム名入力 */
  .team-name-wrap {
    margin-bottom: 16px;
  }
  .team-name-label {
    display: block;
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .team-name-input {
    width: 100%;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(139,92,246,0.25);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .team-name-input::placeholder { color: rgba(148,163,184,0.4); font-weight: 400; }

    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.03em;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* 診断ボタン */
  .btn-analyze {
    display: block;
    width: 100%;
    padding: 16px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-bottom: 32px;
  }
  .btn-analyze:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(139,92,246,0.4);
  }
  .btn-analyze:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ===== 結果セクション ===== */
  .result-section {
    display: none;
    animation: fadein 0.5s ease-out;
  }
  .result-section.visible {
    display: block;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* チームスコアカード */
  .team-card {
    background: rgba(26,10,62,0.5);
    border: 1px solid rgba(139,92,246,0.25);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .team-card-title {
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
  }

  /* 総合スコア */
  .team-score-area {
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .team-score-value {
    font-size: clamp(48px, 12vw, 64px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 4px;
  }
  .team-score-label {
    font-size: 14px;
    font-weight: 600;
  }
  .team-score-rank {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
  }
  .rank-s { background: rgba(255,215,0,0.2); color: #fbbf24; }
  .rank-a { background: rgba(139,92,246,0.2); color: #a78bfa; }
  .rank-b { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .rank-c { background: rgba(148,163,184,0.15); color: var(--dim); }

  /* 因子バー */
  .factor-rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .factor-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .factor-label {
    font-size: 13px;
    font-weight: 700;
    width: 56px;
    flex-shrink: 0;
  }
  .factor-bar-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .factor-bar-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.8s ease;
  }
  .factor-avg {
    font-size: 13px;
    font-weight: 600;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  /* 因子コメント */
  .factor-comments {
    background: rgba(26,10,62,0.45);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .factor-comments-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .factor-comment {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--dim);
  }
  .factor-comment:last-child { margin-bottom: 0; }
  .factor-comment-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .factor-comment-text { flex: 1; }
  .factor-comment strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ペアカード */
  .pair-card {
    background: rgba(26,10,62,0.45);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .pair-section {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .pair-section:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .pair-label {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .pair-names {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .pair-score {
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
  }
  .pair-comment {
    font-size: 13px;
    color: var(--dim);
    line-height: 1.7;
    margin-top: 6px;
  }

  /* 総合コメント */
  .summary-card {
    background: linear-gradient(145deg, rgba(139,92,246,0.15) 0%, rgba(59,130,246,0.08) 100%);
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .summary-title {
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 14px;
  }
  .summary-text {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
  }
  .summary-strengths,
  .summary-cautions {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
  }
  .summary-strengths {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
  }
  .summary-cautions {
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.2);
  }
  .summary-strengths strong { color: #34d399; }
  .summary-cautions strong { color: #fbbf24; }

  /* 保存ボタン */
  .btn-save-team {
    display: block;
    width: 100%;
    padding: 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, rgba(139,92,246,0.7), rgba(59,130,246,0.7));
    border: 1px solid rgba(139,92,246,0.4);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-save-team:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-save-team:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* 再選択ボタン */
  .btn-reselect {
    display: block;
    width: 100%;
    padding: 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    color: var(--dim);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-reselect:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }

  /* ポジションアドバイス */
  .position-card {
    background: rgba(26,10,62,0.45);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .position-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }
  .position-member {
    padding: 14px 16px;
    background: rgba(139,92,246,0.06);
    border: 1px solid rgba(139,92,246,0.12);
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .position-member:last-child { margin-bottom: 0; }
  .position-name {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .position-name .factor-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    color: #fff;
  }
  .position-advice {
    font-size: 13px;
    line-height: 1.7;
    color: var(--dim);
  }
  .position-advice strong { color: var(--text); }
  .position-tip-area {
    margin-top: 8px;
    position: relative;
  }
  .position-tip {
    font-size: 12px;
    line-height: 1.7;
    color: var(--dim);
    padding: 10px 14px;
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.15);
    border-radius: 8px;
  }
  .position-good {
    font-size: 13px;
    line-height: 1.7;
    color: #34d399;
    text-align: center;
    padding: 8px 0;
  }

  /* エンタメモードボタン */
  .btn-entertain {
    display: block;
    width: 100%;
    padding: 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: #c084fc;
    background: rgba(139,92,246,0.08);
    border: 1px dashed rgba(139,92,246,0.4);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-entertain:hover {
    background: rgba(139,92,246,0.15);
    border-color: rgba(139,92,246,0.7);
  }

  /* エンタメカード */
  .entertain-card {
    background: linear-gradient(145deg, rgba(88,28,135,0.18) 0%, rgba(30,10,80,0.15) 100%);
    border: 1px solid rgba(139,92,246,0.35);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .entertain-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .entertain-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #c084fc;
    padding: 2px 8px;
    border: 1px solid rgba(192,132,252,0.4);
    border-radius: 999px;
  }
  .entertain-disclaimer {
    font-size: 11px;
    color: var(--dim);
    line-height: 1.7;
    margin-bottom: 16px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
  }
  .entertain-type-wrap {
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(139,92,246,0.15);
  }
  .entertain-type-label {
    font-size: 11px;
    color: #c084fc;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .entertain-type-name {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #c084fc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .entertain-type-desc {
    font-size: 13px;
    line-height: 1.8;
    color: var(--dim);
  }
  .entertain-patterns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;

  .entertain-pattern {

    padding: 12px 14px;
    border-radius: 10px;
  }
  .entertain-pattern.warning {

    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5;
  }
  .entertain-pattern.caution {
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.2);
    color: #fde68a;
  }
  .entertain-pattern.positive {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
    color: #6ee7b7;
  }
  .entertain-members-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--dim);
  }
  .entertain-member-row {
    padding: 10px 14px;
    background: rgba(139,92,246,0.06);
    border: 1px solid rgba(139,92,246,0.1);
    border-radius: 10px;
    margin-bottom: 8px;

<script>
// ===== 定数 =====
const STORAGE_KEY_MY = 'bigfive_my_results';
const STORAGE_KEY_OTHERS = 'bigfive_other_results';
const STORAGE_KEY_TEAMS = 'bigfive_team_results';
const MAX_MEMBERS = 8;
const MAX_TEAMS = 10;
const MIN_MEMBERS = 2;

const traitInfo = {
  O: { name: '開放性', color: '#8b5cf6' },
  C: { name: '誠実性', color: '#3b82f6' },
  E: { name: '外向性', color: '#f97316' },
  A: { name: '協調性', color: '#f472b6' },
  N: { name: '感受性', color: '#14b8a6' },
};

// ===== ユーティリティ =====
function toImgCode(code) {
  return code.split('').map(d => { const n = parseInt(d); return n <= 2 ? '1' : n >= 4 ? '5' : '3'; }).join('');
}

function codeToScores(code) {
  return {
    O: parseInt(code[0]), C: parseInt(code[1]),
    E: parseInt(code[2]), A: parseInt(code[3]), N: parseInt(code[4])
  };
}

function formatDate(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return '今日';
  if (diffDays === 1) return '昨日';
  if (diffDays < 7) return `${diffDays}日前`;
  if (diffDays < 30) return `${Math.floor(diffDays / 7)}週間前`;
  return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
}

// ===== URLの共有データを解析 =====
let sharedMember = null;
let viewTeamData = null;
(function parseShareParam() {
  try {
    // マイページから保存済みチームを表示
    const viewRaw = new URLSearchParams(location.search).get('view');
    if (viewRaw) {
      const params = new URLSearchParams(decodeURIComponent(viewRaw));
      const members = [];
      const codes = params.getAll('m');
      const names = params.getAll('n');
      const genders = params.getAll('g');
      const types = params.getAll('t');
      codes.forEach((c, i) => {
        members.push({
          code: c,
          name: names[i] || `メンバー (${c})`,
          gender: genders[i] || 'F',
          type: types[i] || 'other'
        });
      });
      if (members.length >= 2) {
        viewTeamData = {
          teamName: params.get('teamName') || '',
          members
        };
      }
      return;
    }
    // 共有リンクからのメンバー
    const raw = new URLSearchParams(location.search).get('share');
    if (!raw) return;
    const data = JSON.parse(decodeURIComponent(escape(atob(raw))));
    if (!data.c || data.c.length !== 5) return;
    sharedMember = {
      id: 'shared_0',
      name: data.n || `友達 (${data.c})`,
      code: data.c,
      scores: codeToScores(data.c),
      gender: data.g || 'F',
      type: 'shared',
      date: new Date().toISOString()
    };
  } catch(e) {}
})();

// ===== メンバー読み込み =====
let allMembers = [];
let selectedIds = new Set();

function loadMembers() {
  // マイページからの保存済みチーム表示
  if (viewTeamData) {
    return viewTeamData.members.map((m, i) => ({
      id: `view_${i}`,
      name: m.name,
      code: m.code,
      scores: codeToScores(m.code),
      gender: m.gender || 'F',
      type: m.type || 'other',
      date: new Date().toISOString()
    }));
  }

  const myResults = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
  const otherResults = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');

  const members = [];

  // 自分の結果（適用中データを使用）
  if (myResults.length > 0) {
    const activeIdx = Math.min(parseInt(localStorage.getItem('bigfive_active_my_index') || '0'), Math.max(0, myResults.length - 1));
    const r = myResults[activeIdx];
    const scores = r.scores || codeToScores(r.code);
    members.push({
      id: 'my_0',
      name: r.typeName || `自分 (${r.code})`,
      code: r.code,
      scores,
      gender: r.gender || 'F',
      type: 'my',
      date: r.date
    });
  }

  // 他人の結果
  otherResults.forEach((r, i) => {
    const scores = codeToScores(r.code);
    members.push({
      id: `other_${i}`,
      name: r.name || `あの人 (${r.code})`,
      code: r.code,
      scores,
      gender: r.gender || 'F',
      type: 'other',
      date: r.date
    });
  });

  // URL共有メンバー（先頭に追加）
  if (sharedMember) {
    members.unshift(sharedMember);
  }

  return members;
}

// ===== メンバー一覧描画 =====
function renderMembers() {
  const container = document.getElementById('memberList');
  allMembers = loadMembers();

  // 共有バナーの表示
  const intro = document.querySelector('.intro');
  const existingBanner = document.getElementById('sharedBanner');
  if (existingBanner) existingBanner.remove();
  if (sharedMember) {
    const banner = document.createElement('div');
    banner.id = 'sharedBanner';
    banner.className = 'shared-banner';
    banner.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg> <strong>${sharedMember.name}</strong> さんから相性チェックのリンクが届きました！<br>あなたの診断結果を選んで「チーム相性を診断する」を押してください。`;
    intro.after(banner);
  }

  if (allMembers.length < MIN_MEMBERS) {
    const needDiag = sharedMember
      ? `<p>自分の診断結果がありません。<a href="quiz.html">自分を診断する →</a></p>`
      : `<p>診断結果が不足しています（最低${MIN_MEMBERS}人必要）</p><p><a href="quiz.html">自分を診断する →</a>　<a href="other_quiz.html">あの人を診断する →</a></p>`;
    container.innerHTML = `<div class="empty-state">${needDiag}</div>`;
    document.getElementById('selectionInfo').textContent = '';
    document.getElementById('analyzeBtn').disabled = true;
    return;
  }

  // 共有メンバーがいる場合、初回だけ自動選択
  if (sharedMember && selectedIds.size === 0) {
    selectedIds.add('shared_0');
    const firstMy = allMembers.find(m => m.type === 'my');
    if (firstMy) selectedIds.add(firstMy.id);
  }

  container.innerHTML = allMembers.map(m => {
    const isSelected = selectedIds.has(m.id);
    const isDisabled = !isSelected && selectedIds.size >= MAX_MEMBERS;
    return `
      <div class="member-card${isSelected ? ' selected' : ''}${isDisabled ? ' disabled' : ''}${m.type === 'shared' ? ' shared' : ''}" data-id="${m.id}">
        <div class="member-checkbox">${isSelected ? '✓' : ''}</div>
        <div class="member-icon${m.type === 'other' ? ' other' : ''}">
          <img src="images/characters/${m.gender}/${toImgCode(m.code)}.webp" alt=""
               onerror="this.parentElement.innerHTML='<svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><path d=&quot;M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2&quot;/><circle cx=&quot;12&quot; cy=&quot;7&quot; r=&quot;4&quot;/></svg>'">
        </div>
        <div class="member-info">
          <div class="member-name">${m.name}</div>
          <div class="member-meta">
            <span class="member-code">${m.code}</span>
          </div>
          <div class="member-score-bars">
            ${['O','C','E','A','N'].map(f => {
              const pct = (m.scores[f] / 5) * 100;
              return `<div class="member-sbar"><div class="member-sbar-fill" style="width:${pct}%;background:${traitInfo[f].color}"></div></div>`;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');

  // クリックイベント
  container.querySelectorAll('.member-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else if (selectedIds.size < MAX_MEMBERS) {
        selectedIds.add(id);
      }
      renderMembers();
    });
  });

  // 選択カウンター
  const info = document.getElementById('selectionInfo');
  const count = selectedIds.size;
  if (count === 0) {
    info.innerHTML = `メンバーを選択してください（${MIN_MEMBERS}〜${MAX_MEMBERS}人）`;
  } else if (count >= 6) {
    const commPaths = (count * (count - 1)) / 2;
    info.innerHTML = `
      <span>${count}</span>人選択中（最大${MAX_MEMBERS}人まで）
      <div style="margin-top:10px;padding:12px 14px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:10px;text-align:left;font-size:12px;line-height:1.8;color:#fbbf24;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> <strong>チームの人数について</strong><br>
        <span style="color:var(--dim);">
          心理学の研究では、<strong style="color:var(--text);">5人前後が最も機能しやすいチームサイズ</strong>とされています。
          ${count}人では会話の経路が<strong style="color:var(--text);">${commPaths}通り</strong>に増え、コミュニケーションコストが急増します。<br>
          また「リングルマン効果」により、人数が増えるほど個人の貢献量が下がる傾向があります。
          6人以上では意思決定が遅くなるリスクも高まります。
        </span>
      </div>
    `;
  } else {
    info.innerHTML = `<span>${count}</span>人選択中（最大${MAX_MEMBERS}人まで）`;
  }

  // ボタン有効化
  document.getElementById('analyzeBtn').disabled = count < MIN_MEMBERS;
}

// ===== ポジションアドバイスデータ =====
const improvementTips = {
  O: {
    up: '①普段読まない分野の本や記事に触れてみる。特に文学的フィクションは視点取得能力を高める。②未経験の趣味に挑戦する。「毎日1つ新しいこと」をルールにすると行動確認効果がある。③年齢や職業が異なる人との対話を増やす。④通勤ルートや作業順序など、日常のルーティンを意識的に変える。',
    down: '①毎日同じパターンの生活を避け、意識的に変化を取り入れる。②「自分には才能がない」という固定マインドセットに気づき、「まだ知らないだけ」と捉え直す。③SNSのアルゴリズムに依存せず、異なる情報源に触れる。④失敗を恐れず「間違えても学びがある」と捉える習慣をつける。'
  },
  C: {
    up: '①「朝起きたら(if)ベッドを整える(then)」のように、状況と行動を結びつけるif-thenプランニングを実践。②既存の習慣に新しい行動をくっつける（例：コーヒーを淹れたらタスクを3つ書く）。③2分で終わることは即座にやる。④翌日の優先タスク3つを寝る前に決める。⑤目標を人に伝えて進捗を共有する。',
    down: '①睡眠を7〜9時間確保する。睡眠不足は計画性と自己制御を直接阻害する。②慢性的な過労やバーンアウトに注意する。③スマホの即時報酬に依存しない。④「完璧にできないならやらない」という回避型完璧主義に気づく。⑤やるべきことを3つまで絞る習慣をつける。'
  },
  E: {

  },

  },

// ===== ポジションアドバイス計算 =====
function genPositionAdvice(members, currentScore) {
  const advice = [];

  members.forEach((member, idx) => {
    let bestImprovement = 0;
    let bestFactor = null;
    let bestDirection = 0;

    ['O', 'C', 'E', 'A', 'N'].forEach(f => {
      [-1, 1].forEach(dir => {
        const newScore = Math.max(1, Math.min(5, member.scores[f] + dir));
        if (newScore === member.scores[f]) return;

        const adjustedMembers = members.map((m, i) =>
          i === idx ? { ...m, scores: { ...m.scores, [f]: newScore } } : m
        );
        const { score: newTeamScore } = calcTeamScore(adjustedMembers);
        const improvement = newTeamScore - currentScore;

        if (improvement > bestImprovement) {
          bestImprovement = improvement;
          bestFactor = f;
          bestDirection = dir;
        }
      });
    });

    if (bestFactor && bestImprovement >= 2) {
      advice.push({
        name: member.name,
        factor: bestFactor,
        factorName: traitInfo[bestFactor].name,
        improvement: bestImprovement,
        text: `${traitInfo[bestFactor].name}を${bestDirection > 0 ? '<b>伸ばす</b>' : '<b>他に活かす</b>'}ことでチームスコアが<b>+${bestImprovement}点</b>になります`,
        tipKey: bestFactor,
        tipDir: bestDirection > 0 ? 'up' : 'down'
      });
    } else {
      advice.push({
        name: member.name,
        text: '現在の特性はチームに良い影響を与えています',
        factor: null, tipKey: null
      });
    }
  });

  return advice;
}

// ===== チームスコア計算 =====
function calcTeamScore(members) {
  const factors = ['O', 'C', 'E', 'A', 'N'];
  const n = members.length;

  // 平均
  const avg = {};
  factors.forEach(f => {
    avg[f] = members.reduce((sum, m) => sum + m.scores[f], 0) / n;
  });

  // 分散
  const variance = {};
  factors.forEach(f => {
    variance[f] = members.reduce((sum, m) => sum + (m.scores[f] - avg[f]) ** 2, 0) / n;
  });

  // 最小値・最大値（視覚化用）
  const min = {}, max = {};
  factors.forEach(f => {
    min[f] = Math.min(...members.map(m => m.scores[f]));
    max[f] = Math.max(...members.map(m => m.scores[f]));
  });

  // チームスコア計算
  let raw = 50;

  // ポジティブ要因
  raw += avg.C * 7;       // C高＝実行力プラス
  raw += avg.A * 7;       // A高＝協調性プラス
  raw += variance.O * 1.5; // O分散＝多様性プラス（控えめ）

  // ネガティブ要因
  raw -= variance.C * 3;  // C分散＝生活スタイル不一致マイナス
  raw -= avg.N * 7;       // N高＝ストレスリスクマイナス

  // 「高すぎる」ペナルティ
  if (avg.A >= 4.5) raw -= 5;  // A高すぎ＝グループシンクリスク
  if (avg.C >= 4.5) raw -= 3;  // C高すぎ＝柔軟性不足リスク

  // 多様性ボーナス（3人以上の場合）
  if (n >= 3) {
    const totalVariance = variance.O + variance.E + variance.A;
    raw += Math.min(totalVariance * 0.5, 4);
  }

  // 大人数ペナルティ（5人超：コミュニケーション経路が n*(n-1)/2 通りに急増するため）
  // 5人=10通りを基準に、超過した経路数×1.2点を減算（最大22点）
  if (n > 5) {
    const extraPaths = (n * (n - 1) / 2) - 10;
    raw -= Math.min(extraPaths * 1.2, 22);
  }

  // 2人チームはペア相性を重視
  if (n === 2) {
    const pairScore = calcPairCompatibility(members[0].code, members[1].code);
    raw = raw * 0.4 + pairScore * 0.6;
  }

  // 正規化 0〜100
  const score = Math.max(0, Math.min(100, Math.round(raw)));

  return { score, avg, variance, min, max };
}

// ===== ペア相性計算 =====
function calcPairCompatibility(code1, code2) {
  const [o1, c1, e1, a1, n1] = code1.split('').map(Number);
  const [o2, c2, e2, a2, n2] = code2.split('').map(Number);
  return Math.round(calcCompatCore(
    { O: o1, C: c1, E: e1, A: a1, N: n1 },
    { O: o2, C: c2, E: e2, A: a2, N: n2 }
  ));
}

// ===== 総合コメント生成 =====
function genSummary(score, avg, variance, bestPair, worstPair, n) {
  let rank, rankClass, summaryText;

  if (score >= 80) {
    rank = 'S'; rankClass = 'rank-s';
    summaryText = '非常に高いチーム相性です。メンバーの強みがうまく補完し合っており、協力して成果を出せる理想的な組成です。';
  } else if (score >= 60) {
    rank = 'A'; rankClass = 'rank-a';
    summaryText = '良好なチーム相性です。お互いの違いを活かしながら、効果的に連携できるチームです。';
  } else if (score >= 40) {
    rank = 'B'; rankClass = 'rank-b';
    summaryText = '普通のチーム相性です。工夫次第で良いチームになります。いくつか注意点を意識しましょう。';
  } else {
    rank = 'C'; rankClass = 'rank-c';
    summaryText = '挑戦的なチーム相性です。個性の違いが大きい分、衝突リスクもありますが、工夫次第で強力なチームになります。';
  }

  // 強み
  const strengths = [];
  if (avg.C >= 3.5) strengths.push('計画性と実行力');
  if (avg.A >= 3.5) strengths.push('チームの和と協力関係');
  if (variance.O >= 0.8) strengths.push('多様な視点からの創造性');
  if (avg.N <= 2.5) strengths.push('精神的な安定性');

  // 注意点
  const cautions = [];
  if (variance.C >= 1.0) cautions.push('生活リズムや計画性の違い');
  if (avg.N >= 3.5) cautions.push('ストレスによる感情的な対立');
  if (avg.A <= 2.5) cautions.push('意見の衝突と意思決定の遅れ');
  if (avg.A >= 4.5) cautions.push('反対意見が出にくい傾向');
  if (avg.C <= 2.5) cautions.push('段取りや計画の不在');
  if (n >= 6) cautions.push(`人数が多い（${n}人）ためコミュニケーションコスト増加`);

  return { rank, rankClass, summaryText, strengths, cautions };
}

// ===== エンタメモード：データ取得 =====
function loadEntertainData(members) {
  let myEq = null, myDt = null;
  try { myEq = JSON.parse(localStorage.getItem('eq_result') || 'null'); } catch(e) {}
  try { myDt = JSON.parse(localStorage.getItem('dark_triad_result') || 'null'); } catch(e) {}
  const otherResults = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');

  return members.map(m => {
    let eq = null, dt = null;
    if (m.type === 'my') {
      eq = myEq;
      dt = myDt;
    } else if (m.type === 'other') {
      const idx = parseInt(m.id.replace('other_', ''));
      if (!isNaN(idx) && otherResults[idx]) {
        eq = otherResults[idx].eq || null;
        dt = otherResults[idx].darkTriad || null;
      }
    }
    return { ...m, eq, dt };
  });
}

// ===== エンタメモード：チームキャラクター判定 =====
function genTeamCharacter(membersWithData) {
  const eqMembers = membersWithData.filter(m => m.eq && m.eq.overall != null);
  const dtMembers = membersWithData.filter(m => m.dt && m.dt.nPct != null);

  const eqAvg = eqMembers.length > 0
    ? eqMembers.reduce((s, m) => s + m.eq.overall, 0) / eqMembers.length
    : null;

  const narcHigh  = dtMembers.filter(m => m.dt.nPct >= 65);
  const machiHigh = dtMembers.filter(m => m.dt.mPct >= 65);
  const psychHigh = dtMembers.filter(m => m.dt.pPct >= 65);
  const anyDtHigh = dtMembers.filter(m => Math.max(m.dt.nPct, m.dt.mPct, m.dt.pPct) >= 65);

  const patterns = [];

  // パターン検出（文脈込み）
  if (machiHigh.length >= 1 && eqAvg !== null && eqAvg >= 3.2) {
    patterns.push({
      type: 'warning',
      text: `${machiHigh.map(m => m.name).join('・')}さんのマキャベリアン傾向と、チームの高いEQが組み合わさると、感情を読む力が一方的に利用される「搾取的ダイナミクス」が生じやすいです。外部交渉では強みになる一方、内部の信頼構築を意識的に行うことが重要です。`
    });
  }

  if (narcHigh.length === 1 && eqMembers.length >= 2 && eqAvg !== null && eqAvg >= 3.2) {
    patterns.push({
      type: 'caution',
      text: `${narcHigh[0].name}さんの強いリーダーシップと、周囲の共感力の高さは、短期的なプロジェクトで非常に効果的です。ただし長期になると「引っ張られ疲れ」が起きやすいため、定期的に役割と貢献を再確認しましょう。`
    });
  }

  if (narcHigh.length >= 2) {
    patterns.push({
      type: 'warning',
      text: `強いリーダーシップ傾向を持つメンバーが複数いるチームです。方向性が合っているうちは突破力がありますが、意見が割れたときの内部対立リスクが高くなります。意思決定フローを明文化しておくことが有効です。`
    });
  }

  if (eqAvg !== null && eqAvg >= 3.5 && anyDtHigh.length === 0 && dtMembers.length >= Math.floor(membersWithData.length / 2)) {
    patterns.push({
      type: 'positive',
      text: `EQが高く、ダークトライアド傾向が低い組み合わせは「長期的に持続するチーム」の典型パターンです。信頼関係が自然に育ちやすく、メンバーの定着率も高くなる傾向があります。`
    });
  }

  if (eqAvg !== null && eqAvg >= 4.0 && anyDtHigh.length === 0) {
    patterns.push({
      type: 'caution',
      text: `全体的にEQが高いチームは、互いに気を遣い合うあまり「創造的な対立」が起きにくくなることがあります。意図的に反論役（デビルズアドボケイト）を設けるなど、建設的な摩擦を生む仕組みを作ると効果的です。`
    });
  }

  if (psychHigh.length >= 1 && eqAvg !== null && eqAvg >= 3.0) {
    patterns.push({
      type: 'caution',
      text: `高ストレス環境での冷静な判断力が強みになりうる一方、長期的なチームの信頼関係が傷つきやすいパターンです。短期・危機対応に強い反面、継続的な関係構築には工夫が必要です。`
    });
  }

  // チームタイプ決定
  let typeName = null, typeDesc = null;
  if (eqMembers.length === 0 && dtMembers.length === 0) {
    typeName = null;
  } else if (eqAvg !== null && eqAvg >= 3.5 && anyDtHigh.length === 0 && dtMembers.length >= 1) {
    typeName = '安定・持続型';
    typeDesc = '感情的な共感力が高く、ダークトライアド傾向も低い組み合わせです。長期プロジェクトや信頼を要する仕事で真価を発揮します。急成長よりも着実な積み上げが得意です。';
  } else if (eqAvg !== null && eqAvg >= 4.0) {
    typeName = '調和型';
    typeDesc = '感情知性が高く、対立をうまく収められるチームです。人間関係のトラブルが少なく、相談しやすい空気があります。意見を積極的に言い合える場を作ると、さらに力が伸びます。';
  } else if (machiHigh.length >= 1 && eqAvg !== null && eqAvg >= 3.0) {
    typeName = '戦略×共感型';
    typeDesc = '交渉力・洞察力と人への共感力が混在したチームです。外部との折衝や組織政治で強みを発揮します。内部の信頼構築が最大の課題であり、成長のカギです。';
  } else if (narcHigh.length >= 1 && eqAvg !== null && eqAvg >= 2.5) {
    typeName = 'エネルギー型';
    typeDesc = '強い推進力と共感力が混在したチームです。短期的な成果を出すのが得意で、場の勢いを作れます。長期的にはエネルギーの持続性を意識した役割分担が鍵になります。';
  } else if (anyDtHigh.length >= 2) {
    typeName = '競争型';
    typeDesc = '個性と主張の強いメンバーが集まったチームです。明確なルール・役割・評価基準を設けることで、競争が内部崩壊ではなく成果に向かいます。';
  } else if (eqAvg !== null && eqAvg >= 2.5) {
    typeName = 'バランス型';
    typeDesc = '多様な特性が混在したチームです。状況に応じて役割を柔軟に変えられる適応力があります。';
  } else {
    typeName = 'データ収集中';
    typeDesc = 'まだ診断データが少ないため、より詳しい分析にはEQ・ダークトライアド診断を増やしてみてください。';
  }

  return { typeName, typeDesc, patterns, eqAvg, eqCount: eqMembers.length, dtCount: dtMembers.length };
}

// ===== エンタメモード：HTML生成 =====
function genEntertainHtml(membersWithData, character) {
  const hasAny = membersWithData.some(m => m.eq || m.dt);

  if (!hasAny) {
    const memberCount = membersWithData.length;
    return `
      <div class="entertain-card">
        <div class="entertain-header">
          <span class="entertain-label">エンタメモード</span>
        </div>
        <div class="entertain-no-data" style="margin-top:12px;">
          <p>このチームメンバーのEQ・ダークトライアド診断データがまだありません。</p>
          <p style="margin-top:8px;"><a href="eq.html">EQ診断を受ける →</a>　<a href="dark-triad.html">ダークトライアド診断を受ける →</a></p>
          <p style="margin-top:8px;font-size:11px;">※ あの人のデータは「あの人のEQ診断」「あの人のダークトライアド診断」から追加できます</p>
        </div>
      </div>
    `;
  }

  // チームタイプ
  const typeHtml = character.typeName ? `
    <div class="entertain-type-wrap">
      <p class="entertain-type-label">チームキャラクター</p>
      <p class="entertain-type-name">${character.typeName}</p>
      <p class="entertain-type-desc">${character.typeDesc}</p>
    </div>
  ` : '';

  // パターンコメント
  const patternsHtml = character.patterns.length > 0 ? `
    <div class="entertain-patterns">
      ${character.patterns.map(p => `<div class="entertain-pattern ${p.type}">${p.text}</div>`).join('')}
    </div>
  ` : '';

  // メンバー別
  const membersHtml = membersWithData.map(m => {
    if (!m.eq && !m.dt) return '';
    const bars = [];
    if (m.eq && m.eq.overall != null) {
      const pct = ((m.eq.overall - 1) / 4) * 100;
      bars.push(`
        <div class="entertain-mini-row">
          <span class="entertain-mini-label">EQ</span>
          <div class="entertain-mini-track"><div class="entertain-mini-fill" style="width:${pct}%;background:#d946ef;"></div></div>
          <span class="entertain-mini-val">${m.eq.levelName || m.eq.overall.toFixed(1)}</span>
        </div>
      `);
    }
    if (m.dt) {
      [['N', 'ナルシシズム', '#f97316', m.dt.nPct],
       ['M', 'マキャベリアン', '#ef4444', m.dt.mPct],
       ['P', 'サイコパシー', '#8b5cf6', m.dt.pPct]].forEach(([key, label, color, val]) => {
        if (val == null) return;
        bars.push(`
          <div class="entertain-mini-row">
            <span class="entertain-mini-label" title="${label}">${label}</span>
            <div class="entertain-mini-track"><div class="entertain-mini-fill" style="width:${val}%;background:${color};"></div></div>
            <span class="entertain-mini-val">${val}%</span>
          </div>
        `);
      });
    }
    return `
      <div class="entertain-member-row">
        <div class="entertain-member-name">${m.name}</div>
        <div class="entertain-mini-bars">${bars.join('')}</div>
      </div>
    `;
  }).filter(Boolean).join('');

  const dataNote = [];
  if (character.eqCount > 0) dataNote.push(`EQデータ: ${character.eqCount}人`);
  if (character.dtCount > 0) dataNote.push(`ダークトライアドデータ: ${character.dtCount}人`);

  return `
    <div class="entertain-card">
      <div class="entertain-header">
        <span class="entertain-label">エンタメモード</span>
      </div>
      <p class="entertain-disclaimer">※ EQ・ダークトライアドは自己申告値で測定誤差があります。エンタメ・参考値としてお楽しみください。（${dataNote.join('・')}）</p>
      ${typeHtml}
      ${patternsHtml}
      ${membersHtml ? `<p class="entertain-members-title">メンバー別データ</p>${membersHtml}` : ''}
    </div>
  `;
}

  if (viewTeamData.teamName) {
    document.getElementById('teamNameInput').value = viewTeamData.teamName;
  }
  renderMembers();
  renderResults();
  // イントロを隠して結果セクションにスクロール
  document.querySelector('.intro').style.display = 'none';
  setTimeout(() => {
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 150);
}
