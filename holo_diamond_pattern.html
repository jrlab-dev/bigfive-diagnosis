<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ホログラム ダイヤモンドパターン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    cursor: crosshair;
  }
  .controls {
    position: fixed;
    bottom: 20px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  label {
    color: #888;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  input[type=range] { width: 100px; cursor: pointer; }
  .hint {
    position: fixed;
    top: 16px;
    color: #444;
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<p class="hint">HOLOGRAPHIC DIAMOND PATTERN — マウスで光の角度が変わります</p>
<canvas id="c"></canvas>

<div class="controls">
  <label>セルサイズ
    <input type="range" id="cellSize" min="8" max="48" value="22">
    <span id="cellSizeVal">22</span>px
  </label>
  <label>速度
    <input type="range" id="speed" min="1" max="20" value="6">
  </label>
  <label>深さ
    <input type="range" id="depth" min="10" max="80" value="40">
  </label>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
let mouseX = 0.5, mouseY = 0.5;
let time = 0;

// パラメータ
let CELL = 22;
let SPEED = 6;
let DEPTH = 40; // 立体感の深さ（%）

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// マウス追従
window.addEventListener('mousemove', e => {
  mouseX = e.clientX / W;
  mouseY = e.clientY / H;
});

// タッチ対応
window.addEventListener('touchmove', e => {
  mouseX = e.touches[0].clientX / W;
  mouseY = e.touches[0].clientY / H;
}, { passive: true });

// ── HSLからRGBへ ──
function hslToRgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

// ── ホログラム色計算 ──
// col, row = グリッド位置
// facet = 0:上 1:下 2:左 3:右
// mx,my = マウス位置(0-1)
// t = 時間
function getHoloColor(col, row, facet, mx, my, t) {
  const cols = Math.ceil(W / CELL) + 1;
  const rows = Math.ceil(H / CELL) + 1;

  // セルの正規化位置
  const nx = col / cols;
  const ny = row / rows;

  // 光の角度（マウスで制御）
  const lightAngle = mx * 360;
  const lightElev  = my * 180;

  // 各面の法線方向に基づく色相オフセット
  const faceOffset = [0, 180, 90, 270][facet];

  // 距離ベースの分散（中心から外に向かって色が変わる）
  const dx = nx - mx;
  const dy = ny - my;
  const dist = Math.sqrt(dx*dx + dy*dy) * 360;

  // 最終的な色相
  const hue = (lightAngle + faceOffset + dist * 0.8 + t * SPEED * 0.3) % 360;

  // 面ごとの明度（立体感）
  const faceLight = [72, 25, 50, 40][facet];

  // マウス距離による彩度
  const sat = 70 + Math.sin(dist * 0.05 + t * 0.02) * 30;

  const [r, g, b] = hslToRgb(hue, sat, faceLight);
  return `rgb(${r},${g},${b})`;
}

// ── ダイヤモンドピラミッドを1セル描画 ──
function drawCell(col, row, cx, cy, t, mx, my) {
  const h = CELL;
  const w = CELL;
  const d = h * (DEPTH / 100); // 中心の凸量（ピクセル）

  // 4隅
  const tl = { x: cx,     y: cy     };
  const tr = { x: cx + w, y: cy     };
  const bl = { x: cx,     y: cy + h };
  const br = { x: cx + w, y: cy + h };
  // 中心（ピラミッドの頂点 → 視点の都合で少し上にオフセット）
  const cc = { x: cx + w/2, y: cy + h/2 - d * 0.3 };

  // ── 上面（トップ三角）──
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y);
  ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(cc.x, cc.y);
  ctx.closePath();
  ctx.fillStyle = getHoloColor(col, row, 0, mx, my, t);
  ctx.fill();

  // ── 下面（ボトム三角）──
  ctx.beginPath();
  ctx.moveTo(bl.x, bl.y);
  ctx.lineTo(br.x, br.y);
  ctx.lineTo(cc.x, cc.y);
  ctx.closePath();
  ctx.fillStyle = getHoloColor(col, row, 1, mx, my, t);
  ctx.fill();

  // ── 左面 ──
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y);
  ctx.moveTo(tl.x, tl.y);
  ctx.lineTo(bl.x, bl.y);
  ctx.lineTo(cc.x, cc.y);
  ctx.closePath();
  ctx.fillStyle = getHoloColor(col, row, 2, mx, my, t);
  ctx.fill();

  // ── 右面 ──
  ctx.beginPath();
  ctx.moveTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y);
  ctx.lineTo(cc.x, cc.y);
  ctx.closePath();
  ctx.fillStyle = getHoloColor(col, row, 3, mx, my, t);
  ctx.fill();
}

// ── メインループ ──
function draw() {
  time++;
  ctx.clearRect(0, 0, W, H);

  const cols = Math.ceil(W / CELL) + 1;
  const rows = Math.ceil(H / CELL) + 1;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const cx = col * CELL;
      const cy = row * CELL;
      drawCell(col, row, cx, cy, time, mouseX, mouseY);
    }
  }

  // 黒のグリッド線（縫い目）
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 0.5;
  for (let row = 0; row <= rows; row++) {
    ctx.beginPath();
    ctx.moveTo(0, row * CELL);
    ctx.lineTo(W, row * CELL);
    ctx.stroke();
  }
  for (let col = 0; col <= cols; col++) {
    ctx.beginPath();
    ctx.moveTo(col * CELL, 0);
    ctx.lineTo(col * CELL, H);
    ctx.stroke();
  }

  // 全体に薄い光沢オーバーレイ
  const gloss = ctx.createRadialGradient(
    mouseX * W, mouseY * H, 0,
    mouseX * W, mouseY * H, Math.max(W, H) * 0.6
  );
  gloss.addColorStop(0, 'rgba(255,255,255,0.07)');
  gloss.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gloss;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

draw();

// ── コントロール ──
document.getElementById('cellSize').addEventListener('input', function() {
  CELL = +this.value;
  document.getElementById('cellSizeVal').textContent = CELL;
});
document.getElementById('speed').addEventListener('input', function() {
  SPEED = +this.value;
});
document.getElementById('depth').addEventListener('input', function() {
  DEPTH = +this.value;
});
</script>
</body>
</html>
