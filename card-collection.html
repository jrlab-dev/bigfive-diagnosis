<script>
(function() {
  'use strict';

  var currentFilter = 'all';
  var ownedCards = [];
  var deleteTarget = null;
  var deleteConfirmStep = 0;

  // レアリティ名マッピング
  var rarityNames = {
    all: 'All',
    r0: 'Normal',
    r1: 'Rare',
    r2: 'Super Rare',
    r3: 'Super Super Rare',
    r4: 'Ultra Rare',
    r5: 'Legendary Rare',
    r6: 'Secret',
    r7: 'Dark Secret'
  };

  // 削除確認モーダル（二重承認）
  var confirmEl = document.getElementById('deleteConfirm');
  var targetEl = document.getElementById('deleteTarget');
  var deleteBtnEl = document.getElementById('deleteBtn');

  document.getElementById('deleteCancel').addEventListener('click', function() {
    confirmEl.classList.remove('show');
    deleteTarget = null;
    deleteConfirmStep = 0;
    deleteBtnEl.textContent = '削除';
    deleteBtnEl.style.background = '#ef4444';
  });

  deleteBtnEl.addEventListener('click', function() {
    if (!deleteTarget || !window.AlbumUtils) return;
    if (deleteConfirmStep === 0) {
      deleteConfirmStep = 1;
      deleteBtnEl.textContent = '本当に削除';
      deleteBtnEl.style.background = '#991b1b';
      return;
    }
    // step 1: 実行
    var cards = AlbumUtils.getAlbumCards();
    cards = cards.filter(function(c) {
      return !(c.code === deleteTarget.code && c.gender === deleteTarget.gender && c.version === deleteTarget.version);
    });
    localStorage.setItem(AlbumUtils.STORAGE_KEY, JSON.stringify(cards));
    confirmEl.classList.remove('show');
    deleteTarget = null;
    deleteConfirmStep = 0;
    deleteBtnEl.textContent = '削除';
    deleteBtnEl.style.background = '#ef4444';
    init();
  });

  function init() {
    if (typeof AlbumUtils !== 'undefined') AlbumUtils.migrateExistingResults();

    // アルバムからカードデータを取得
    var albumCards = (typeof AlbumUtils !== 'undefined') ? AlbumUtils.getAlbumCards() : [];

    // 保存されたrarityが間違っている可能性があるため、コードから再計算
    albumCards.forEach(function(card) {
      var correctRarity = (card.version === '10') ? 'r0' : computeRarity(card.code);
      if (card.isHidden && card.hiddenId) correctRarity = 'r6';
      card.rarity = correctRarity;
    });

    ownedCards = albumCards;

    // 進捗表示
    var ownedCount = albumCards.length;
    document.getElementById('progressText').textContent = ownedCount.toLocaleString() + ' / 8,298 枚コレクト';
    document.getElementById('progressBar').style.width = Math.min(ownedCount / 8298 * 100, 100).toFixed(1) + '%';

    // フィルタータブ
    document.querySelectorAll('.filter-tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        // レアリティ名を表示
        var rarityNameEl = document.getElementById('rarityName');
        if (rarityNameEl && rarityNames[currentFilter]) {
          rarityNameEl.textContent = rarityNames[currentFilter];
        }
        render();
      });
    });

    render();
  }

  function applyFilter() {
    if (currentFilter === 'all') {
      return ownedCards;
    }
    return ownedCards.filter(function(c) {
      return c.rarity === currentFilter;
    });
  }

  function render() {
    var grid = document.getElementById('cardGrid');
    var countEl = document.getElementById('countLabel');
    var filtered = applyFilter();

    countEl.textContent = filtered.length + '枚';

    // グリッド描画
    grid.innerHTML = '';
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state">カードがありません<br>診断を受けてカードをゲットしよう！</div>';
      return;
    }

    filtered.forEach(function(card) {
      // 保存されたrarityではなくコードから正しいrarityを再計算
      var correctRarity = (card.version === '10') ? 'r0' : computeRarity(card.code);
      if (card.isHidden && card.hiddenId) correctRarity = 'r6'; // Secret
      card.rarity = correctRarity;

      var el = document.createElement('a');
      el.className = 'collection-card rarity-' + card.rarity;
      el.href = 'result.html?type=' + card.code + '&v=' + (card.version || '10') + '&gender=' + card.gender + '&saved=1';

      // 長押しで削除
      var timer = null;
      el.addEventListener('touchstart', function(e) {
        timer = setTimeout(function() {
          e.preventDefault();
          deleteTarget = card;
          targetEl.textContent = card.code + (card.gender === 'M' ? ' ♂' : ' ♀') + ' (' + (card.rarity || '?') + ')';
          confirmEl.classList.add('show');
        }, 1000);
      }, { passive: true });
      el.addEventListener('touchend', function() { clearTimeout(timer); });
      el.addEventListener('touchmove', function() { clearTimeout(timer); });
      el.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        deleteTarget = card;
        targetEl.textContent = card.code + (card.gender === 'M' ? ' ♂' : ' ♀') + ' (' + (card.rarity || '?') + ')';
        confirmEl.classList.add('show');
      });

      var img = document.createElement('img');
      img.src = 'https://bigfive.jr-genius.jp/ogp-image?code=' + card.code + '&gender=' + card.gender + '&rarity=' + card.rarity;
      img.loading = 'lazy';
      img.alt = '';

      var label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = card.code + (card.gender === 'M' ? ' ♂' : ' ♀');

      el.appendChild(img);
      el.appendChild(label);
      grid.appendChild(el);
    });
  }

  init();
})();

// ===== 機能解放マップ =====
(function() {
  if (typeof UNLOCK_TABLE === 'undefined') return;
  var cardCount = typeof getCardCount === 'function' ? getCardCount() : 0;
  var legacy = typeof isLegacyUser === 'function' && isLegacyUser();
  // Stage 2 範囲：25〜99枚の機能のみ表示（urlありのもの）
  var features = UNLOCK_TABLE.filter(function(e) {
    return e.cards >= 25 && e.cards <= 99 && e.url;
  });
  var html = '';
  features.forEach(function(f) {
    var unlocked = legacy || cardCount >= f.cards;
    var remaining = f.cards - cardCount;
    var link = unlocked ? '<a class="umap-link" href="' + f.url + '">' : '<span class="umap-link">';
    var linkClose = unlocked ? '</a>' : '</span>';
    html += '<div class="umap-row ' + (unlocked ? 'umap-unlocked' : 'umap-locked') + '">'
      + link
      + '<div class="umap-count">' + f.cards + '枚</div>'
      + '<div class="umap-name">' + f.label + '</div>'
      + linkClose
      + '<div class="umap-status">' + (unlocked ? '解放済み' : 'あと' + remaining + '枚') + '</div>'
      + '</div>';
  });
  var el = document.getElementById('unlockMapList');
  if (el) el.innerHTML = html;
})();
</script>
