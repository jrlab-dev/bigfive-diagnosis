// ===== 質問配列構築 =====
function buildQuestions(ver){
  var qs=[];
  var src=(ver===291)?DATA_291:DATA_60;
  TYPE_KEYS.forEach(function(t){
    SECTION_NAMES.forEach(function(sec){
      var items=src[t][sec];
      var limit=(ver===291)?items.length:items.length;
      for(var i=0;i<limit;i++){
        var text=items[i];
        qs.push({text:text,type:t,section:sec});
      }
    });
  });
  return qs;
}

// ===== クイズ開始 =====
function startQuiz(ver){
  version=ver;
  PROGRESS_KEY='riasec_progress_'+(ver===291?'full':'short');
  questions=buildQuestions(ver);
  current=0;
  answers=new Array(questions.length).fill(null);
  currentSection=questions[0].section;
  document.getElementById('introArea').style.display='none';
  document.getElementById('progressArea').style.display='block';
  document.getElementById('questionArea').style.display='block';
  showQuestion();
}

// ===== セクション遷移 =====
function showSectionIntro(){
  var sec=questions[current].section;
  if(sec===currentSection) return false;
  currentSection=sec;
  var el=document.getElementById('sectionIntro');
  var secIdx=SECTION_NAMES.indexOf(sec)+1;
  el.innerHTML='<div class="sec-label">セクション '+secIdx+' / 3</div>'+
    '<h2>'+SECTION_LABELS[sec]+'について聞きます</h2>'+
    '<p>'+(sec==='activity'?'日々の活動について、どれくらい好きかをお答えください。':sec==='competency'?'ご自身の能力や得意なことについてお答えください。':'様々な職業への興味の有無をお答えください。')+'</p>'+
    '<button class="sec-btn" onclick="hideSectionIntro()">続ける</button>';
  el.classList.add('show');
  document.getElementById('questionArea').style.display='none';
  document.getElementById('progressArea').style.display='none';
  return true;
}
function hideSectionIntro(){
  document.getElementById('sectionIntro').classList.remove('show');
  document.getElementById('questionArea').style.display='block';
  document.getElementById('progressArea').style.display='block';
  showQuestion();
}

// ===== 質問表示 =====
function showQuestion(){
  if(showSectionIntro()) return;
  var q=questions[current];
  var pct=Math.round((current/questions.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=(current+1)+' / '+questions.length+(version===291?' ('+SECTION_LABELS[q.section]+')':'');

  var fl=document.getElementById('qFactorLabel');
  var ti=TYPE_INFO[q.type];
  fl.textContent=ti.name;
  fl.style.background=ti.color+'18';
  fl.style.color=ti.color;
  fl.style.border='1px solid '+ti.color+'40';

  document.getElementById('qNumber').textContent='Q'+(current+1);
  document.getElementById('qText').textContent=q.text;

  var labelsDiv=document.getElementById('answerLabels');
  labelsDiv.innerHTML='';
  var labels=ANSWER_SETS[q.section]||ANSWER_SETS.activity;
  labels.forEach(function(lb){
    var sp=document.createElement('span');
    sp.textContent=lb.replace(/\n/g,'');
    labelsDiv.appendChild(sp);
  });

  var area=document.getElementById('answersArea');
  area.innerHTML='';
  [1,2,3,4,5].forEach(function(val){
    var btn=document.createElement('button');
    btn.className='answer-btn'+(answers[current]===val?' selected':'');
    btn.innerHTML='<span style="font-size:16px;font-weight:700;">'+val+'</span><span class="answer-label">'+labels[val-1]+'</span>';
    btn.addEventListener('click',function(){selectAnswer(val);});
    area.appendChild(btn);
  });

  document.getElementById('backBtn').style.visibility=current>0?'visible':'hidden';
}

// ===== 回答選択 =====
function selectAnswer(val){
  if(timer) return;
  answers[current]=val;
  document.querySelectorAll('.answer-btn').forEach(function(b,i){
    b.classList.toggle('selected',i+1===val);
  });
  timer=setTimeout(function(){
    timer=null;
    document.querySelectorAll('.answer-btn').forEach(function(b){b.classList.remove('selected');});
    current++;
    saveProgress();
    if(current>=questions.length){
      clearProgress();
      showLoading();
    } else {
      showQuestion();
    }
  },280);
}

// ===== 戻る =====
function goBack(){
  if(timer){clearTimeout(timer);timer=null;}
  if(current>0){current--;showQuestion();}
}

// ===== ローディング =====
function showLoading(){
  document.getElementById('questionArea').style.display='none';
  document.getElementById('progressArea').style.display='none';
  document.getElementById('loadingArea').classList.add('active');
  setTimeout(function(){
    document.getElementById('loadingArea').classList.remove('active');
    showResult();
  },1800);
}

// ===== スコア計算 =====
function calcScores(){
  var sums={R:0,I:0,A:0,S:0,E:0,C:0};
  var counts={R:0,I:0,A:0,S:0,E:0,C:0};
  questions.forEach(function(q,i){
    var val=answers[i]||3;
    sums[q.type]+=val;
    counts[q.type]++;
  });
  var result={};
  TYPE_KEYS.forEach(function(t){result[t]={sum:sums[t],count:counts[t],avg:counts[t]>0?(sums[t]/counts[t]):0};});
  var sorted=TYPE_KEYS.slice().sort(function(a,b){return result[b].avg-result[a].avg;});
  result.code=sorted[0]+sorted[1]+sorted[2];
  result.sorted=sorted;
  return result;
}

// ===== 結果表示 =====
function showResult(preScores){
  document.getElementById('loadingArea').style.display='none';
  var scores=preScores||calcScores();
  var container=document.getElementById('resultArea');
  container.style.display='flex';
  container.style.flexDirection='column';
  container.style.alignItems='center';
  container.style.gap='12px';

  var code=scores.code;
  var sorted=scores.sorted;
  var maxAvg=scores[sorted[0]].avg;

  var html='';

  // ヘッダー
  html+='<div style="text-align:center;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06);width:100%;">';
  html+='<span class="result-badge">RIASEC 職業興味診断</span>';
  html+='<div class="holland-code">';
  for(var i=0;i<3;i++){
    var t=code[i];
    html+='<span style="color:'+TYPE_INFO[t].color+';">'+t+'</span>';
  }
  html+='</div>';
  html+='<p class="code-desc">あなたのHollandコードは <strong>'+code+'</strong>（'+TYPE_INFO[code[0]].name+'・'+TYPE_INFO[code[1]].name+'・'+TYPE_INFO[code[2]].name+'）です。</p>';
  html+='</div>';

  // 6タイプスコアバー
  html+='<div class="factor-box">';
  html+='<div style="font-size:13px;font-weight:700;margin-bottom:12px;">6タイプのスコア</div>';
  TYPE_KEYS.forEach(function(t){
    var avg=scores[t].avg;
    var pct=Math.round((avg/5)*100);
    html+='<div class="factor-row">';
    html+='<span class="factor-label" style="color:'+TYPE_INFO[t].color+';">'+TYPE_INFO[t].name+'</span>';
    html+='<div class="factor-bar-bg"><div class="factor-bar-fill" data-pct="'+pct+'" style="background:'+TYPE_INFO[t].color+';"></div></div>';
    html+='<span class="factor-score" style="color:'+TYPE_INFO[t].color+';">'+avg.toFixed(1)+'</span>';
    html+='</div>';
  });
  html+='</div>';

  // 上位3タイプ解説
  html+='<div style="font-size:15px;font-weight:900;margin:16px 0 8px;width:100%;">あなたの上位タイプ</div>';
  html+='<div class="type-cards">';
  for(var i=0;i<3;i++){
    var t=code[i];
    var ti=TYPE_INFO[t];
    html+='<div class="type-card" style="border-top:3px solid '+ti.color+';">';
    html+='<h3 style="color:'+ti.color+';">'+ti.name+'（'+ti.short+'）'+(i===0?' — 最も強い':'')+'</h3>';
    html+='<div class="type-catch" style="color:'+ti.color+';">'+ti.catch+'</div>';
    html+='<p>'+ti.desc+'</p>';
    html+='</div>';
  }
  html+='</div>';

  // 適職提案
  var code2=code[0]+code[1];
  var code2r=code[1]+code[0];
  var careers=CAREER_MAP[code2]||CAREER_MAP[code2r]||CAREER_MAP[code[0]]||[];
  var primaryCareers=CAREER_MAP[code[0]]||[];
  var allCareers=careers.slice();
  primaryCareers.forEach(function(c){if(allCareers.indexOf(c)===-1)allCareers.push(c);});
  allCareers=allCareers.slice(0,15);

  html+='<div class="career-section">';
  html+='<h3>あなたに合う職業</h3>';
  html+='<div class="career-grid">';
  allCareers.forEach(function(c){html+='<span class="career-tag">'+c+'</span>';});
  html+='</div>';
  html+='</div>';

  // Big Fiveクロス分析
  var bfList=JSON.parse(localStorage.getItem('bigfive_my_results')||'[]');
  var bfResult=bfList.length>0?bfList[0]:null;
  if(bfResult&&bfResult.scores){
    var bf=bfResult.scores;
    html+='<div style="font-size:15px;font-weight:900;margin:16px 0 8px;width:100%;">ビッグファイブ × RIASEC</div>';
    CROSS_PATTERNS.forEach(function(p){
      if(p.cond(bf,code)) html+='<div class="cross-box"><h3>クロス分析</h3><p>'+p.msg+'</p></div>';
    });
  }

  // ナビ
  html+='<div class="nav-btns">';
  html+='<a href="career.html" class="nav-btn primary">キャリア適性診断を見る</a>';
  html+='<a href="quiz.html?v=10" class="nav-btn">ビッグファイブ診断を受ける</a>';
  html+='<button class="nav-btn" onclick="retry()">もう一度受ける</button>';
  html+='<a href="index.html" class="nav-btn">トップに戻る</a>';
  html+='</div>';

  // 免責
  html+='<div class="disclaimer">この診断はHolland（1959, 1997）のRIASEC理論に基づく参考情報です。結果は自己理解の一助であり、職業選択を確定するものではありません。個人の適性は経験や環境によって変化します。専門のキャリアカウンセラーとの併用をお勧めします。</div>';

  container.innerHTML=html;

  // バーアニメーション
  setTimeout(function(){
    document.querySelectorAll('.factor-bar-fill').forEach(function(el){
      el.style.width=el.getAttribute('data-pct')+'%';
    });
  },100);

  // localStorage保存
  if(!preScores){
    localStorage.setItem(STORAGE_KEY,JSON.stringify({scores:scores,version:version,timestamp:Date.now()}));
  }
}

// ===== リトライ =====
function retry(){
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('resultArea').style.display='none';
  document.getElementById('introArea').style.display='flex';
  current=0;answers=[];
  window.scrollTo(0,0);
}

// ===== 途中から再開 =====
function resumeQuiz(ver,pKey){
  var progress=localStorage.getItem(pKey);
  if(!progress){startQuiz(ver);return;}
  try{
    var pData=JSON.parse(progress);
    version=ver;
    PROGRESS_KEY=pKey;
    questions=buildQuestions(ver);
    current=pData.current||0;
    answers=pData.answers||new Array(questions.length).fill(null);
    currentSection=questions[current].section;
    document.getElementById('introArea').style.display='none';
    document.getElementById('progressArea').style.display='block';
    document.getElementById('questionArea').style.display='block';
    showQuestion();
  }catch(e){startQuiz(ver);}
}

// ===== やり直し =====
function restartQuiz(ver,pKey,btn){
  localStorage.removeItem(pKey);
  var box=btn.closest('.resume-box');
  if(box) box.remove();
  startQuiz(ver);
}

// ===== 進捗保存 =====
function saveProgress(){
  if(!PROGRESS_KEY) return;
  localStorage.setItem(PROGRESS_KEY,JSON.stringify({current:current,answers:answers}));
}
function clearProgress(){
  if(!PROGRESS_KEY) return;
  localStorage.removeItem(PROGRESS_KEY);
}

// ===== 初期化 =====
(function(){
  var urlParams=new URLSearchParams(location.search);
  var vParam=urlParams.get('v');

  // 保存済み結果の復元
  var saved=localStorage.getItem(STORAGE_KEY);
  if(saved){
    try{
      var data=JSON.parse(saved);
      if(data.scores){
        document.getElementById('introArea').style.display='none';
        showResult(data.scores);
        return;
      }
    }catch(e){}
  }

  // 途中保存の復元
  if(vParam){
    var ver=parseInt(vParam);
    if(ver===60||ver===291){
      var pKey='riasec_progress_'+(ver===291?'full':'short');
      var progress=localStorage.getItem(pKey);
      if(progress){
        try{
          var pData=JSON.parse(progress);
          version=ver;
          PROGRESS_KEY=pKey;
          questions=buildQuestions(ver);
          current=pData.current||0;
          answers=pData.answers||new Array(questions.length).fill(null);
          currentSection=questions[current].section;
          document.getElementById('introArea').style.display='none';
          document.getElementById('progressArea').style.display='block';
          document.getElementById('questionArea').style.display='block';
          showQuestion();
          return;
        }catch(e){}
      }
      startQuiz(ver);
    }
  }

  // イントロ画面に再開プロンプト表示（3問以上回答時のみ）
  [{ver:60,key:'riasec_progress_short'},{ver:291,key:'riasec_progress_full'}].forEach(function(cfg){
    try{
      var raw=localStorage.getItem(cfg.key);
      if(!raw) return;
      var pd=JSON.parse(raw);
      if(!pd.answers) return;
      var done=pd.answers.filter(function(a){return a!==null;}).length;
      if(done<3){localStorage.removeItem(cfg.key);return;}
      var total=pd.answers.length;
      var introEl=document.getElementById('introArea');
      var box=document.createElement('div');
      box.className='resume-box';
      box.innerHTML='<div class="resume-label">SAVED PROGRESS</div>'+
        '<div class="resume-info">'+cfg.ver+'問版：'+done+' / '+total+' 問回答済み</div>'+
        '<div class="resume-detail">前回の途中経過が保存されています</div>'+
        '<div class="resume-btns">'+
          '<button class="resume-btn primary" onclick="resumeQuiz('+cfg.ver+',\''+cfg.key+'\')">続きから始める</button>'+
          '<button class="resume-btn secondary" onclick="restartQuiz('+cfg.ver+',\''+cfg.key+'\',this)">最初からやり直す</button>'+
        '</div>';
      introEl.insertBefore(box,introEl.querySelector('.ver-cards'));
    }catch(e){}
  });
})();
</script>
