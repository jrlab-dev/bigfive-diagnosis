// ===== Big Fiveマッチング（Barrick & Mount 1991 回帰係数方式） =====
function matchPct(user,item){
  var b=item.betas,score=0,maxScore=0;
  var POS=['O','C','E','A'];
  for(var i=0;i<POS.length;i++){
    var k=POS[i],bk=b[k]||0;
    score+=bk*((user[k]||3)-1);
    if(bk>0) maxScore+=bk*4;
  }
  var bES=b.ES||0;
  score+=bES*(5-(user.N||3));
  if(bES>0) maxScore+=bES*4;
  if(maxScore===0) return 50;
  return Math.max(5,Math.min(100,Math.round(30+70*(score/maxScore))));
}

function rankItems(user,list){
  return list.map(function(item){
    return {item:item,pct:matchPct(user,item)};
  }).sort(function(a,b){return b.pct-a.pct;});
}

// ===== RIASECマッチング =====
var RIASEC_MAX_DIST=Math.sqrt(6*16);

function riasecMatchPct(user,ideal){
  var sumSq=0;
  for(var i=0;i<RIASEC_KEYS.length;i++){
    var diff=(user[RIASEC_KEYS[i]]||3)-ideal[RIASEC_KEYS[i]];
    sumSq+=diff*diff;
  }
  return Math.max(1,Math.round((1-Math.sqrt(sumSq)/RIASEC_MAX_DIST)*100));
}

function rankItemsRIASEC(userScores){
  return JOB_TYPES.map(function(job){
    return {item:job,pct:riasecMatchPct(userScores,RIASEC_IDEALS[job.id])};
  }).sort(function(a,b){return b.pct-a.pct;});
}

// ===== アーキタイプ選択 =====
function pickArchetypes(scores){
  var matched=[];
  for(var i=0;i<ARCHETYPES.length;i++){
    if(ARCHETYPES[i].cond(scores)) matched.push(ARCHETYPES[i]);
    if(matched.length>=2) break;
  }
  if(matched.length===0){
    var scored=ARCHETYPES.map(function(a){
      var s=0;
      if(scores.C>=3) s++;
      if(scores.E>=3) s++;
      if(scores.O>=3) s++;
      if(scores.A>=3) s++;
      if(scores.N>=3) s++;
      return {a:a,s:s};
    }).sort(function(a,b){return b.s-a.s;});
    matched=[scored[0].a];
    if(scored.length>1&&scored[1].s===scored[0].s) matched.push(scored[1].a);
  }
  return matched.slice(0,2);
}

// ===== 統合スコア =====
var INTEGRATION_WEIGHT=0.25;

function computeIntegrated(bfScores,riasecScores){
  var RIASEC_THRESHOLD=60;
  return JOB_TYPES.map(function(job){
    var bfPct=matchPct(bfScores,job);
    var riasecPct=riasecMatchPct(riasecScores,RIASEC_IDEALS[job.id]);
    var modifier=(riasecPct-RIASEC_THRESHOLD)*INTEGRATION_WEIGHT;
    var finalPct=Math.max(1,Math.min(100,Math.round(bfPct+modifier)));
    var tag;
    if(riasecPct>=RIASEC_THRESHOLD&&bfPct>=60) tag='aptitude_interest';
    else if(bfPct>=60) tag='aptitude_main';
    else if(riasecPct>=RIASEC_THRESHOLD) tag='interest_plus';
    else tag='neutral';
    return {item:job,bfPct:bfPct,riasecPct:riasecPct,finalPct:finalPct,modifier:Math.round(modifier*10)/10,tag:tag};
  }).sort(function(a,b){return b.finalPct-a.finalPct;});
}

  if(btn.disabled) return;
  btn.disabled=true;
  btn.textContent='分析中...';

  var tc=document.querySelector('.two-col-container');
  var overlay=document.createElement('div');
  overlay.className='integration-loading';
  overlay.innerHTML='<div class="loading-spinner"></div><div class="loading-text">2つの軸を統合して最適解を計算中<span class="thinking-dots"></span></div>';

    overlay.remove();

}
