<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャラクター台帳｜ビッグファイブ診断</title>
<meta name="description" content="ビッグファイブ診断で使う3125種類のキャラクター画像を管理する内部用のキャラクター台帳。コード・名前で検索し、10問版・30問版・120問版ごとの画像対応状況を一覧で確認できます。">
<style>
  *{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;margin:0;background:#f8fafc;color:#0f172a}header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 18px}h1{font-size:20px;margin:0 0 10px}.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.tools input,.tools select,.tools button{padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;background:#fff}.tools button{cursor:pointer;font-weight:700}.count{font-size:13px;color:#64748b}.wrap{padding:16px}.row{background:#fff;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:14px;overflow:hidden}.row-head{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:10px 12px;background:#f1f5f9;border-bottom:1px solid #e2e8f0}.code{font-weight:800;font-size:18px}.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:999px;background:#e2e8f0;color:#334155;margin-left:6px}.badge.exact{background:#fee2e2;color:#991b1b}.name{font-size:13px;color:#475569}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:12px}@media(max-width:900px){.grid{grid-template-columns:1fr}}.gender{border:1px solid #e2e8f0;border-radius:8px;padding:10px}.gender h2{font-size:14px;margin:0 0 8px}.imgs{display:grid;grid-template-columns:repeat(6,minmax(90px,1fr));gap:8px}.cell{border:1px solid #e2e8f0;border-radius:6px;background:#fff;min-height:128px;padding:6px;display:flex;flex-direction:column;gap:5px}.cell b{font-size:11px;color:#334155}.cell img{width:100%;height:96px;object-fit:contain;background:#f8fafc;border-radius:4px}.cell.card img{height:96px;object-fit:cover}.missing{height:96px;display:flex;align-items:center;justify-content:center;background:#f1f5f9;color:#94a3b8;border-radius:4px;font-size:12px}.path{font-size:10px;color:#64748b;word-break:break-all;line-height:1.3}.legend{font-size:12px;color:#475569;margin-top:8px;line-height:1.6}.warn{color:#b91c1c;font-weight:700}.more{display:flex;justify-content:center;padding:0 16px 24px}.more button{padding:10px 18px;border:1px solid #94a3b8;border-radius:6px;background:#fff;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>キャラクター台帳</h1>
  <div class="tools"><input id="q" placeholder="コード・名前で検索 例: 53551" autocomplete="off"><select id="filter"><option value="all">すべて</option><option value="exact">ドンピシャ画像あり</option><option value="rounded-code">1/3/5コード</option><option value="full-code">2/4を含むコード</option></select><button id="resetLimit" type="button">先頭20件</button><span class="count" id="count"></span></div>
  <div class="legend">10問版は丸め画像固定。30問版・120問版はドンピシャ画像があれば優先、なければ通常/丸め画像。カード画像は図鑑で使うOGPカードの確認用です。</div>
</header>
<div class="wrap" id="app">読み込み中...</div><div class="more" id="moreWrap" style="display:none"><button id="moreBtn" type="button">さらに20件表示</button></div>
<script>
const app=document.getElementById('app'), q=document.getElementById('q'), filter=document.getElementById('filter'), count=document.getElementById('count'), moreWrap=document.getElementById('moreWrap'), moreBtn=document.getElementById('moreBtn'), resetLimit=document.getElementById('resetLimit');let rows=[],visibleLimit=20;
function imgCell(label, src, isCard){return `<div class="cell${isCard?' card':''}"><b>${label}</b>${src?`<img src="${src}" alt="${label}" loading="lazy" decoding="async" fetchpriority="low" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'missing',textContent:'なし'}))">`}:`<div class="missing">なし</div>`}<div class="path">${src||''}</div></div>`;}
function genderBlock(code,g,d){return `<section class="gender"><h2>${g==='F'?'女性 F':'男性 M'}</h2><div class="imgs">${imgCell('丸め画像',d.roundedImage,false)}${imgCell('通常/完全一致',d.fullImage,false)}${imgCell('ドンピシャ画像',d.exactImage,false)}${imgCell('10問カード',d.card10,true)}${imgCell('30問カード',d.card30,true)}${imgCell('120問カード',d.card120,true)}</div><div class="legend">実表示: 10問=${d.display10||'なし'} / 30問=${d.display30||'なし'} / 120問=${d.display120||'なし'}</div></section>`;}
function filteredRows(){const term=q.value.trim().toLowerCase();const f=filter.value;return rows.filter(r=>{if(f==='exact'&&!r.exactAvailable)return false;if(f==='rounded-code'&&r.codeKind!=='rounded-code')return false;if(f==='full-code'&&r.codeKind!=='full-code')return false;if(term&&!(r.code.includes(term)||r.publicName.toLowerCase().includes(term)))return false;return true;});}
function render(){const list=filteredRows();const shown=list.slice(0,visibleLimit);count.textContent=`${shown.length} / ${list.length}件表示（全${rows.length}件）`;app.innerHTML=shown.map(r=>`<article class="row"><div class="row-head"><div><span class="code">${r.code}</span><span class="badge">丸め ${r.roundedCode}</span>${r.exactAvailable?'<span class="badge exact">ドンピシャ画像あり</span>':''}<span class="badge">${r.codeKind}</span></div><div class="name">${r.publicName}</div></div><div class="grid">${genderBlock(r.code,'F',r.F)}${genderBlock(r.code,'M',r.M)}</div></article>`).join('')||'<p>該当なし</p>';moreWrap.style.display=list.length>visibleLimit?'flex':'none';}
function resetAndRender(){visibleLimit=20;render();}
fetch('character_registry.json').then(r=>r.json()).then(data=>{rows=data.items||[];render();}).catch(e=>{app.innerHTML='<p class="warn">character_registry.json を読み込めませんでした。</p><pre>'+e+'</pre>';});q.addEventListener('input',resetAndRender);filter.addEventListener('change',resetAndRender);resetLimit.addEventListener('click',resetAndRender);moreBtn.addEventListener('click',()=>{visibleLimit+=20;render();});
</script>
</body>
</html>
