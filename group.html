<style>
  :root {
    --purple: #8b5cf6;
    --blue: #3b82f6;
    --pink: #ec4899;
    --c-O: #8b5cf6; --c-C: #3b82f6; --c-E: #f97316; --c-A: #f472b6; --c-N: #14b8a6;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 40px 20px 80px;
  }
  .container { max-width: 600px; margin: 0 auto; }

  /* ヘッダー */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--dim); text-decoration: none; font-size: 14px; transition: color .2s; }
  .back-link:hover { color: var(--text); }
  .page-title { font-size: 20px; font-weight: 700; }

  /* タブ */
  .tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .tab-btn { flex: 1; padding: 10px; font-family: inherit; font-size: 14px; font-weight: 700; color: var(--dim); background: none; border: none; border-radius: 9px; cursor: pointer; transition: all .2s; }
  .tab-btn.active { color: var(--text); background: rgba(139,92,246,0.2); box-shadow: 0 0 12px rgba(139,92,246,0.15); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ===== 名簿セレクター ===== */
  .roster-selector {
    display: flex; align-items: center; gap: 8px;
    background: rgba(26,10,62,0.4);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 12px; padding: 12px 16px;
    margin-bottom: 14px;
  }
  .roster-label { font-size: 12px; color: var(--dim); white-space: nowrap; }
  .roster-select {
    flex: 1; min-width: 0;
    font-family: inherit; font-size: 14px; font-weight: 700;
    color: var(--text); background: transparent;
    border: none; outline: none; cursor: pointer;
    appearance: none; -webkit-appearance: none;
  }
  .roster-select option { background: #1a0a3e; color: #e2e8f0; }
  .roster-icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--dim); padding: 4px; font-size: 16px;
    transition: color .2s; line-height: 1; border-radius: 6px;
  }
  .roster-icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .roster-icon-btn.danger:hover { color: #f87171; background: rgba(248,113,113,0.1); }
  .btn-new-roster {
    display: block; width: 100%;
    padding: 9px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--purple);
    background: rgba(139,92,246,0.07);
    border: 1px dashed rgba(139,92,246,0.3);
    border-radius: 10px; cursor: pointer; transition: all .2s;
    margin-bottom: 8px;
  }
  .btn-new-roster:hover { background: rgba(139,92,246,0.15); }

  /* インライン名前入力フォーム */
  .inline-name-form {
    display: none;
    gap: 8px; margin-bottom: 14px;
  }
  .inline-name-form.open { display: flex; }
  .inline-name-input {
    flex: 1; padding: 9px 14px;
    font-family: inherit; font-size: 14px;
    color: var(--text);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(139,92,246,0.35);
    border-radius: 10px; outline: none;
    transition: border-color .2s;
  }
  .inline-name-input:focus { border-color: var(--purple); }
  .inline-ok-btn {
    padding: 9px 16px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    color: #fff; background: var(--purple);
    border: none; border-radius: 10px; cursor: pointer; transition: opacity .2s;
    white-space: nowrap;
  }
  .inline-ok-btn:hover { opacity: .85; }
  .inline-cancel-btn {
    padding: 9px 12px;
    font-family: inherit; font-size: 13px;
    color: var(--dim); background: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; cursor: pointer; transition: all .2s;
  }
  .inline-cancel-btn:hover { color: var(--text); }

  /* 追加フォーム */
  .roster-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .roster-count { font-size: 13px; color: var(--dim); }
  .roster-count span { color: var(--purple); font-weight: 700; }
  .add-form { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .add-input { flex: 1; min-width: 0; padding: 10px 14px; font-family: inherit; font-size: 14px; color: var(--text); background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.25); border-radius: 10px; outline: none; transition: border-color .2s; }
  .add-input::placeholder { color: rgba(148,163,184,0.4); }
  .add-input:focus { border-color: var(--purple); }
  .add-input.code { flex: 0 0 90px; font-family: monospace; letter-spacing: .1em; }
  .add-btn { padding: 10px 18px; font-family: inherit; font-size: 14px; font-weight: 700; color: #fff; background: linear-gradient(135deg, var(--purple), var(--blue)); border: none; border-radius: 10px; cursor: pointer; transition: all .2s; white-space: nowrap; }
  .add-btn:hover { opacity: .85; transform: translateY(-1px); }
  .add-error { font-size: 12px; color: #f87171; margin-bottom: 10px; min-height: 18px; }

  /* 取り込みボタン */
  .import-btn { display: block; width: 100%; padding: 11px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--purple); background: rgba(139,92,246,0.07); border: 1px solid rgba(139,92,246,0.25); border-radius: 10px; cursor: pointer; transition: all .2s; margin-bottom: 14px; }
  .import-btn:hover { background: rgba(139,92,246,0.15); }

  /* 生徒リスト */
  .student-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .student-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(26,10,62,0.4); border: 1px solid rgba(139,92,246,0.15); border-radius: 12px; }
  .student-num { font-size: 11px; color: var(--dim); min-width: 20px; text-align: right; }
  .student-name { flex: 1; font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .student-code { font-family: monospace; font-size: 12px; background: rgba(139,92,246,0.15); color: var(--purple); padding: 2px 8px; border-radius: 6px; letter-spacing: .1em; }
  .student-bars { display: flex; gap: 3px; align-items: flex-end; height: 20px; }
  .sbar { width: 4px; border-radius: 2px; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--dim); font-size: 16px; padding: 2px 4px; transition: color .2s; line-height: 1; }
  .del-btn:hover { color: #f87171; }
  .empty-roster { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 14px; line-height: 1.8; }
  .clear-btn { display: block; width: 100%; padding: 10px; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--dim); background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; transition: all .2s; margin-top: 4px; }
  .clear-btn:hover { border-color: #f87171; color: #f87171; }

  /* ===== インポートモーダル ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    width: 100%; max-width: 600px;
    background: var(--bg2, #0f1535);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    max-height: 80vh; display: flex; flex-direction: column;
    animation: slideup .25s ease-out;
  }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal-sub { font-size: 12px; color: var(--dim); margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-shrink: 0; }
  .modal-action-btn { padding: 7px 14px; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--dim); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; transition: all .2s; }
  .modal-action-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }
  .modal-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .modal-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(139,92,246,0.1);
    border-radius: 10px; cursor: pointer; transition: all .2s;
    user-select: none;
  }
  .modal-item.checked { background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.35); }
  .modal-item.already { opacity: .4; pointer-events: none; }
  .modal-checkbox {
    width: 20px; height: 20px; border-radius: 5px;
    border: 2px solid rgba(139,92,246,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .2s; font-size: 11px;
  }
  .modal-item.checked .modal-checkbox { background: var(--purple); border-color: var(--purple); }
  .modal-item-name { flex: 1; font-size: 14px; font-weight: 500; }
  .modal-item-code { font-family: monospace; font-size: 11px; color: var(--dim); background: rgba(255,255,255,0.06); padding: 2px 7px; border-radius: 5px; }
  .modal-item-tag { font-size: 10px; color: var(--dim); background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 10px; }
  .modal-footer { flex-shrink: 0; }
  .modal-confirm-btn { display: block; width: 100%; padding: 14px; font-family: inherit; font-size: 15px; font-weight: 700; color: #fff; background: linear-gradient(135deg, var(--purple), var(--blue)); border: none; border-radius: 12px; cursor: pointer; transition: all .2s; }
  .modal-confirm-btn:hover:not(:disabled) { opacity: .85; }
  .modal-confirm-btn:disabled { opacity: .4; cursor: not-allowed; }
  .modal-cancel { display: block; text-align: center; margin-top: 10px; font-size: 13px; color: var(--dim); cursor: pointer; padding: 6px; }
  .modal-cancel:hover { color: var(--text); }

  /* ===== グループ分けタブ ===== */
  .group-settings { background: rgba(26,10,62,0.4); border: 1px solid rgba(139,92,246,0.15); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
  .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .settings-row:last-child { margin-bottom: 0; }
  .settings-label { font-size: 13px; color: var(--dim); min-width: 90px; }
  .num-input { width: 70px; padding: 8px 12px; font-family: inherit; font-size: 15px; font-weight: 700; color: var(--text); text-align: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.25); border-radius: 8px; outline: none; transition: border-color .2s; }
  .num-input:focus { border-color: var(--purple); }
  .settings-hint { font-size: 12px; color: var(--dim); }
  .settings-warn { font-size: 12px; color: #fbbf24; margin-top: 6px; }

  /* 名簿選択（グループ分けタブ） */
  .grouping-roster-info {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--dim);
    margin-bottom: 16px; padding: 10px 14px;
    background: rgba(139,92,246,0.06);
    border: 1px solid rgba(139,92,246,0.15);
    border-radius: 10px;
  }
  .grouping-roster-name { color: var(--purple); font-weight: 700; }

  .btn-generate { display: block; width: 100%; padding: 16px; font-family: inherit; font-size: 16px; font-weight: 700; color: #fff; background: linear-gradient(135deg, var(--purple), var(--blue)); border: none; border-radius: 14px; cursor: pointer; transition: all .3s; margin-bottom: 28px; }
  .btn-generate:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(139,92,246,0.4); }
  .btn-generate:disabled { opacity: .4; cursor: not-allowed; }

  /* 結果 */
  .result-area { display: none; }
  .result-area.visible { display: block; animation: fadein .4s ease-out; }
  @keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .result-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .result-title { font-size: 16px; font-weight: 700; }
  .btn-shuffle { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--purple); background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); border-radius: 8px; cursor: pointer; transition: all .2s; }
  .btn-shuffle:hover { background: rgba(139,92,246,0.2); }
  .group-cards { display: flex; flex-direction: column; gap: 14px; }
  .group-card { background: rgba(26,10,62,0.45); border: 1px solid rgba(139,92,246,0.2); border-radius: 14px; padding: 18px; }
  .group-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .group-name { font-size: 15px; font-weight: 700; }
  .group-count { font-size: 12px; color: var(--dim); background: rgba(255,255,255,0.07); padding: 3px 10px; border-radius: 20px; }
  .group-members { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .group-member-chip { font-size: 12px; font-weight: 500; padding: 4px 10px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2); border-radius: 20px; }
  .factor-bars { display: flex; flex-direction: column; gap: 6px; }
  .factor-row { display: flex; align-items: center; gap: 10px; }
  .factor-label { font-size: 11px; color: var(--dim); min-width: 40px; }
  .factor-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
  .factor-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease-out; }
  .factor-val { font-size: 11px; color: var(--dim); min-width: 28px; text-align: right; font-family: monospace; }
  .empty-group { text-align: center; padding: 48px 20px; color: var(--dim); font-size: 14px; line-height: 1.8; }

  @media (max-width: 400px) {
    body { padding: 24px 14px 60px; }
    .add-input.code { flex: 0 0 80px; }
  }
</style>
</head>

  </div>
</div>

<script>
const STORAGE_KEY   = 'bigfive_group_rosters_v2';
const ACTIVE_KEY    = 'bigfive_group_active_roster';
const OTHERS_KEY    = 'bigfive_other_results';
const MY_KEY        = 'bigfive_my_results';
const MAX_STUDENTS  = 100;

const traitKeys   = ['O','C','E','A','N'];
const traitNames  = { O:'開放性', C:'誠実性', E:'外向性', A:'協調性', N:'感受性' };
const traitColors = { O:'#8b5cf6', C:'#3b82f6', E:'#f97316', A:'#f472b6', N:'#14b8a6' };

function codeToScores(code) {
  return { O:+code[0], C:+code[1], E:+code[2], A:+code[3], N:+code[4] };
}
function isValidCode(code) { return /^[1-5]{5}$/.test(code); }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ===== 名簿データ管理 =====
function loadRosters() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (Array.isArray(raw) && raw.length > 0) return raw;
  } catch(e) {}
  // 旧データ（v1）を移行
  try {
    const old = JSON.parse(localStorage.getItem('bigfive_group_roster_v1') || '[]');
    if (old.length > 0) return [{ id: uid(), name: 'メンバー', students: old }];
  } catch(e) {}
  return [{ id: uid(), name: 'メンバー', students: [] }];
}
function saveRosters() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rosters));
}
function getActiveId() {
  return localStorage.getItem(ACTIVE_KEY) || rosters[0]?.id;
}
function setActiveId(id) {
  localStorage.setItem(ACTIVE_KEY, id);
}
function getActiveRoster() {
  return rosters.find(r => r.id === getActiveId()) || rosters[0];
}

let rosters = loadRosters();

// ===== 名簿セレクター描画 =====
function renderRosterSelect() {
  const sel = document.getElementById('rosterSelect');
  const activeId = getActiveId();
  sel.innerHTML = rosters.map(r =>
    `<option value="${escHtml(r.id)}" ${r.id === activeId ? 'selected' : ''}>${escHtml(r.name)}（${r.students.length}人）</option>`
  ).join('');
  document.getElementById('deleteRosterBtn').disabled = rosters.length <= 1;
}

document.getElementById('rosterSelect').addEventListener('change', e => {
  setActiveId(e.target.value);
  renderAll();
});

// ===== 新しい名簿フォーム =====
function closeAllInlineForms() {
  document.getElementById('newRosterForm').classList.remove('open');
  document.getElementById('renameRosterForm').classList.remove('open');
}

document.getElementById('newRosterBtn').addEventListener('click', () => {
  closeAllInlineForms();
  const form = document.getElementById('newRosterForm');
  const input = document.getElementById('newRosterInput');
  form.classList.add('open');
  input.value = '';
  input.focus();
});
document.getElementById('newRosterCancel').addEventListener('click', () => {
  closeAllInlineForms();
});
function confirmNewRoster() {
  const name = document.getElementById('newRosterInput').value.trim();
  if (!name) return;
  closeAllInlineForms();
  const roster = { id: uid(), name, students: [] };
  rosters.push(roster);
  setActiveId(roster.id);
  saveRosters();
  renderAll();
}
document.getElementById('newRosterOk').addEventListener('click', confirmNewRoster);
document.getElementById('newRosterInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmNewRoster();
  if (e.key === 'Escape') closeAllInlineForms();
});

// ===== リネームフォーム =====
document.getElementById('renameRosterBtn').addEventListener('click', () => {
  closeAllInlineForms();
  const r = getActiveRoster();
  const form = document.getElementById('renameRosterForm');
  const input = document.getElementById('renameRosterInput');
  form.classList.add('open');
  input.value = r.name;
  input.select();
  input.focus();
});
document.getElementById('renameRosterCancel').addEventListener('click', () => {
  closeAllInlineForms();
});
function confirmRename() {
  const name = document.getElementById('renameRosterInput').value.trim();
  if (!name) return;
  closeAllInlineForms();
  const r = getActiveRoster();
  r.name = name;
  saveRosters();
  renderAll();
}
document.getElementById('renameRosterOk').addEventListener('click', confirmRename);
document.getElementById('renameRosterInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmRename();
  if (e.key === 'Escape') closeAllInlineForms();
});

// ===== 名簿削除 =====
document.getElementById('deleteRosterBtn').addEventListener('click', () => {
  if (rosters.length <= 1) return;
  const r = getActiveRoster();
  // confirm()は使ってもページリセットのリスクが低いため維持
  if (!confirm(`「${r.name}」を削除しますか？\nこの名簿のデータはすべて消えます。`)) return;
  rosters = rosters.filter(x => x.id !== r.id);
  setActiveId(rosters[0].id);
  saveRosters();
  renderAll();
});

// ===== 名簿（生徒リスト）描画 =====
function renderRoster() {
  const r = getActiveRoster();
  const students = r.students;
  document.getElementById('rosterCount').textContent = students.length;

  const list  = document.getElementById('studentList');
  const empty = document.getElementById('emptyRoster');
  const clrBtn = document.getElementById('clearBtn');

  if (students.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    clrBtn.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  clrBtn.style.display = '';

  list.innerHTML = students.map((s, i) => {
    const sc = codeToScores(s.code);
    const bars = traitKeys.map(k => {
      const h = Math.round((sc[k] / 5) * 20 + 2);
      return `<div class="sbar" style="height:${h}px;background:${traitColors[k]};opacity:.75"></div>`;
    }).join('');
    return `
      <div class="student-item">
        <span class="student-num">${i+1}</span>
        <span class="student-name">${escHtml(s.name)}</span>
        <span class="student-code">${s.code}</span>
        <div class="student-bars">${bars}</div>
        <button class="del-btn" data-id="${s.id}" title="削除">×</button>
      </div>`;
  }).join('');

  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const r2 = getActiveRoster();
      r2.students = r2.students.filter(s => s.id !== btn.dataset.id);
      saveRosters();
      renderAll();
    });
  });
}

// ===== 生徒追加 =====
function addStudent() {
  const nameEl = document.getElementById('inputName');
  const codeEl = document.getElementById('inputCode');
  const errEl  = document.getElementById('addError');
  const name = nameEl.value.trim();
  const code = codeEl.value.trim();

  if (!name) { errEl.textContent = '名前を入力してください'; return; }
  if (!isValidCode(code)) { errEl.textContent = 'コードは1〜5の数字5桁（例：34213）'; return; }
  const r = getActiveRoster();
  if (r.students.length >= MAX_STUDENTS) { errEl.textContent = `上限${MAX_STUDENTS}人です`; return; }
  errEl.textContent = '';

  r.students.push({ id: uid(), name, code });
  saveRosters();
  renderAll();
  nameEl.value = '';
  codeEl.value = '';
  nameEl.focus();
}

document.getElementById('addBtn').addEventListener('click', addStudent);
document.getElementById('inputCode').addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(); });
document.getElementById('inputName').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inputCode').focus(); });

document.getElementById('clearBtn').addEventListener('click', () => {
  const r = getActiveRoster();
  if (!confirm(`「${r.name}」の全${r.students.length}人を削除しますか？`)) return;
  r.students = [];
  saveRosters();
  renderAll();
});

// ===== インポートモーダル =====
let modalChecked = new Set();
let modalItems = []; // モーダル表示中のアイテムキャッシュ

document.getElementById('importBtn').addEventListener('click', openImportModal);

function loadAllSaved() {
  const myRaw = (() => { try { return JSON.parse(localStorage.getItem(MY_KEY) || '[]'); } catch(e) { return []; } })();
  const othersRaw = (() => { try { return JSON.parse(localStorage.getItem(OTHERS_KEY) || '[]'); } catch(e) { return []; } })();
  const all = [];
  // インデックスベースのUIDで重複を防ぐ
  myRaw.forEach((o, i) => {
    all.push({ uid: 'my_' + i, name: o.name || o.typeName || `自分(${o.code})`, code: o.code, tag: '自分' });
  });
  othersRaw.forEach((o, i) => {
    all.push({ uid: 'oth_' + i, name: o.name || `あの人(${o.code})`, code: o.code, tag: 'あの人' });
  });
  return all;
}

function openImportModal() {
  modalItems = loadAllSaved();

  if (modalItems.length === 0) {
    alert('保存されているデータがありません。\n先に診断を受けて結果を保存してください。');
    return;
  }

  const r = getActiveRoster();
  // 名前＋コードで取込済み判定（uid変化に依存しない）
  const existingKeys = new Set(r.students.map(s => s.name + '|' + s.code));
  const remaining = MAX_STUDENTS - r.students.length;

  document.getElementById('modalSub').textContent =
    `保存データ ${modalItems.length}件 ／ あと${remaining}人追加可能`;

  modalChecked = new Set();
  const all = modalItems;

  const list = document.getElementById('modalList');
  list.innerHTML = all.map(o => {
    const already = existingKeys.has(o.name + '|' + o.code);
    const sc = codeToScores(o.code);
    const bars = traitKeys.map(k => {
      const h = Math.round((sc[k] / 5) * 18 + 2);
      return `<div class="sbar" style="height:${h}px;background:${traitColors[k]};opacity:.75;display:inline-block;width:4px;border-radius:2px;vertical-align:bottom"></div>`;
    }).join('');
    const tagColor = o.tag === '自分' ? 'rgba(16,185,129,0.2);color:#34d399' : 'rgba(139,92,246,0.15);color:#a78bfa';
    return `
      <div class="modal-item${already ? ' already' : ''}" data-uid="${escHtml(o.uid)}" data-name="${escHtml(o.name)}" data-code="${escHtml(o.code)}">
        <div class="modal-checkbox">${already ? '✓' : ''}</div>
        <span class="modal-item-name">${escHtml(o.name)}</span>
        <span style="display:flex;gap:2px;align-items:flex-end;height:20px">${bars}</span>
        <span class="modal-item-code">${o.code}</span>
        <span class="modal-item-tag" style="background:${tagColor}">${already ? '取込済' : o.tag}</span>
      </div>`;
  }).join('');

  list.querySelectorAll('.modal-item:not(.already)').forEach(item => {
    item.addEventListener('click', () => {
      const uid = item.dataset.uid;
      if (modalChecked.has(uid)) {
        modalChecked.delete(uid);
        item.classList.remove('checked');
        item.querySelector('.modal-checkbox').textContent = '';
      } else {
        modalChecked.add(uid);
        item.classList.add('checked');
        item.querySelector('.modal-checkbox').textContent = '✓';
      }
      updateModalConfirmBtn(remaining);
    });
  });

  updateModalConfirmBtn(remaining);
  document.getElementById('importModal').classList.add('open');
}

function updateModalConfirmBtn(remaining) {
  const btn = document.getElementById('modalConfirmBtn');
  const sel = modalChecked.size;
  const n = Math.min(sel, remaining);
  btn.disabled = sel === 0;
  if (sel === 0) {
    btn.textContent = '取り込む';
  } else if (sel > remaining) {
    btn.textContent = `選択した${sel}人を取り込む（上限のため${remaining}人まで）`;
  } else {
    btn.textContent = `選択した${sel}人を取り込む`;
  }
}

document.getElementById('selectAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.modal-item:not(.already)').forEach(item => {
    modalChecked.add(item.dataset.uid);
    item.classList.add('checked');
    item.querySelector('.modal-checkbox').textContent = '✓';
  });
  const r = getActiveRoster();
  updateModalConfirmBtn(MAX_STUDENTS - r.students.length);
});

document.getElementById('deselectAllBtn').addEventListener('click', () => {
  modalChecked.clear();
  document.querySelectorAll('.modal-item:not(.already)').forEach(item => {
    item.classList.remove('checked');
    item.querySelector('.modal-checkbox').textContent = '';
  });
  const r = getActiveRoster();
  updateModalConfirmBtn(MAX_STUDENTS - r.students.length);
});

document.getElementById('modalConfirmBtn').addEventListener('click', () => {
  const r = getActiveRoster();
  const remaining = MAX_STUDENTS - r.students.length;
  let added = 0;

  for (const o of modalItems) {
    if (!modalChecked.has(o.uid)) continue;
    if (added >= remaining) break;
    r.students.push({ id: uid(), name: o.name, code: o.code });
    added++;
  }

  saveRosters();
  closeModal();
  renderAll();
  if (added > 0) {
    const skipped = modalChecked.size - added;
    alert(skipped > 0 ? `${added}人を取り込みました（上限のため${skipped}人スキップ）` : `${added}人を取り込みました`);
  }
});

function closeModal() {
  document.getElementById('importModal').classList.remove('open');
  modalChecked.clear();
}
document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
document.getElementById('importModal').addEventListener('click', e => {
  if (e.target === document.getElementById('importModal')) closeModal();
});

// ===== タブ切り替え =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'grouping') updateGroupingUI();
  });
});

// ===== グループ分け =====
function updateGroupingUI() {
  const r = getActiveRoster();
  const n = r.students.length;
  const g = parseInt(document.getElementById('groupCount').value) || 2;
  const warn = document.getElementById('settingsWarn');
  const btn  = document.getElementById('generateBtn');

  document.getElementById('groupingRosterInfo').innerHTML =
    `使用中の名簿：<span class="grouping-roster-name">${escHtml(r.name)}</span>　<span style="color:var(--dim)">${n}人</span>`;

  if (n < 2) {
    warn.textContent = '名簿にメンバーを2人以上登録してください';
    btn.disabled = true;
  } else if (g > n) {
    warn.textContent = `登録人数（${n}人）よりグループ数が多いです`;
    btn.disabled = true;
  } else if (g * 2 > n) {
    warn.textContent = '1グループあたり1人になる場合があります';
    btn.disabled = false;
  } else {
    warn.textContent = '';
    btn.disabled = false;
  }
}

document.getElementById('groupCount').addEventListener('input', updateGroupingUI);

function generateGroups(seed) {
  const r = getActiveRoster();
  const g = Math.max(2, Math.min(20, parseInt(document.getElementById('groupCount').value) || 4));
  const shuffled = [...r.students];

  let rng = seed || Date.now();
  const rand = () => { rng = (rng * 1664525 + 1013904223) & 0xffffffff; return (rng >>> 0) / 0xffffffff; };
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  shuffled.sort((a, b) => {
    const sa = Object.values(codeToScores(a.code)).reduce((x,y) => x+y, 0);
    const sb = Object.values(codeToScores(b.code)).reduce((x,y) => x+y, 0);
    return sb - sa;
  });

  const groups = Array.from({ length: g }, () => []);
  shuffled.forEach((s, i) => {
    const round = Math.floor(i / g);
    const pos = round % 2 === 0 ? i % g : g - 1 - (i % g);
    groups[pos].push(s);
  });
  return groups;
}

function renderGroups(groups) {
  const r = getActiveRoster();
  const area  = document.getElementById('resultArea');
  const cards = document.getElementById('groupCards');
  document.getElementById('resultTitle').textContent =
    `${escHtml(r.name)}　${groups.length}グループ / ${r.students.length}人`;
  area.classList.add('visible');

  cards.innerHTML = groups.map((members, gi) => {
    if (members.length === 0) return '';
    const avgs = {};
    traitKeys.forEach(k => {
      avgs[k] = members.reduce((s, m) => s + codeToScores(m.code)[k], 0) / members.length;
    });
    const chips = members.map(m => `<span class="group-member-chip">${escHtml(m.name)}</span>`).join('');
    const bars  = traitKeys.map(k => `
      <div class="factor-row">
        <span class="factor-label">${traitNames[k]}</span>
        <div class="factor-bar-bg"><div class="factor-bar-fill" style="width:${(avgs[k]/5)*100}%;background:${traitColors[k]}"></div></div>
        <span class="factor-val">${avgs[k].toFixed(1)}</span>
      </div>`).join('');
    return `
      <div class="group-card">
        <div class="group-card-header">
          <span class="group-name">グループ ${gi + 1}</span>
          <span class="group-count">${members.length}人</span>
        </div>
        <div class="group-members">${chips}</div>
        <div class="factor-bars">${bars}</div>
      </div>`;
  }).join('');
}

document.getElementById('generateBtn').addEventListener('click', () => {
  const groups = generateGroups();
  renderGroups(groups);
});
document.getElementById('shuffleBtn').addEventListener('click', () => {
  renderGroups(generateGroups(Date.now() + Math.random()));
});

// ===== 全描画 =====
function renderAll() {
  renderRosterSelect();
  renderRoster();
  updateGroupingUI();
}

renderAll();
</script>
</body>
</html>
