<script>
(function() {
  'use strict';

  var PER_PAGE = 120;
  var currentFilter = 'code';
  var currentPage = 0;
  var allCards = [];
  var filteredCards = [];

  function toScale(v) { return v <= 2 ? 1 : v >= 4 ? 5 : 3; }

  function isMax(factor, value) {
    if (factor === 'N') return value === 1;
    if (factor === 'E' || factor === 'A') return value === 1 || value === 5;
    return value === 5;
  }

  function computeRarity(code) {
    var o = +code[0], c = +code[1], e = +code[2], a = +code[3], n = +code[4];
    var mc = 0;
    if (isMax('O', o)) mc++;
    if (isMax('C', c)) mc++;
    if (isMax('E', e)) mc++;
    if (isMax('A', a)) mc++;
    if (isMax('N', n)) mc++;
    if (mc === 0) return 'r1';
    if (mc === 1) return 'r2';
    if (mc === 2) return 'r3';
    if (mc === 3) return 'r4';
    return 'r5';
  }

  function getImagePath(card) {
    // 入手済みカードはR2のカード画像を使用
    if (card.owned) {
      return 'https://bigfive.jr-genius.jp/ogp-image?code=' + card.code + '&gender=' + card.gender + '&rarity=' + card.rarity;
    }
    // 未入手カードはキャラクター画像（シルエット表示用）
    var imgCode = [0,1,2,3,4].map(function(i) { return toScale(+card.code[i]); }).join('');
    return 'images/characters/' + card.gender + '/' + imgCode + '.webp';
  }

  function init() {
    if (typeof AlbumUtils !== 'undefined') AlbumUtils.migrateExistingResults();

    var albumCards = (typeof AlbumUtils !== 'undefined') ? AlbumUtils.getAlbumCards() : [];
    // versionを含めて管理（10問版と30問版の同じコードは別カード）
    var ownedCardsMap = {};
    var ownedHiddenSet = {};
    albumCards.forEach(function(c) {
      var key = c.code + '_' + c.gender + '_' + (c.version || '30');
      ownedCardsMap[key] = c; // カードデータ全体を保存
      if (c.isHidden && c.hiddenId) ownedHiddenSet[c.hiddenId] = true;
    });

    // 全カード生成（コード順）
    allCards = [];

    // 10問版：各因子4通り {1,3,4,5} のみ出現（2段階が出ない）
    var tenValues = [1, 3, 4, 5];
    for (var oi=0;oi<tenValues.length;oi++)
    for (var ci=0;ci<tenValues.length;ci++)
    for (var ei=0;ei<tenValues.length;ei++)
    for (var ai=0;ai<tenValues.length;ai++)
    for (var ni=0;ni<tenValues.length;ni++) {
      var code = '' + tenValues[oi] + tenValues[ci] + tenValues[ei] + tenValues[ai] + tenValues[ni];
      ['M','F'].forEach(function(gender) {
        var key = code + '_' + gender + '_10';
        var ownedCard = ownedCardsMap[key];
        allCards.push({
          code: code,
          gender: gender,
          version: '10',
          rarity: 'r0',
          owned: !!ownedCard
        });
      });
    }

    // 30問版・120問版共通：全3125パターン（隠しキャラの有無だけが違い）
    for (var o=1;o<=5;o++)
    for (var c=1;c<=5;c++)
    for (var e=1;e<=5;e++)
    for (var a=1;a<=5;a++)
    for (var n=1;n<=5;n++) {
      var code = '' + o + c + e + a + n;
      ['M','F'].forEach(function(gender) {
        // 30問版または120問版のどちらかで入手していれば入手済み
        var key30 = code + '_' + gender + '_30';
        var key120 = code + '_' + gender + '_120';
        var ownedCard30 = ownedCardsMap[key30];
        var ownedCard120 = ownedCardsMap[key120];
        var ownedCard = ownedCard30 || ownedCard120;

        // versionは入手した方を優先（両方入手している場合は120を優先）
        var version = ownedCard120 ? '120' : (ownedCard30 ? '30' : '30');

        allCards.push({
          code: code,
          gender: gender,
          version: version,
          rarity: computeRarity(code),
          owned: !!ownedCard
        });
      });
    }

    // 進捗表示（アルバム内の枚数）
    // 総カード数：10問版(1,024×2) + 30問版・120問版共通(3,125×2) = 8,298枚
    var ownedCount = albumCards.length;
    var totalCards = 8298;
    document.getElementById('progressText').textContent = ownedCount + ' / ' + totalCards.toLocaleString() + ' 枚コレクト';
    document.getElementById('progressBar').style.width = (ownedCount / totalCards * 100).toFixed(1) + '%';

    // フィルタータブ
    document.querySelectorAll('.filter-tab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        currentPage = 0;
        applyFilter();
        render();
      });
    });

    renderHidden(ownedHiddenSet);
    applyFilter();
    render();
  }

  function applyFilter() {
    var RARITY_ORDER = {r7:0,r6:1,r5:2,r4:3,r3:4,r2:5,r1:6,r0:7};
    if (currentFilter === 'owned') {
      filteredCards = allCards.filter(function(c) { return c.owned; });
    } else if (currentFilter === 'rarity') {
      filteredCards = allCards.filter(function(c) { return c.owned; })
        .sort(function(a, b) {
          return (RARITY_ORDER[a.rarity] || 9) - (RARITY_ORDER[b.rarity] || 9);
        });
    } else {
      filteredCards = allCards;
    }
  }

  function render() {
    var grid = document.getElementById('cardGrid');
    var pagEl = document.getElementById('pagination');
    var countEl = document.getElementById('countLabel');

    var usePagination = (currentFilter === 'code');
    var pageCards = usePagination
      ? filteredCards.slice(currentPage * PER_PAGE, (currentPage + 1) * PER_PAGE)
      : filteredCards;
    var totalPages = Math.ceil(filteredCards.length / PER_PAGE);

    if (usePagination) {
      countEl.textContent = '全8,298枚 ／ ' + (currentPage + 1) + ' / ' + totalPages + ' ページ';
    } else {
      countEl.textContent = filteredCards.length + '枚';
    }

    // グリッド描画
    grid.innerHTML = '';
    if (filteredCards.length === 0) {
      grid.innerHTML = '<div class="empty-state">まだカードがありません<br>診断を受けてカードをゲットしよう！</div>';
      pagEl.innerHTML = '';
      return;
    }

    pageCards.forEach(function(card) {
      var el;
      if (card.owned) {
        // 入手済みカードはリンクにする（versionパラメータを含める）
        el = document.createElement('a');
        el.className = 'zukan-card owned rarity-' + card.rarity;
        el.href = 'result.html?type=' + card.code + '&v=' + card.version + '&gender=' + card.gender + '&saved=1';
      } else {
        // 未入手カードはdivのまま
        el = document.createElement('div');
        el.className = 'zukan-card unowned rarity-' + card.rarity;
      }

      var img = document.createElement('img');
      img.src = getImagePath(card);
      img.loading = 'lazy';
      img.alt = '';

      var label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = card.owned
        ? card.code + (card.gender === 'M' ? ' ♂' : ' ♀')
        : '???';

      el.appendChild(img);
      el.appendChild(label);
      grid.appendChild(el);
    });

    // ページネーション（コード順のみ）
    pagEl.innerHTML = '';
    if (usePagination) {
      var prevBtn = document.createElement('button');
      prevBtn.className = 'page-nav-btn';
      prevBtn.textContent = '◀ 前へ';
      prevBtn.disabled = currentPage === 0;
      prevBtn.addEventListener('click', function() {
        currentPage--;
        render();
        window.scrollTo(0, 0);
      });

      var info = document.createElement('div');
      info.className = 'page-info';
      info.textContent = (currentPage + 1) + ' / ' + totalPages;

      var nextBtn = document.createElement('button');
      nextBtn.className = 'page-nav-btn';
      nextBtn.textContent = '次へ ▶';
      nextBtn.disabled = currentPage >= totalPages - 1;
      nextBtn.addEventListener('click', function() {
        currentPage++;
        render();
        window.scrollTo(0, 0);
      });

      pagEl.appendChild(prevBtn);
      pagEl.appendChild(info);
      pagEl.appendChild(nextBtn);
    }
  }

  function renderHidden(ownedHiddenSet) {
    var grid = document.getElementById('hiddenGrid');
    if (typeof HIDDEN_CHARACTERS === 'undefined' || !HIDDEN_CHARACTERS.length) {
      grid.innerHTML = '<div class="empty-state">データなし</div>';
      return;
    }
    HIDDEN_CHARACTERS.forEach(function(hc) {
      var owned = !!ownedHiddenSet[hc.id];
      var rarity = hc.a === 1 ? 'r7' : 'r6';
      var el;
      if (owned) {
        // 入手済みカードはリンクにする
        el = document.createElement('a');
        el.className = 'zukan-card owned rarity-' + rarity;
        el.href = 'result.html?char=' + hc.id + '&v=120&saved=1';
      } else {
        // 未入手カードはdivのまま
        el = document.createElement('div');
        el.className = 'zukan-card unowned rarity-' + rarity;
      }

      var img = document.createElement('img');
      // 入手済みはR2のカード画像、未入手はキャラクター画像（シルエット用）
      if (owned) {
        img.src = 'https://bigfive.jr-genius.jp/ogp-image?char=' + hc.id;
      } else {
        img.src = 'images/characters/hidden/' + hc.img;
      }
      img.loading = 'lazy';
      img.alt = '';

      var label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = owned ? hc.id : '???';

      el.appendChild(img);
      el.appendChild(label);
      grid.appendChild(el);
    });
  }

  init();
})();
</script>
