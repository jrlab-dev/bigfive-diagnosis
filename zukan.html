<script>
(function() {
  'use strict';

  var currentFilter = 'code';
  var typeCards = [];        // 486枚（243タイプ×M/F）
  var ownedTypeMap = {};     // key: toScaleCode+gender → 代表所持カード{code,gender,version,rarity}
  var chartState = {};       // key: code → {M:bool, F:bool}

  function toScale(v) { return v <= 2 ? 1 : v >= 4 ? 5 : 3; }
  function toScaleCode(code) {
    return [0,1,2,3,4].map(function(i){ return toScale(+code[i]); }).join('');
  }

  // ---- データ構築 ----
  function build() {
    if (typeof AlbumUtils !== 'undefined') AlbumUtils.migrateExistingResults();
    var albumCards = (typeof AlbumUtils !== 'undefined') ? AlbumUtils.getAlbumCards() : [];

    var RANK = (typeof AlbumUtils !== 'undefined' && AlbumUtils.RARITY_RANK) ? AlbumUtils.RARITY_RANK : {};
    // 全3125コードのチャート発見状態＋タイプ別の代表所持カード
    albumCards.forEach(function(c) {
      if (c.isHidden) return;
      if (!c.code || c.code.length !== 5 || !c.gender) return;
      // チャート（正確なコード単位）
      if (!chartState[c.code]) chartState[c.code] = { M:false, F:false };
      if (c.gender === 'M') chartState[c.code].M = true;
      if (c.gender === 'F') chartState[c.code].F = true;
      // タイプ（丸め243単位）の代表カード＝最高レア度を保持
      var ts = toScaleCode(c.code);
      var tkey = ts + '_' + c.gender;
      var cur = ownedTypeMap[tkey];
      var rank = RANK[c.rarity] || 0;
      if (!cur || rank > (RANK[cur.rarity] || 0)) {
        ownedTypeMap[tkey] = { code: c.code, gender: c.gender, version: c.version || '30', rarity: c.rarity };
      }
    });

    // 486枚のタイプカードを生成（コード順・男女）
    typeCards = [];
    var s = [1,3,5];
    for (var oi=0;oi<3;oi++)
    for (var ci=0;ci<3;ci++)
    for (var ei=0;ei<3;ei++)
    for (var ai=0;ai<3;ai++)
    for (var ni=0;ni<3;ni++) {
      var ts = '' + s[oi] + s[ci] + s[ei] + s[ai] + s[ni];
      ['M','F'].forEach(function(gender) {
        var tkey = ts + '_' + gender;
        var owned = ownedTypeMap[tkey];
        typeCards.push({
          ts: ts,
          gender: gender,
          owned: !!owned,
          // 所持なら実カードのレア度、未所持は丸めコードの基準レア度
          rarity: owned ? owned.rarity : (typeof computeRarity === 'function' ? computeRarity(ts, gender) : 'r1'),
          link: owned ? owned : null
        });
      });
    }
  }

  // ---- 称号 ----
  var TITLES = [
    { name: '性格の旅人',     min: 0 },
    { name: '探索者',         min: 60 },
    { name: '開拓者',         min: 240 },
    { name: '賢者',           min: 720 },
    { name: '大賢者',         min: 1800 },
    { name: '伝説の探求者',   min: 4000 }
  ];
  function renderTitle() {
    var discovered = 0, purple = 0;
    Object.keys(chartState).forEach(function(code){
      var st = chartState[code];
      if (st.M || st.F) discovered++;
      if (st.M && st.F) purple++;
    });
    var points = discovered + purple; // 完全発見（両性別）ボーナス
    var idx = 0;
    for (var i=0;i<TITLES.length;i++){ if (points >= TITLES[i].min) idx = i; }
    var cur = TITLES[idx], next = TITLES[idx+1];

    document.getElementById('titleText').textContent = cur.name;
    document.getElementById('discoveryCount').textContent = discovered.toLocaleString();

    var gauge = document.getElementById('titleGauge');
    var nextEl = document.getElementById('titleNext');
    if (next) {
      var span = next.min - cur.min;
      var prog = Math.max(0, Math.min(1, (points - cur.min) / span));
      gauge.style.width = (prog*100).toFixed(1) + '%';
      nextEl.textContent = '次の称号「' + next.name + '」まで あと ' + (next.min - points).toLocaleString() + ' pt';
    } else {
      gauge.style.width = '100%';
      nextEl.textContent = '最高称号を達成しています';
    }
  }

  // ---- コンプリートチャート ----
  var FACTOR_ANGLES = [0,1,2,3,4].map(function(i){ return (-90 + i*72) * Math.PI/180; });
  function hash01(str) {
    var h = 2166136261;
    for (var i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = (h*16777619)>>>0; }
    return (h % 100000) / 100000;
  }
  function renderChart() {
    var CX = 180, CY = 180, MAXR = 168;
    var parts = [];
    var s = [1,2,3,4,5];
    for (var o=1;o<=5;o++)
    for (var c=1;c<=5;c++)
    for (var e=1;e<=5;e++)
    for (var a=1;a<=5;a++)
    for (var n=1;n<=5;n++) {
      var code = '' + o + c + e + a + n;
      var digits = [o,c,e,a,n];
      var ring = 0, vx = 0, vy = 0;
      for (var k=0;k<5;k++){
        var dev = digits[k]-3;
        ring += Math.abs(dev);
        vx += dev * Math.cos(FACTOR_ANGLES[k]);
        vy += dev * Math.sin(FACTOR_ANGLES[k]);
      }
      var mag = Math.sqrt(vx*vx+vy*vy);
      var angle = mag < 0.001 ? hash01(code)*Math.PI*2 : Math.atan2(vy, vx);
      // 密集する中間環をほぐすジッター
      var ja = (hash01(code+'a')-0.5) * 0.55;
      var jr = (hash01(code+'r')-0.5) * 12;
      var radius = ring/10*MAXR + jr;
      if (radius < 0) radius = 0;
      var x = CX + radius*Math.cos(angle+ja);
      var y = CY + radius*Math.sin(angle+ja);

      var st = chartState[code];
      var fill = '#2a3550', op = 0.55, r = 1.7;
      if (st) {
        if (st.M && st.F) { fill = '#a855f7'; op = 1; r = 2.5; }
        else if (st.M)    { fill = '#3b82f6'; op = 0.95; r = 2.3; }
        else if (st.F)    { fill = '#f43f5e'; op = 0.95; r = 2.3; }
      }
      if (code === '33333') { r = Math.max(r, 3.2); }
      var ts = toScaleCode(code);
      parts.push('<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+r+
        '" fill="'+fill+'" fill-opacity="'+op+'" data-ts="'+ts+'"/>');
    }
    var svg = document.getElementById('chartSvg');
    svg.innerHTML = parts.join('');

    // マスをタップ → 該当タイプのカードへスクロール
    svg.addEventListener('click', function(ev){
      var t = ev.target;
      if (t && t.tagName === 'circle' && t.getAttribute('data-ts')) {
        scrollToType(t.getAttribute('data-ts'));
      }
    });

    setupZoom();
  }

  function scrollToType(ts) {
    // まず該当タイプが今のフィルタで表示されているか確認、なければコード順に戻す
    var el = document.querySelector('.zukan-card[data-ts="'+ts+'"]');
    if (!el) {
      setFilter('code');
      el = document.querySelector('.zukan-card[data-ts="'+ts+'"]');
    }
    if (!el) return;
    el.scrollIntoView({ behavior:'smooth', block:'center' });
    document.querySelectorAll('.zukan-card.flash').forEach(function(x){ x.classList.remove('flash'); });
    el.classList.add('flash');
    setTimeout(function(){ el.classList.remove('flash'); }, 1600);
  }

  // ---- ズーム/パン ----
  function setupZoom() {
    var vp = document.getElementById('chartViewport');
    var svg = document.getElementById('chartSvg');
    var scale = 1, tx = 0, ty = 0;
    var MIN = 1, MAX = 6;
    var pointers = {};
    var startDist = 0, startScale = 1, startMid = null, startTx = 0, startTy = 0;
    var panStart = null;

    function apply() {
      // 範囲外に飛ばないようクランプ
      var maxShift = (scale-1);
      var w = vp.clientWidth;
      tx = Math.max(-maxShift*w, Math.min(0, tx));
      ty = Math.max(-maxShift*w, Math.min(0, ty));
      svg.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')';
    }
    function zoomAt(cx, cy, factor) {
      var ns = Math.max(MIN, Math.min(MAX, scale*factor));
      var k = ns/scale;
      tx = cx - k*(cx - tx);
      ty = cy - k*(cy - ty);
      scale = ns;
      apply();
    }

    vp.addEventListener('pointerdown', function(e){
      vp.setPointerCapture(e.pointerId);
      pointers[e.pointerId] = { x:e.clientX, y:e.clientY };
      var ids = Object.keys(pointers);
      if (ids.length === 1) {
        panStart = { x:e.clientX, y:e.clientY, tx:tx, ty:ty };
      } else if (ids.length === 2) {
        var p = ids.map(function(id){ return pointers[id]; });
        startDist = Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y);
        startScale = scale;
        var rect = vp.getBoundingClientRect();
        startMid = { x:(p[0].x+p[1].x)/2-rect.left, y:(p[0].y+p[1].y)/2-rect.top };
        startTx = tx; startTy = ty;
        panStart = null;
      }
    });
    vp.addEventListener('pointermove', function(e){
      if (!pointers[e.pointerId]) return;
      pointers[e.pointerId] = { x:e.clientX, y:e.clientY };
      var ids = Object.keys(pointers);
      if (ids.length === 2 && startDist) {
        var p = ids.map(function(id){ return pointers[id]; });
        var dist = Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y);
        var ns = Math.max(MIN, Math.min(MAX, startScale * (dist/startDist)));
        var k = ns/startScale;
        tx = startMid.x - k*(startMid.x - startTx);
        ty = startMid.y - k*(startMid.y - startTy);
        scale = ns;
        apply();
      } else if (ids.length === 1 && panStart && scale > 1) {
        tx = panStart.tx + (e.clientX - panStart.x);
        ty = panStart.ty + (e.clientY - panStart.y);
        apply();
      }
    });
    function up(e){
      delete pointers[e.pointerId];
      if (Object.keys(pointers).length < 2) startDist = 0;
      if (Object.keys(pointers).length === 0) panStart = null;
    }
    vp.addEventListener('pointerup', up);
    vp.addEventListener('pointercancel', up);
    vp.addEventListener('wheel', function(e){
      e.preventDefault();
      var rect = vp.getBoundingClientRect();
      zoomAt(e.clientX-rect.left, e.clientY-rect.top, e.deltaY < 0 ? 1.15 : 1/1.15);
    }, { passive:false });

    document.getElementById('chartZoomIn').onclick = function(){ zoomAt(vp.clientWidth/2, vp.clientHeight/2, 1.4); };
    document.getElementById('chartZoomOut').onclick = function(){ zoomAt(vp.clientWidth/2, vp.clientHeight/2, 1/1.4); };
    document.getElementById('chartReset').onclick = function(){ scale=1; tx=0; ty=0; apply(); };
  }

  // ---- カード一覧 ----
  function typeImagePath(card) {
    return 'images/characters/marume243/' + card.gender + '/' + card.ts + '.webp';
  }
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(function(b){
      b.classList.toggle('active', b.dataset.filter === f);
    });
    renderList();
  }
  function renderList() {
    var RARITY_ORDER = {r7:0,r6:1,r5:2,r4:3,r3:4,r2:5,r1:6,r0:7};
    var list = typeCards.slice();
    if (currentFilter === 'owned') {
      list = list.filter(function(c){ return c.owned; });
    } else if (currentFilter === 'unowned') {
      list = list.filter(function(c){ return !c.owned; });
    } else if (currentFilter === 'rarity') {
      list.sort(function(a,b){
        var d = (RARITY_ORDER[a.rarity]||9) - (RARITY_ORDER[b.rarity]||9);
        return d !== 0 ? d : (a.ts+a.gender < b.ts+b.gender ? -1 : 1);
      });
    }

    var ownedTotal = typeCards.filter(function(c){ return c.owned; }).length;
    document.getElementById('countLabel').textContent =
      '全486枚（243タイプ×男女）／ 発見 ' + ownedTotal + '枚';

    var grid = document.getElementById('cardGrid');
    grid.innerHTML = '';
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-state">該当するカードはありません<br>診断を受けてカードをゲットしよう！</div>';
      return;
    }
    var frag = document.createDocumentFragment();
    list.forEach(function(card) {
      var el;
      if (card.owned && card.link) {
        el = document.createElement('a');
        el.className = 'zukan-card owned rarity-' + card.rarity;
        el.href = 'result.html?type=' + card.link.code + '&v=' + card.link.version + '&gender=' + card.link.gender + '&saved=1';
      } else {
        el = document.createElement('div');
        el.className = 'zukan-card unowned';
      }
      el.setAttribute('data-ts', card.ts);

      var img = document.createElement('img');
      img.src = typeImagePath(card);
      img.loading = 'lazy';
      img.alt = '';

      var label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = card.owned
        ? card.ts + (card.gender === 'M' ? ' ♂' : ' ♀')
        : '???';

      el.appendChild(img);
      el.appendChild(label);
      frag.appendChild(el);
    });
    grid.appendChild(frag);
  }

  function renderHidden() {
    var ownedHiddenSet = {};
    var albumCards = (typeof AlbumUtils !== 'undefined') ? AlbumUtils.getAlbumCards() : [];
    albumCards.forEach(function(c){ if (c.isHidden && c.hiddenId) ownedHiddenSet[c.hiddenId] = true; });

    var grid = document.getElementById('hiddenGrid');
    if (typeof HIDDEN_CHARACTERS === 'undefined' || !HIDDEN_CHARACTERS.length) {
      grid.innerHTML = '<div class="empty-state">データなし</div>';
      return;
    }
    HIDDEN_CHARACTERS.forEach(function(hc) {
      var owned = !!ownedHiddenSet[hc.id];
      var rarity = hc.a === 1 ? 'r7' : 'r6';
      var el;
      if (owned) {
        el = document.createElement('a');
        el.className = 'zukan-card owned rarity-' + rarity;
        el.href = 'result.html?char=' + hc.id + '&v=120&saved=1';
      } else {
        el = document.createElement('div');
        el.className = 'zukan-card unowned';
      }
      var img = document.createElement('img');
      if (owned) {
        img.src = 'https://bigfive.jr-genius.jp/ogp-image?char=' + hc.id;
      } else {
        var code5 = '' + hc.o + hc.c + hc.e + hc.a + hc.n;
        img.src = 'images/characters/secret/' + (hc.gender === 'M' ? 'M' : 'F') + '/' + code5 + '.webp';
      }
      img.loading = 'lazy';
      img.alt = '';
      var label = document.createElement('div');
      label.className = 'card-label';
      label.textContent = owned ? hc.id : '???';
      el.appendChild(img);
      el.appendChild(label);
      grid.appendChild(el);
    });
  }

  function init() {
    build();
    renderTitle();
    renderChart();
    renderList();
    renderHidden();
    document.querySelectorAll('.filter-tab').forEach(function(btn){
      btn.addEventListener('click', function(){ setFilter(btn.dataset.filter); });
    });
  }

  init();
})();

// ===== 解放済み機能一覧 =====

  if (typeof UNLOCK_TABLE === 'undefined') return;
  var features = UNLOCK_TABLE.filter(function(e) {
    return e.url && e.id !== 'zukan_s3' && e.id !== 'zukan_s2';
  });
  var html = '';
  features.forEach(function(f) {
    html += '<div class="umap-row">'
      + '<a class="umap-link" href="' + f.url + '">'
      + '<div class="umap-count">' + f.cards + '枚</div>'
      + '<div class="umap-name">' + f.label + '</div>'
      + '</a>'
      + '<div class="umap-status">解放済み</div>'
      + '</div>';
  });
  var el = document.getElementById('unlockMapList');
  if (el) el.innerHTML = html;
})();
</script>
