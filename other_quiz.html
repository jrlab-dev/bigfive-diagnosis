<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0e27;
    --purple: #8b5cf6;
    --blue: #3b82f6;
    --pink: #ec4899;
    --text: #e2e8f0;
    --dim: #94a3b8;
    --card-bg: rgba(26,10,62,0.45);
    --card-border: rgba(139,92,246,0.2);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden; line-height: 1.8;
  }
  .bg-nebula {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139,92,246,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 85% 15%, rgba(236,72,153,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 70% 40% at 50% 70%, rgba(139,92,246,0.08) 0%, transparent 70%);
    animation: nebula-drift 25s ease-in-out infinite alternate;
  }
  @keyframes nebula-drift { 0%{transform:scale(1)} 100%{transform:scale(1.05) translate(-1%,1%)} }
  .bg-stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; animation: twinkle 4s ease-in-out infinite alternate; }
  @keyframes twinkle { 0%{opacity:.5} 100%{opacity:1} }

  /* ===== 共通 ===== */
  .screen {
    position: relative; z-index: 1;
    width: 100%; max-width: 560px;
    min-height: 100vh;
    display: none; flex-direction: column;
    padding: 40px 24px;
  }
  .screen.active { display: flex; }

  /* ===== スタート画面 ===== */
  #startScreen { justify-content: center; align-items: center; text-align: center; }
  .start-eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: .1em;
    color: var(--purple); margin-bottom: 16px;
  }
  .start-title {
    font-size: 26px; font-weight: 900; line-height: 1.4; margin-bottom: 10px;
  }
  .start-title em {
    font-style: normal;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .start-sub { font-size: 14px; color: var(--dim); margin-bottom: 36px; line-height: 1.7; }

  /* 関係性選択 */
  .rel-label { font-size: 13px; color: var(--dim); text-align: left; width: 100%; margin-bottom: 10px; font-weight: 500; }
  .rel-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 24px; }
  .rel-btn {
    padding: 16px 6px; border-radius: 14px;
    background: rgba(139,92,246,0.08);
    border: 1.5px solid rgba(139,92,246,0.15);
    color: var(--dim); font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s; text-align: center; line-height: 1.5;
  }
  .rel-btn .rel-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .rel-btn:hover { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.35); color: var(--text); }
  .rel-btn.selected { border-color: var(--purple); color: var(--text); font-weight: 700; }
  .rel-btn.sel-love    { background: rgba(236,72,153,0.15); border-color: var(--pink); }
  .rel-btn.sel-work    { background: rgba(59,130,246,0.15); border-color: var(--blue); }
  .rel-btn.sel-friend  { background: rgba(16,185,129,0.15); border-color: #10b981; }

  /* 名前入力 */
  .input-group { width: 100%; margin-bottom: 18px; text-align: left; }
  .input-label { display: block; font-size: 13px; color: var(--dim); margin-bottom: 8px; font-weight: 500; }
  .text-input {
    width: 100%; padding: 14px 18px;
    background: rgba(139,92,246,0.08); border: 1.5px solid rgba(139,92,246,0.2);
    border-radius: 12px; color: var(--text); font-family: inherit; font-size: 16px;
    outline: none; transition: border-color .2s;
  }
  .text-input::placeholder { color: var(--dim); }
  .text-input:focus { border-color: var(--purple); }

  /* 付き合い期間 */
  .period-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .period-btn {
    padding: 10px 8px; border-radius: 10px;
    background: rgba(139,92,246,0.08); border: 1.5px solid rgba(139,92,246,0.15);
    color: var(--dim); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all .2s; text-align: center;
  }
  .period-btn:hover { background: rgba(139,92,246,0.18); color: var(--text); }
  .period-btn.selected { background: rgba(139,92,246,0.2); border-color: var(--purple); color: var(--text); font-weight: 700; }

  .gender-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .gender-btn {
    padding: 10px 8px; border-radius: 10px;
    background: rgba(139,92,246,0.08); border: 1.5px solid rgba(139,92,246,0.15);
    color: var(--dim); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all .2s; text-align: center;
  }
  .gender-btn:hover { background: rgba(139,92,246,0.18); color: var(--text); }
  .gender-btn.selected { background: rgba(139,92,246,0.2); border-color: var(--purple); color: var(--text); font-weight: 700; }

  /* キャラクター表示 */
  .char-area { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
  .char-img-other {
    width: 160px; height: 160px; object-fit: contain; border-radius: 16px;
    background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.2);
  }
  .char-name-label { font-size: 13px; color: var(--dim); margin-top: 8px; }

  .accuracy-note {
    display: none; font-size: 12px; color: var(--dim);
    padding: 10px 14px; background: rgba(139,92,246,0.07);
    border: 1px solid rgba(139,92,246,0.15); border-radius: 8px;
    margin-bottom: 20px; width: 100%; text-align: left;
  }
  .accuracy-note.show { display: block; }

  .start-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    color: #fff; font-family: inherit; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s; margin-bottom: 16px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
  }
  .start-btn:hover { opacity: .9; transform: translateY(-1px); }
  .start-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .start-note { font-size: 12px; color: var(--dim); text-align: center; line-height: 1.6; }

  /* ===== クイズ画面 ===== */
  #quizScreen { justify-content: flex-start; }
  .who-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 24px;
    padding: 10px 14px; border-radius: 10px;
  }
  .who-bar.rel-love   { background: rgba(236,72,153,0.09); border: 1px solid rgba(236,72,153,0.22); }
  .who-bar.rel-work   { background: rgba(59,130,246,0.09); border: 1px solid rgba(59,130,246,0.22); }
  .who-bar.rel-friend { background: rgba(16,185,129,0.09); border: 1px solid rgba(16,185,129,0.22); }
  .who-icon { font-size: 20px; }
  .who-name-txt { font-size: 14px; font-weight: 700; }
  .rel-love   .who-name-txt { color: var(--pink); }
  .rel-work   .who-name-txt { color: var(--blue); }
  .rel-friend .who-name-txt { color: #10b981; }
  .who-sub-txt { font-size: 12px; color: var(--dim); }

  .progress { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
  .progress-bar { flex:1; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; transition: width .4s ease; }
  .rel-love-bar   .progress-fill { background: linear-gradient(90deg, var(--pink), var(--purple)); }
  .rel-work-bar   .progress-fill { background: linear-gradient(90deg, var(--blue), var(--purple)); }
  .rel-friend-bar .progress-fill { background: linear-gradient(90deg, #10b981, var(--blue)); }
  .progress-text { font-size:13px; color:var(--dim); font-weight:500; min-width:40px; text-align:right; }

  .question-area { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .question-num { font-size:13px; font-weight:500; margin-bottom:12px; }
  .rel-love   .question-num { color: var(--pink); }
  .rel-work   .question-num { color: var(--blue); }
  .rel-friend .question-num { color: #10b981; }
  .question-text { font-size:18px; line-height:1.7; margin-bottom:36px; min-height:80px; transition:opacity .2s; }

  .answers { display:flex; gap:10px; margin-bottom:40px; }
  .answer-btn {
    flex:1; padding:14px 4px; font-family:inherit; font-size:12px; font-weight:500;
    color:var(--dim); background:rgba(139,92,246,0.08); border:1.5px solid rgba(139,92,246,0.15);
    border-radius:12px; cursor:pointer; transition:all .2s;
    min-height:48px; display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .answer-btn:hover { background:rgba(139,92,246,0.2); border-color:rgba(139,92,246,0.4); color:var(--text); }
  .answer-btn.selected { background:linear-gradient(135deg,var(--purple),var(--blue)); border-color:transparent; color:#fff; font-weight:700; }

  .back-btn {
    display:inline-flex; align-items:center; gap:6px; font-family:inherit; font-size:13px;
    color:var(--dim); background:none; border:none; cursor:pointer; padding:8px 0; transition:color .2s;
  }
  .back-btn:hover { color:var(--text); }

  /* ===== ローディング ===== */
  #loadingScreen { justify-content:center; align-items:center; text-align:center; gap:24px; }
  .loading-spinner {
    width:56px; height:56px; border:3px solid rgba(139,92,246,0.2);
    border-top-color:var(--purple); border-radius:50%;
    animation:spin 1s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size:20px; font-weight:700; }
  .loading-name { background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .loading-sub { font-size:14px; color:var(--dim); }
  .loading-dots::after { content:''; animation:dots 1.5s infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

  /* ===== 結果画面 ===== */
  #resultScreen { justify-content:flex-start; padding-top:48px; }
  .result-header { text-align:center; margin-bottom:32px; }
  .result-rel-badge {
    display:inline-block; font-size:12px; font-weight:700;
    border-radius:20px; padding:4px 16px; margin-bottom:12px;
  }
  .badge-love   { background:rgba(236,72,153,0.15); color:var(--pink); border:1px solid rgba(236,72,153,0.3); }
  .badge-work   { background:rgba(59,130,246,0.15); color:var(--blue); border:1px solid rgba(59,130,246,0.3); }
  .badge-friend { background:rgba(16,185,129,0.15); color:#10b981; border:1px solid rgba(16,185,129,0.3); }
  .result-name { font-size:26px; font-weight:900; margin-bottom:6px; }
  .result-name em { font-style:normal; background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .result-sub { font-size:13px; color:var(--dim); }

  /* 特性バー */
  .traits-card {
    background:var(--card-bg); border:1px solid var(--card-border);
    border-radius:16px; padding:24px; margin-bottom:20px; backdrop-filter:blur(8px);
  }
  .trait-row { margin-bottom:20px; }
  .trait-row:last-child { margin-bottom:0; }
  .trait-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .trait-label { font-size:14px; font-weight:700; }
  .trait-desc { font-size:11px; color:var(--dim); font-weight:400; margin-left:6px; }
  .trait-level { font-size:12px; padding:2px 10px; border-radius:10px; font-weight:600; }
  .lv-high { background:rgba(236,72,153,0.2); color:var(--pink); }
  .lv-mid  { background:rgba(139,92,246,0.2); color:var(--purple); }
  .lv-low  { background:rgba(148,163,184,0.15); color:var(--dim); }
  .bar-bg  { height:8px; background:rgba(255,255,255,0.02); border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; transition:width .8s cubic-bezier(.4,0,.2,1); }

  /* 相性カード */
  .compat-card {
    border-radius:16px; padding:24px; margin-bottom:20px; text-align:center;
    backdrop-filter:blur(8px);
  }
  .compat-card.love   { background:rgba(236,72,153,0.08); border:1px solid rgba(236,72,153,0.2); }
  .compat-card.work   { background:rgba(59,130,246,0.08); border:1px solid rgba(59,130,246,0.2); }
  .compat-card.friend { background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2); }
  .compat-title { font-size:14px; color:var(--dim); margin-bottom:10px; }
  .compat-score { font-size:52px; font-weight:900; line-height:1; margin-bottom:8px; }
  .compat-score.love   { background:linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .compat-score.work   { background:linear-gradient(135deg,var(--blue),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .compat-score.friend { background:linear-gradient(135deg,#10b981,var(--blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .compat-label { font-size:16px; font-weight:700; margin-bottom:8px; }
  .compat-desc { font-size:13px; color:var(--dim); line-height:1.7; }

  /* 性格説明カード */
  .desc-card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 22px 24px; margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }
  .desc-title { font-size: 13px; color: var(--dim); margin-bottom: 10px; font-weight: 500; }
  .desc-text { font-size: 15px; line-height: 1.9; color: var(--text); }
  .desc-keywords { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .desc-kw {
    font-size: 12px; padding: 4px 12px; border-radius: 20px;
    background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.2);
    color: var(--purple); font-weight: 500;
  }

  /* 相性誘導カード */
  .compat-prompt {
    background: rgba(139,92,246,0.07); border: 1px solid rgba(139,92,246,0.2);
    border-radius: 16px; padding: 22px 24px; margin-bottom: 20px;
    text-align: center;
  }
  .compat-prompt-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
  .compat-prompt-sub { font-size: 13px; color: var(--dim); margin-bottom: 16px; line-height: 1.7; }
  .compat-prompt-btn {
    display: inline-block; padding: 12px 24px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700;
    text-decoration: none; transition: opacity .2s;
  }
  .compat-prompt-btn:hover { opacity: .85; }

  /* 精度注記 */
  .accuracy-card {
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
    border-radius:12px; padding:14px 16px; margin-bottom:20px;
    font-size:12px; color:var(--dim); line-height:1.7;
  }

  /* アクション */
  .action-btn {
    width:100%; padding:15px; border:none; border-radius:14px;
    font-family:inherit; font-size:15px; font-weight:700;
    cursor:pointer; transition:all .2s; margin-bottom:12px;
    display:block; text-decoration:none; text-align:center;
  }
  .btn-primary { background:linear-gradient(135deg,var(--pink),var(--purple)); color:#fff; }
  .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
  .btn-secondary { background:rgba(139,92,246,0.1); border:1.5px solid rgba(139,92,246,0.25); color:var(--text); }
  .btn-secondary:hover { background:rgba(139,92,246,0.2); }
  .btn-save { background:linear-gradient(135deg,#10b981,#059669); }
  .btn-save:hover { box-shadow:0 8px 32px rgba(16,185,129,0.4); }
  .btn-saved { background:linear-gradient(135deg,rgba(6,182,212,0.8),rgba(59,130,246,0.8)); pointer-events:none; }

  @media(max-width:400px){
    .question-text{font-size:16px}
    .answer-btn{font-size:11px;padding:12px 2px}
    .answers{gap:6px}
    .start-title{font-size:22px}
    .rel-options{grid-template-columns:1fr 1fr 1fr;gap:6px}
  }

  /* ===== バイアス警告カード ===== */
  .bias-warning {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 16px; padding: 20px;
    margin-bottom: 16px; text-align: center;
  }
  .bias-warning-text {
    font-size: 13px; color: #fbbf24;
    margin-bottom: 14px; line-height: 1.6; font-weight: 500;
  }
  .bias-btns { display: flex; gap: 10px; flex-direction: column; }
  .bias-btn-remove {
    padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #f59e0b, #ec4899);
    color: #fff; font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s;
  }
  .bias-btn-remove:hover { opacity: .9; transform: translateY(-1px); }
  .bias-btn-keep {
    padding: 11px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; color: var(--dim);
    font-family: inherit; font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .bias-btn-keep:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  /* ===== バイアス説明画面 ===== */
  #biasScreen { justify-content: flex-start; padding-top: 48px; }
  .bias-screen-header { text-align: center; margin-bottom: 28px; }
  .bias-screen-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: .12em;
    color: #f59e0b; margin-bottom: 10px;
  }
  .bias-screen-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; line-height: 1.4; }
  .bias-screen-sub { font-size: 13px; color: var(--dim); line-height: 1.7; }
  .bias-list { width: 100%; margin-bottom: 28px; }
  .bias-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 16px; margin-bottom: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; transition: border-color .2s;
  }
  .bias-item:hover { border-color: rgba(245,158,11,0.25); }
  .bias-num {
    width: 30px; height: 30px; flex-shrink: 0;

function genPersonDesc(sc, name) {
  // 最もスコアが高い2特性を特定
  const sorted = Object.entries(sc).sort((a,b) => b[1]-a[1]);
  const top1 = sorted[0][0], top2 = sorted[1][0];

  // 総合説明文
  const e1 = traitDesc[top1][sc[top1]];
  const e2 = traitDesc[top2][sc[top2]];

  const summaries = {
    EO: `${name}さんは、明るく社交的でありながら好奇心旺盛な行動派タイプです。`,
    EC: `${name}さんは、社交的でありながら責任感も強い、信頼されやすいタイプです。`,
    EA: `${name}さんは、人懐こく思いやり深い、周りを温かくする存在です。`,
    EN: `${name}さんは、表に出る明るさの裏に繊細な感受性を持ち合わせています。`,
    OC: `${name}さんは、好奇心と計画性を兼ね備えた、着実に挑戦できるタイプです。`,
    OA: `${name}さんは、オープンマインドで人にも親切な、懐の深いタイプです。`,
    ON: `${name}さんは、豊かな感受性と好奇心を持つ、感性の鋭いタイプです。`,
    CA: `${name}さんは、誠実で思いやりがあり、周囲から信頼を集めやすいタイプです。`,
    CN: `${name}さんは、几帳面で繊細。細かいことに気づける、丁寧な仕事をするタイプです。`,
    AN: `${name}さんは、共感力が高く感情豊か。人の気持ちに寄り添うのが得意なタイプです。`,
  };

  const key = [top1, top2].sort().join('').replace('EN','EN').replace('NE','EN');
  const keyStr = top1+top2;
  const reverseKey = top2+top1;
  const summary = summaries[keyStr] || summaries[reverseKey] || `${name}さんは${e1.kw[0]}で${e2.kw[0]}な性格傾向が見られます。`;

  // キーワード収集（全特性から）
  const allKw = [];
  for (const f of ['E','N','O','C','A']) {
    allKw.push(...(traitDesc[f][sc[f]]?.kw || []).slice(0,1));
  }

  return { summary, detail: `${e1.text} ${e2.text}`, keywords: allKw };
}

// ===== 相性スコア計算（学術根拠版＋関係性重み） =====
function calcCompat(other, my, weights) {
  if (!my) return null;
  const m = { E: my.E, N: my.N, O: my.O, C: my.C, A: my.A };
  const p = { E: other.E, N: other.N, O: other.O, C: other.C, A: other.A };

  // 差分
  const dE = Math.abs(m.E - p.E);
  const dN = Math.abs(m.N - p.N);
  const dO = Math.abs(m.O - p.O);
  const dC = Math.abs(m.C - p.C);
  const dA = Math.abs(m.A - p.A);

  // 生スコア計算（Actor効果 + Partner効果 + 差分ペナルティ）
  let rawScore =
    (6 - m.N) * 5.0 +   // 自分のN低さ（Actor効果 ρ=-.29）
    (6 - p.N) * 4.0 +   // 相手のN低さ（Partner効果 r=-.22）
    m.A * 5.0 +          // 自分のA高さ（Actor効果 ρ=+.29）
    p.A * 3.5 +          // 相手のA高さ（Partner効果 r=+.15）
    m.C * 3.0 +          // 自分のC高さ（Actor効果 ρ=+.25）
    p.C * 1.5 +          // 相手のC高さ（Partner効果 r=+.12）
    (-dC * 2.0) +       // Cスコア差ペナルティ
    (-dE * 3.5) +       // Eスコア差ペナルティ
    (-dO * 0.5);        // Oスコア差ペナルティ

  // 特殊パターン補正
  if (m.N >= 4 && p.A <= 2) rawScore -= 15;
  if (p.N >= 4 && m.A <= 2) rawScore -= 15;
  if (m.N <= 2 && p.N <= 2) rawScore += 8;
  if (m.A >= 4 && p.A >= 4) rawScore += 8;

  // 関係性の重みで差分ペナルティを調整
  rawScore += (-dN) * (weights.N || 1) * 1.5;
  rawScore += (-dA) * (weights.A || 1) * 0.5;

  // 正規化: -16〜130 → 0〜100
  const MIN = -30, MAX = 130;
  const normalizedScore = (rawScore - MIN) / (MAX - MIN) * 100;
  return Math.max(0, Math.min(100, Math.round(normalizedScore)));
}

// ===== 結果保存機能（LocalStorage） =====
const STORAGE_KEY_OTHERS = 'bigfive_other_results';

// 保存済みチェック
function checkAlreadySaved() {
  if (!window.currentOtherResult) return;

  const others = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');
  const saveBtn = document.getElementById('saveBtn');
  if (!saveBtn) return;

  const isSaved = others.some(r =>
    r.name === window.currentOtherResult.name &&
    r.code === window.currentOtherResult.code
  );

  if (isSaved) {
    saveBtn.textContent = '✓ 保存済み';
    saveBtn.className = 'action-btn btn-saved';
  }
}

// 保存実行
document.getElementById('saveBtn').addEventListener('click', () => {
  if (!window.currentOtherResult) return;

  try {
    const others = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');
    const result = window.currentOtherResult;

    // 重複チェック
    const isDuplicate = others.some(r =>
      r.name === result.name && r.code === result.code
    );

    if (!isDuplicate) {
      others.unshift(result);
      if (others.length > 100) others.pop();
      localStorage.setItem(STORAGE_KEY_OTHERS, JSON.stringify(others));
    }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.textContent = '✓ 保存しました！';
    saveBtn.className = 'action-btn btn-saved';

    setTimeout(() => {
      saveBtn.textContent = '✓ 保存済み';
    }, 2000);

  } catch (e) {
    console.error('保存エラー:', e);
    alert('保存に失敗しました');
  }
});

// ===== 星の生成 =====
(function(){
  const el = document.getElementById('bgStars');
  let css = '';
  const n = 60, bright = new Set(), superBright = new Set();
  while(superBright.size<5) superBright.add(Math.floor(Math.random()*n));
  while(bright.size<10){const v=Math.floor(Math.random()*n);if(!superBright.has(v))bright.add(v);}
  for(let i=0;i<n;i++){
    const x=Math.random()*100,y=Math.random()*100;
    if(superBright.has(i)){const s=Math.random()*2+3,o=Math.random()*.2+.8;css+=`radial-gradient(${s}px ${s}px at ${x}% ${y}%,rgba(255,255,255,${o}) 0%,transparent 100%),radial-gradient(${s*4}px ${s*4}px at ${x}% ${y}%,rgba(200,210,255,${o*.4}) 0%,transparent 100%),radial-gradient(${s*8}px ${s*8}px at ${x}% ${y}%,rgba(140,160,255,${o*.15}) 0%,transparent 100%)`;}
    else if(bright.has(i)){const s=Math.random()*2+2,o=Math.random()*.3+.7;css+=`radial-gradient(${s}px ${s}px at ${x}% ${y}%,rgba(255,255,255,${o}) 0%,transparent 100%),radial-gradient(${s*3}px ${s*3}px at ${x}% ${y}%,rgba(180,200,255,${o*.3}) 0%,transparent 100%)`;}
    else{const s=Math.random()*1.5+.5,o=Math.random()*.5+.2;css+=`radial-gradient(${s}px ${s}px at ${x}% ${y}%,rgba(255,255,255,${o}) 0%,transparent 100%)`;}
    if(i<n-1)css+=',';
  }
  el.style.backgroundImage=css;
})();
