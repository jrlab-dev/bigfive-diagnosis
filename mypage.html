  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    content: ''; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; transition: transform 0.3s;
  }
  .setting-toggle.on::after { transform: translateX(20px); }

  .sync-status { font-size: 12px; margin-top: 10px; min-height: 18px; text-align: center; }

  .album-header {

  .album-progress-bar {

  .album-card-source {
    position: absolute;
    top: 3px;
    right: 3px;
    font-size: 9px;
    background: rgba(0,0,0,0.5);
    color: #aaa;
    padding: 1px 5px;
    border-radius: 4px;
  }
  .album-empty-slot {
    aspect-ratio: 1;
    border: 2px dashed rgba(139,92,246,0.2);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(139,92,246,0.25);
    font-size: 24px;
  }
  .album-badges {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .album-badge {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    position: relative;
  }
  .album-badge.locked {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    opacity: 0.4;
  }
  .album-badge.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); border: 2px solid #cd7f32; }
  .album-badge.silver { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); border: 2px solid #c0c0c0; }
  .album-badge.gold { background: linear-gradient(135deg, #ffd700, #daa520); border: 2px solid #ffd700; }
  .album-badge.diamond { background: linear-gradient(135deg, #b9f2ff, #7df9ff, #89cff0); border: 2px solid #7df9ff; }
  .album-badge-label {
    position: absolute;
    bottom: -16px;
    font-size: 9px;
    color: #999;
    white-space: nowrap;
  }
  .album-badge.locked .album-badge-label { color: #555; }
  .album-badge-date {
    position: absolute;
    bottom: -28px;
    font-size: 8px;
    color: #666;
    white-space: nowrap;
  }
  .stage2-btn {
    display: block;
    width: 100%;
    max-width: 300px;
    margin: 0 auto 30px;
    padding: 14px 24px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s;
  }
  .stage2-btn.locked {
    background: rgba(255,255,255,0.05);
    color: #555;
    cursor: not-allowed;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .stage2-btn.unlocked {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: #fff;
    box-shadow: 0 4px 20px rgba(139,92,246,0.4);
  }
  .stage2-btn.unlocked:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(139,92,246,0.5);
  }
  .album-empty-msg {
    text-align: center;
    color: #888;
    padding: 40px 20px;
    font-size: 14px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      トップに戻る
    </a>
    <h1 class="page-title">
      <span class="icon-with-text">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        マイページ
      </span>
    </h1>
    <div style="width: 80px;"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="my">自分の結果</button>
    <button class="tab" data-tab="others">あの人の結果</button>
    <button class="tab" data-tab="tests">心理テスト</button>
    <button class="tab" data-tab="album">カードアルバム</button>
  </div>

  <div id="myResults" class="results-list"></div>
  <div id="otherResults" class="results-list" style="display: none;"></div>
  <div id="otherTestResults" class="results-list" style="display: none;"></div>
  <div id="albumContent" class="results-list" style="display: none;"></div>

  <!-- 総合レポートバナー -->
  <div class="report-banner" id="reportBanner"></div>

  <div class="setting-row">
    <span class="setting-label">
      <span class="icon-with-text">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        トップページのキャラクターを表示
      </span>
    </span>
    <button class="setting-toggle" id="charToggleBtn" aria-label="キャラクター表示切り替え"></button>
  </div>

  <!-- 端末引継ぎ -->
  <div class="sync-section">
    <div class="sync-title">
      <span class="icon-with-text">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
          <line x1="12" y1="18" x2="12.01" y2="18"/>
        </svg>
        端末引継ぎ
      </span>
    </div>
    <div class="sync-desc">IDを使って別のスマホ・PCにデータを引き継げます</div>
    <button class="sync-btn save" id="syncSaveBtn">このデバイスのデータを保存する</button>
    <div class="sync-id-box" id="syncIdBox" style="display:none">
      <div class="sync-id-label">引継ぎID</div>
      <div class="sync-id-text" id="syncIdText"></div>
      <button class="sync-copy-btn" id="syncCopyBtn">コピー</button>
      <div class="sync-id-note">このIDを別のデバイスで下の欄に入力してください</div>
    </div>
    <div class="sync-divider">または</div>
    <div class="sync-input-row">
      <input type="text" class="sync-input" id="syncIdInput" placeholder="引継ぎIDを入力">
      <button class="sync-btn load" id="syncLoadBtn">引き継ぐ</button>
    </div>
    <div class="sync-status" id="syncStatus"></div>
  </div>

  <button class="clear-all" id="clearAllBtn">
    <span class="icon-with-text">
      <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/>
        <line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
      すべてのデータを削除
    </span>
  </button>

  <div style="margin-top: 20px; text-align: center;">
    <a href="team.html" class="back-link" style="font-size: 14px; display: inline-flex; align-items: center; gap: 6px;">
      <span class="icon-with-text">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        チーム相性を診断する →
      </span>
    </a>
  </div>
</div>

<script>
// ===== データ管理 =====
const STORAGE_KEY_MY = 'bigfive_my_results';
const STORAGE_KEY_OTHERS = 'bigfive_other_results';
const MAX_MY = 5;
const MAX_OTHERS = 10;
const STORAGE_KEY_ACTIVE_MY = 'bigfive_active_my_index';

let currentTab = 'my';

// 適用中インデックスの取得・設定
function getActiveMyIndex() {
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
  if (results.length === 0) return 0;
  const saved = parseInt(localStorage.getItem(STORAGE_KEY_ACTIVE_MY) || '0');
  return Math.min(saved, results.length - 1);
}
function setActiveMyIndex(index) {
  localStorage.setItem(STORAGE_KEY_ACTIVE_MY, String(index));
}

// タブ切り替え
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    render();
  });
});

// 日付フォーマット
function formatDate(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diffMs = now - date;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return '今日';
  if (diffDays === 1) return '昨日';
  if (diffDays < 7) return `${diffDays}日前`;
  if (diffDays < 30) return `${Math.floor(diffDays / 7)}週間前`;
  return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
}

// 色取得
function getFactorColor(factor) {
  const colors = { O: '#8b5cf6', C: '#3b82f6', E: '#f97316', A: '#f472b6', N: '#14b8a6' };
  return colors[factor] || '#888';
}

// 自分の結果レンダリング
function renderMyResults() {
  const container = document.getElementById('myResults');
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');

  if (results.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <p>まだ保存された結果がありません</p>
        <p><a href="quiz.html">診断を受ける →</a></p>
      </div>
    `;
    return;
  }

  const activeIdx = getActiveMyIndex();
  const capacityColor = results.length >= MAX_MY ? '#ef4444' : results.length >= MAX_MY - 1 ? '#f97316' : '#8b5cf6';
  const capacityHtml = `<div style="text-align:right;font-size:12px;color:${capacityColor};margin-bottom:8px;font-weight:600;">${results.length}/${MAX_MY}件保存中${results.length >= MAX_MY ? '（上限・古いものから上書きされます）' : ''}</div>`;
  const activeNoteHtml = `<div style="font-size:12px;color:#a78bfa;margin-bottom:10px;"><span class="icon-with-text"><svg class="icon-sm" style="color:#fbbf24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>適用中 = 相性診断などで使われる結果。タップして切替可</span></div>`;

  const vBadgeColors = { '10': '#64748b', '30': '#3b82f6', '120': '#8b5cf6' };
  container.innerHTML = capacityHtml + activeNoteHtml + results.map((r, i) => {
    const scores = r.scores || {
      O: parseInt(r.code[0]), C: parseInt(r.code[1]),
      E: parseInt(r.code[2]), A: parseInt(r.code[3]), N: parseInt(r.code[4])
    };
    const gender = r.gender || 'F';
    const imgCode = r.code.split('').map(d => { const n = parseInt(d); return n <= 2 ? '1' : n >= 4 ? '5' : '3'; }).join('');
    const hiddenImg = (r.version === '120') ? getHiddenCharImg(scores, gender) : null;
    const imgPath = hiddenImg || `images/characters/${gender}/${imgCode}.webp`;
    const v = String(r.version || '10');
    const vLabel = v + 'Q';
    const vColor = vBadgeColors[v] || '#64748b';

    const isActive = i === activeIdx;
    return `
      <a href="result.html?type=${r.code}&v=${r.version || '10'}&gender=${gender}" class="result-card" style="${isActive ? 'border:1.5px solid rgba(139,92,246,0.5);padding-top:28px;' : ''}">
        ${isActive ? '<div style="position:absolute;top:8px;left:12px;background:#8b5cf6;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.05em;"><span class="icon-with-text"><svg class="icon-sm" style="width:11px;height:11px;" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>適用中</span></div>' : ''}
        <div class="result-card-icon" style="background: rgba(139,92,246,0.2);">
          <div class="character-thumb">
            <img src="${imgPath}" alt="キャラクター" onerror="this.parentElement.innerHTML='<span class=\'character-thumb-placeholder\'><svg class=\'icon-sm\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><circle cx=\'12\' cy=\'8\' r=\'4\'/><path d=\'M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2\'/></svg></span>'">
          </div>
        </div>
        <div class="result-card-content">
          <div class="result-card-name">${r.typeName}</div>
          <div class="result-card-meta">
            <span class="result-card-code">${r.code}</span>
            <span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;background:${vColor}33;color:${vColor};border:1px solid ${vColor}66;">${vLabel}</span>
            <span class="result-card-date">${formatDate(r.date)}</span>
          </div>
          <div class="score-bars">
            ${['O','C','E','A','N'].map(f => {
              const score = scores[f] || 3;
              const pct = (score / 5) * 100;
              return `<div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${getFactorColor(f)}"></div></div>`;
            }).join('')}
          </div>
        </div>
        <button class="partner-btn${isActive ? ' active' : ''}" title="適用中に設定" onclick="event.preventDefault(); setActiveMyIndex(${i}); renderMyResults();">${isActive ? '<svg class="icon-sm" style="color:#fbbf24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' : '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'}</button>
        <button class="delete-btn" onclick="event.preventDefault(); deleteMyResult(${i})">削除</button>
      </a>
    `;
  }).join('');
}

// あの人の結果レンダリング
let selectedOthers = new Set();

function toggleOtherCheck(index) {
  if (selectedOthers.has(index)) {
    selectedOthers.delete(index);
  } else {
    selectedOthers.add(index);
  }
  renderOtherCheckUI();
}

// トップページに表示するパートナーを設定
function setPartner(index) {
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');
  const current = JSON.parse(localStorage.getItem('bigfive_selected_partner') || 'null');
  // 同じ人を再タップで解除
  if (current && current.code === results[index].code && current.name === results[index].name) {
    localStorage.removeItem('bigfive_selected_partner');
  } else {
    localStorage.setItem('bigfive_selected_partner', JSON.stringify(results[index]));
  }
  renderOtherResults();
}

function renderOtherCheckUI() {
  const count = selectedOthers.size;
  const bar = document.getElementById('selectAction');
  if (!bar) return;

  document.querySelectorAll('.other-check').forEach((el, i) => {
    const isChecked = selectedOthers.has(i);
    el.classList.toggle('checked', isChecked);
    el.innerHTML = isChecked ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>' : '';
    el.closest('.result-card').classList.toggle('checked', isChecked);
  });

  const countEl = bar.querySelector('.select-action-count');
  const btnEl = bar.querySelector('.select-action-btn');
  if (count > 0) {
    bar.style.display = 'flex';
    countEl.textContent = `${count}人選択中`;
    btnEl.innerHTML = `<span class="icon-with-text"><svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>チーム相性を見る</span>`;
  } else {
    bar.style.display = 'none';
  }
}

function renderOtherResults() {
  const container = document.getElementById('otherResults');
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');

  if (results.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <p>まだ保存された結果がありません</p>
        <p><a href="other_quiz.html">あの人を診断する →</a></p>
      </div>
    `;
    return;
  }

  // 選択中インデックスを有効範囲内に制限
  selectedOthers = new Set([...selectedOthers].filter(i => i < results.length));

  const otherCapColor = results.length >= MAX_OTHERS ? '#ef4444' : results.length >= MAX_OTHERS - 1 ? '#f97316' : '#ec4899';
  const otherCapHtml = `<div style="text-align:right;font-size:12px;color:${otherCapColor};margin-bottom:8px;font-weight:600;">${results.length}/${MAX_OTHERS}件保存中${results.length >= MAX_OTHERS ? '（上限・古いものから上書きされます）' : ''}</div>`;
  const addBtn = results.length < MAX_OTHERS
    ? `<a href="other_quiz.html" style="display:block;width:100%;padding:14px;border-radius:12px;background:rgba(236,72,153,0.1);border:1.5px dashed rgba(236,72,153,0.35);color:#ec4899;font-size:14px;font-weight:700;text-align:center;text-decoration:none;margin-bottom:12px;">+ あの人を新しく診断する</a>`
    : `<a href="other_quiz.html" style="display:block;width:100%;padding:14px;border-radius:12px;background:rgba(239,68,68,0.1);border:1.5px dashed rgba(239,68,68,0.35);color:#ef4444;font-size:14px;font-weight:700;text-align:center;text-decoration:none;margin-bottom:12px;">上書き診断する（最も古い結果が削除されます）</a>`;

  const actionBar = `<div class="select-action" id="selectAction" style="display:none;">
    <span><span class="select-action-count">0人選択中</span></span>
    <a href="team.html" class="select-action-btn">
      <span class="icon-with-text">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        チーム相性を見る
      </span>
    </a>
  </div>`;

  // パートナー未設定なら1番目の人を自動設定
  if (!localStorage.getItem('bigfive_selected_partner')) {
    localStorage.setItem('bigfive_selected_partner', JSON.stringify(results[0]));
  }
  const partnerData = JSON.parse(localStorage.getItem('bigfive_selected_partner') || 'null');
  container.innerHTML = otherCapHtml + addBtn + actionBar + results.map((r, i) => {
    const scores = {
      O: parseInt(r.code[0]), C: parseInt(r.code[1]),
      E: parseInt(r.code[2]), A: parseInt(r.code[3]), N: parseInt(r.code[4])
    };
    const gender = r.gender || 'F';
    function roundImg(s) { return s <= 2 ? 1 : s >= 4 ? 5 : 3; }
    const imgCode = `${roundImg(scores.O)}${roundImg(scores.C)}${roundImg(scores.E)}${roundImg(scores.A)}${roundImg(scores.N)}`;
    const hiddenImgOther = (r.version === '120') ? getHiddenCharImg(scores, gender) : null;
    const charSrc = hiddenImgOther || `images/characters/${gender}/${imgCode}.webp`;
    const isChecked = selectedOthers.has(i);
    const isPartner = partnerData && partnerData.code === r.code && partnerData.name === r.name;
    const isChild = r.relation === 'child46' || r.relation === 'child79';
    return `
      <div class="result-card${isChecked ? ' checked' : ''}" style="${isChild ? 'background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.4);' : ''}">
        <div class="card-checkbox other-check${isChecked ? ' checked' : ''}" onclick="event.preventDefault(); event.stopPropagation(); toggleOtherCheck(${i})">${isChecked ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg>' : ''}</div>
        <a href="${isChild ? `kodomo.html?type=${r.code}&gender=${gender}&name=${encodeURIComponent(r.name)}&rel=${r.relation}` : `result.html?type=${r.code}&v=${r.version || '10'}&gender=${gender}&name=${encodeURIComponent(r.name)}&rel=${r.relation || 'friend'}`}" style="display:flex;align-items:center;gap:16px;flex:1;min-width:0;text-decoration:none;color:inherit;">
          <div class="result-card-icon" style="background: rgba(236,72,153,0.08); padding:0; overflow:hidden;">
            <img src="${charSrc}" alt="${r.name}" style="width:56px;height:56px;object-fit:contain;"

// ===== 心理テスト結果（concierge.jsのCONCIERGE_CONFIG.testsを使用）=====
// getResultを各テストに追加（mypage用の表示名取得）
const TEST_META = (typeof CONCIERGE_CONFIG !== 'undefined' ? CONCIERGE_CONFIG.tests : []).map(t => ({
  ...t,
  bgColor: t.bgColor || 'rgba(139,92,246,0.1)',
  getResult: t.getResult || (() => ({ name: '完了', color: '#10b981' }))
}));

function renderOtherTests() {
  const container = document.getElementById('otherTestResults');
  container.innerHTML = TEST_META.map((test, i) => {
    let stored = null;
    try { stored = JSON.parse(localStorage.getItem(test.key)); } catch(e) {}

    if (stored) {
      const res = test.getResult(stored);
      const date = stored.timestamp ? formatDate(new Date(stored.timestamp).toISOString()) : '';
      return `
        <a href="${test.url}" class="test-card">
          <div class="test-card-icon" style="background:${test.bgColor}">${test.icon}</div>
          <div class="test-card-content">
            <div class="test-card-title">${test.title}</div>
            <div class="test-card-result" style="color:${res.color}">${res.name}</div>
            ${date ? `<div class="test-card-date">${date}</div>` : ''}
          </div>
          <button class="delete-btn" onclick="event.preventDefault(); deleteTestResult('${test.key}')">削除</button>
        </a>
      `;
    } else {
      return `
        <a href="${test.url}" class="test-card not-taken">
          <div class="test-card-icon" style="background:${test.bgColor}">${test.icon}</div>
          <div class="test-card-content">
            <div class="test-card-title">${test.title}</div>
            <div class="test-card-cta">診断を受ける →</div>
          </div>
        </a>
      `;
    }
  }).join('');
}

function deleteTestResult(key) {
  if (!confirm('この結果を削除しますか？')) return;
  localStorage.removeItem(key);
  renderOtherTests();
}

// ===== アルバム =====
function renderAlbum() {
  const container = document.getElementById('albumContent');
  if (!window.AlbumUtils) { container.innerHTML = '<p style="color:#888;padding:40px;text-align:center;">読み込み中...</p>'; return; }

  // 初回アクセス時に既存データを移行
  const meta = AlbumUtils.getAlbumMeta();
  if (!meta.migrated) {
    AlbumUtils.migrateExistingResults();
  }

  const cards = AlbumUtils.getAlbumCards();
  const count = cards.length;
  const TOTAL = 8298;
  const pct = Math.round((count / TOTAL) * 100);
  const isComplete = count >= TOTAL;

  if (count === 0) {
    container.innerHTML = '<div class="album-empty-msg">診断を実行するとカードがアルバムに追加されます。<br>自分の診断や「あの人を分析する」でカードを集めましょう！<br><br>友達に結果をシェアしてもらうと図鑑が埋まります！</div>';
    return;
  }

  let html = '<div class="album-header">';
  html += `<div class="album-progress-text${isComplete ? ' complete' : ''}">${count.toLocaleString()} / ${TOTAL.toLocaleString()} 枚${isComplete ? ' COMPLETE!' : ''}</div>`;
  html += '<div class="album-progress-bar"><div class="album-progress-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';

  // カードグリッド（直近20枚まで表示）
  html += '<div class="album-grid">';
  var displayCards = cards.slice(0, 20);
  displayCards.forEach(function(card) {
    const imgPath = AlbumUtils.getCardImagePath(card);
    const r = card.rarity || 'common';
    const sourceLabel = card.source === 'my' ? '自分' : card.source === 'other' ? 'あの人' : '';
    html += '<a href="result.html?type=' + card.code + '&v=' + card.version + '&gender=' + card.gender + '&rarity=' + r + '&saved=1" class="album-card rarity-' + r + '">';
    html += '<img src="' + imgPath + '" alt="' + (card.typeName || card.code) + '" loading="lazy">';
    html += '<div class="album-card-code">' + card.code + '</div>';
    if (sourceLabel) html += '<div class="album-card-source">' + sourceLabel + '</div>';
    html += '</a>';
  });
  // 空スロット
  for (var i = displayCards.length; i < 20; i++) {
    html += '<div class="album-empty-slot">?</div>';
  }
  if (count > 20) {
    html += '<div style="grid-column:1/-1;text-align:center;font-size:12px;color:#64748b;padding:4px;">...他 ' + (count - 20) + ' 枚</div>';
  }
  html += '</div>';

  // 実績バッジ
  html += '<div class="album-badges">';
  var badgeConfigs = [
    { threshold: 10, icon: '🥉', cls: 'bronze', label: '10枚' },
    { threshold: 50, icon: '🥈', cls: 'silver', label: '50枚' },
    { threshold: 100, icon: '🥇', cls: 'gold', label: '100枚' },
    { threshold: 500, icon: '💎', cls: 'diamond', label: '500枚' },
    { threshold: 1000, icon: '👑', cls: 'diamond', label: '1000枚' },
    { threshold: 5000, icon: '🏆', cls: 'diamond', label: '5000枚' }
  ];
  badgeConfigs.forEach(function(b) {
    var unlocked = meta.milestones && meta.milestones[b.threshold];
    var dateStr = unlocked ? new Date(unlocked.date).getMonth() + 1 + '/' + new Date(unlocked.date).getDate() : '';
    html += '<div class="album-badge ' + (unlocked ? b.cls : 'locked') + '">';
    html += b.icon;
    html += '<span class="album-badge-label">' + b.label + '</span>';
    if (dateStr) html += '<span class="album-badge-date">' + dateStr + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // コレクション・図鑑ボタン
  html += '<a href="card-collection.html" class="stage2-btn unlocked" style="margin-top:12px;">📚 コレクションを開く</a>';
  html += '<a href="zukan.html" class="stage2-btn unlocked" style="margin-top:8px;">📖 全種類図鑑を開く</a>';

  container.innerHTML = html;
}

// ===== 端末引継ぎ =====
const SYNC_ID_KEY = 'bigfive_sync_id';
const SYNC_API = 'https://bigfive.jr-genius.jp/api';
const SYNC_DATA_KEYS = [
  'bigfive_my_results', 'bigfive_other_results',
  'bigfive_album', 'bigfive_album_meta',
  'bigfive_results_v10', 'bigfive_results_v30', 'bigfive_results_v120',
];

function getSyncId() {
  let id = localStorage.getItem(SYNC_ID_KEY);
  if (!id) {
    id = crypto.randomUUID();
    localStorage.setItem(SYNC_ID_KEY, id);
  }
  return id;
}

function collectLocalData() {
  const data = {};
  SYNC_DATA_KEYS.forEach(k => {
    const v = localStorage.getItem(k);
    if (v) data[k] = v;
  });
  // bigfive_ で始まる残りのキーも収集
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('bigfive_') && !data[k]) {
      data[k] = localStorage.getItem(k);
    }
  }
  return data;
}

function setStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status ' + (type || '');
}

document.getElementById('syncSaveBtn').addEventListener('click', async () => {
  const btn = document.getElementById('syncSaveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  setStatus('', '');
  try {
    const id = getSyncId();
    const data = collectLocalData();
    const res = await fetch(`${SYNC_API}/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: id, data }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'エラー');
    document.getElementById('syncIdText').textContent = id;
    document.getElementById('syncIdBox').style.display = 'block';
    setStatus('保存しました！', 'ok');
  } catch (e) {
    setStatus('保存に失敗しました: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'このデバイスのデータを保存する';
  }
});

document.getElementById('syncCopyBtn').addEventListener('click', () => {
  const id = document.getElementById('syncIdText').textContent;
  navigator.clipboard.writeText(id).then(() => {
    const btn = document.getElementById('syncCopyBtn');
    btn.textContent = 'コピーしました！';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  });
});

document.getElementById('syncLoadBtn').addEventListener('click', async () => {
  const input = document.getElementById('syncIdInput').value.trim();
  if (!input) { setStatus('IDを入力してください', 'err'); return; }

  const btn = document.getElementById('syncLoadBtn');
  btn.disabled = true;
  btn.textContent = '読み込み中...';
  setStatus('', '');
  try {
    const res = await fetch(`${SYNC_API}/load?id=${encodeURIComponent(input)}`);
    if (res.status === 404) throw new Error('IDが見つかりません');
    if (!res.ok) throw new Error('サーバーエラー');
    const json = await res.json();
    if (!json.found) throw new Error('IDが見つかりません');
    if (!confirm('このIDのデータを引き継ぎます。\n現在のデータは上書きされます。よろしいですか？')) return;
    Object.entries(json.data).forEach(([k, v]) => localStorage.setItem(k, v));
    localStorage.setItem(SYNC_ID_KEY, input);
    setStatus('引き継ぎ完了！ページを再読み込みします...', 'ok');
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    setStatus('失敗しました: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '引き継ぐ';
  }
});

// 既存のIDがあれば表示
(function() {

<script>
// 隠しキャラ画像パスを取得（一致しなければnull）120問版のみ呼ぶこと
function getHiddenCharImg(scores, gender) {
  if (typeof HIDDEN_CHARACTERS === 'undefined') return null;
  if (!scores.O) return null;
  function matchGender(ch) { return ch.gender === 'any' || ch.gender === gender; }
  // ① ズバリ照合（診断スコアそのまま）
  const exact = HIDDEN_CHARACTERS.find(ch =>
    ch.o === scores.O && ch.c === scores.C && ch.e === scores.E && ch.a === scores.A && ch.n === scores.N && matchGender(ch)
  );
  if (exact) return exact.img ? `images/characters/hidden/${exact.img}` : null;
  // ② 丸め照合（1/3/5変換後）
  function toScale(v) { return v <= 2 ? 1 : v >= 4 ? 5 : 3; }
  const ch = HIDDEN_CHARACTERS.find(c =>
    c.o === toScale(scores.O) && c.c === toScale(scores.C) && c.e === toScale(scores.E) &&
    c.a === toScale(scores.A) && c.n === toScale(scores.N) && matchGender(c)
  );
  return ch && ch.img ? `images/characters/hidden/${ch.img}` : null;
}

// 初期表示（全スクリプト読み込み後に実行）
render();
renderReportBanner();
</script>
