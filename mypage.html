<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ — ビッグファイブ3125タイプ診断</title>
<meta name="description" content="保存した診断結果の一覧。自分の過去の結果や、あの人の性格分析結果を確認できます。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0e27;
    --purple: #8b5cf6;
    --blue: #3b82f6;
    --pink: #ec4899;
    --text: #e2e8f0;
    --dim: #94a3b8;
    --c-O: #8b5cf6;
    --c-C: #3b82f6;
    --c-E: #f97316;
    --c-A: #f472b6;
    --c-N: #14b8a6;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  /* ヘッダー */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }
  .page-title {
    font-size: 20px;
    font-weight: 700;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(139,92,246,0.2);
  }
  .tab {
    padding: 12px 24px;
    background: none;
    border: none;
    color: var(--dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--purple);
    border-bottom-color: var(--purple);
  }

  /* 結果リスト */
  .results-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
  }
  .empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }
  .empty-state p {
    font-size: 14px;
    line-height: 1.8;
  }
  .empty-state a {
    color: var(--purple);
    text-decoration: none;
    font-weight: 600;
  }
  .empty-state a:hover { text-decoration: underline; }

  /* 結果カード */
  .result-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: rgba(26,10,62,0.45);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .result-card:hover {
    border-color: rgba(139,92,246,0.5);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(139,92,246,0.15);
  }
  .result-card-icon {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .result-card-content {
    flex: 1;
    min-width: 0;
  }
  .result-card-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-card-meta {
    font-size: 12px;
    color: var(--dim);
  }
  .result-card-code {
    font-family: monospace;
    background: rgba(139,92,246,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--purple);
  }
  .result-card-date {
    margin-left: 8px;
  }
  .delete-btn {
    padding: 8px 12px;
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: #f87171;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .delete-btn:hover {
    background: rgba(239,68,68,0.25);
    border-color: rgba(239,68,68,0.5);
  }

  /* スコア表示 */
  .score-bars {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .score-bar {
    width: 24px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
  }

  /* キャラクター画像表示 */
  .character-thumb {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    overflow: hidden;
    background: rgba(26,10,62,0.45);
    border: 1px solid rgba(139,92,246,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .character-thumb img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .character-thumb-placeholder {
    font-size: 28px;
    opacity: 0.3;
  }

  /* 心理テストカード */
  .test-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: rgba(26,10,62,0.45);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
  }
  .test-card:hover {
    border-color: rgba(139,92,246,0.5);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(139,92,246,0.15);
  }
  .test-card.not-taken {
    opacity: 0.55;
    border-style: dashed;
  }
  .test-card.not-taken:hover {
    opacity: 0.8;
  }
  .test-card-icon {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .test-card-content { flex: 1; min-width: 0; }
  .test-card-title {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 4px;
  }
  .test-card-result {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .test-card-date {
    font-size: 12px;
    color: var(--dim);
  }
  .test-card-cta {
    font-size: 13px;
    color: var(--purple);
    font-weight: 600;
  }

  /* 総合レポートバナー */
  .report-banner {
    margin-bottom: 20px;
    padding: 18px 20px;
    background: linear-gradient(135deg, rgba(139,92,246,0.18), rgba(236,72,153,0.12));
    border: 1px solid rgba(139,92,246,0.35);
    border-radius: 14px;
    text-align: center;
  }
  .report-banner-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .report-banner-sub {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 14px;
  }
  .report-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    border: none;
    border-radius: 999px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .report-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .report-missing-note {
    font-size: 12px;
    color: var(--dim);
    margin-top: 10px;
  }
  .report-missing-note a { color: var(--purple); font-weight: 600; text-decoration: none; }

  /* クリアボタン */
  .clear-all {
    margin-top: 24px;
    padding: 12px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    color: #f87171;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }
  .clear-all:hover {
    background: rgba(239,68,68,0.2);
  }
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      トップに戻る
    </a>
    <h1 class="page-title">📋 マイページ</h1>
    <div style="width: 80px;"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="my">自分の結果</button>
    <button class="tab" data-tab="others">あの人の結果</button>
    <button class="tab" data-tab="tests">心理テスト</button>
  </div>

  <div id="myResults" class="results-list"></div>
  <div id="otherResults" class="results-list" style="display: none;"></div>
  <div id="otherTestResults" class="results-list" style="display: none;"></div>

  <!-- 総合レポートバナー -->
  <div class="report-banner" id="reportBanner"></div>

  <button class="clear-all" id="clearAllBtn">🗑️ すべてのデータを削除</button>

  <div style="margin-top: 20px; text-align: center;">
    <a href="team.html" class="back-link" style="font-size: 14px; display: inline-flex; align-items: center; gap: 6px;">
      👥 チーム相性を診断する →
    </a>
  </div>
</div>

<script>
// ===== データ管理 =====
const STORAGE_KEY_MY = 'bigfive_my_results';
const STORAGE_KEY_OTHERS = 'bigfive_other_results';

let currentTab = 'my';

// タブ切り替え
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    render();
  });
});

// 日付フォーマット
function formatDate(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diffMs = now - date;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays === 0) return '今日';
  if (diffDays === 1) return '昨日';
  if (diffDays < 7) return `${diffDays}日前`;
  if (diffDays < 30) return `${Math.floor(diffDays / 7)}週間前`;
  return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
}

// 色取得
function getFactorColor(factor) {
  const colors = { O: '#8b5cf6', C: '#3b82f6', E: '#f97316', A: '#f472b6', N: '#14b8a6' };
  return colors[factor] || '#888';
}

// 自分の結果レンダリング
function renderMyResults() {
  const container = document.getElementById('myResults');
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');

  if (results.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <p>まだ保存された結果がありません</p>
        <p><a href="quiz.html">診断を受ける →</a></p>
      </div>
    `;
    return;
  }

  container.innerHTML = results.map((r, i) => {
    const scores = r.scores || {};
    const gender = r.gender || 'F';
    const imgCode = r.code.split('').map(d => { const n = parseInt(d); return n <= 2 ? '1' : n >= 4 ? '5' : '3'; }).join('');
    const imgPath = `images/characters/${gender}/${imgCode}.webp`;

    return `
      <a href="result.html?type=${r.code}&v=${r.version || '10'}&gender=${gender}" class="result-card">
        <div class="result-card-icon" style="background: rgba(139,92,246,0.2);">
          <div class="character-thumb">
            <img src="${imgPath}" alt="キャラクター" onerror="this.parentElement.innerHTML='<span class=\'character-thumb-placeholder\'>🧑</span>'">
          </div>
        </div>
        <div class="result-card-content">
          <div class="result-card-name">${r.typeName}</div>
          <div class="result-card-meta">
            <span class="result-card-code">${r.code}</span>
            <span class="result-card-date">${formatDate(r.date)}</span>
          </div>
          <div class="score-bars">
            ${['O','C','E','A','N'].map(f => {
              const score = scores[f] || 3;
              const pct = (score / 5) * 100;
              return `<div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${getFactorColor(f)}"></div></div>`;
            }).join('')}
          </div>
        </div>
        <button class="delete-btn" onclick="event.preventDefault(); deleteMyResult(${i})">削除</button>
      </a>
    `;
  }).join('');
}

// あの人の結果レンダリング
function renderOtherResults() {
  const container = document.getElementById('otherResults');
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');

  if (results.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <p>まだ保存された結果がありません</p>
        <p><a href="other_quiz.html">あの人を診断する →</a></p>
      </div>
    `;
    return;
  }

  container.innerHTML = results.map((r, i) => {
    // コードからスコアを抽出
    const scores = {
      O: parseInt(r.code[0]), C: parseInt(r.code[1]),
      E: parseInt(r.code[2]), A: parseInt(r.code[3]), N: parseInt(r.code[4])
    };
    return `
      <div class="result-card">
        <div class="result-card-icon" style="background: rgba(236,72,153,0.2);">
          👤
        </div>
        <div class="result-card-content">
          <div class="result-card-name">${r.name}</div>
          <div class="result-card-meta">
            <span class="result-card-code">${r.code}</span>
            <span class="result-card-date">${formatDate(r.date)}</span>
          </div>
          <div class="score-bars">
            ${['O','C','E','A','N'].map(f => {
              const score = scores[f] || 3;
              const pct = (score / 5) * 100;
              return `<div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${getFactorColor(f)}"></div></div>`;
            }).join('')}
          </div>
        </div>
        <button class="delete-btn" onclick="deleteOtherResult(${i})">削除</button>
      </div>
    `;
  }).join('');
}

// 削除機能
function deleteMyResult(index) {
  if (!confirm('この結果を削除しますか？')) return;
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_MY) || '[]');
  results.splice(index, 1);
  localStorage.setItem(STORAGE_KEY_MY, JSON.stringify(results));
  render();
}

function deleteOtherResult(index) {
  if (!confirm('この結果を削除しますか？')) return;
  const results = JSON.parse(localStorage.getItem(STORAGE_KEY_OTHERS) || '[]');
  results.splice(index, 1);
  localStorage.setItem(STORAGE_KEY_OTHERS, JSON.stringify(results));
  render();
}

// ===== 心理テスト結果 =====
const TEST_META = [
  {
    key: 'love_result',
    title: '恋愛スタイル診断',
    icon: '💕',
    url: 'love.html',
    bgColor: 'rgba(236,72,153,0.15)',
    getResult: (d) => {
      const map = {
        eros: { name: '情熱型', color: '#ec4899' },
        ludus: { name: '遊び型', color: '#f97316' },
        storge: { name: '友情型', color: '#22c55e' },
        pragma: { name: '現実型', color: '#3b82f6' },
        mania: { name: '執着型', color: '#8b5cf6' },
        agape: { name: '献身型', color: '#f59e0b' },
      };
      return map[d.mainStyle] || { name: d.mainStyle, color: '#ec4899' };
    }
  },
  {
    key: 'mindset_result',
    title: 'マインドセット診断',
    icon: '🧠',
    url: 'mindset.html',
    bgColor: 'rgba(16,185,129,0.15)',
    getResult: (d) => {
      const map = {
        growth: { name: '成長マインドセット', color: '#10b981' },
        mixed:  { name: '混合マインドセット', color: '#8b5cf6' },
        fixed:  { name: '固定マインドセット', color: '#f97316' },
      };
      return map[d.type] || { name: d.type, color: '#10b981' };
    }
  },
  {
    key: 'sdt_result',
    title: '動機タイプ診断',
    icon: '⚡',
    url: 'sdt.html',
    bgColor: 'rgba(59,130,246,0.15)',
    getResult: (d) => {
      const map = {
        autonomy:    { name: '自律駆動型', color: '#3b82f6' },
        competence:  { name: '達成志向型', color: '#f59e0b' },
        relatedness: { name: '関係重視型', color: '#ec4899' },
      };
      return map[d.strongest] || { name: d.strongest, color: '#3b82f6' };
    }
  },
  {
    key: 'schwartz_result',
    title: '価値観診断',
    icon: '🌍',
    url: 'schwartz.html',
    bgColor: 'rgba(245,158,11,0.15)',
    getResult: (d) => {
      const valJa = {
        'self-direction': '自己方向性', 'stimulation': '刺激追求', 'hedonism': '快楽主義',
        'achievement': '達成', 'power': '権力', 'security': '安全',
        'conformity': '同調', 'tradition': '伝統', 'benevolence': '仁愛', 'universalism': '普遍主義'
      };
      const top = d.top3 && d.top3[0] ? valJa[d.top3[0]] || d.top3[0] : '不明';
      const sub = d.top3 && d.top3[1] ? valJa[d.top3[1]] || d.top3[1] : '';
      return { name: sub ? `${top}・${sub}重視` : `${top}重視`, color: '#f59e0b' };
    }
  },
];

function renderOtherTests() {
  const container = document.getElementById('otherTestResults');
  container.innerHTML = TEST_META.map((test, i) => {
    let stored = null;
    try { stored = JSON.parse(localStorage.getItem(test.key)); } catch(e) {}

    if (stored) {
      const res = test.getResult(stored);
      const date = stored.timestamp ? formatDate(new Date(stored.timestamp).toISOString()) : '';
      return `
        <a href="${test.url}" class="test-card">
          <div class="test-card-icon" style="background:${test.bgColor}">${test.icon}</div>
          <div class="test-card-content">
            <div class="test-card-title">${test.title}</div>
            <div class="test-card-result" style="color:${res.color}">${res.name}</div>
            ${date ? `<div class="test-card-date">${date}</div>` : ''}
          </div>
          <button class="delete-btn" onclick="event.preventDefault(); deleteTestResult('${test.key}')">削除</button>
        </a>
      `;
    } else {
      return `
        <a href="${test.url}" class="test-card not-taken">
          <div class="test-card-icon" style="background:${test.bgColor}">${test.icon}</div>
          <div class="test-card-content">
            <div class="test-card-title">${test.title}</div>
            <div class="test-card-cta">診断を受ける →</div>
          </div>
        </a>
      `;
    }
  }).join('');
}

function deleteTestResult(key) {
  if (!confirm('この結果を削除しますか？')) return;
  localStorage.removeItem(key);
  renderOtherTests();
}

// 全削除
document.getElementById('clearAllBtn').addEventListener('click', () => {
  if (!confirm('すべての保存データを削除しますか？\nこの操作は取り消せません。')) return;
  localStorage.removeItem(STORAGE_KEY_MY);
  localStorage.removeItem(STORAGE_KEY_OTHERS);
  TEST_META.forEach(t => localStorage.removeItem(t.key));
  render();
});

// レンダリング
function render() {
  const myEl = document.getElementById('myResults');
  const otherEl = document.getElementById('otherResults');
  const testEl = document.getElementById('otherTestResults');
  myEl.style.display = 'none';
  otherEl.style.display = 'none';
  testEl.style.display = 'none';

  if (currentTab === 'my') {
    myEl.style.display = 'flex';
    renderMyResults();
  } else if (currentTab === 'others') {
    otherEl.style.display = 'flex';
    renderOtherResults();
  } else {
    testEl.style.display = 'flex';
    renderOtherTests();
  }
}

// ===== 総合レポートバナー =====
function renderReportBanner() {
  const banner = document.getElementById('reportBanner');
  const hasBf  = JSON.parse(localStorage.getItem('bigfive_my_results') || '[]').length > 0;
  const tests  = [
    { key: 'love_result',     name: '恋愛スタイル診断', url: 'love.html' },
    { key: 'mindset_result',  name: 'マインドセット診断', url: 'mindset.html' },
    { key: 'sdt_result',      name: '動機タイプ診断',    url: 'sdt.html' },
    { key: 'schwartz_result', name: '価値観診断',        url: 'schwartz.html' },
  ];
  const missing = tests.filter(t => !localStorage.getItem(t.key));
  const allDone = hasBf && missing.length === 0;

  if (allDone) {
    banner.innerHTML = `
      <div class="report-banner-title">✦ 全テスト完了！総合レポートが見られます</div>
      <div class="report-banner-sub">5つのテストを統合した、あなただけの深層分析</div>
      <a href="report.html" class="report-btn">📊 総合レポートを見る</a>
    `;
  } else {
    const remainCount = missing.length + (hasBf ? 0 : 1);
    const missingLinks = missing.slice(0, 2).map(t =>
      `<a href="${t.url}">${t.name}</a>`
    ).join('・');
    banner.innerHTML = `
      <div class="report-banner-title">📊 総合レポートを解放しよう</div>
      <div class="report-banner-sub">あと ${remainCount} つのテストで全テスト統合レポートが見られます</div>
      <a href="report.html" class="report-btn" style="opacity:0.6;">📊 レポートを見る（一部）</a>
      <div class="report-missing-note">未受診: ${missingLinks}${missing.length > 2 ? '…' : ''}</div>
    `;
  }
}

// 初期表示
render();
renderReportBanner();
</script>
<script src="nav.js"></script>
</body>
</html>
