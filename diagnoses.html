<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://bigfive.jr-genius.jp/diagnoses.html">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" href="favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="favicon-180.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理学診断 一覧 | ビッグファイブ 診断【公式】</title>
<meta name="description" content="【公式】ビッグファイブ 診断を含む9種類の心理学診断一覧。HSP・愛着スタイル・恋愛スタイル・マインドセット・価値観・動機タイプなど。科学的根拠に基づく無料診断。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e27; --purple: #8b5cf6; --blue: #3b82f6;
  --pink: #ec4899; --yellow: #fbbf24; --green: #10b981;
  --text: #e2e8f0; --dim: #94a3b8;
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

.bg-nebula {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(139,92,246,0.12) 0%, transparent 70%),
              radial-gradient(ellipse 50% 40% at 80% 15%, rgba(251,191,36,0.08) 0%, transparent 70%),
              radial-gradient(ellipse 60% 40% at 50% 75%, rgba(59,130,246,0.06) 0%, transparent 70%);
}

.page-wrap { max-width: 640px; margin: 0 auto; padding: 40px 20px 60px; position: relative; z-index: 1; }

/* ===== ヘッダー ===== */
.page-badge { display: inline-block; font-size: 12px; font-weight: 700; color: var(--purple); background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3); border-radius: 999px; padding: 5px 14px; margin-bottom: 16px; }
.page-title { font-size: 26px; font-weight: 900; line-height: 1.4; margin-bottom: 10px; }
.page-title em { font-style: normal; background: linear-gradient(135deg, var(--purple), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.page-sub { font-size: 14px; color: var(--dim); line-height: 1.8; margin-bottom: 36px; }

/* ===== おすすめセクション ===== */
#recSection { display: none; margin-bottom: 36px; }
.rec-header { font-size: 13px; font-weight: 700; color: var(--yellow); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.rec-grid { display: flex; flex-direction: column; gap: 10px; }
.rec-card { display: flex; align-items: center; gap: 14px; background: rgba(251,191,36,0.07); border: 1.5px solid rgba(251,191,36,0.25); border-radius: 14px; padding: 14px 16px; cursor: pointer; text-decoration: none; transition: all .2s; }
.rec-card:hover { background: rgba(251,191,36,0.13); transform: translateY(-2px); }
.rec-icon { font-size: 28px; flex-shrink: 0; }
.rec-body { flex: 1; }
.rec-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.rec-reason { font-size: 12px; color: var(--yellow); line-height: 1.5; }
.rec-arrow { font-size: 16px; color: var(--dim); flex-shrink: 0; }

/* ===== 診断カード一覧 ===== */
.section-label { font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: .08em; margin-bottom: 14px; }
.diag-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
.diag-card { display: flex; align-items: flex-start; gap: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 16px; text-decoration: none; color: inherit; transition: all .2s; }
.diag-card:hover { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.25); transform: translateY(-2px); }
.diag-icon { font-size: 30px; flex-shrink: 0; margin-top: 2px; }
.diag-body { flex: 1; }
.diag-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.diag-desc { font-size: 12px; color: var(--dim); line-height: 1.6; margin-bottom: 8px; }
.diag-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.diag-tag { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 999px; }
.tag-q { background: rgba(59,130,246,0.12); color: #93c5fd; }
.tag-time { background: rgba(148,163,184,0.1); color: var(--dim); }
.tag-done { background: rgba(16,185,129,0.12); color: #6ee7b7; }
.diag-arrow { font-size: 18px; color: var(--dim); flex-shrink: 0; margin-top: 6px; }
</style>
</head>
<body>
<div class="bg-nebula"></div>
<div class="page-wrap">
  <span class="page-badge">🧪 心理学診断 一覧</span>
  <h1 class="page-title">科学に基づく<br><em>9つの心理学診断</em></h1>
  <p class="page-sub">すべて無料・登録不要。各診断は独立して受けられます。<br>ビッグファイブの結果がある方には、あなたに合ったおすすめを表示します。</p>

  <!-- おすすめセクション（ビッグファイブ結果がある場合のみ表示） -->
  <section id="recSection">
    <p class="rec-header">⭐ あなたへのおすすめ</p>
    <div class="rec-grid" id="recGrid"></div>
    <div style="height:1px;background:rgba(255,255,255,0.07);margin:28px 0;"></div>
  </section>

  <!-- すべての診断 -->
  <p class="section-label">すべての診断</p>
  <div class="diag-grid" id="diagGrid"></div>
</div>

<script>
const DIAGNOSES = [
  {
    id: 'bigfive',
    icon: '🧬',
    name: 'ビッグファイブ性格診断',
    desc: '心理学で最も信頼性が高い5因子モデル。開放性・誠実性・外向性・協調性・感受性のバランスから3125タイプを判定。',
    url: 'quiz.html?v=10',
    questions: 10,
    minutes: 3,
  },
  {
    id: 'hsp',
    icon: '🌙',
    name: 'HSP 感受性チェック',
    desc: 'あなたの感じ方の深さを分析。EOE（感覚過敏）・AES（美的感受性）・LST（低感覚耐性）の3因子で特徴がわかる。',
    url: 'hsp.html',
    questions: 12,
    minutes: 3,
    recommend: { factor: 'N', score: 5, reason: '感受性が豊かなあなたに。HSPとの関連を知ることで自己理解が深まります。' },
  },
  {
    id: 'attachment',
    icon: '🤝',
    name: '愛着スタイル チェック',
    desc: '大切な人との関わり方のパターンを分析。安心型・不安型・回避型・恐れ型の4スタイルから自分の傾向がわかる。',
    url: 'attachment.html',
    questions: 12,
    minutes: 3,
    recommend: { factor: 'A', score: 5, reason: '思いやりが強いあなたに。人との繋がり方をさらに深く理解できます。' },
  },
  {
    id: 'love',
    icon: '💕',
    name: '恋愛スタイル診断',
    desc: '情熱型・遊び型・友情型・現実型・執着型・献身型の6スタイルからあなたの恋愛パターンを分析。ビッグファイブとの組み合わせも。',
    url: 'love.html',
    questions: 12,
    minutes: 3,
    recommend: { factor: 'E', score: 5, reason: '社交的なあなたに。恋愛での自分らしさを発見できます。' },
  },
  {
    id: 'mindset',
    icon: '🌱',
    name: 'マインドセット診断',
    desc: 'ドゥエック博士の理論に基づく診断。「成長型」か「固定型」かを8問で分析。才能観・努力観があなたの行動にどう影響するかがわかる。',
    url: 'mindset.html',
    questions: 8,
    minutes: 2,
    recommend: { factor: 'C', score: 1, reason: 'やり遂げる力を伸ばすヒントが見つかるかもしれません。' },
  },
  {
    id: 'schwartz',
    icon: '🧭',
    name: '価値観タイプ診断',
    desc: 'シュワーツの価値理論（80カ国で検証）に基づく21問診断。安全・達成・普遍主義など10カテゴリであなたの核心的な価値観を分析。',
    url: 'schwartz.html',
    questions: 21,
    minutes: 5,
    recommend: { factor: 'O', score: 5, reason: '好奇心旺盛なあなたに。自分が何を大切にしているかが明確になります。' },
  },
  {
    id: 'sdt',
    icon: '⚡',
    name: '動機タイプ診断',
    desc: 'Deci & Ryanの自己決定理論による21問診断。自律性・有能感・関係性の3欲求から「何があなたを動かすか」を科学的に分析。',
    url: 'sdt.html',
    questions: 21,
    minutes: 5,
    recommend: { factor: 'C', score: 5, reason: 'やり遂げる力が高いあなたに。その動機の源泉を探ってみましょう。' },
  },
  {
    id: 'kodomo',
    icon: '🧒',
    name: 'お子さんの性格診断',
    desc: '4〜9歳の子どもを持つ保護者向け。30問の観察ベース診断でお子さんの強み・楽しみやすい遊び・将来の夢へのヒントがわかる。',
    url: 'kodomo.html',
    questions: 30,
    minutes: 6,
  },
  {
    id: 'other',
    icon: '👥',
    name: 'あの人を診断する',
    desc: 'パートナー・友人・家族など「あの人」の性格をビッグファイブで診断。診断後はチーム相性分析にも使えます。',
    url: 'other_quiz.html',
    questions: 10,
    minutes: 3,
  },
];

// ===== ビッグファイブの保存結果を取得 =====
function getMyBigFiveScores() {
  try {
    const results = JSON.parse(localStorage.getItem('bigfive_my_results') || '[]');
    if (results.length === 0) return null;
    return results[0].scores; // 最新の結果
  } catch(e) { return null; }
}

// ===== 完了済み診断を取得 =====
function getDoneIds() {
  const done = new Set();
  try {
    if (localStorage.getItem('bigfive_my_results')) done.add('bigfive');
    if (localStorage.getItem('hsp_result')) done.add('hsp');
    if (localStorage.getItem('attachment_result')) done.add('attachment');
    if (localStorage.getItem('love_result')) done.add('love');
    if (localStorage.getItem('mindset_result')) done.add('mindset');
    if (localStorage.getItem('schwartz_result')) done.add('schwartz');
    if (localStorage.getItem('sdt_result')) done.add('sdt');
    if ((JSON.parse(localStorage.getItem('bigfive_other_results') || '[]')).some(r => r.relation && r.relation.startsWith('child'))) done.add('kodomo');
    if ((JSON.parse(localStorage.getItem('bigfive_other_results') || '[]')).some(r => !r.relation || !r.relation.startsWith('child'))) done.add('other');
  } catch(e) {}
  return done;
}

// ===== おすすめ生成 =====
function buildRecommendations(scores) {
  const recs = [];
  DIAGNOSES.forEach(d => {
    if (!d.recommend) return;
    const { factor, score, reason } = d.recommend;
    if (scores[factor] === score) recs.push({ ...d, reason });
  });
  // 最大3件
  return recs.slice(0, 3);
}

// ===== 診断カードHTML =====
function diagCardHTML(d, done) {
  const isDone = done.has(d.id);
  return `
    <a href="${d.url}" class="diag-card">
      <span class="diag-icon">${d.icon}</span>
      <div class="diag-body">
        <div class="diag-name">${d.name}</div>
        <div class="diag-desc">${d.desc}</div>
        <div class="diag-meta">
          <span class="diag-tag tag-q">📝 ${d.questions}問</span>
          <span class="diag-tag tag-time">⏱ 約${d.minutes}分</span>
          ${isDone ? '<span class="diag-tag tag-done">✓ 受診済み</span>' : ''}
        </div>
      </div>
      <span class="diag-arrow">›</span>
    </a>`;
}

// ===== 描画 =====
const scores = getMyBigFiveScores();
const done = getDoneIds();

if (scores) {
  const recs = buildRecommendations(scores);
  if (recs.length > 0) {
    const recSection = document.getElementById('recSection');
    const recGrid = document.getElementById('recGrid');
    recSection.style.display = 'block';
    recs.forEach(r => {
      recGrid.innerHTML += `
        <a href="${r.url}" class="rec-card">
          <span class="rec-icon">${r.icon}</span>
          <div class="rec-body">
            <div class="rec-name">${r.name}</div>
            <div class="rec-reason">${r.reason}</div>
          </div>
          <span class="rec-arrow">›</span>
        </a>`;
    });
  }
}

const diagGrid = document.getElementById('diagGrid');
DIAGNOSES.forEach(d => { diagGrid.innerHTML += diagCardHTML(d, done); });
</script>
<script src="nav.js"></script>
</body>
</html>
