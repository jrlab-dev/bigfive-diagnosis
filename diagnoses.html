    desc: 'Hollandの理論に基づく職業興味検査。60問（約5分）または291問（約20分）で6タイプからあなたの職業適性パターンを導きます。',
    url: 'riasec.html',
    questions: 60,
    minutes: 5,
    recommend: { factor: 'O', score: 5, reason: '好奇心が旺盛なあなたに。自分に合う職業の方向性が見つかります。' },
  },
  {
    id: 'career-integration',
    fc: 'O',
    icon: '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 009 9"/></svg>',
    name: 'キャリア統合分析',
    desc: 'ビッグファイブ適性×RIASEC興味の2軸を統合。性格的適性と職業興味の両面から最適なキャリアを分析。両方の結果が必要です。',
    url: 'career-integration.html',
    questions: 0,
    minutes: 0,
  },
];

// ===== ビッグファイブの保存結果を取得 =====
function getMyBigFiveScores() {
  try {
    const results = JSON.parse(localStorage.getItem('bigfive_my_results') || '[]');
    if (results.length === 0) return null;
    const activeIdx = Math.min(parseInt(localStorage.getItem('bigfive_active_my_index') || '0'), Math.max(0, results.length - 1));
    return results[activeIdx].scores;
  } catch(e) { return null; }
}

// ===== 完了済み診断を取得 =====
function getDoneIds() {
  const done = new Set();
  try {
    if (localStorage.getItem('bigfive_my_results')) done.add('bigfive');
    if (localStorage.getItem('bigfive_my_results')) done.add('career');
    if (localStorage.getItem('hsp_result')) done.add('hsp');
    if (localStorage.getItem('attachment_result')) done.add('attachment');
    if (localStorage.getItem('love_result')) done.add('love');
    if (localStorage.getItem('mindset_result')) done.add('mindset');
    if (localStorage.getItem('schwartz_result')) done.add('schwartz');
    if (localStorage.getItem('sdt_result')) done.add('sdt');
    if (localStorage.getItem('locus_result')) done.add('locus');
    if (localStorage.getItem('eq_result')) done.add('eq');
    if (localStorage.getItem('impostor_result')) done.add('impostor');
    if (localStorage.getItem('riasec_result')) done.add('riasec');
    if (localStorage.getItem('riasec_result') && localStorage.getItem('bigfive_my_results')) done.add('career-integration');
    if ((JSON.parse(localStorage.getItem('bigfive_other_results') || '[]')).some(r => r.relation && r.relation.startsWith('child'))) done.add('kodomo');
    if ((JSON.parse(localStorage.getItem('bigfive_other_results') || '[]')).some(r => !r.relation || !r.relation.startsWith('child'))) done.add('other');
  } catch(e) {}
  return done;
}

// ===== おすすめ生成 =====
function buildRecommendations(scores) {
  const recs = [];
  DIAGNOSES.forEach(d => {
    if (!d.recommend) return;
    const { factor, score, reason } = d.recommend;
    if (scores[factor] === score) recs.push({ ...d, reason });
  });
  // 最大2件
  return recs.slice(0, 2);
}

// ===== 診断カードHTML =====
function diagCardHTML(d, done) {
  const isDone = done.has(d.id);
  const locked = (typeof isUnlocked === 'function') && !isUnlocked(d.id);
  const required = locked && (typeof getRequiredCards === 'function') ? getRequiredCards(d.id) : 0;
  const current  = locked && (typeof getCardCount    === 'function') ? getCardCount()          : 0;
  const remaining = required - current;

  if (locked) {
    return `
    <div class="diag-card diag-card-locked" data-feature="${d.id}" data-required="${required}" onclick="window._showLockedToast(${remaining})">
      <span class="diag-icon" style="opacity:0.35">${d.icon}</span>
      <div class="diag-body" style="opacity:0.4">
        <div class="diag-name">${d.name}</div>
        <div class="diag-desc">${d.desc}</div>
      </div>
      <div class="diag-lock-badge">🔒 あと${remaining}枚</div>
    </div>`;
  }

  return `
    <a href="${d.url}" class="diag-card"${d.fc ? ` data-fc="${d.fc}"` : ''}>
      <span class="diag-icon">${d.icon}</span>
      <div class="diag-body">
        <div class="diag-name">${d.name}</div>
        <div class="diag-desc">${d.desc}</div>
        <div class="diag-meta">
          ${d.questions > 0 ? `<span class="diag-tag tag-q"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> ${d.questions}問</span>
          <span class="diag-tag tag-time"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 約${d.minutes}分</span>` :
          '<span class="diag-tag tag-q"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg> 診断結果から即分析</span>'}
          ${isDone ? '<span class="diag-tag tag-done">✓ 受診済み</span>' : ''}
        </div>
      </div>
      <span class="diag-arrow">›</span>
    </a>`;
}

// ===== 描画 =====
const scores = getMyBigFiveScores();
const done = getDoneIds();

if (scores) {
  const recs = buildRecommendations(scores);
  if (recs.length > 0) {
    const recSection = document.getElementById('recSection');
    const recGrid = document.getElementById('recGrid');
    recSection.style.display = 'block';
    recs.forEach(r => {
      recGrid.innerHTML += `
        <a href="${r.url}" class="rec-card">
          <span class="rec-icon">${r.icon}</span>
          <div class="rec-body">
            <div class="rec-name">${r.name}</div>
            <div class="rec-reason">${r.reason}</div>
          </div>
          <span class="rec-arrow">›</span>
        </a>`;
    });
  }
}

const selfGrid = document.getElementById('selfGrid');
const otherGrid = document.getElementById('otherGrid');
const SELF_IDS = ['bigfive','hsp','attachment','love','mindset','schwartz','sdt','locus','eq','impostor'];
const sortedDiagnoses = [...DIAGNOSES].sort((a, b) => {
  const aLocked = (typeof isUnlocked === 'function') && !isUnlocked(a.id);
  const bLocked = (typeof isUnlocked === 'function') && !isUnlocked(b.id);
  if (aLocked === bLocked) return 0;
  return aLocked ? 1 : -1;
});
sortedDiagnoses.forEach(d => {
  const target = SELF_IDS.includes(d.id) ? selfGrid : otherGrid;
  target.innerHTML += diagCardHTML(d, done);
});
</script>
<style>
.diag-card-locked {
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(30,41,59,0.5);
  border: 1px solid rgba(51,65,85,0.5);
  user-select: none;
}
.diag-lock-badge {
  position: absolute;
  top: 50%;
  right: 14px;
  transform: translateY(-50%);
  background: rgba(139,92,246,0.2);
  border: 1px solid rgba(139,92,246,0.4);
  color: #a78bfa;
  font-size: 0.75rem;
  font-weight: bold;
  padding: 4px 10px;
  border-radius: 999px;
  white-space: nowrap;
}
#diagLockedToast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1e293b;
  border: 1px solid rgba(139,92,246,0.4);
  color: #e2e8f0;
  font-size: 0.85rem;
  line-height: 1.5;
  padding: 12px 18px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 7000;
  max-width: calc(100vw - 32px);
  width: max-content;
  text-align: center;
}
#diagLockedToast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
<div id="diagLockedToast"></div>
<script>
window._showLockedToast = function(remaining) {
  var toast = document.getElementById('diagLockedToast');
  if (!toast) return;
  toast.textContent = 'カードをあと' + remaining + '枚集めると解放されます。診断を受けるか、友達のシェアを受け取るとカードが増えます';
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 6000);
};
</script>
<script src="nav.js"></script>
</body>
