<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0a0e27"/>
  <!-- 五角形の5つのセクター（背景） -->
  <polygon points="32,32 32,6 56.7,23.9" fill="#8b5cf6"/>
  <polygon points="32,32 56.7,23.9 47.3,53.1" fill="#3b82f6"/>
  <polygon points="32,32 47.3,53.1 16.7,53.1" fill="#f59e0b"/>
  <polygon points="32,32 16.7,53.1 7.3,23.9" fill="#10b981"/>
  <polygon points="32,32 7.3,23.9 32,6" fill="#f0a0c8"/>
  <!-- 中心の暗い円（文字を読みやすくする） -->
  <circle cx="32" cy="32" r="16" fill="#0a0e27" opacity="0.85"/>
  <!-- BIG FIVE テキスト（上） -->
  <text x="32" y="26" text-anchor="middle" font-family="'SF Pro Display',Arial,Helvetica,sans-serif" font-weight="500" font-size="7" fill="#94a3b8" letter-spacing="0.5">BIG FIVE</text>
  <!-- OCEAN テキスト（中央下） -->
  <text x="32" y="42" text-anchor="middle" font-family="'SF Pro Display',Arial,Helvetica,sans-serif" font-weight="800" font-size="16" letter-spacing="1.5">
    <tspan fill="#8b5cf6">O</tspan><tspan fill="#3b82f6">C</tspan><tspan fill="#f59e0b">E</tspan><tspan fill="#10b981">A</tspan><tspan fill="#f0a0c8">N</tspan>
  </text>
</svg>
