/* в”Җв”Җв”Җ BACKGROUND BLOBS в”Җв”Җв”Җ */
.bg-canvas {

  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.45;
  animation: drift 20s ease-in-out infinite alternate;
}
/* гғӯгӮҙ5иүІ: Purple, Blue, Cyan, Orange, Pink */
.blob-1 { width: 520px; height: 520px; background: #6A0DAD; top: -60px; left: 20%; animation-duration: 22s; }

.blob-5 { width: 440px; height: 440px; background: #FF1493; top: 600px; left: 45%; animation-duration: 17s; animation-delay: -8s; }

@keyframes drift {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, 30px) scale(1.08); }

<script>
// в”Җв”Җв”Җ MODAL в”Җв”Җв”Җ
function openModal() {
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// в”Җв”Җв”Җ DIAGNOSIS STATE в”Җв”Җв”Җ
function getDiagnosisState() {
  const completed = JSON.parse(localStorage.getItem('big5_completed') || '[]');
  const allTests = ['quiz','love','hsp','attachment','schwartz','sdt','mindset','team','other'];
  if (completed.length === 0) return 'none';
  if (allTests.every(t => completed.includes(t))) return 'complete';
  return 'done';
}

function initDiagnosisState() {
  const state = getDiagnosisState();
  document.querySelectorAll('.dyn-state').forEach(el => el.classList.remove('active'));
  if (state === 'none') document.getElementById('dyn-none').classList.add('active');
  else if (state === 'done') document.getElementById('dyn-done').classList.add('active');
  else if (state === 'complete') document.getElementById('dyn-complete').classList.add('active');

  // Show иЁәж–ӯжёҲгҒҝ badges
  const completed = JSON.parse(localStorage.getItem('big5_completed') || '[]');
  if (completed.some(t => t === 'quiz10')) document.getElementById('badge-v10').classList.add('show');
  if (completed.some(t => t === 'quiz30')) document.getElementById('badge-v30').classList.add('show');
  if (completed.some(t => t === 'quiz120')) document.getElementById('badge-v120').classList.add('show');
}

initDiagnosisState();

// Smooth scroll for anchor links
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', function(e) {
    const target = document.querySelector(this.getAttribute('href'));
    if (target) {
      e.preventDefault();
      const top = target.getBoundingClientRect().top + window.pageYOffset - 80;
      window.scrollTo({top, behavior: 'smooth'});
    }
  });
});
</script>
